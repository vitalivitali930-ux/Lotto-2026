name: Zero Chaos Scraper

on:
  schedule:
    - cron: '*/15 * * * *' # Запуск каждые 15 минут
  workflow_dispatch: # Позволяет запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install telethon

      - name: Run Scraper
        env:
          TG_ID: ${{ secrets.TELEGRAM_API_ID }}
          TG_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: python scraper.py
