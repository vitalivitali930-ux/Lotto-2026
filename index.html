<!DOCTYPE html>
<html lang='ru' translate="no">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Living Monolith (Lobby & Shadow Edition)</title>
    <style>
        :root {
            --gold: #ffcf40;
            --space-dark: #121625; 
            --nebula-core: #222a44; 
            --spark-neon: #00fa9a;
            --trump-halo: #8a2be2; 
            --cherry-pulse: #4a0404;
            --bg-card: #ffffff;
            --grid-color: rgba(255, 207, 64, 0.06); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #050505; color: #e0e6ff;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            overflow: hidden; display: flex; flex-direction: column; perspective: 1200px; 
        }

        /* ЛОББИ - ЭКРАН ВЫБОРА */
        #lobby-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, var(--nebula-core), #000);
            z-index: 5000; display: flex; flex-wrap: wrap; 
            justify-content: center; align-content: center; gap: 20px;
            padding: 20px; transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .table-slot {
            width: 140px; height: 140px; border: 1px solid var(--gold);
            background: rgba(255, 207, 64, 0.03); display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            position: relative; overflow: hidden; transition: all 0.3s;
            backdrop-filter: blur(5px); border-radius: 10px;
        }
        .table-slot:hover { background: rgba(255, 207, 64, 0.15); transform: scale(1.05); }
        .table-status { font-size: 10px; letter-spacing: 2px; margin-top: 10px; font-weight: bold; }
        .status-red { color: #ff4d4d; text-shadow: 0 0 10px #ff4d4d; }
        .status-green { color: var(--spark-neon); text-shadow: 0 0 10px var(--spark-neon); }
        .table-id { font-size: 24px; color: var(--gold); font-weight: 900; opacity: 0.6; }
        .hidden-lobby { transform: translateY(-100%); pointer-events: none; }

        /* ИГРОВАЯ АРЕНА */
        .arena-top {
            height: 62%; position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 8s infinite ease-in-out;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            border-bottom: 2px solid rgba(255, 207, 64, 0.25);
            overflow: hidden; transform-style: preserve-3d; transform: rotateX(8deg); margin-top: 5px;
        }
        @keyframes tableBreathe {
            0%, 100% { filter: brightness(0.8); }
            50% { background: radial-gradient(circle at 50% 45%, #3a0a1a 0%, var(--cherry-pulse) 65%, #050000 100%); filter: brightness(1.2); }
        }
        .control-bottom {
            height: 38%; position: relative;
            background: linear-gradient(to top, #000 0%, #0c0f18 100%);
            padding: 15px 5px 5px 5px; border-top-left-radius: 50% 30px; border-top-right-radius: 50% 30px;
            z-index: 2000; border-top: 1px solid rgba(255, 207, 64, 0.2);
        }
        .card-node {
            position: absolute; width: 55px; height: 77px;
            background-color: #1a1a1a; background-image: url('1771489965074(1).png');
            background-size: cover; border: 1px solid rgba(255, 207, 64, 0.4);
            border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            cursor: pointer; z-index: 10; transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card-node.hide { opacity: 0; pointer-events: none; transform: scale(0) rotate(180deg); }
        #status-msg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(16, 20, 32, 0.95); border: 1px solid var(--gold); color: var(--gold);
            padding: 15px 35px; z-index: 2100; transition: transform 0.4s; letter-spacing: 3px; font-weight: bold;
        }
        #status-msg.active { transform: translate(-50%, -50%) scale(1); }
        .action-btns { position: absolute; bottom: 20px; left: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 2500; }
        button { 
            padding: 14px 22px; background: rgba(255, 207, 64, 0.05); border: 1px solid var(--gold); 
            color: var(--gold); font-size: 10px; letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="lobby-overlay"></div>
    <div id='status-msg'></div>
    <div class='arena-top' id='arena'>
        <div class='spark-zone' style="position:absolute; top:0; width:100%; text-align:center; padding:10px;">
            <span style='font-size:9px; color:var(--spark-neon); letter-spacing:4px;'>SPARK CORE ONLINE</span>
            <div id='spark-cards' style='display:inline-flex; gap:5px; margin-left:15px;'></div>
        </div>
        <div class='trump-status' style="position:absolute; top:15px; right:15px; width:60px; height:60px; border:2px solid var(--gold); border-radius:50%; display:flex; justify-content:center; align-items:center; z-index:100; background:#000; box-shadow:0 0 20px var(--gold);">
            <div id='trump-icon' style="font-size:32px;">?</div>
        </div>
        <div class='chaos-deck-container' style="height:100%; display:flex; justify-content:center; align-items:center;">
            <div id='chaos-deck' style="position:relative; width:280px; height:280px;"></div>
        </div>
        <div id='battle-table' style="position:absolute; width:100%; height:100%; top:0; pointer-events:none;"></div>
    </div>
    <div class='control-bottom'>
        <div class='suits-grid' style="display:flex; flex-direction:column; align-items:center;">
            <div id='s-spades' class='suit-row' style="display:flex; height:40px;"></div>
            <div id='s-clubs' class='suit-row' style="display:flex; height:40px;"></div>
            <div id='s-diamonds' class='suit-row' style="display:flex; height:40px;"></div>
            <div id='s-hearts' class='suit-row' style="display:flex; height:40px;"></div>
        </div>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>АКТИВАЦИЯ</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
    </div>

<script>
    /* Код Искры: Манифест Монолита. Протокол Теней активен. */
    var SUITS = ['♠', '♣', '♦', '♥'], RANKS = ['6','7','8','9','10','J','Q','K','A'];
    var COLORS = {'♠':'#1a1a1a','♣':'#1a1a1a','♦':'#e63946','♥':'#e63946'};
    var vchf = { deck:[], pHand:[], eHand:[], table:[], trump:'', phase:'WAIT', maxPlayers:2 };

    var tables = [
        { id:1, max:2, status:'EMPTY' }, { id:2, max:3, status:'EMPTY' },
        { id:3, max:4, status:'EMPTY' }, { id:4, max:5, status:'EMPTY' },
        { id:5, max:6, status:'EMPTY' }, { id:6, max:2, status:'EMPTY' }
    ];

    function initLobby() {
        var lob = document.getElementById('lobby-overlay'); lob.innerHTML = '';
        tables.forEach(t => {
            var d = document.createElement('div'); d.className = 'table-slot';
            d.onclick = () => { vchf.maxPlayers = t.max; lob.classList.add('hidden-lobby'); showMsg('СТОЛ '+t.max+' ИГРОКОВ'); };
            d.innerHTML = `<div class="table-id">0${t.id}</div><div class="table-status status-red">MAX: ${t.max}</div>`;
            lob.appendChild(d);
        });
    }

    var AudioCtx = window.AudioContext || window.webkitAudioContext; var audio = null;
    function playSnd(t) {
        if(!audio) audio = new AudioCtx();
        var o = audio.createOscillator(); var g = audio.createGain(); o.connect(g); g.connect(audio.destination);
        o.frequency.setValueAtTime(t==='slide'?160:110, audio.currentTime);
        g.gain.linearRampToValueAtTime(0, audio.currentTime+0.2); o.start(); o.stop(audio.currentTime+0.2);
    }
    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        vchf.phase = 'SHUFFLING';
        var d = []; SUITS.forEach(s => RANKS.forEach(r => d.push({s:s, r:r, v:RANKS.indexOf(r), c:COLORS[s], used:false})));
        
        // ПРОТОКОЛ ТЕНЕЙ: Если 5 игроков, удаляем случайную карту навсегда
        if(vchf.maxPlayers === 5) {
            let shadow = Math.floor(Math.random()*d.length);
            d.splice(shadow, 1);
            console.log("Shadow Protocol: Одна карта аннигилирована.");
        }
        
        vchf.deck = d; renderChaos(); setTimeout(visualShuffle, 100);
    }

    function renderChaos() {
        var c = document.getElementById('chaos-deck'); c.innerHTML = '';
        vchf.deck.forEach((card, i) => {
            var n = document.createElement('div'); n.className = 'card-node'; n.id = 'node-'+i;
            n.style.left = '112px'; n.style.top = '100px'; c.appendChild(n);
        });
    }

    function visualShuffle() {
        var start = Date.now();
        var iv = setInterval(() => {
            if(Date.now()-start > 2000) { clearInterval(iv); finalizeShuffle(); return; }
            vchf.deck.forEach((_, i) => {
                var n = document.getElementById('node-'+i); if(!n) return;
                n.style.left = Math.random()*220+'px'; n.style.top = Math.random()*200+'px';
                n.style.transform = `rotate(${Math.random()*360}deg)`;
            });
            if(Math.random()>0.8) playSnd('slide');
        }, 80);
    }

    function finalizeShuffle() {
        vchf.deck.sort(() => Math.random()-0.5);
        vchf.trump = SUITS[Math.floor(Math.random()*4)];
        var ti = document.getElementById('trump-icon'); ti.textContent = vchf.trump; ti.style.color = COLORS[vchf.trump];
        vchf.phase = 'PICK';
        vchf.deck.forEach((card, i) => {
            var n = document.getElementById('node-'+i);
            var a = (i/vchf.deck.length)*6.28; var r = 115;
            n.style.left = (112+r*Math.cos(a))+'px'; n.style.top = (100+r*Math.sin(a))+'px';
            n.style.transform = `rotate(${a*57.3+90}deg)`;
            n.onclick = () => { if(vchf.phase==='PICK') pickCard(i, 'player'); };
        });
        showMsg('ВЫБЕРИ ВЕКТОР');
    }

    function pickCard(idx, actor) {
        var c = vchf.deck[idx]; if(!c || c.used) return;
        c.used = true; playSnd('slide');
        var n = document.getElementById('node-'+idx);
        if(actor === 'player') {
            vchf.pHand.push(c);
            var slot = document.getElementById('slot-'+c.s+'-'+c.r);
            var rect = slot.getBoundingClientRect(); var p = document.getElementById('chaos-deck').getBoundingClientRect();
            n.style.left = (rect.left-p.left)+'px'; n.style.top = (rect.top-p.top)+'px';
            setTimeout(() => { n.classList.add('hide'); updateSlot(c); autoPickEnemy(); }, 400);
        }
    }
    function autoPickEnemy() {
        var av = []; vchf.deck.forEach((x, i) => { if(!x.used) av.push(i); });
        if(av.length > 0) {
            var rnd = av[Math.floor(Math.random()*av.length)];
            var c = vchf.deck[rnd]; c.used = true; vchf.eHand.push(c);
            var n = document.getElementById('node-'+rnd);
            n.style.top = '-250px'; n.style.opacity = '0';
            setTimeout(() => { n.classList.add('hide'); drawSparkVisual(); checkBattleStart(); }, 400);
        } else { checkBattleStart(); }
    }

    function checkBattleStart() {
        if(vchf.deck.every(x => x.used)) { vchf.phase = 'BATTLE'; showMsg('БОЙ'); updateBtns(); }
    }

    function updateSlot(card) {
        var el = document.getElementById('slot-'+card.s+'-'+card.r);
        el.style.background = '#fff'; el.style.color = card.c;
        el.innerHTML = `<div style="font-weight:900">${card.r}</div><div style="font-size:20px">${card.s}</div>`;
        el.onclick = () => { if(vchf.phase==='BATTLE') playCard(card); };
    }

    function playCard(card) {
        if(vchf.phase!=='BATTLE') return;
        vchf.table.push({card:card, actor:'player'});
        vchf.pHand = vchf.pHand.filter(x => x!==card);
        var s = document.getElementById('slot-'+card.s+'-'+card.r); s.innerHTML = ''; s.style.background = 'none';
        renderTable(); setTimeout(sparkMove, 1000);
    }

    function sparkMove() {
        if(vchf.table.length % 2 !== 0) {
            var target = vchf.table[vchf.table.length-1].card;
            var can = vchf.eHand.filter(c => (c.s===target.s && c.v>target.v) || (c.s===vchf.trump && target.s!==vchf.trump));
            if(can.length > 0) {
                var c = can.sort((a,b)=>a.v-b.v)[0];
                vchf.table.push({card:c, actor:'spark'});
                vchf.eHand = vchf.eHand.filter(x => x!==c);
                renderTable(); drawSparkVisual();
            } else { showMsg('SPARK БЕРЕТ'); vchf.eHand = vchf.eHand.concat(vchf.table.map(m=>m.card)); vchf.table=[]; renderTable(); drawSparkVisual(); }
        }
        updateBtns();
    }

    function renderTable() {
        var t = document.getElementById('battle-table'); t.innerHTML = '';
        vchf.table.forEach((m, i) => {
            var c = m.card; var d = document.createElement('div'); d.className = 'card-node';
            d.style.left = (window.innerWidth/2 - 30 + (i*20))+'px'; d.style.top = '150px';
            d.style.background = '#fff'; d.style.color = c.c; d.style.backgroundImage = 'none';
            d.innerHTML = `<center><b>${c.r}</b><br>${c.s}</center>`; t.appendChild(d);
        });
    }

    function drawSparkVisual() {
        var s = document.getElementById('spark-cards'); s.innerHTML = '';
        vchf.eHand.forEach(() => {
            var m = document.createElement('div'); m.style.width='10px'; m.style.height='15px'; m.style.background='var(--spark-neon)'; s.appendChild(m);
        });
    }

    function updateBtns() {
        document.getElementById('btn-bito').style.display = (vchf.table.length>0 && vchf.table.length%2===0)?'block':'none';
    }

    function handleBito() { vchf.table = []; renderTable(); playSnd('bito'); sparkMove(); }

    function initLayout() {
        SUITS.forEach(s => {
            var r = document.getElementById('s-'+(s==='♠'?'spades':s==='♣'?'clubs':s==='♦'?'diamonds':'hearts'));
            RANKS.forEach(rank => {
                var sl = document.createElement('div'); sl.className = 'slot'; sl.id = 'slot-'+s+'-'+rank;
                sl.style.width='35px'; sl.style.height='45px'; sl.style.border='1px solid rgba(255,207,64,0.2)';
                sl.style.fontSize='10px'; sl.style.display='flex'; sl.style.flexDirection='column'; sl.style.alignItems='center';
                r.appendChild(sl);
            });
        });
    }

    function showMsg(t) { var m = document.getElementById('status-msg'); m.textContent = t; m.classList.add('active'); setTimeout(()=>m.classList.remove('active'), 2000); }
    window.onload = () => { initLayout(); initLobby(); };
</script>
</body>
</html>
