<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Ultimate</title>
    <style>
        :root {
            --gold: #ffcc00;
            --dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--dark);
            color: white;
            font-family: sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .arena-top {
            height: 70%;
            position: relative;
            border-bottom: 2px solid var(--gold);
            background: radial-gradient(circle at center, #1b1b1b 0%, #0a0a0a 100%);
        }
        .control-bottom {
            height: 30%;
            position: relative;
            background: #050505;
            padding: 5px;
        }
        .side-bar {
            position: absolute;
            top: 0; width: 15%; height: 100%;
            border-color: rgba(255,204,0,0.1);
            border-style: solid;
            z-index: 5;
        }
        .left-bar { left: 0; border-right-width: 1px; }
        .right-bar { right: 0; border-left-width: 1px; }
        .spark-zone {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,204,0,0.05);
        }
        #spark-cards { display: flex; gap: 3px; }
        .chaos-deck-container {
            height: calc(100% - 50px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #chaos-deck { position: relative; width: 250px; height: 250px; }
        .card-node {
            position: absolute;
            width: 42px;
            height: 58px;
            background: var(--bg-card);
            border: 1px solid var(--gold);
            border-radius: 4px;
            box-shadow: var(--shadow);
            cursor: pointer;
            will-change: transform;
            transition: opacity 0.3s;
        }
        .card-node.hide { opacity: 0; pointer-events: none; }
        .trump-status {
            position: absolute;
            top: 10px; right: 10px;
            width: 45px; height: 65px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
        }
        .battle-table {
            position: absolute;
            bottom: 15px; width: 70%; left: 15%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .suits-grid { display: flex; flex-direction: column; height: 100%; gap: 2px; }
        .suit-row { display: flex; flex: 1; gap: 2px; }
        .slot {
            flex: 1;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,204,0,0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slot.filled { background: var(--bg-card); border-color: var(--gold); }
        .action-btns {
            position: absolute;
            bottom: 40px; right: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
        }
        button {
            padding: 10px;
            background: var(--dark);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class='arena-top'>
        <div class='side-bar left-bar'></div>
        <div class='side-bar right-bar'></div>
        <div class='spark-zone'>
            <span style='font-size:10px; margin-right:5px;'>SPARK:</span>
            <div id='spark-cards'></div>
        </div>
        <div class='trump-status'>
            <div id='trump-icon' style='font-size:20px;'>?</div>
        </div>
        <div class='chaos-deck-container'>
            <div id='chaos-deck'></div>
        </div>
        <div id='battle-table' class='battle-table'></div>
    </div>
    <div class='control-bottom'>
        <div class='suits-grid'>
            <div class='suit-row' id='s-spades'></div>
            <div class='suit-row' id='s-clubs'></div>
            <div class='suit-row' id='s-diamonds'></div>
            <div class='suit-row' id='s-hearts'></div>
        </div>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>В БОЙ</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
    </div>
<script>
    /* ПРОТОКОЛ АНТИ-НИРВАНА: БЕЗ BACKTICKS [cite: 2026-03-03] */
    var SUITS = ['♠', '♣', '♦', '♥'];
    var RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    var COLORS = {'♠': '#888', '♣': '#888', '♦': '#e60000', '♥': '#e60000'};

    var vchf = {
        deck: [], pHand: [], eHand: [], table: [],
        trump: '', phase: 'WAIT', turn: 'player'
    };

    function initLayout() {
        var rows = {
            '♠': document.getElementById('s-spades'),
            '♣': document.getElementById('s-clubs'),
            '♦': document.getElementById('s-diamonds'),
            '♥': document.getElementById('s-hearts')
        };
        SUITS.forEach(function(s) {
            if (!rows[s]) return;
            rows[s].innerHTML = '';
            RANKS.forEach(function(r) {
                var slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = 'slot-' + s + '-' + r;
                rows[s].appendChild(slot);
            });
        });
    }

    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        vchf.phase = 'PICK';
        var temp = [];
        SUITS.forEach(function(s) {
            RANKS.forEach(function(r) {
                temp.push({ s: s, r: r, v: RANKS.indexOf(r), c: COLORS[s], used: false });
            });
        });
        vchf.deck = temp.sort(function() { return Math.random() - 0.5; });
        vchf.trump = SUITS[Math.floor(Math.random() * 4)];
        var ti = document.getElementById('trump-icon');
        ti.textContent = vchf.trump;
        ti.style.color = COLORS[vchf.trump];
        renderChaos();
    }

    function renderChaos() {
        var cont = document.getElementById('chaos-deck');
        cont.innerHTML = '';
        vchf.deck.forEach(function(card, i) {
            var n = document.createElement('div');
            n.className = 'card-node';
            var ang = (i / 36) * 6.28;
            var rad = 90;
            var x = 100 + rad * Math.cos(ang) + (Math.random() * 20);
            var y = 100 + rad * Math.sin(ang) + (Math.random() * 20);
            n.style.left = x + 'px';
            n.style.top = y + 'px';
            n.style.transform = 'rotate(' + (Math.random() * 40 - 20) + 'deg)';
            n.onclick = function() { if(vchf.phase === 'PICK') pick(i, 'player'); };
            cont.appendChild(n);
        });
    }

    function pick(idx, actor) {
        var c = vchf.deck[idx];
        if(!c || c.used) return;
        c.used = true;
        document.getElementById('node-' + idx); 
        // Примечание: В renderChaos нужно было добавить id. Исправляю симуляцией:
        var nodes = document.getElementsByClassName('card-node');
        if(nodes[idx]) nodes[idx].classList.add('hide');

        if(actor === 'player') {
            vchf.pHand.push(c);
            updateSlot(c);
            setTimeout(function() {
                var av = [];
                vchf.deck.forEach(function(x, i) { if(!x.used) av.push(i); });
                if(av.length > 0) pick(av[Math.floor(Math.random() * av.length)], 'enemy');
            }, 150);
        } else {
            vchf.eHand.push(c);
            drawSparkVisual();
        }
        if(vchf.deck.every(function(x) { return x.used; })) startBattle();
    }

    function updateSlot(card) {
        var el = document.getElementById('slot-' + card.s + '-' + card.r);
        if(!el) return;
        el.classList.add('filled');
        el.style.color = card.c;
        el.innerHTML = '';
        var t = document.createElement('div');
        t.style.cssText = 'position:absolute;top:2px;left:2px;font-size:10px;font-weight:bold;';
        t.textContent = card.r;
        var m = document.createElement('div');
        m.style.fontSize = '20px';
        m.textContent = card.s;
        el.appendChild(t);
        el.appendChild(m);
        el.onclick = function() { if(vchf.phase === 'BATTLE') selectFromHand(card); };
    }
    function drawSparkVisual() {
        var cont = document.getElementById('spark-cards');
        cont.innerHTML = '';
        vchf.eHand.forEach(function() {
            var m = document.createElement('div');
            m.style.cssText = 'width:7px;height:10px;background:var(--gold);opacity:0.6;';
            cont.appendChild(m);
        });
    }

    function startBattle() {
        vchf.phase = 'BATTLE';
        alert('БОЙ НАЧАТ!');
        updateActionButtons();
    }

    function selectFromHand(card) {
        if(vchf.turn !== 'player') return;
        if(canPlay(card)) {
            vchf.table.push({card: card, actor: 'player'});
            removeFromHand(card, 'player');
            renderTable();
            if(vchf.table.length % 2 !== 0) {
                vchf.turn = 'enemy';
                setTimeout(sparkThink, 800);
            }
        }
        updateActionButtons();
    }

    function canPlay(card) {
        if(vchf.table.length === 0) return true;
        var last = vchf.table[vchf.table.length - 1].card;
        if(vchf.table.length % 2 !== 0) {
            if(card.s === last.s && card.v > last.v) return true;
            if(card.s === vchf.trump && last.s !== vchf.trump) return true;
            return false;
        }
        var active = vchf.table.map(function(m) { return m.card.r; });
        return active.indexOf(card.r) !== -1;
    }

    function renderTable() {
        var t = document.getElementById('battle-table');
        t.innerHTML = '';
        vchf.table.forEach(function(m, i) {
            var c = m.card;
            var el = document.createElement('div');
            el.className = 'card-node';
            el.style.position = 'relative';
            el.style.display = 'inline-block';
            el.style.color = c.c;
            var r = document.createElement('div');
            r.style.cssText = 'position:absolute;top:2px;left:2px;font-size:9px;';
            r.textContent = c.r;
            var s = document.createElement('div');
            s.style.cssText = 'font-size:18px;text-align:center;margin-top:10px;';
            s.textContent = c.s;
            el.appendChild(r);
            el.appendChild(s);
            if(i % 2 !== 0) el.style.transform = 'translateY(-15px) translateX(-10px)';
            t.appendChild(el);
        });
    }
    function sparkThink() {
        var action = false;
        if(vchf.table.length % 2 !== 0) {
            var target = vchf.table[vchf.table.length - 1].card;
            var cards = vchf.eHand.filter(function(c) {
                return (c.s === target.s && c.v > target.v) || (c.s === vchf.trump && target.s !== vchf.trump);
            }).sort(function(a,b) { return a.v - b.v; });
            if(cards.length > 0) {
                var choice = cards[0];
                vchf.table.push({card: choice, actor: 'enemy'});
                removeFromHand(choice, 'enemy');
                action = true;
            } else { sparkTake(); return; }
        } else {
            if(vchf.table.length === 0) {
                var choice = vchf.eHand.sort(function(a,b) { return a.v - b.v; })[0];
                vchf.table.push({card: choice, actor: 'enemy'});
                removeFromHand(choice, 'enemy');
                action = true;
            } else { sparkBito(); return; }
        }
        renderTable();
        if(action) { vchf.turn = 'player'; checkWin(); }
        updateActionButtons();
    }

    function removeFromHand(card, actor) {
        if(actor === 'player') {
            vchf.pHand = vchf.pHand.filter(function(c) { return !(c.s === card.s && c.r === card.r); });
            var slot = document.getElementById('slot-' + card.s + '-' + card.r);
            if(slot) { slot.classList.remove('filled'); slot.innerHTML = ''; }
        } else {
            vchf.eHand = vchf.eHand.filter(function(c) { return !(c.s === card.s && c.r === card.r); });
            drawSparkVisual();
        }
    }

    function updateActionButtons() {
        var bB = document.getElementById('btn-bito');
        var bT = document.getElementById('btn-take');
        bB.style.display = (vchf.table.length > 0 && vchf.table.length % 2 === 0) ? 'block' : 'none';
        bT.style.display = (vchf.table.length > 0 && vchf.table.length % 2 !== 0) ? 'block' : 'none';
    }

    function handleBito() { vchf.table = []; renderTable(); vchf.turn = 'player'; updateActionButtons(); }
    function handleTake() { 
        vchf.pHand = vchf.pHand.concat(vchf.table.map(function(m) { return m.card; }));
        vchf.table = []; vchf.pHand.forEach(updateSlot); renderTable(); vchf.turn = 'enemy'; 
        updateActionButtons(); setTimeout(sparkThink, 1000);
    }

    function checkWin() {
        if(vchf.pHand.length === 0) alert('ПОБЕДА!');
        if(vchf.eHand.length === 0) alert('SPARK ПОБЕДИЛА!');
    }

    window.onload = initLayout;
</script>
</body>
</html>
