<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERO_CHAOS // MONOLITH_ARSENAL</title>
    <style>
        :root {
            --bg: radial-gradient(circle at top, #1a1c1e 0%, #050607 100%);
            --gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            --gold-solid: #fcf6ba;
            --glass: rgba(74, 4, 4, 0.22); 
            --rings: radial-gradient(circle at var(--ox, -10%) var(--oy, -10%), transparent 0%, transparent 35%, rgba(0, 0, 0, 0.5) 36%, rgba(94, 10, 10, 0.12) 37%, transparent 39%, transparent 60%, rgba(0, 0, 0, 0.55) 61%, rgba(74, 4, 4, 0.18) 62%, transparent 65%);
            --grid: linear-gradient(rgba(252, 246, 186, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(252, 246, 186, 0.03) 1px, transparent 1px);
        }
        body { 
            background: var(--bg); background-image: var(--grid); background-size: 20px 20px; 
            color: var(--gold-solid); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; 
            min-height: 100vh; overflow-x: hidden;
        }
        h2 { font-weight: 300; letter-spacing: 12px; text-align: center; text-transform: uppercase; margin: 60px 0; color: #fff; text-shadow: 0 0 30px rgba(252,246,186,0.3); }
        
        /* СЕКЦИЯ КАТЕГОРИЙ (4 ГЛАВНЫХ СЛОТА) */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto 100px auto; }
        .category-card {
            background: var(--gold); padding: 40px; border-radius: 20px; color: #000; text-align: center; 
            font-weight: 900; letter-spacing: 5px; cursor: pointer; transition: 0.4s; text-transform: uppercase;
            box-shadow: 0 0 50px rgba(191, 149, 63, 0.2);
        }
        .category-card:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(191, 149, 63, 0.6); }

        /* СЕТКА СЛОТОВ */
        .shop-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 35px; max-width: 1600px; margin: 0 auto; }
        
        .card {
            position: relative; background: var(--glass); background-image: var(--rings); backdrop-filter: blur(15px);
            border: 1px solid rgba(252, 246, 186, 0.1); border-left: 2px solid rgba(252, 246, 186, 0.3); border-top: 1px solid rgba(252, 246, 186, 0.5); 
            border-radius: 16px; padding: 25px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.9); 
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer; text-decoration: none; display: block;
            transform: rotateZ(-1.2deg);
        }
        .card:hover { transform: translateY(-20px) rotateZ(1.2deg) scale(1.08); border-color: var(--gold-solid); z-index: 10; }

        .card-img { 
            width: 100%; height: 140px; background: #000; border-radius: 10px; margin-bottom: 18px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); 
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .price { font-weight: bold; font-size: 1.1rem; margin-top: 15px; color: var(--gold-solid); }
        .slot-num { position: absolute; top: 12px; right: 15px; font-size: 0.65rem; opacity: 0.4; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h2>ARSENAL // MONOLITH</h2>

    <div class="category-grid">
        <div class="category-card" onclick="showCategory('INTELLECT')">Intellect</div>
        <div class="category-card" onclick="showCategory('CRAFT_FOOD')">Craft Food</div>
        <div class="category-card" onclick="showCategory('WORKSHOP')">Workshop</div>
        <div class="category-card" onclick="showCategory('WAY')">Way</div>
    </div>

    <div class="shop-grid" id="main-grid"></div>

    <script>
        /* 🔱 DATABASE: ЧЕТЫРЕ ЧАСТИЦЫ МИРА 🔱 */
        const DATABASE = {
            'INTELLECT': [
                { id: 1, name: "AI CONSULT", price: 200, url: "https://openai.com", img: "https://www.gstatic.com/lamda/images/favicon_v2_16x16.png" },
                { id: 2, name: "CODE ARCHITECT", price: 198, url: "https://github.com", img: "https://github.githubassets.com/favicons/favicon.svg" },
                { id: 3, name: "DESIGN STUDIO", price: 196, url: "https://behance.net", img: "https://a5.behance.net/2397193638062/img/favicon.ico" }
            ],
            'CRAFT_FOOD': [],
            'WORKSHOP': [],
            'WAY': []
        };

        // Наполнение пустот (по 25 на категорию)
        function initDB() {
            Object.keys(DATABASE).forEach((cat, index) => {
                const startId = (index * 25) + 1;
                while(DATABASE[cat].length < 25) {
                    const currentId = startId + DATABASE[cat].length;
                    let p = Math.round(202 - (2 * (currentId - (index * 25))));
                    DATABASE[cat].push({ id: currentId, name: `VACANT_${currentId}`, price: p < 0 ? 0 : p, url: "#", img: "" });
                }
            });
        }

        function showCategory(catName) {
            const grid = document.getElementById('main-grid');
            grid.style.display = 'grid';
            grid.innerHTML = '';
            
            DATABASE[catName].forEach(item => {
                const card = document.createElement('a');
                card.href = item.url;
                card.target = "_blank";
                card.className = 'card';
                card.style.setProperty('--ox', (Math.random() * 100) + '%');
                card.style.setProperty('--oy', (Math.random() * 100) + '%');
                
                card.innerHTML = `
                    <div class="slot-num">#${item.id}</div>
                    <div class="card-img">
                        ${item.img ? `<img src="${item.img}">` : `<span style="opacity:0.1">EMPTY</span>`}
                    </div>
                    <div style="letter-spacing: 2px; font-size: 0.85rem; text-transform: uppercase;">${item.name}</div>
                    <div class="price">${item.price} VCHF</div>
                `;
                grid.appendChild(card);
            });
            window.scrollTo({ top: grid.offsetTop - 50, behavior: 'smooth' });
        }

        initDB();
    </script>

    <div style="text-align:center; padding: 100px 0; opacity: 0.15; font-size: 0.6rem; letter-spacing: 10px;">
        МАНІФЕСТ МОНОЛІТА // ZERO_CHAOS // 2026
    </div>

</body>
</html>
