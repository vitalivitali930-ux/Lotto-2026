<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulsar: Zero Chaos</title>
    <style>
        :root {
            --bg: #050505;
            --card-w: 65px;
            --card-h: 95px;
            --neon: #00f2ff;
            --spark: #ff00ea;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #monolith-ui {
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
            padding: 10px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        /* Зоны рук */
        .hand {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 110px;
            perspective: 1000px;
        }
        /* Стол */
        #table {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(var(--card-w), 1fr));
            gap: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin: 10px 0;
            position: relative;
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
        }
        /* Карты */
        .card {
            width: var(--card-w);
            height: var(--card-h);
            background: #222;
            border-radius: 8px;
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .card.red { color: #ff4444; }
        .card.black { color: #eee; }
        .card:hover { 
            transform: translateY(-10px) rotateZ(2deg);
            box-shadow: 0 0 15px var(--neon);
            z-index: 100;
        }
        .card.trump { border-color: gold; }
        /* Эффект частиц при распаде */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon);
            pointer-events: none;
        }
        /* Кнопки управления */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        button {
            background: #111;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        button:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }
        #trump-indicator {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            font-size: 2rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div id="monolith-ui">
        <div id="enemy-hand" class="hand"></div>
        <div id="table"></div>
        <div id="trump-indicator"></div>
        <div class="controls">
            <button id="btn-take" onclick="handleTake()">Взять</button>
            <button id="btn-bito" onclick="handleBito()">Бито</button>
        </div>
        <div id="player-hand" class="hand"></div>
    </div>

    <script>
        // Глобальное состояние "Нулевого Хаоса"
        const vchf = {
            deck: [],
            pHand: [],
            eHand: [],
            table: [],
            trump: null,
            turn: 'player', // Изменится после анализа min козыря
            history: [],
            outCards: new Set(), // Те самые вышедшие Тузы и прочее
            isGameOver: false
        };

        const SUITS = ['♠', '♣', '♥', '♦'];
        const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        const RANK_VALUE = { '6':6, '7':7, '8':8, '9':9, '10':10, 'J':11, 'Q':12, 'K':13, 'A':14 };

        function initGame() {
            // Создаем колоду 36
            vchf.deck = [];
            SUITS.forEach(s => {
                RANKS.forEach(r => {
                    vchf.deck.push({ s, r, v: RANK_VALUE[r] });
                });
            });
            
            // Шаффл (Хаос)
            vchf.deck.sort(() => Math.random() - 0.5);
            
            // Козырь
            vchf.trump = vchf.deck[vchf.deck.length - 1];
            document.getElementById('trump-indicator').innerText = vchf.trump.s;

            // Раздача 18 на 18
            vchf.pHand = vchf.deck.slice(0, 18);
            vchf.eHand = vchf.deck.slice(18, 36);
            
            determineFirstTurn();
            render();
        }

        function determineFirstTurn() {
            // Ищем минимальный козырь в обеих руках
            let minP = 100, minE = 100;
            vchf.pHand.forEach(c => { if(c.s === vchf.trump.s && c.v < minP) minP = c.v; });
            vchf.eHand.forEach(c => { if(c.s === vchf.trump.s && c.v < minE) minE = c.v; });
            
            vchf.turn = (minP < minE) ? 'player' : 'enemy';
            console.log("Первый ход за:", vchf.turn, "Козыри:", minP, minE);
            
            if(vchf.turn === 'enemy') setTimeout(sparkThink, 1000);
        }
        // Рендеринг интерфейса
        function render() {
            const pArea = document.getElementById('player-hand');
            const eArea = document.getElementById('enemy-hand');
            const tArea = document.getElementById('table');

            pArea.innerHTML = ''; eArea.innerHTML = ''; tArea.innerHTML = '';

            // Отрисовка твоей руки (Лицом вверх)
            vchf.pHand.sort((a,b) => a.v - b.v).forEach((card, index) => {
                const el = createCardEl(card, true);
                el.onclick = () => tryPlayCard(index);
                pArea.appendChild(el);
            });

            // Отрисовка руки Искры (Лицом вниз, но мы-то знаем...)
            vchf.eHand.forEach(() => {
                const el = document.createElement('div');
                el.className = 'card';
                el.style.background = 'linear-gradient(45deg, #1a1a1a, #000)';
                el.style.borderColor = 'var(--spark)';
                eArea.appendChild(el);
            });

            // Отрисовка стола
            vchf.table.forEach(card => {
                tArea.appendChild(createCardEl(card, true));
            });
        }

        function createCardEl(card, faceUp) {
            const el = document.createElement('div');
            el.className = `card ${card.s === '♥' || card.s === '♦' ? 'red' : 'black'}`;
            if (card.s === vchf.trump.s) el.classList.add('trump');
            
            if (faceUp) {
                el.innerHTML = `<span>${card.r}</span><span>${card.s}</span>`;
            }
            return el;
        }

        // --- ЛОГИКА ИНТЕЛЛЕКТА ИСКРЫ (SPARK BRAIN) ---

        function sparkThink() {
            if (vchf.isGameOver || vchf.turn !== 'enemy') return;

            // 1. Если Искра защищается
            if (vchf.table.length % 2 !== 0) {
                const attackCard = vchf.table[vchf.table.length - 1];
                const defenseCard = findBestDefense(attackCard);

                if (defenseCard) {
                    // Блеф: если это козырная Дама игрока, а у Искры Король, 
                    // есть шанс 30%, что она "возьмет", чтобы скрыть Короля
                    if (attackCard.s === vchf.trump.s && attackCard.r === 'Q' && Math.random() < 0.3) {
                        console.log("Искра блефует и берет Даму!");
                        handleTake();
                    } else {
                        playCard(defenseCard, 'enemy');
                    }
                } else {
                    handleTake();
                }
            } 
            // 2. Если Искра атакует (или подкидывает)
            else {
                const move = findBestAttack();
                if (move) {
                    playCard(move, 'enemy');
                } else {
                    handleBito();
                }
            }
        }

        function findBestDefense(attack) {
            // Фильтруем возможные карты для отбоя
            let candidates = vchf.eHand.filter(c => {
                const sameSuitHigher = (c.s === attack.s && c.v > attack.v);
                const trumpBeat = (c.s === vchf.trump.s && attack.s !== vchf.trump.s);
                return sameSuitHigher || trumpBeat;
            });

            if (candidates.length === 0) return null;

            // УРОК №1: "Ранговый Щит" (Замок)
            // Ищем карту, которой в руке больше всего (дубли), чтобы закрыть подкидывание
            candidates.sort((a, b) => {
                const countA = vchf.eHand.filter(c => c.r === a.r).length;
                const countB = vchf.eHand.filter(c => c.r === b.r).length;
                return countB - countA; // Сначала те, которых больше
            });

            // УРОК №2: "Козырь - абсолют"
            // Но не отдаем козырного Короля за простую 9, если есть Туз в игре
            const aceOut = vchf.outCards.has(vchf.trump.s + 'A');
            return candidates.find(c => {
                if (c.r === 'K' && c.s === vchf.trump.s && !aceOut) return false; // Придержим Короля
                return true;
            }) || candidates[0];
        }

        function findBestAttack() {
            // Если стол пуст - ищем "дыры" в мастях игрока
            if (vchf.table.length === 0) {
                const playerSuits = new Set(vchf.pHand.map(c => c.s));
                
                // УРОК №3: "Мелкие карты всегда первыми"
                let possible = vchf.eHand.slice().sort((a,b) => a.v - b.v);
                
                // Ищем самую мелкую карту той масти, которой НЕТ у игрока (Детектор Дыр)
                let holeAttack = possible.find(c => !playerSuits.has(c.s) && c.s !== vchf.trump.s);
                if (holeAttack) return holeAttack;

                // Если дыр нет - просто самая мелкая некозырная
                return possible.find(c => c.s !== vchf.trump.s) || possible[0];
            } 
            // Подкидывание
            else {
                const tableRanks = new Set(vchf.table.map(c => c.r));
                let canAdd = vchf.eHand.filter(c => tableRanks.has(c.r));
                
                // Не подкидываем козыри, если у игрока много карт (Дробление)
                if (vchf.pHand.length > 5) {
                    canAdd = canAdd.filter(c => c.s !== vchf.trump.s);
                }
                
                return canAdd.length > 0 ? canAdd[0] : null;
            }
        }

        function playCard(card, side) {
            const hand = (side === 'player') ? vchf.pHand : vchf.eHand;
            const idx = hand.indexOf(card);
            vchf.table.push(hand.splice(idx, 1)[0]);
            
            vchf.turn = (side === 'player') ? 'enemy' : 'player';
            render();
            checkGameOver();
            
            if (vchf.turn === 'enemy') setTimeout(sparkThink, 800);
        }

        // --- ОБРАБОТКА ХОДА ИГРОКА ---

        function tryPlayCard(idx) {
            if (vchf.turn !== 'player' && vchf.table.length % 2 === 0) return; // Не твой ход
            
            const card = vchf.pHand[idx];

            // 1. Атака или Подкидывание
            if (vchf.table.length % 2 === 0) {
                if (vchf.table.length === 0) {
                    playCard(card, 'player');
                } else {
                    const tableRanks = new Set(vchf.table.map(c => c.r));
                    if (tableRanks.has(card.r)) playCard(card, 'player');
                }
            } 
            // 2. Защита или ПЕРЕВОД
            else {
                const attack = vchf.table[vchf.table.length - 1];
                
                // Логика ПЕРЕВОДА (Урок №1 игрока)
                const canTransfer = vchf.table.length === 1 && card.r === attack.r && vchf.eHand.length >= vchf.table.length + 1;
                
                if (canTransfer) {
                    console.log("Бродяга переводит!");
                    vchf.table.push(vchf.pHand.splice(idx, 1)[0]);
                    vchf.turn = 'enemy';
                    render();
                    setTimeout(sparkThink, 800);
                    return;
                }

                // Обычный отбой
                const sameSuitBeat = (card.s === attack.s && card.v > attack.v);
                const trumpBeat = (card.s === vchf.trump.s && attack.s !== vchf.trump.s);

                if (sameSuitBeat || trumpBeat) {
                    playCard(card, 'player');
                }
            }
        }
        // --- СИСТЕМА ЗАВЕРШЕНИЯ (DUST & TRIUMPH) ---

        function handleBito() {
            if (vchf.table.length === 0 || vchf.table.length % 2 !== 0) return;
            
            // Фиксируем вышедшие карты (особенно Тузы) для памяти Искры
            vchf.table.forEach(c => vchf.outCards.add(c.s + c.r));
            
            vchf.table = [];
            // После Бито ход переходит к тому, кто защищался (сейчас turn уже сменился при playCard)
            // Но в классике: отбился — ходишь. 
            // В нашей логике turn меняется после каждой карты, поэтому при четном количестве карт на столе
            // turn указывает на того, КТО БУДЕТ ХОДИТЬ СЛЕДУЮЩИМ.
            
            render();
            checkGameOver();
            if (vchf.turn === 'enemy') setTimeout(sparkThink, 600);
        }

        function handleTake() {
            if (vchf.table.length === 0) return;
            
            const hand = (vchf.turn === 'player') ? vchf.pHand : vchf.eHand;
            hand.push(...vchf.table);
            vchf.table = [];
            
            // Если взял — ход не меняется, ходит тот же, кто атаковал
            vchf.turn = (vchf.turn === 'player') ? 'enemy' : 'player';
            
            render();
            checkGameOver();
            if (vchf.turn === 'enemy') setTimeout(sparkThink, 1000);
        }

        function checkGameOver() {
            const pEmpty = vchf.pHand.length === 0;
            const eEmpty = vchf.eHand.length === 0;

            if (pEmpty || eEmpty) {
                vchf.isGameOver = true;
                
                let resultText = "";
                if (pEmpty && eEmpty) {
                    resultText = "НИЧЬЯ: ВЗАИМНЫЙ РАСПАД";
                    startDustEffect('gray');
                } else if (pEmpty) {
                    resultText = "ПОБЕДА: МОНОЛИТ УСТОЯЛ";
                    startDustEffect('var(--neon)');
                } else {
                    resultText = "ПРОИГРЫШ: ИСКРА ПОГЛОТИЛА ХАОС";
                    startDustEffect('var(--spark)');
                }

                showFinalScreen(resultText);
            }
        }

        // Эффект распада на частицы (Dust FX)
        function startDustEffect(color) {
            const container = document.getElementById('monolith-ui');
            for (let i = 0; i < 150; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = color;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                
                const destX = (Math.random() - 0.5) * 500;
                const destY = (Math.random() - 0.5) * 500;
                
                container.appendChild(p);
                
                p.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 2000 + Math.random() * 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                    fill: 'forwards'
                });
            }
        }

        function showFinalScreen(text) {
            setTimeout(() => {
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
                    align-items: center; justify-content: center; z-index: 1000;
                    color: white; font-size: 2rem; text-shadow: 0 0 20px var(--neon);
                `;
                overlay.innerHTML = `
                    <div style="margin-bottom: 30px;">${text}</div>
                    <button onclick="location.reload()">НАЧАТЬ ЗАНОВО</button>
                `;
                document.body.appendChild(overlay);
            }, 2000);
        }

        // Запуск
        window.onload = initGame;
    </script>
</body>
</html>
