<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, vertical-align=top">
    
    <meta name="theme-color" content="#1a1c1e">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="color-scheme" content="dark">

    <title>ZERO_CHAOS // TERMINAL_100_ETALON</title>
    <style>
        :root {
            --bg: radial-gradient(circle at top, #1a1c1e 0%, #050607 100%);
            --gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            --gold-solid: #fcf6ba;
            --steel: rgba(45, 45, 48, 0.6);
            --glass: rgba(74, 4, 4, 0.22); 
            --danger: #ff5f5f;
            --spotlight: radial-gradient(circle at 50% 0%, rgba(252, 246, 186, 0.22) 0%, transparent 75%);
            --rings: radial-gradient(circle at var(--ox, -10%) var(--oy, -10%), transparent 0%, transparent 35%, rgba(0, 0, 0, 0.5) 36%, rgba(94, 10, 10, 0.12) 37%, transparent 39%, transparent 60%, rgba(0, 0, 0, 0.55) 61%, rgba(74, 4, 4, 0.18) 62%, transparent 65%);
            --grid: linear-gradient(rgba(252, 246, 186, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(252, 246, 186, 0.03) 1px, transparent 1px);
        }
        
        body {
            background: var(--bg); background-image: var(--grid); background-size: 20px 20px; background-attachment: fixed;
            color: var(--gold-solid); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; padding-bottom: 120px;
            letter-spacing: 0.5px; -webkit-tap-highlight-color: transparent; overflow-x: hidden; color-scheme: dark;
        }

        h2 { font-weight: 300; letter-spacing: 12px; text-shadow: 0 0 20px rgba(252, 246, 186, 0.2); text-align: center; margin-bottom: 40px; text-transform: uppercase; cursor: pointer; }

        /* 🔱 КАТЕГОРИИ: ГЛАВНЫЙ ЭКРАН */
        .category-nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto 50px auto; }
        .cat-unit {
            background: var(--glass); border: 1px solid var(--gold-solid); padding: 40px 20px; border-radius: 12px;
            text-align: center; cursor: pointer; transition: 0.4s; backdrop-filter: blur(15px);
            font-weight: bold; letter-spacing: 4px; text-transform: uppercase; font-size: 0.9rem;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5);
        }
        .cat-unit:hover { background: var(--gold); color: #000; transform: translateY(-5px); }
        .cat-unit.active { border-width: 3px; box-shadow: 0 0 30px rgba(252, 246, 186, 0.4); }

        .shop-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        /* КАРТОЧКА: ТЕХНО-ЛОЖЕМЕНТ (ЭТАЛОН) */
        .card {
            position: relative; background: var(--glass); background-image: var(--rings); backdrop-filter: blur(10px);
            border: 1px solid rgba(252, 246, 186, 0.1); border-left: 2px solid rgba(252, 246, 186, 0.2); border-top: 1px solid rgba(252, 246, 186, 0.45); 
            border-radius: 12px; padding: 20px; text-align: center; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.9), inset 0 0 30px rgba(74, 4, 4, 0.3); overflow: hidden;
            text-decoration: none; color: inherit; display: block;
        }

        .card:nth-child(3n) { --ox: 110%; --oy: -20%; }
        .card:nth-child(3n+1) { --ox: -40%; --oy: 120%; }
        .card:nth-child(3n+2) { --ox: 60%; --oy: -40%; }

        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 100%; background: var(--spotlight); pointer-events: none; z-index: 2; }
        .card:hover { transform: scale(1.03); border-color: var(--gold-solid); }

        .card-img {
            width: 100%; height: 130px; background: linear-gradient(180deg, #000 0%, #1a0101 100%);
            border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; color: #4a0404; border: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 1;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

        .price { color: rgba(252, 246, 186, 0.85); font-size: 0.85rem; margin: 10px 0; font-weight: bold; position: relative; z-index: 1; }

        .buy-btn {
            margin-top: 10px; width: 100%; background: var(--gold); border: none; border-radius: 6px;
            color: #000; padding: 10px; font-weight: bold; font-size: 0.75rem; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; position: relative; z-index: 3;
        }

        /* СЕЙФ-БАР (ЭТАЛОН) */
        #cart-bar {
            position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 11, 12, 0.98);
            backdrop-filter: blur(25px); border: 1px solid rgba(252, 246, 186, 0.35); border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; box-sizing: border-box; z-index: 100;
            box-shadow: 0 -15px 60px rgba(0,0,0,0.95); cursor: pointer;
        }

        #cart-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #1a1c1e 0%, #050607 100%); z-index: 200; overflow-y: auto; padding: 30px; box-sizing: border-box;
        }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(252, 246, 186, 0.1); padding: 15px 0; }
        .close-btn { color: #888; float: right; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body onclick="activateFullscreen()">

    <h2 onclick="location.reload()">VCHF // ARSENAL</h2>

    <div class="category-nav" id="cat-nav">
        <div class="cat-unit" onclick="showSector('INTELLECT', this)">Intellect</div>
        <div class="cat-unit" onclick="showSector('CRAFT_FOOD', this)">Craft Food</div>
        <div class="cat-unit" onclick="showSector('WORKSHOP', this)">Workshop</div>
        <div class="cat-unit" onclick="showSector('WAY', this)">Way</div>
    </div>
    
    <div class="shop-grid" id="main-grid"></div>

    <div id="cart-bar" onclick="toggleCart(event)">
        <span id="cart-info" style="font-size: 0.8rem; font-weight: bold;">СЕЙФ ПУСТ</span>
        <button class="buy-btn" style="width: auto; margin: 0; padding: 8px 20px; background: none; border: 1px solid var(--gold-solid); color: var(--gold-solid);">ОТКРЫТЬ</button>
    </div>

    <div id="cart-modal">
        <span class="close-btn" onclick="toggleCart(event)">[ ВЕРНУТЬСЯ К ОБЗОРУ ]</span>
        <h3 style="border-bottom: 1px solid var(--gold-solid); padding-bottom: 15px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase;">ДЕПОЗИТАРИЙ</h3>
        <div id="cart-list"></div>
        <div id="cart-total" style="margin-top: 30px; text-align: right; font-size: 1.2rem; color: var(--gold-solid);"></div>
        <button onclick="clearCart(event)" style="color: var(--danger); border-color: var(--danger); background: none; margin-top: 40px; border: 1px solid var(--danger); width: auto; padding: 10px 30px;">ОБНУЛИТЬ СЕЙФ</button>
    </div>

    <script>
        const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, duration) {
            if (AudioCtx.state === 'suspended') AudioCtx.resume();
            const osc = AudioCtx.createOscillator();
            const gain = AudioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, AudioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(AudioCtx.destination);
            osc.start(); osc.stop(AudioCtx.currentTime + duration);
        }

        function activateFullscreen() {
            let de = document.documentElement;
            if (de.requestFullscreen) de.requestFullscreen();
        }

        /* 🔱 DATABASE 🔱 */
        const DATABASE = {
            'INTELLECT': [
                { id: 1, name: "GPT_CORE", price: 200, url: "https://chatgpt.com", img: "https://openai.com/favicon.ico" },
                { id: 2, name: "GITHUB_DATA", price: 198, url: "https://github.com", img: "https://github.githubassets.com/favicons/favicon.svg" },
                { id: 3, name: "BEHANCE_VIS", price: 196, url: "https://behance.net", img: "https://www.behance.net/favicon.ico" }
            ],
            'CRAFT_FOOD': [
                { id: 26, name: "HONEY_GOLD", price: 150, url: "https://www.wildflowershoney.com", img: "" },
                { id: 27, name: "WINE_CELLAR", price: 148, url: "https://www.vivino.com", img: "" },
                { id: 28, name: "BIO_GRAIN", price: 146, url: "https://www.organicfacts.net", img: "" }
            ],
            'WORKSHOP': [
                { id: 51, name: "IRON_CRAFT", price: 300, url: "https://www.etsy.com", img: "" },
                { id: 52, name: "WOOD_ART", price: 298, url: "https://www.pinterest.com", img: "" },
                { id: 53, name: "TECH_FIX", price: 296, url: "https://www.ifixit.com", img: "" }
            ],
            'WAY': [
                { id: 76, name: "LOGISTIC_PRO", price: 100, url: "https://www.dhl.com", img: "" },
                { id: 77, name: "VISA_HELP", price: 98, url: "https://www.schengenvisainfo.com", img: "" },
                { id: 78, name: "CAR_GO", price: 96, url: "https://www.uber.com", img: "" }
            ]
        };

        // Наполнение пустот до 25 в каждой
        Object.keys(DATABASE).forEach((cat, idx) => {
            const startId = (idx * 25) + 1;
            while(DATABASE[cat].length < 25) {
                const cid = startId + DATABASE[cat].length;
                DATABASE[cat].push({ id: cid, name: `VACANT_${cid}`, price: (200 - cid), url: "#", img: "" });
            }
        });

        let cart = JSON.parse(localStorage.getItem('monolith_cart')) || [];

        function showSector(catName, btn) {
            playSfx(440, 'sine', 0.1);
            document.querySelectorAll('.cat-unit').forEach(u => u.classList.remove('active'));
            btn.classList.add('active');
            
            const grid = document.getElementById('main-grid');
            grid.style.display = 'grid';
            grid.innerHTML = '';

            DATABASE[catName].forEach(item => {
                const card = document.createElement('a');
                card.className = 'card';
                card.href = item.url;
                card.target = item.url === "#" ? "_self" : "_blank";
                
                card.innerHTML = `
                    <div class="card-img">
                        ${item.img ? `<img src="${item.img}">` : `VCHF_UNIT_${item.id}`}
                    </div>
                    <div style="font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;">${item.name}</div>
                    <div class="price">${item.price > 0 ? item.price : 0} VCHF</div>
                    <button class="buy-btn" onclick="event.preventDefault(); event.stopPropagation(); addToCart('${item.name}', ${item.price})">В СЕЙФ</button>
                `;
                grid.appendChild(card);
            });
            window.scrollTo({ top: grid.offsetTop - 50, behavior: 'smooth' });
        }

        function addToCart(name, price) {
            playSfx(880, 'sine', 0.1);
            cart.push({ name, price });
            saveCart();
            renderCart();
        }

        function saveCart() {
            localStorage.setItem('monolith_cart', JSON.stringify(cart));
            document.getElementById('cart-info').innerText = cart.length > 0 ? `АКТИВОВ В СЕЙФЕ: ${cart.length}` : 'СЕЙФ ПУСТ';
        }

        function toggleCart(e) {
            if(e) e.stopPropagation();
            playSfx(110, 'triangle', 0.2);
            const m = document.getElementById('cart-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalDiv = document.getElementById('cart-total');
            list.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                list.innerHTML += `<div class="cart-item"><span>${item.name}</span><span>${item.price} VCHF</span></div>`;
            });
            totalDiv.innerText = `ИТОГО К ДЕПОЗИТУ: ${total} VCHF`;
        }

        function clearCart(e) {
            if(e) e.stopPropagation();
            playSfx(50, 'sawtooth', 0.4);
            cart = []; saveCart(); toggleCart();
        }

        saveCart();
    </script>
</body>
</html>
