<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Chaos | Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #050403;
            --stone: #1e1a17;
            --moss: #39ff14;
            --gold: #ffcc00;
            --ruby: #ff0055;
            --stone-shadow: inset 4px 4px 8px rgba(255,255,255,0.03), inset -6px -6px 15px rgba(0,0,0,0.8), 8px 8px 20px rgba(0,0,0,0.6);
        }
        body {
            background: var(--bg); color: #d4d4d4; font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px;
        }
        /* Статус "Live" */
        .live-status {
            font-size: 0.6rem; color: var(--moss); text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center;
        }
        .dot { width: 6px; height: 6px; background: var(--moss); border-radius: 50%; margin-right: 8px; animation: pulse 1.5s infinite; }
        
        .main-hex {
            width: 100px; height: 100px; background: var(--stone);
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex; justify-content: center; align-items: center;
            box-shadow: var(--stone-shadow); border: 1px solid rgba(57, 255, 20, 0.2); margin-bottom: 15px;
        }

        .card {
            width: 100%; max-width: 420px; background: #0c0b0a; border: 1px solid #2a2420;
            padding: 20px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 8px; margin-top: 0; }

        input, select {
            width: 100%; background: #000; border: 1px solid #333; color: var(--moss);
            padding: 10px; margin: 5px 0; outline: none; border-radius: 0; font-family: monospace;
        }

        .btn-action {
            width: 100%; background: var(--moss); border: none; color: #000;
            padding: 14px; margin-top: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.75rem;
        }

        #results-list { margin-top: 15px; }
        .load-item {
            background: #080808; border: 1px solid #222; padding: 12px; margin-bottom: 8px;
            font-size: 0.75rem; position: relative; border-left: 3px solid var(--moss);
        }
        .copy-btn { position: absolute; top: 10px; right: 10px; color: var(--gold); cursor: pointer; font-size: 0.6rem; text-decoration: underline; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="live-status"><div class="dot"></div> System Live: EU-Gate 2.6.3</div>

    <div class="main-hex"><b style="color:var(--gold); font-size:0.7rem;">VCHF</b></div>

    <div class="card">
        <h3>1. Поиск Вектора (Open Web)</h3>
        <input type="text" id="start-city" placeholder="ОТКУДА (Warszawa)">
        <input type="text" id="end-city" placeholder="КУДА (Bremen)">
        <button class="btn-action" onclick="fetchLoads()">Найти грузы и догрузы</button>
        
        <div id="results-list"></div>

        <h3 style="margin-top:25px;">2. Контракт (PDF Generator)</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <input type="text" id="driver" placeholder="Водитель">
            <input type="text" id="truck" placeholder="Номер авто">
        </div>
        <input type="text" id="cargo" placeholder="Что везем?">
        <input type="text" id="price" placeholder="Сумма водителю (€)">
        <button class="btn-action" style="background:var(--gold)" onclick="makePDF()">Скачать PDF и закрыть</button>
    </div>

    <script>
        // Имитация "умного" поиска
        function fetchLoads() {
            const s = document.getElementById('start-city').value;
            const e = document.getElementById('end-city').value;
            if(!s || !e) return alert("Укажите маршрут");

            const list = document.getElementById('results-list');
            list.innerHTML = "<p style='color:var(--moss); font-size:0.6rem;'>Сканирование трассы А-категории...</p>";

            setTimeout(() => {
                const data = [
                    { f: "Pol-Trans", l: "Металл (12т)", p: 1150, c: "@dispatcher_pl" },
                    { f: "LKW Connect", l: "Мебель (3т) - ПО ПУТИ", p: 380, c: "+49 170 000" }
                ];

                list.innerHTML = data.map(i => `
                    <div class="load-item">
                        <span class="copy-btn" onclick="copyToClip('${i.f}', '${i.p}')">COPY FOR TG</span>
                        <b>${i.f}</b> | <span style="color:var(--moss)">€${i.p}</span><br>
                        ${i.l} | ${s} ➔ ${e}<br>
                        <small style="color:#555">${i.c}</small>
                    </div>
                `).join('');
            }, 800);
        }

        function copyToClip(firm, price) {
            const text = `Предлагаю груз: ${firm}. Цена: ${price}€. Оформление через Zero-Chaos. Едем?`;
            navigator.clipboard.writeText(text);
            alert("Текст скопирован для Telegram!");
        }

        function makePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const d = document.getElementById('driver').value;
            const t = document.getElementById('truck').value;
            const c = document.getElementById('cargo').value;
            const p = document.getElementById('price').value;
            const orderId = Math.floor(Math.random() * 9000) + 1000;

            doc.setFont("helvetica", "bold");
            doc.text("ZERO-CHAOS LOGISTICS CONFIRMATION", 20, 20);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.text(`Order ID: #ZC-${orderId} | Date: ${new Date().toLocaleDateString()}`, 20, 30);
            doc.line(20, 35, 190, 35);
            
            doc.text(`Driver Name: ${d}`, 20, 50);
            doc.text(`Truck Plate: ${t}`, 20, 60);
            doc.text(`Cargo Info: ${c}`, 20, 70);
            doc.text(`Rate: ${p} EUR`, 20, 80);
            
            doc.line(20, 90, 190, 90);
            doc.setFontSize(8);
            doc.text("Note: This is an electronic confirmation. Commission 1% included in management fee.", 20, 100);
            
            doc.save(`ZC_Order_${t}.pdf`);
        }
    </script>
</body>
</html>
