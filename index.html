<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCHF 2.0 | MATRIX 36 | STANDART PIG</title>
    <style>
        /* PROJECT: VCHF 2.0 (Bi-Turbo Ultimate)
           IDENTITY: Нулевой Хаос (Zero Chaos)
           RULE: Новый код = Старый код + Зонирование 30/15/15/40
           STRATEGY: Целостность превыше краткости.
        */
        :root {
            --gold: #d4af37;
            --vchf-glow: 0 0 20px rgba(212, 175, 55, 0.4);
            --cherry-velvet: radial-gradient(circle at center, #2a0008 0%, #000 100%);
            --glass: rgba(0, 0, 0, 0.9);
            --chaos: #ff0033;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: 'Courier New', monospace; color: var(--gold); 
        }

        #main-monolith {
            display: flex; flex-direction: column; width: 100vw; height: 100vh;
        }

        /* ПОЛЕ БОЯ (70% СВЕРХУ - включает ИИ и стороны) */
        #battle-sector {
            height: 70%; position: relative; background: var(--cherry-velvet);
            border-bottom: 1px solid #333; overflow: hidden;
        }

        /* ПЕРИМЕТР СТУЛЬЕВ (ИМИТАЦИЯ 15%) */
        .seat-imitation {
            position: absolute; display: flex; gap: 2px; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.1);
        }
        
        /* ВЕРХ (SPARK) - 15% высоты */
        #seat-top { 
            top: 0; left: 0; width: 100%; height: 15%; 
            border-bottom: 1px solid var(--gold);
        }
        /* БОКА - по 15% ширины */
        #seat-left { top: 15%; left: 0; width: 15%; height: 55%; border-right: 1px solid #222; }
        #seat-right { top: 15%; right: 0; width: 15%; height: 55%; border-left: 1px solid #222; }

        /* ЦЕНТР (ПОЛЕ БОЯ) */
        #arena-center {
            position: absolute; top: 15%; left: 15%; width: 70%; height: 55%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* МАТРИЦА 36 В АРЕНЕ */
        #matrix-36 {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px;
            width: 240px; height: 240px; margin-bottom: 20px;
        }
        .sphere-36 {
            width: 35px; height: 35px; border: 1px solid #444; border-radius: 2px;
            background: #111; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; background-image: url('1771489965074(1).png');
            background-size: cover;
        }
        .sphere-36.active { border-color: var(--gold); box-shadow: var(--vchf-glow); }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ (30% СНИЗУ) */
        #player-sector {
            height: 30%; background: #050505; position: relative;
            display: flex; flex-direction: column; padding: 2px;
            border-top: 2px solid var(--gold);
        }

        /* 4 РЯДА ПО МАСТЯМ (УПЛОТНЕННО) */
        .suit-row {
            flex: 1; display: flex; position: relative; width: 100%;
            border-bottom: 1px solid #1a1a1a; overflow-x: auto; scrollbar-width: none;
        }
        .suit-row::-webkit-scrollbar { display: none; }

        .card-slot {
            min-width: 10.5%; height: 95%; margin-right: -1%;
            background: #000; border: 1px solid #222; border-radius: 3px;
            transition: 0.2s; position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 11px;
        }
        .card-slot.active { background: #fff; border-color: var(--gold); }
        .card-slot.selected { transform: translateY(-10px); z-index: 50; border: 2px solid var(--gold); }

        /* КНОПКИ ДЕЙСТВИЯ (ПЛАВАЮЩИЕ НАД ПАНЕЛЬЮ) */
        #action-bar {
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 1000;
        }
        .vchf-btn {
            padding: 8px 20px; background: #000; border: 2px solid var(--gold);
            color: var(--gold); font-weight: bold; border-radius: 4px;
            font-size: 13px; display: none; text-shadow: 0 0 5px #000;
        }

        /* ИМИТАЦИЯ КАРТ (РУБАШКИ) */
        .card-back-mini {
            width: 15px; height: 22px; background: var(--gold); border: 1px solid #000; border-radius: 2px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="main-monolith">
        <div id="battle-sector">
            <div id="seat-top" class="seat-imitation">
                <div style="position:absolute; top:2px; font-size:10px;">SPARK (CPU)</div>
                <div id="spark-hand-visual" style="display:flex; gap:2px; margin-top:15px;"></div>
            </div>
            
            <div id="seat-left" class="seat-imitation">
                <div style="transform: rotate(-90deg); font-size:9px;">SLOT 2</div>
            </div>
            <div id="seat-right" class="seat-imitation">
                <div style="transform: rotate(90deg); font-size:9px;">SLOT 4</div>
            </div>

            <div id="arena-center">
                <div id="matrix-36"></div>
                <div id="battle-display" style="display:flex; gap:5px; height:80px;"></div>
            </div>
        </div>

        <div id="player-sector">
            <div id="action-bar">
                <button class="vchf-btn" id="btn-take" onclick="handleTake()">ВЗЯТЬ</button>
                <button class="vchf-btn" id="btn-bito" onclick="handleBito()">БИТО</button>
            </div>
            <div class="suit-row" id="row-spades"></div>
            <div class="suit-row" id="row-clubs"></div>
            <div class="suit-row" id="row-diamonds"></div>
            <div class="suit-row" id="row-hearts"></div>
        </div>
    </div>
    <script>
    // [КОНЕЦ ОКНА 1 - ГЕОМЕТРИЯ 30/15/15 УСТАНОВЛЕНА]
    /* PROJECT: VCHF 2.0 (Bi-Turbo Ultimate)
       IDENTITY: Нулевой Хаос (Zero Chaos)
       RULE: Новый код = Старый код + Имитация 15%
       MEMORY: Window 2 (lines 701-1400)
       NOTE: Карта на поле боя вылетает в центр. Имитация обновляется мгновенно.
    */

    const SUITS = ['♠', '♣', '♦', '♥'];
    const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const COLORS = {'♠': '#888', '♣': '#888', '♦': '#e60000', '♥': '#e60000'};

    let vchf_state = {
        matrix: [], 
        pHand: [], 
        eHand: [], 
        table: [],
        trump: '',
        turn: 'player',
        phase: 'PICK',
        seats: [0, 0, 0, 0] // Счетчик карт на 4 стула
    };

    function initLayout() {
        const rows = {
            '♠': document.getElementById('row-spades'),
            '♣': document.getElementById('row-clubs'),
            '♦': document.getElementById('row-diamonds'),
            '♥': document.getElementById('row-hearts')
        };

        SUITS.forEach(suit => {
            rows[suit].innerHTML = '';
            RANKS.forEach(rank => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.id = `slot-${suit}-${rank}`;
                slot.dataset.suit = suit;
                slot.dataset.rank = rank;
                rows[suit].appendChild(slot);
            });
        });
        
        buildFractalDeck();
    }

    function buildFractalDeck() {
        let deck = [];
        SUITS.forEach(s => {
            RANKS.forEach(r => {
                deck.push({
                    suit: s, rank: r, 
                    val: RANKS.indexOf(r) + 6, 
                    color: COLORS[s],
                    picked: false
                });
            });
        });

        // Фрактальное перемешивание (36 итераций)
        for (let i = 0; i < 36; i++) {
            deck.sort(() => Math.random() - 0.5);
        }
        vchf_state.matrix = deck;
        renderMatrix();
    }

    function renderMatrix() {
        const container = document.getElementById('matrix-36');
        container.innerHTML = '';
        vchf_state.matrix.forEach((card, index) => {
            const sphere = document.createElement('div');
            sphere.className = 'sphere-36';
            sphere.onclick = () => {
                if (vchf_state.phase === 'PICK') processPick(index, 'player');
            };
            container.appendChild(sphere);
        });
    }

    function processPick(index, actor) {
        const card = vchf_state.matrix[index];
        if (card.picked) return;

        card.picked = true;
        const spheres = document.querySelectorAll('.sphere-36');
        spheres[index].style.visibility = 'hidden';

        if (actor === 'player') {
            vchf_state.pHand.push(card);
            syncPlayerSlot(card);
        } else {
            vchf_state.eHand.push(card);
            updateSparkImitation();
        }

        checkPickEnd();
    }

    function syncPlayerSlot(card) {
        const slot = document.getElementById(`slot-${card.suit}-${card.rank}`);
        if (slot) {
            slot.classList.add('active');
            slot.style.color = card.color;
            slot.innerHTML = `
                <div style="font-weight:900">${card.rank}</div>
                <div style="font-size:18px">${card.suit}</div>
            `;
            slot.onclick = () => selectCard(card);
        }
    }

    function updateSparkImitation() {
        const container = document.getElementById('spark-hand-visual');
        container.innerHTML = '';
        // Ограничиваем визуал, чтобы не перегружать 15% зоны
        const count = vchf_state.eHand.length;
        const displayCount = Math.min(count, 18); 
        
        for (let i = 0; i < displayCount; i++) {
            const mini = document.createElement('div');
            mini.className = 'card-back-mini';
            container.appendChild(mini);
        }
        if (count > 18) {
            const plus = document.createElement('div');
            plus.innerText = `+${count - 18}`;
            plus.style.fontSize = '8px';
            container.appendChild(plus);
        }
    }

    function checkPickEnd() {
        const picked = vchf_state.matrix.filter(c => c.picked).length;
        
        if (vchf_state.phase === 'PICK' && picked < 36) {
            // ИИ тянет сразу после игрока (имитация одновременности)
            setTimeout(() => {
                const available = vchf_state.matrix.map((c, i) => !c.picked ? i : null).filter(n => n !== null);
                if (available.length > 0) {
                    const idx = available[Math.floor(Math.random() * available.length)];
                    processPick(idx, 'enemy');
                }
            }, 100);
        }

        if (picked === 36) {
            vchf_state.phase = 'BATTLE';
            setTrump();
        }
    }

    function setTrump() {
        const trumpCard = vchf_state.matrix[Math.floor(Math.random() * 36)];
        vchf_state.trump = trumpCard.suit;
        // Визуальное обозначение козыря (в фоне или индикатором)
        document.getElementById('battle-sector').style.borderTop = `4px solid ${COLORS[vchf_state.trump]}`;
        console.log("Козырь установлен:", vchf_state.trump);
    }

    window.onload = initLayout;
    // [КОНЕЦ ОКНА 2 - ДВИЖОК РАЗДАЧИ И ИМИТАЦИИ СИНХРОНИЗИРОВАН]
    /* PROJECT: VCHF 2.0 (Bi-Turbo Ultimate)
       IDENTITY: Нулевой Хаос (Zero Chaos)
       RULE: Манифест Монолита - Integrity over brevity
       MEMORY: Window 3 (lines 1401-2100)
       NOTE: Кнопки управления появляются в центре Action Bar над руками.
    */

    function selectCard(card) {
        if (vchf_state.phase !== 'BATTLE') return;
        
        // Сброс предыдущего выбора
        document.querySelectorAll('.card-slot').forEach(s => s.classList.remove('selected'));
        const slot = document.getElementById(`slot-${card.suit}-${card.rank}`);
        
        if (vchf_state.turn === 'player') {
            // Если ход игрока (Атака)
            if (vchf_state.table.length === 0 || canAttackWith(card)) {
                executePlayerMove(card);
            }
        } else {
            // Если ход ИИ (Защита игрока)
            if (canDefend(card)) {
                executePlayerDefend(card);
            }
        }
    }

    function canAttackWith(card) {
        if (vchf_state.table.length >= 6) return false;
        // Правило Дурака: подкидывать только те ранги, что уже на столе
        const ranksOnTable = vchf_state.table.flatMap(p => [p.atk.rank, p.def ? p.def.rank : null]);
        return ranksOnTable.includes(card.rank);
    }

    function canDefend(defCard) {
        const target = vchf_state.table.find(p => p.def === null);
        if (!target) return false;
        
        const atkCard = target.atk;
        if (defCard.suit === atkCard.suit && defCard.val > atkCard.val) return true;
        if (defCard.suit === vchf_state.trump && atkCard.suit !== vchf_state.trump) return true;
        return false;
    }

    function executePlayerMove(card) {
        const move = { atk: card, def: null };
        vchf_state.table.push(move);
        removeCardFromHand(card, 'player');
        renderTable();
        
        vchf_state.turn = 'player'; // Игрок атакует, ждем ответа ИИ
        setTimeout(sparkDefense, 600);
    }

    function executePlayerDefend(card) {
        const target = vchf_state.table.find(p => p.def === null);
        target.def = card;
        removeCardFromHand(card, 'player');
        renderTable();
        
        // После защиты игрока, ИИ может подкинуть
        setTimeout(sparkAttack, 800);
    }

    function removeCardFromHand(card, actor) {
        if (actor === 'player') {
            const slot = document.getElementById(`slot-${card.suit}-${card.rank}`);
            slot.classList.remove('active', 'selected');
            slot.innerHTML = '';
            slot.onclick = null;
            vchf_state.pHand = vchf_state.pHand.filter(c => !(c.suit === card.suit && c.rank === card.rank));
        } else {
            vchf_state.eHand = vchf_state.eHand.filter(c => !(c.suit === card.suit && c.rank === card.rank));
            updateSparkImitation();
        }
    }

    function renderTable() {
        const tableArea = document.getElementById('battle-display');
        tableArea.innerHTML = '';
        
        vchf_state.table.forEach(pair => {
            const pairDiv = document.createElement('div');
            pairDiv.style.position = 'relative';
            pairDiv.style.width = '60px';
            
            const atk = createCardUI(pair.atk);
            pairDiv.appendChild(atk);
            
            if (pair.def) {
                const def = createCardUI(pair.def);
                def.style.position = 'absolute';
                def.style.top = '15px';
                def.style.left = '10px';
                def.style.zIndex = '10';
                pairDiv.appendChild(def);
            }
            tableArea.appendChild(pairDiv);
        });
        
        updateActionButtons();
    }

    function createCardUI(card) {
        const div = document.createElement('div');
        div.style.cssText = `
            width: 55px; height: 80px; background: #fff; border-radius: 4px;
            color: ${card.color}; border: 1px solid #000; font-size: 12px;
            display: flex; flex-direction: column; justify-content: space-between; padding: 3px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        `;
        div.innerHTML = `<div>${card.rank}</div><div style="font-size:20px; align-self:center">${card.suit}</div><div style="transform:rotate(180deg)">${card.rank}</div>`;
        return div;
    }

    function updateActionButtons() {
        const bito = document.getElementById('btn-bito');
        const take = document.getElementById('btn-take');
        
        bito.style.display = 'none';
        take.style.display = 'none';

        if (vchf_state.table.length === 0) return;

        const allCovered = vchf_state.table.every(p => p.def !== null);

        if (vchf_state.turn === 'player') {
            // Игрок атаковал
            if (allCovered) bito.style.display = 'inline-block';
        } else {
            // ИИ атаковал
            if (!allCovered) take.style.display = 'inline-block';
        }
    }

    function handleBito() {
        vchf_state.table = [];
        vchf_state.turn = (vchf_state.turn === 'player') ? 'enemy' : 'player';
        renderTable();
        if (vchf_state.turn === 'enemy') setTimeout(sparkAttack, 1000);
    }

    function handleTake() {
        const allCards = vchf_state.table.flatMap(p => [p.atk, p.def].filter(Boolean));
        if (vchf_state.turn === 'enemy') {
            // Игрок берет
            allCards.forEach(c => {
                vchf_state.pHand.push(c);
                syncPlayerSlot(c);
            });
            vchf_state.turn = 'enemy'; // Ход остается у ИИ
        }
        vchf_state.table = [];
        renderTable();
        setTimeout(sparkAttack, 1000);
    }

    // [КОНЕЦ ОКНА 3 - ЛОГИКА БИТВЫ ЗАКРЕПЛЕНА]
    /* PROJECT: VCHF 2.0 (Bi-Turbo Ultimate)
       IDENTITY: Нулевой Хаос (Zero Chaos)
       RULE: Новый код = Старый код + Интеллект Spark
       MEMORY: Window 4 (lines 2101-2750)
       NOTE: ИИ Spark учитывает козырь и минимизирует потери ценных карт.
    */

    // ИИ SPARK: ЗАЩИТА (DEFENSE)
    function sparkDefense() {
        if (vchf_state.phase !== 'BATTLE' || vchf_state.turn !== 'player') return;

        const target = vchf_state.table.find(p => p.def === null);
        if (!target) return;

        const atkCard = target.atk;
        
        // Поиск кандидатов: той же масти выше ИЛИ козырь
        let candidates = vchf_state.eHand.filter(c => 
            (c.suit === atkCard.suit && c.val > atkCard.val) || 
            (c.suit === vchf_state.trump && atkCard.suit !== vchf_state.trump)
        );

        // Сортировка: сначала не козыри (по возрастанию), потом козыри
        candidates.sort((a, b) => {
            if (a.suit === vchf_state.trump && b.suit !== vchf_state.trump) return 1;
            if (a.suit !== vchf_state.trump && b.suit === vchf_state.trump) return -1;
            return a.val - b.val;
        });

        if (candidates.length > 0) {
            const defCard = candidates[0];
            target.def = defCard;
            removeCardFromHand(defCard, 'enemy');
            renderTable();
            
            // После успешной защиты Spark, игрок может подкинуть (если есть что)
            updateActionButtons();
        } else {
            // Spark не может покрыться -> забирает всё
            console.log("Spark: Нечем крыться. Забираю.");
            setTimeout(() => sparkTake(), 600);
        }
    }

    // ИИ SPARK: АТАКА (ATTACK)
    function sparkAttack() {
        if (vchf_state.phase !== 'BATTLE') return;
        vchf_state.turn = 'enemy';

        let attackCard = null;

        if (vchf_state.table.length === 0) {
            // Первая атака: самая слабая карта (не козырь)
            let hand = [...vchf_state.eHand].sort((a, b) => a.val - b.val);
            attackCard = hand.find(c => c.suit !== vchf_state.trump) || hand[0];
        } else {
            // Подкидывание: ищем совпадение рангов
            const ranksOnTable = vchf_state.table.flatMap(p => [p.atk.rank, p.def ? p.def.rank : null]);
            let candidates = vchf_state.eHand.filter(c => ranksOnTable.includes(c.rank));
            
            // Не подкидываем козыри без крайней нужды
            candidates = candidates.sort((a, b) => a.val - b.val);
            if (candidates.length > 0 && vchf_state.table.length < 6) {
                attackCard = candidates[0];
            }
        }

        if (attackCard) {
            vchf_state.table.push({ atk: attackCard, def: null });
            removeCardFromHand(attackCard, 'enemy');
            renderTable();
            updateActionButtons();
        } else {
            // Спарк больше не может/не хочет атаковать -> БИТО
            if (vchf_state.table.every(p => p.def !== null)) {
                console.log("Spark: БИТО.");
                handleBito();
            }
        }
    }

    function sparkTake() {
        const allCards = vchf_state.table.flatMap(p => [p.atk, p.def].filter(Boolean));
        allCards.forEach(c => vchf_state.eHand.push(c));
        vchf_state.table = [];
        updateSparkImitation();
        renderTable();
        
        vchf_state.turn = 'player'; // Ход переходит к игроку
        updateActionButtons();
    }

    // ПРОВЕРКА ФИНАЛА
    function checkEndGame() {
        if (vchf_state.phase !== 'BATTLE') return;
        
        const pEmpty = vchf_state.pHand.length === 0;
        const eEmpty = vchf_state.eHand.length === 0;

        if (pEmpty && eEmpty) finalize("НИЧЬЯ: ХАОС УРАВНОВЕШЕН");
        else if (pEmpty) finalize("ПОБЕДА: WANDERER СЛОМАЛ МАТРИЦУ");
        else if (eEmpty) finalize("ПОРАЖЕНИЕ: SPARK ОБНУЛИЛА ВАС");
    }

    function finalize(msg) {
        vchf_state.phase = 'END';
        const modal = document.createElement('div');
        modal.style.cssText = `
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
            color: var(--gold); font-family: 'Courier New', monospace;
        `;
        modal.innerHTML = `
            <h1 style="letter-spacing:10px">${msg}</h1>
            <button onclick="location.reload()" class="vchf-btn" style="display:block; margin-top:30px">РИТУАЛ ЗАНОВО</button>
            <p style="margin-top:20px; font-size:10px">Манифест Монолита: vchf — дух, chf — расчет.</p>
        `;
        document.body.appendChild(modal);
    }

    // ИНИЦИАЛИЗАЦИЯ
    window.addEventListener('DOMContentLoaded', () => {
        initLayout();
        console.log("-----------------------------------------");
        console.log("VCHF 2.0: BI-TURBO ULTIMATE | CORE 30/70");
        console.log("STATUS: CPU COLD / AGENT WANDERER");
        console.log("-----------------------------------------");
    });

    /* МАНИФЕСТ МОНОЛИТА ИСПОЛНЕН:
       1. Зонирование 30% (управление) / 15% (Spark) / 15% (Бока) / 40% (Арена).
       2. Матрица 36 заменяет 42 сферы.
       3. 4 ряда по мастям зафиксированы в нижнем секторе.
