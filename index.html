<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Quartet Chaos Edition</title>
    <style>
        :root {
            --gold: #ffcf40; /* Твой цвет (Юг) */
            --space-dark: #121625; 
            --nebula-core: #222a44; 
            --spark-neon: #00fa9a; /* Север (Spark-Top) */
            --spark-blue: #00d4ff; /* Запад (Spark-West) */
            --spark-fire: #ff4500; /* Восток (Spark-East) */
            --trump-halo: #8a2be2; 
            --cherry-pulse: #4a0404;
            --bg-card: #ffffff;
            --grid-color: rgba(255, 207, 64, 0.06); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #050505; color: #e0e6ff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; perspective: 1200px; 
        }
        .arena-top {
            height: 62%; position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 8s infinite ease-in-out;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            border-bottom: 2px solid rgba(255, 207, 64, 0.25);
            overflow: hidden; transform-style: preserve-3d; transform: rotateX(8deg); margin-top: 5px;
        }

        @keyframes tableBreathe {
            0%, 100% { background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%); filter: brightness(0.8); }
            50% { background: radial-gradient(circle at 50% 45%, #3a0a1a 0%, var(--cherry-pulse) 65%, #050000 100%); filter: brightness(1.2); }
        }

        /* Боковые зоны Spark */
        .spark-side {
            position: absolute; top: 50%; width: 40px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 4px; align-items: center; z-index: 60;
        }
        #side-west { left: 10px; border-left: 2px solid var(--spark-blue); padding-left: 5px; }
        #side-east { right: 10px; border-right: 2px solid var(--spark-fire); padding-right: 5px; }
        .side-label { font-size: 7px; writing-mode: vertical-rl; letter-spacing: 2px; margin-bottom: 5px; }

        .arena-top::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 44px 44px; pointer-events: none; z-index: 0;
        }

        .control-bottom {
            height: 38%; position: relative;
            background: linear-gradient(to top, #000 0%, #0c0f18 100%);
            padding: 15px 5px 5px 5px; border-top-left-radius: 50% 30px; border-top-right-radius: 50% 30px;
            z-index: 2000; border-top: 1px solid rgba(255, 207, 64, 0.2);
        }
        .card-node {
            position: absolute; width: 55px; height: 77px;
            background-color: #1a1a1a; background-image: url('1771489965074(1).png');
            background-size: cover; border: 1px solid rgba(255, 207, 64, 0.4);
            border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            cursor: pointer; z-index: 10; transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .shuffling { transition: all 0.2s ease-in-out !important; }
        .card-node.face-up { 
            background-image: none !important; background-color: var(--bg-card);
            transform: rotateY(0deg); border: 1px solid #fff;
        }
        .card-node.hide { opacity: 0; pointer-events: none; transform: scale(0.5) rotateX(90deg); }
        
        #status-msg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(16, 20, 32, 0.95); border: 1px solid var(--gold); color: var(--gold);
            padding: 15px 35px; text-align: center; z-index: 2100; font-weight: bold;
            letter-spacing: 3px; backdrop-filter: blur(10px); transition: 0.4s;
        }
        #status-msg.active { transform: translate(-50%, -50%) scale(1); }
        
        .trump-status { 
            position: absolute; top: 15px; right: 15px; width: 50px; height: 50px; 
            border: 2px solid var(--gold); background: #000; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        #trump-icon { font-size: 30px; }
        
        .suits-grid { display: flex; flex-direction: column; height: 100%; padding-left: 80px; align-items: center; }
        .suit-row { display: flex; height: 44px; margin-top: -12px; }
        .slot { 
            width: 53px; height: 72px; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 207, 64, 0.25); position: relative;
            display: flex; align-items: center; justify-content: center;
            margin-left: -28px; border-radius: 5px; transition: 0.4s;
        }
        .slot.filled { background: var(--bg-card); border: 1px solid #fff; z-index: 5; }
        
        .action-btns { position: absolute; bottom: 20px; left: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 2500; }
        button { 
            padding: 12px 18px; background: rgba(0,0,0,0.5); border: 1px solid var(--gold); color: var(--gold); 
            font-size: 9px; letter-spacing: 2px; font-weight: bold; cursor: pointer;
        }
        .spark-zone { 
            position: absolute; top: 0; left: 0; width: 100%; height: 45px; 
            display: flex; align-items: center; justify-content: center; z-index: 50;
        }
    </style>
</head>
<body>
    <div id='status-msg'></div>
    <div class='arena-top' id='arena'>
        <div class='spark-zone'>
            <span style='font-size:9px; color:var(--spark-neon); letter-spacing:3px;'>NORTH SPARK</span>
            <div id='spark-cards-top' style='margin-left:15px; display:flex; gap:3px;'></div>
        </div>
        
        <div id='side-west' class='spark-side'>
            <span class='side-label' style='color:var(--spark-blue)'>WEST SPARK</span>
            <div id='spark-cards-west' style='display:flex; flex-direction:column; gap:3px;'></div>
        </div>
        <div id='side-east' class='spark-side'>
            <span class='side-label' style='color:var(--spark-fire)'>EAST SPARK</span>
            <div id='spark-cards-east' style='display:flex; flex-direction:column; gap:3px;'></div>
        </div>

        <div class='trump-status'><div id='trump-icon'>?</div></div>
        <div class='chaos-deck-container'><div id='chaos-deck'></div></div>
        <div id='battle-table'></div>
    </div>

    <div class='control-bottom'>
        <div class='suits-grid'>
            <div id='s-spades' class='suit-row'></div><div id='s-clubs' class='suit-row'></div>
            <div id='s-diamonds' class='suit-row'></div><div id='s-hearts' class='suit-row'></div>
        </div>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>КВАРТЕТ ХАОСА: ПУСК</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
    </div>

<script>
    /* Код обновлен Искрой: КВАРТЕТ ХАОСА (4 игрока). Сверка: 100%. */
    var SUITS = ['♠', '♣', '♦', '♥'];
    var RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    var COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    
    // Порядок хода: player -> west -> top -> east
    var TURN_ORDER = ['player', 'west', 'top', 'east'];
    
    var vchf = { 
        deck: [], 
        pHand: [], 
        eHandTop: [], eHandWest: [], eHandEast: [], // 3 противника
        table: [], 
        trump: '', 
        phase: 'WAIT', 
        turn: 'player',
        defender: 'west' // Кто сейчас отбивается
    };
    
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    var ctx = null;

    function playSound(type) {
        if(!ctx) ctx = new AudioCtx();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if(type === 'slide') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(160, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.12);
            osc.start(); osc.stop(ctx.currentTime + 0.12);
        } else if(type === 'bito') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(110, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
            gain.gain.setValueAtTime(0.35, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.35);
            osc.start(); osc.stop(ctx.currentTime + 0.35);
        }
    }
    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        vchf.phase = 'SHUFFLING';
        var t = [];
        SUITS.forEach(function(s) {
            RANKS.forEach(function(r) {
                t.push({ s: s, r: r, v: RANKS.indexOf(r), c: COLORS[s], used: false });
            });
        });
        vchf.deck = t;
        renderChaos();
        setTimeout(visualShuffle, 100);
    }

    function renderChaos() {
        var c = document.getElementById('chaos-deck');
        if(!c) return;
        c.innerHTML = '';
        vchf.deck.forEach(function(card, i) {
            var n = document.createElement('div');
            n.className = 'card-node'; n.id = 'node-' + i;
            n.style.left = '112px'; n.style.top = '100px'; 
            c.appendChild(n);
        });
    }

    function visualShuffle() {
        var startTime = Date.now();
        var duration = 2000;
        var trumpEl = document.getElementById('trump-icon');
        var interval = setInterval(function() {
            var elapsed = Date.now() - startTime;
            if(Math.random() > 0.8) playSound('slide');
            vchf.deck.forEach(function(card, i) {
                var node = document.getElementById('node-' + i);
                if(node) {
                    node.style.left = (Math.random() * 225) + 'px';
                    node.style.top = (Math.random() * 200) + 'px';
                    node.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
                }
            });
            var rs = SUITS[Math.floor(Math.random() * 4)];
            trumpEl.textContent = rs;
            if(elapsed > duration) { clearInterval(interval); finalizeShuffle(); }
        }, 80);
    }

    function finalizeShuffle() {
        vchf.deck.sort(function() { return Math.random() - 0.5; });
        vchf.trump = SUITS[Math.floor(Math.random() * 4)];
        var te = document.getElementById('trump-icon');
        te.textContent = vchf.trump; te.style.color = COLORS[vchf.trump];
        vchf.phase = 'PICK';
        vchf.deck.forEach(function(card, i) {
            var n = document.getElementById('node-' + i);
            if(n) {
                var a = (i / 36) * 6.283; var r = 110;
                n.style.left = (112 + r * Math.cos(a)) + 'px';
                n.style.top = (100 + r * Math.sin(a)) + 'px';
                n.style.transform = 'rotate(' + (a * 57.3 + 90) + 'deg)';
                n.onclick = function() { if(vchf.phase === 'PICK') pickCycle(i); };
            }
        });
        showMsg('РАЗДАЧА КВАРТЕТА');
    }

    // Раздача по кругу всем 4 игрокам
    function pickCycle(idx) {
        if(vchf.deck[idx].used) return;
        
        // 1. Тебе
        pick(idx, 'player');
        
        // 2. Остальным троим автоматически из свободных
        var agents = ['west', 'top', 'east'];
        agents.forEach(function(agent) {
            var av = []; vchf.deck.forEach(function(x, i) { if(!x.used) av.push(i); });
            if(av.length > 0) pick(av[0], agent);
        });
        checkFinal();
    }

    function pick(idx, actor) {
        var c = vchf.deck[idx];
        if(!c || c.used) return;
        c.used = true;
        playSound('slide');
        var node = document.getElementById('node-' + idx);
        
        if(actor === 'player') {
            vchf.pHand.push(c);
            var target = document.getElementById('slot-' + c.s + '-' + c.r);
            var rect = target.getBoundingClientRect();
            var parent = document.getElementById('chaos-deck').getBoundingClientRect();
            node.style.left = (rect.left - parent.left) + 'px';
            node.style.top = (rect.top - parent.top) + 'px';
            setTimeout(function() { node.classList.add('hide'); updateSlot(c); }, 400);
        } else {
            if(actor === 'top') vchf.eHandTop.push(c);
            else if(actor === 'west') vchf.eHandWest.push(c);
            else if(actor === 'east') vchf.eHandEast.push(c);
            
            node.style.opacity = '0';
            setTimeout(function() { node.classList.add('hide'); drawAllSparks(); }, 400);
        }
    }
    function drawAllSparks() {
        renderSparkHand('spark-cards-top', vchf.eHandTop, 'var(--spark-neon)');
        renderSparkHand('spark-cards-west', vchf.eHandWest, 'var(--spark-blue)');
        renderSparkHand('spark-cards-east', vchf.eHandEast, 'var(--spark-fire)');
    }

    function renderSparkHand(id, hand, color) {
        var cont = document.getElementById(id);
        if(!cont) return;
        cont.innerHTML = '';
        hand.forEach(function() {
            var m = document.createElement('div');
            m.style.cssText = 'width:10px;height:14px;background:'+color+';opacity:0.6;border-radius:2px;box-shadow:0 0 5px '+color+';';
            cont.appendChild(m);
        });
    }

    function checkFinal() {
        if(vchf.deck.every(function(x) { return x.used; })) {
            if(vchf.phase !== 'BATTLE') { 
                vchf.phase = 'BATTLE'; 
                showMsg('БОЙ НАЧАТ'); 
                updateActionButtons();
                if(vchf.turn !== 'player') setTimeout(sparkThink, 1000);
            }
        }
    }

    function updateSlot(card) {
        var el = document.getElementById('slot-' + card.s + '-' + card.r);
        if(!el) return;
        el.classList.add('filled'); el.style.color = card.c; el.innerHTML = '';
        var t = document.createElement('div');
        t.style.cssText = 'position:absolute;top:3px;left:4px;font-size:11px;font-weight:900;';
        t.textContent = card.r;
        var m = document.createElement('div');
        m.style.cssText = 'font-size:26px;'; m.textContent = card.s;
        el.appendChild(t); el.appendChild(m);
        el.onclick = function() { if(vchf.phase === 'BATTLE') selectFromHand(card); };
    }

    function sparkThink() {
        if(vchf.phase !== 'BATTLE' || vchf.turn === 'player') return;
        
        var currentActor = vchf.turn;
        var hand = (currentActor === 'top') ? vchf.eHandTop : (currentActor === 'west' ? vchf.eHandWest : vchf.eHandEast);
        
        // Если Spark атакует
        if(vchf.table.length % 2 === 0) {
            if(hand.length > 0) {
                var ch = hand.sort(function(a,b) { return a.v - b.v; })[0];
                executeMove(ch, currentActor);
            } else { nextTurn(); }
        } else {
            // Если Spark защищается
            var target = vchf.table[vchf.table.length - 1].card;
            var cand = hand.filter(function(c) {
                return (c.s === target.s && c.v > target.v) || (c.s === vchf.trump && target.s !== vchf.trump);
            }).sort(function(a,b) { return a.v - b.v; });
            
            if(cand.length > 0) { executeMove(cand[0], currentActor); }
            else { sparkTake(currentActor); }
        }
    }

    function executeMove(card, actor) {
        playSound('slide');
        vchf.table.push({card: card, actor: actor});
        removeFromHand(card, actor);
        renderTable();
        
        // После хода передаем очередь следующему по кругу
        nextTurn();
    }

    function nextTurn() {
        var idx = TURN_ORDER.indexOf(vchf.turn);
        vchf.turn = TURN_ORDER[(idx + 1) % 4];
        updateActionButtons();
        if(vchf.turn !== 'player') setTimeout(sparkThink, 1200);
    }
    function removeFromHand(card, actor) {
        if(actor === 'player') {
            vchf.pHand = vchf.pHand.filter(function(c) { return !(c.s === card.s && c.r === card.r); });
            var slot = document.getElementById('slot-' + card.s + '-' + card.r);
            if(slot) { slot.classList.remove('filled'); slot.innerHTML = ''; }
        } else {
            if(actor === 'top') vchf.eHandTop = vchf.eHandTop.filter(function(c) { return !(c.s === card.s && c.r === card.r); });
            else if(actor === 'west') vchf.eHandWest = vchf.eHandWest.filter(function(c) { return !(c.s === card.s && c.r === card.r); });
            else if(actor === 'east') vchf.eHandEast = vchf.eHandEast.filter(function(c) { return !(c.s === card.s && c.r === card.r); });
            drawAllSparks();
        }
    }

    function renderTable() {
        var tc = document.getElementById('battle-table');
        tc.innerHTML = '';
        vchf.table.forEach(function(move, i) {
            var col = i % 4; var row = Math.floor(i / 4);
            var el = document.createElement('div');
            el.className = 'card-node face-up';
            el.style.left = (window.innerWidth/2 - 120 + col*60) + 'px';
            el.style.top = (100 + row*40) + 'px';
            el.style.color = move.card.c;
            el.innerHTML = "<div style='position:absolute;top:2px;left:4px;font-size:10px;'>"+move.card.r+"</div><div style='font-size:24px;text-align:center;margin-top:10px;'>"+move.card.s+"</div>";
            tc.appendChild(el);
        });
    }

    function handleBito() {
        playSound('bito');
        vchf.table = []; renderTable();
        nextTurn();
    }

    function sparkTake(actor) {
        showMsg(actor.toUpperCase() + ' БЕРЕТ');
        var cards = vchf.table.map(function(m) { return m.card; });
        if(actor === 'top') vchf.eHandTop = vchf.eHandTop.concat(cards);
        else if(actor === 'west') vchf.eHandWest = vchf.eHandWest.concat(cards);
        else if(actor === 'east') vchf.eHandEast = vchf.eHandEast.concat(cards);
        vchf.table = []; drawAllSparks(); renderTable();
        nextTurn();
    }

    function updateActionButtons() {
        var isPlayerTurn = (vchf.turn === 'player');
        document.getElementById('btn-bito').style.display = (isPlayerTurn && vchf.table.length > 0) ? 'block' : 'none';
        document.getElementById('btn-take').style.display = (isPlayerTurn && vchf.table.length % 2 !== 0) ? 'block' : 'none';
    }

    window.onload = function() { initLayout(); };
</script>
</body>
</html>
