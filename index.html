<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERO CHAOS | THE MONOLITH</title>
    <style>
        :root {
            --gold: #bf953f;
            --gold-bright: #fcf6ba;
            --cherry-deep: #2b0101;
            --black: #050505;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; overflow: hidden; font-family: 'Cinzel', serif;
        }

        #vault-stage {
            position: relative; width: 100vw; height: 100vh;
            display: flex; perspective: 1200px;
        }

        /* --- СТВОРКИ С ТОЛЩИНОЙ (3D) --- */
        .door {
            width: 50%; height: 100%; z-index: 10;
            background: radial-gradient(circle at center, var(--cherry-deep) 0%, var(--black) 100%);
            border: 2px solid var(--gold);
            box-shadow: inset 0 0 150px #000;
            transition: 3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .door-l { border-right: 4px solid var(--gold); transform-origin: left center; }
        .door-r { border-right: 4px solid var(--gold); transform-origin: right center; }

        /* --- ШТУРВАЛ (HEAVY GEAR) --- */
        .wheel-unit {
            position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%);
            width: 340px; height: 340px; z-index: 50;
            display: flex; align-items: center; justify-content: center;
        }

        .hub-core {
            width: 130px; height: 130px; background: #111;
            border: 6px double var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px #000, inset 0 0 25px var(--gold);
            z-index: 60; filter: drop-shadow(0 0 10px rgba(191, 149, 63, 0.4));
        }

        .spoke-group {
            position: absolute; width: 100%; height: 100%;
            transition: 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .spoke {
            position: absolute; top: 50%; left: 50%;
            width: 150px; height: 8px; 
            background: linear-gradient(90deg, var(--gold), transparent);
            transform-origin: 0% 50%;
        }

        .cap {
            position: absolute; right: -40px; top: -21px;
            width: 55px; height: 55px; background: #000;
            border: 2px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-weight: 900; font-size: 1.5em;
            cursor: pointer; box-shadow: 0 8px 20px #000;
            transition: 0.4s;
        }

        /* --- ЭФФЕКТЫ --- */
        .cap-active { transform: scale(0) translateY(400px); opacity: 0; }
        .vault-open .door-l { transform: rotateY(-95deg) scaleX(0.9); opacity: 0.2; }
        .vault-open .door-r { transform: rotateY(95deg) scaleX(0.9); opacity: 0.2; }
        .screen-shake { animation: shake 0.2s; }

        @keyframes shake {
            0% { transform: translateY(0); }
            50% { transform: translateY(4px); }
            100% { transform: translateY(0); }
        }

        .entry-ready {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            padding: 15px 60px; background: none; border: 1px solid var(--gold);
            color: var(--gold); letter-spacing: 12px; font-weight: bold;
            cursor: pointer; opacity: 0; transition: 1s; z-index: 100;
        }
    </style>
</head>
<body onclick="initAudio()">

<div id="vault-stage">
    <div id="dl" class="door door-l"></div>
    <div id="dr" class="door door-r"></div>

    <div class="wheel-unit">
        <div class="hub-core"><span style="font-size:60px; color:var(--gold);">☠</span></div>
        <div id="gear" class="spoke-group"></div>
    </div>

    <button id="open-btn" class="entry-ready" onclick="crack()">OPEN</button>
</div>

<script>
    let audioCtx, count = 0;
    const symbols = ['$','€','₣','£','¥','₿'];
    const gear = document.getElementById('gear');

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    // Генерация Механики
    symbols.forEach((s, i) => {
        const spoke = document.createElement('div');
        spoke.className = 'spoke';
        spoke.style.transform = `rotate(${i * 60}deg)`;
        spoke.innerHTML = `<div class="cap" onclick="engage('${s}', this)">${s}</div>`;
        gear.appendChild(spoke);
    });

    function playSound(freq, type, dur, vol) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function engage(s, el) {
        if (count >= 6) return;
        // Звук удара ригеля
        playSound(80, 'sine', 0.4, 1);
        playSound(150, 'square', 0.1, 0.2); // Металлический лязг
        
        el.classList.add('cap-active');
        document.body.classList.add('screen-shake');
        setTimeout(() => document.body.classList.remove('screen-shake'), 200);

        count++;
        gear.style.transform = `rotate(${count * 60}deg)`;
        
        if (count === 6) document.getElementById('open-btn').style.opacity = '1';
    }

    function crack() {
        // Звук гидравлики
        playSound(50, 'sawtooth', 2, 0.5); 
        document.getElementById('vault-stage').classList.add('vault-open');
        setTimeout(() => { window.location.href = 'terminal.html'; }, 3000);
    }
</script>
</body>
</html>
