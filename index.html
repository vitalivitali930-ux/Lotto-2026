<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ZERO_CHAOS // COFFEE_MONOLITH_TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --steel: #121213;
            --steel-mid: #242426;
            --gold-hot: #fcf6ba;
            --shadow-deep: rgba(0,0,0,0.9);
        }

        body {
            margin: 0; background: var(--steel);
            color: var(--gold-hot);
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
        }

        .header {
            padding: 40px; text-align: center;
            border-bottom: 1px solid var(--steel-mid);
            letter-spacing: 5px; color: #444;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 50px; padding: 60px;
            perspective: 2000px;
        }

        .cup-card {
            position: relative; height: 500px;
            background: linear-gradient(145deg, #1a1a1b, #0a0a0a);
            border: 1px solid var(--steel-mid);
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .cup-card:hover {
            transform: rotateY(-10deg) rotateX(5deg) translateZ(50px);
            border-color: var(--gold-hot);
            box-shadow: 0 0 40px rgba(252, 246, 186, 0.15);
        }

        /* Визуализация стакана */
        .cup-preview {
            flex-grow: 1; display: flex;
            align-items: center; justify-content: center;
            position: relative;
        }

        .cup-shape {
            width: 120px; height: 180px;
            background: #000;
            clip-path: polygon(10% 0%, 90% 0%, 80% 100%, 20% 100%);
            border: 1px solid #333;
            position: relative;
            transition: 0.5s;
        }

        .cup-card:hover .cup-shape {
            border-color: var(--gold-hot);
            box-shadow: 0 0 20px rgba(252, 246, 186, 0.2);
        }

        /* Золотой узор (динамический для каждого мотива) */
        .pattern-overlay {
            position: absolute; top: 20%; left: 0; width: 100%; height: 60%;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(252, 246, 186, 0.05) 10px, rgba(252, 246, 186, 0.05) 11px);
        }

        .asset-info {
            padding: 25px; background: rgba(0,0,0,0.5);
            border-top: 1px solid var(--steel-mid);
        }

        .motive-num { font-size: 0.6rem; color: #555; }
        .motive-title { 
            display: block; font-size: 1.1rem; margin: 8px 0; 
            letter-spacing: 2px;
        }
        .motive-desc { font-size: 0.7rem; color: #888; font-family: sans-serif; line-height: 1.4; }

        .btn-deposit {
            margin-top: 15px; width: 100%; padding: 10px;
            background: transparent; border: 1px solid var(--gold-hot);
            color: var(--gold-hot); font-family: 'Orbitron';
            cursor: pointer; transition: 0.3s;
        }

        .btn-deposit:hover { background: var(--gold-hot); color: #000; }
    </style>
</head>
<body>

    <div class="header">НУЛЕВОЙ ХАОС // ТЕРМИНАЛ АРСЕНАЛА // 9 МОТИВОВ</div>

    <div class="shop-grid" id="grid"></div>

    <script>
        const motives = [
            { t: "ШЕСТЬ РИГЕЛЕЙ", d: "Доступ открыт только изнутри. Механика воли." },
            { t: "ЗОЛОТОЕ СЕЧЕНИЕ", d: "Чистая пропорция спирали Монолита." },
            { t: "РАЗРЫВ (RUPTURE)", d: "Реальность хрупка. Монолит вечен." },
            { t: "INTEGRITY", d: "Целостность выше краткости. Не разбавляй суть." },
            { t: "СИНХРОНИЗАЦИЯ 40Hz", d: "Почувствуй инерцию. Поймай резонанс." },
            { t: "ZERO CHAOS", d: "Порядок, рожденный из цифрового шума." },
            { t: "SWISS STANDARD", d: "Чистота намерения — 999.9. Эталон." },
            { t: "SPARK JOY", d: "Рискуй красиво. Ошибайся осознанно." },
            { t: "ARCHITECT'S FUEL", d: "Двигатель Искры. Алхимия бодрости." }
        ];

        const grid = document.getElementById('grid');

        // Рендер карточек
        motives.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'cup-card';
            card.onmouseenter = () => SoundEngine.playHover();
            card.onclick = () => SoundEngine.playClick();
            
            card.innerHTML = `
                <div class="cup-preview">
                    <div class="cup-shape">
                        <div class="pattern-overlay"></div>
                    </div>
                </div>
                <div class="asset-info">
                    <span class="motive-num">MOTIVE_0${i+1}</span>
                    <span class="motive-title">${m.t}</span>
                    <p class="motive-desc">${m.d}</p>
                    <button class="btn-deposit">ДЕПОНИРОВАТЬ</button>
                </div>
            `;
            grid.appendChild(card);
        });

        // АКУСТИЧЕСКОЕ ЯДРО
        const SoundEngine = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            playHover() {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.frequency.setValueAtTime(40, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.4);
            },
            playClick() {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(900, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.2);
            }
        };

        document.body.onclick = () => { if (SoundEngine.ctx.state === 'suspended') SoundEngine.ctx.resume(); };
    </script>
</body>
</html>
