<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Ultimate Monolith</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --gold: #ffcf40; --space-dark: #121625; --nebula-core: #222a44; 
            --spark-neon: #00fa9a; --trump-halo: #8a2be2; --cherry-pulse: #4a0404; 
            --bg-card: #ffffff; --grid-color: rgba(255, 207, 64, 0.08); 
            --card-w: 55px; --card-h: 77px; --micro-scale: 0.25;
            --tg-blue: #24A1DE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505; color: #e0e6ff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; perspective: 1500px;
            transition: filter 0.5s ease;
        }

        /* --- НОВЫЙ БЛОК: ИНДИКАТОР ЖИЗНИ --- */
        #net-status {
            position: fixed; top: 15px; left: 15px; z-index: 6000;
            background: rgba(12, 15, 24, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(36, 161, 222, 0.4);
            border-radius: 12px; padding: 10px 15px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer; transition: 0.3s;
        }

        .net-logo-wrapper { position: relative; width: 35px; height: 35px; }
        
        .net-logo {
            width: 100%; height: 100%; border-radius: 8px;
            background: url('1771489965074(1).png') center/cover;
            border: 1px solid var(--gold); z-index: 2; position: relative;
        }

        /* Радар вокруг логотипа */
        .radar-ping {
            position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px solid var(--spark-neon); border-radius: 10px;
            opacity: 0; animation: radarBeam 2s infinite;
        }
        @keyframes radarBeam {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .net-info { display: flex; flex-direction: column; }
        .net-info span:first-child { font-size: 9px; color: var(--tg-blue); letter-spacing: 1px; font-weight: bold; }
        #peer-id { font-size: 11px; color: #fff; font-family: monospace; }

        /* Эффект сканирования при поиске */
        #search-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 6500; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .scanner-line {
            width: 200px; height: 2px; background: var(--spark-neon);
            box-shadow: 0 0 15px var(--spark-neon);
            animation: scanMove 2s infinite ease-in-out;
        }
        @keyframes scanMove { 0%, 100% { transform: translateY(-50px); } 50% { transform: translateY(50px); } }

        #btn-start-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 7000; padding: 20px 40px; font-size: 18px; font-weight: 900;
            background: rgba(0, 250, 154, 0.1); border: 2px solid var(--spark-neon);
            color: var(--spark-neon); border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 250, 154, 0.4);
            text-transform: uppercase; letter-spacing: 3px; animation: pulseStart 2s infinite;
        }
        @keyframes pulseStart { 0% { opacity: 0.7; } 50% { opacity: 1; box-shadow: 0 0 50px var(--spark-neon); } 100% { opacity: 0.7; } }

        .arena-top {
            flex: 1; position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 10s infinite ease-in-out;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            border-bottom: 2px solid rgba(255, 207, 64, 0.3);
            overflow: hidden; transform-style: preserve-3d; transform: rotateX(10deg); z-index: 1;
        }

        @keyframes tableBreathe {
            0%, 100% { filter: brightness(0.8); }
            50% { background: radial-gradient(circle at 50% 45%, #3a0a1a 0%, var(--cherry-pulse) 70%, #050000 100%); filter: brightness(1.1); }
        }

        .arena-top::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.5;
        }

        .trump-status { 
            position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; 
            border: 2px solid var(--gold); background: #000; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; z-index: 5000;
            box-shadow: 0 0 25px var(--gold), 0 0 50px var(--trump-halo);
        }

        #trump-icon { font-size: 44px; text-shadow: 0 0 15px #fff, 0 0 30px var(--trump-halo); }

        .card-node {
            position: absolute; width: var(--card-w); height: var(--card-h);
            background: #1a1a1a url('1771489965074(1).png') center/cover;
            border: 1px solid rgba(255, 207, 64, 0.5); border-radius: 6px;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1); transform-style: preserve-3d; z-index: 10;
        }

        .card-node.face-up { background: var(--bg-card) !important; border: 1px solid #fff; color: #000; }

        .control-bottom {
            height: 130px; position: relative; background: linear-gradient(to top, #000 10%, #0c0f18 100%);
            border-top: 1px solid rgba(255, 207, 64, 0.3); transition: 0.6s cubic-bezier(0.075, 0.82, 0.165, 1); z-index: 4000;
        }
        .control-bottom.expanded { height: 350px; }

        .suits-grid { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 15px; }
        .suit-row { display: flex; height: 22px; transition: 0.4s; }

        .slot { 
            width: var(--card-w); height: var(--card-h); background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,207,64,0.2); margin-left: -42px; transform: scale(var(--micro-scale));
            transform-origin: center bottom; transition: 0.5s; border-radius: 4px; overflow: hidden;
        }
        .slot.filled { background: var(--bg-card); border: 1px solid #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.5); color: #000; }
        .slot.locked { filter: grayscale(1) brightness(0.5); pointer-events: none; }

        .control-bottom.expanded .suit-row { height: 65px; margin-bottom: 5px; }
        .control-bottom.expanded .slot { transform: scale(1.1) translateY(-15px); margin-left: -18px; }

        #status-msg {
            position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
            z-index: 9999; color: var(--gold); font-weight: bold; letter-spacing: 4px;
            text-shadow: 0 0 20px var(--gold); opacity: 0; transition: 0.6s; text-align: center; pointer-events: none;
        }
        #status-msg.active { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        .action-btns { 
            position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 15px; z-index: 4500; width: 90%; justify-content: center;
        }
        button.action { 
            padding: 12px 18px; background: rgba(16,20,32,0.9); border: 2px solid var(--gold); 
            color: var(--gold); font-size: 10px; letter-spacing: 2px; font-weight: 900; 
            text-transform: uppercase; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="search-overlay">
        <div class="scanner-line"></div>
        <div id="search-text" style="color:var(--spark-neon); margin-top:70px; font-size:14px; letter-spacing:5px; font-weight:bold;">ПОИСК АБОНЕНТА...</div>
    </div>

    <div id="net-status" onclick="copyMyID()">
        <div class="net-logo-wrapper">
            <div id="radar" class="radar-ping" style="display:none"></div>
            <div class="net-logo"></div>
        </div>
        <div class="net-info">
            <span id="room-info">ОЖИДАНИЕ...</span>
            <span id="peer-id">TAP TO COPY LINK</span>
        </div>
    </div>
    <button id="btn-start-center" onclick="startNetwork()">ВХОД В МОНОЛИТ</button>
    <div id='status-msg'>VCHF MONOLITH ACTIVE</div>
    <div class='trump-status'><div id='trump-icon'>?</div></div>
    <div class='arena-top' id='arena'>
        <div id="enemy-stat" style="position:absolute; top:10px; left:50%; transform:translateX(-50%); color:var(--spark-neon); font-size:10px; letter-spacing:2px; z-index:100;"></div>
        <div id='chaos-deck'></div>
        <div id='battle-table'></div>
    </div>
    <div class='control-bottom' id='ctrl-panel'>
        <div style="position:absolute; top:-45px; right:30px; z-index:4600;">
            <button id='btn-zoom' style="width:55px; height:55px; border-radius:50%; background:#000; border:2px solid var(--gold); color:var(--gold); font-size:22px; cursor:pointer;" onclick='toggleHand()'>↕</button>
        </div>
        <div class='action-btns'>
            <button id='btn-ready' class="action" style="display:none; border-color:var(--spark-neon); color:var(--spark-neon);" onclick='sendReady()'>ГОТОВНОСТЬ</button>
            <button id='btn-bito' class="action" style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-take' class="action" style='display:none; border-color:#ff4444; color:#ff4444;' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
        <div class='suits-grid' id='main-hand'>
            <div id='s-spades' class='suit-row'></div>
            <div id='s-clubs' class='suit-row'></div>
            <div id='s-diamonds' class='suit-row'></div>
            <div id='s-hearts' class='suit-row'></div>
        </div>
    </div>
<script>
    // ПРИМЕЧАНИЕ: Это примечание не будет удалено. Window 2.3 - Логика "Глаз Монолита".
    const SUITS = ['♠', '♣', '♦', '♥'];
    const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    
    let vchf = {
        deck: [], pHand: [], eCount: 0, table: [],
        trump: '', phase: 'WAIT', turn: 'host', attacker: 'host'
    };

    let peer = null, conn = null, myRole = 'host';
    let localReady = false, remoteReady = false;
    let isExpanded = false, audioCtx = null;
    let searchAttempt = 0;
    
    let lastHeartbeat = Date.now();
    let isDisconnected = false;

    function showMsg(text, persistent = false) {
        const m = document.getElementById('status-msg');
        m.textContent = text; m.classList.add('active');
        if (!persistent) setTimeout(() => m.classList.remove('active'), 3000);
    }

    function startNetwork() {
        const urlParams = new URLSearchParams(window.location.search);
        let roomNum = urlParams.get('room');
        if (!roomNum) {
            roomNum = prompt("НОМЕР КОМНАТЫ:");
            if (!roomNum) return;
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?room=${roomNum}`;
            window.history.pushState({path: newUrl}, '', newUrl);
        }
        const finalID = "VCHF_MONO_" + roomNum.trim();
        document.getElementById('btn-start-center').style.display = 'none';
        document.getElementById('search-overlay').style.display = 'flex'; // Включаем сканер
        initPeerSession(finalID, roomNum);
    }

    function initPeerSession(finalID, roomNum) {
        peer = new Peer(null, { debug: 1, config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });
        peer.on('open', () => attemptConnect(finalID, roomNum));
        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') setTimeout(() => initPeerSession(finalID, roomNum), 2000);
        });
        setInterval(monitorConnection, 2000);
    }

    function monitorConnection() {
        if (!conn || !conn.open) return;
        conn.send({type: 'PING', time: Date.now()});
        
        // Визуальный пульс радара при каждом пинге
        const radar = document.getElementById('radar');
        radar.style.display = 'block';
        radar.style.borderColor = isDisconnected ? '#ff4444' : 'var(--spark-neon)';

        if (Date.now() - lastHeartbeat > 5000 && !isDisconnected) {
            isDisconnected = true;
            showMsg("ИДЕТ СОЕДИНЕНИЕ...", true);
            document.body.style.filter = "grayscale(1) brightness(0.5)";
            document.getElementById('peer-id').textContent = "ОБРЫВ СЕТИ";
        }
    }

    function attemptConnect(targetID, roomName) {
        searchAttempt++;
        document.getElementById('room-info').textContent = "ПОИСК: " + roomName;
        document.getElementById('search-text').textContent = `СКАНЕР: ${roomName} (${searchAttempt})`;
        
        conn = peer.connect(targetID, { reliable: true });

        let connectTimeout = setTimeout(() => {
            if (!conn || !conn.open) {
                if (searchAttempt > 3) { peer.destroy(); createHostRoom(targetID, roomName); }
                else { attemptConnect(targetID, roomName); }
            }
        }, 3000);
        setupConn(connectTimeout);
    }

    function createHostRoom(tID, oNum) {
        peer = new Peer(tID, { debug: 1, config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });
        peer.on('open', () => {
            myRole = 'host';
            document.getElementById('search-overlay').style.display = 'none'; // Скрываем сканер
            document.getElementById('room-info').textContent = "КОМНАТА: " + oNum;
            document.getElementById('peer-id').textContent = "ЖДУ ГОСТЯ...";
            document.getElementById('radar').style.display = 'block';
            document.getElementById('radar').style.animation = 'radarBeam 4s infinite'; // Медленный поиск
            showMsg("ВЫ ХОЗЯИН");
        });
        peer.on('connection', (c) => { 
            conn = c; 
            setupConn(); 
            showMsg("ИГРОК ВОШЕЛ");
            document.getElementById('radar').style.animation = 'radarBeam 1s infinite'; // Быстрый пульс - связь есть
        });
    }

    function setupConn(timeoutToClear) {
        if (!conn) return;
        conn.on('open', () => {
            if (timeoutToClear) clearTimeout(timeoutToClear);
            document.getElementById('search-overlay').style.display = 'none';
            document.getElementById('btn-ready').style.display = 'block';
            document.getElementById('peer-id').textContent = "СВЯЗЬ ОК";
            document.getElementById('radar').style.display = 'block';
            document.getElementById('radar').style.animation = 'radarBeam 1s infinite';
            lastHeartbeat = Date.now();
            conn.on('data', handleNetData);
        });
    }

    function handleNetData(data) {
        if (data.type === 'PING') { conn.send({type: 'PONG'}); return; }
        if (data.type === 'PONG') {
            lastHeartbeat = Date.now();
            if (isDisconnected) {
                isDisconnected = false;
                document.getElementById('status-msg').classList.remove('active');
                document.body.style.filter = "none";
                document.getElementById('peer-id').textContent = "СВЯЗЬ ОК";
            }
            return;
        }

        if (data.type === 'READY') { remoteReady = true; showMsg("ВРАГ ГОТОВ"); checkStart(); }
        if (data.type === 'SYNC_DECK') { 
            vchf.deck = data.deck; vchf.trump = data.trump; 
            renderTrumpUI(); startChaosPhase(); 
        }
        if (data.type === 'PICK') executePick(data.idx, 'enemy');
        if (data.type === 'MOVE') executeMove(data.card, 'enemy');
        if (data.type === 'ACTION') { if (data.cmd === 'BITO') syncBito(); if (data.cmd === 'TAKE') syncTake(); }
    }

    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        if (type === 'slide') {
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(220, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
            g.gain.setValueAtTime(0.05, now); osc.start(); osc.stop(now + 0.15);
        } else if (type === 'shuffle') {
            const bufferSize = audioCtx.sampleRate * 0.4; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 600;
            noise.connect(filter); filter.connect(audioCtx.destination); noise.start(); noise.stop(now + 0.4);
        }
    }

    function renderTrumpUI() {
        const icon = document.getElementById('trump-icon');
        icon.textContent = vchf.trump; icon.style.color = COLORS[vchf.trump];
    }
    
    function sendReady() {
        localReady = true; document.getElementById('btn-ready').style.display = 'none';
        if(conn) conn.send({type: 'READY'}); showMsg("ОЖИДАНИЕ..."); checkStart();
    }

    function checkStart() {
        if (localReady && remoteReady && myRole === 'host') {
            let d = []; SUITS.forEach(s => RANKS.forEach(r => d.push({s, r, v: RANKS.indexOf(r), c: COLORS[s], used: false})));
            vchf.deck = d.sort(() => Math.random() - 0.5);
            vchf.trump = SUITS[Math.floor(Math.random() * 4)];
            conn.send({type: 'SYNC_DECK', deck: vchf.deck, trump: vchf.trump});
            renderTrumpUI(); startChaosPhase();
        }
    }

    function startChaosPhase() {
        vchf.phase = 'PICK'; playSound('shuffle'); renderChaosInitial();
    }

    function renderChaosInitial() {
        const container = document.getElementById('chaos-deck'); container.innerHTML = '';
        const cx = window.innerWidth / 2 - 27; const cy = window.innerHeight * 0.4 - 38;
        vchf.deck.forEach((card, i) => {
            const n = document.createElement('div'); n.className = 'card-node'; n.id = `node-${i}`;
            n.style.left = cx + 'px'; n.style.top = cy + 'px'; container.appendChild(n);
            setTimeout(() => {
                const a = (i / 36) * Math.PI * 2;
                n.style.left = (cx + Math.cos(a) * 140) + 'px'; n.style.top = (cy + Math.sin(a) * 140) + 'px';
                n.style.transform = `rotate(${a * 57.3 + 90}deg)`;
            }, i * 15);
            n.onclick = () => { 
                if (vchf.phase === 'PICK' && !card.used) {
                    const canIPick = (myRole === 'host') ? (vchf.pHand.length <= vchf.eCount) : (vchf.pHand.length < vchf.eCount);
                    if (canIPick) { if (conn) conn.send({type: 'PICK', idx: i}); executePick(i, 'player'); }
                    else { showMsg("ЖДИ ВРАГА"); }
                } 
            };
        });
    }

    function executePick(idx, actor) {
        const card = vchf.deck[idx]; const n = document.getElementById(`node-${idx}`);
        if (!n || card.used) return;
        card.used = true; playSound('slide');
        if (actor === 'player') {
            vchf.pHand.push(card); fillSlot(card);
            n.style.zIndex = "5000"; n.style.transform = "scale(0) rotate(180deg)"; n.style.opacity = "0";
            setTimeout(() => n.remove(), 600);
        } else {
            vchf.eCount++; n.style.top = "-150px"; n.style.opacity = "0";
            setTimeout(() => n.remove(), 600);
        }
        document.getElementById('enemy-stat').textContent = `КАРТ У ВРАГА: ${vchf.eCount}`;
        if (vchf.deck.every(c => c.used)) { vchf.phase = 'BATTLE'; vchf.turn = vchf.attacker; showMsg("БОЙ!"); renderBattleTable(); }
    }

    function fillSlot(card) {
        const el = document.getElementById(`slot-${card.s}-${card.r}`); if (!el) return;
        el.classList.add('filled'); el.style.color = card.c;
        el.innerHTML = `<div style="padding:2px; font-size:10px; font-weight:900;">${card.r}</div><div style="font-size:24px; text-align:center;">${card.s}</div>`;
        el.onclick = (e) => {
            e.stopPropagation();
            if (vchf.phase === 'BATTLE' && vchf.turn === myRole) playCard(card);
            else if (!isExpanded) toggleHand();
        };
    }

    function playCard(card) {
        const isAtt = vchf.table.length % 2 === 0;
        if (isAtt) {
            if (myRole !== vchf.attacker) return showMsg("ВРАГ АТАКУЕТ");
            if (!canAttack(card)) return showMsg("НЕЛЬЗЯ ПОДКИНУТЬ");
        } else {
            if (myRole === vchf.attacker) return showMsg("ВРАГ ОТБИВАЕТСЯ");
            if (!canDefend(card)) return showMsg("НЕ БЬЕТ!");
        }
        vchf.pHand = vchf.pHand.filter(c => c !== card);
        const slot = document.getElementById(`slot-${card.s}-${card.r}`);
        slot.classList.remove('filled'); slot.innerHTML = '';
        executeMove(card, 'player'); if(conn) conn.send({type: 'MOVE', card});
    }

    function canAttack(c) { return vchf.table.length === 0 || vchf.table.some(m => m.card.r === c.r); }
    function canDefend(c) {
        const t = vchf.table[vchf.table.length - 1].card;
        if (c.s === t.s) return c.v > t.v;
        return (c.s === vchf.trump && t.s !== vchf.trump);
    }

    function executeMove(card, actor) {
        playSound('slide'); vchf.table.push({card, actor}); if (actor === 'enemy') vchf.eCount--;
        vchf.turn = (vchf.turn === 'host' ? 'guest' : 'host'); renderBattleTable(); checkBattleEnd();
    }

    function renderBattleTable() {
        const c = document.getElementById('battle-table'); c.innerHTML = '';
        vchf.table.forEach((m, i) => {
            const n = document.createElement('div'); n.className = 'card-node face-up';
            const pi = Math.floor(i / 2), isD = i % 2 !== 0;
            n.style.left = `calc(50% + ${(pi % 3) * 85 - 85 + (isD ? 18 : 0)}px)`;
            n.style.top = `calc(40% + ${Math.floor(pi / 3) * 95 - 40 + (isD ? 25 : 0)}px)`;
            n.innerHTML = `<div style="padding:4px; font-weight:900; font-size:12px;">${m.card.r}</div><div style="font-size:32px; text-align:center;">${m.card.s}</div>`;
            n.style.color = m.card.c; c.appendChild(n);
        });
        const isMyTurn = vchf.turn === myRole; const isAttState = vchf.table.length % 2 === 0;
        document.getElementById('btn-bito').style.display = (myRole === vchf.attacker && isAttState && vchf.table.length > 0) ? 'block' : 'none';
        document.getElementById('btn-take').style.display = (myRole !== vchf.attacker && !isAttState) ? 'block' : 'none';
        document.querySelectorAll('.slot').forEach(s => { if(vchf.turn !== myRole) s.classList.add('locked'); else s.classList.remove('locked'); });
        document.getElementById('enemy-stat').textContent = `КАРТ У ВРАГА: ${vchf.eCount}`;
    }

    function handleBito() { syncBito(); if(conn) conn.send({type: 'ACTION', cmd: 'BITO'}); }
    function syncBito() {
        playSound('shuffle'); createDustCloud(); vchf.table = [];
        vchf.attacker = (vchf.attacker === 'host' ? 'guest' : 'host'); vchf.turn = vchf.attacker;
        setTimeout(renderBattleTable, 600); showMsg("БИТО! ТВОЙ ХОД");
    }

    function handleTake() { syncTake(); if(conn) conn.send({type: 'ACTION', cmd: 'TAKE'}); }
    function syncTake() {
        vchf.table.forEach(m => { if (vchf.attacker !== myRole) { vchf.pHand.push(m.card); fillSlot(m.card); } else { vchf.eCount++; } });
        vchf.table = []; vchf.turn = vchf.attacker;
        setTimeout(renderBattleTable, 600); showMsg("ВЗЯТО");
    }

    function createDustCloud() {
        document.querySelectorAll('#battle-table .card-node').forEach(card => {
            card.style.transform = "scale(0) rotate(180deg)"; card.style.opacity = "0";
        });
    }

    function checkBattleEnd() {
        if (vchf.phase !== 'BATTLE') return;
        if (vchf.pHand.length === 0 || vchf.eCount === 0) {
            setTimeout(() => {
                const iW = vchf.pHand.length === 0, eW = vchf.eCount === 0;
                if (iW && eW) showMsg("НИЧЬЯ"); else if (iW) showMsg("ПОБЕДА!"); else if (eW) showMsg("ПОРАЖЕНИЕ");
            }, 1000);
        }
    }

    function toggleHand() {
        isExpanded = !isExpanded;
        document.getElementById('ctrl-panel').classList.toggle('expanded', isExpanded);
        document.getElementById('btn-zoom').textContent = isExpanded ? '✕' : '↕';
    }

    function copyMyID() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => showMsg("ССЫЛКА КОПИРОВАНА"));
    }

    window.onload = () => {
        SUITS.forEach(s => {
            const row = document.getElementById('s-' + (s === '♠' ? 'spades' : s === '♣' ? 'clubs' : s === '♦' ? 'diamonds' : 'hearts'));
            RANKS.forEach(rank => {
                const sl = document.createElement('div'); sl.className = 'slot'; sl.id = `slot-${s}-${rank}`; row.appendChild(sl);
            });
        });
    };
</script>
</body>
</html>
