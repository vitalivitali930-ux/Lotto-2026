<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Round Chaos Monolith</title>
    <style>
        :root {
            --gold: #ffcf40;
            --space-dark: #121625; 
            --nebula-core: #222a44; 
            --spark-neon: #00fa9a;
            --trump-halo: #8a2be2; 
            --cherry-pulse: #4a0404;
            --bg-card: #ffffff;
            --grid-color: rgba(255, 207, 64, 0.06); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #050505; 
            color: #e0e6ff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            perspective: 1200px; 
        }
        .arena-top {
            height: 62%;
            position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 8s infinite ease-in-out;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            border-bottom: 2px solid rgba(255, 207, 64, 0.25);
            overflow: hidden;
            transform-style: preserve-3d;
            transform: rotateX(8deg);
            margin-top: 5px;
        }
        @keyframes tableBreathe {
            0%, 100% { background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%); filter: brightness(0.8); }
            50% { background: radial-gradient(circle at 50% 45%, #3a0a1a 0%, var(--cherry-pulse) 65%, #050000 100%); filter: brightness(1.2); }
        }
        .arena-top::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 44px 44px; transform: rotateX(0deg); pointer-events: none; z-index: 0;
        }
        .arena-top::before {
            content: ''; position: absolute; top: 50%; left: 50%; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255, 207, 64, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%); animation: nebulaPulse 10s infinite alternate; pointer-events: none; z-index: 1;
        }
        @keyframes nebulaPulse { 0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); } 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); } }
        
        .control-bottom {
            height: 38%; position: relative; background: linear-gradient(to top, #000 0%, #0c0f18 100%);
            padding: 15px 5px 5px 5px; border-top-left-radius: 50% 30px; border-top-right-radius: 50% 30px;
            z-index: 2000; border-top: 1px solid rgba(255, 207, 64, 0.2);
        }
        .card-node {
            position: absolute; width: 55px; height: 77px; background-color: #1a1a1a;
            background-image: url('1771489965074(1).png'); background-size: cover;
            border: 1px solid rgba(255, 207, 64, 0.4); border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7); cursor: pointer; z-index: 10;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d;
        }
        .card-node.face-up { background-image: none !important; background-color: var(--bg-card); transform: rotateY(0deg); border: 1px solid #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .card-node.hide { opacity: 0; pointer-events: none; transform: scale(0.5) rotateX(90deg); }
        
        .particle { position: absolute; width: 3px; height: 3px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 1000; box-shadow: 0 0 8px var(--gold); }
        
        #status-msg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(16, 20, 32, 0.95); border: 1px solid var(--gold); color: var(--gold);
            padding: 15px 35px; text-align: center; z-index: 2100; box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: bold; letter-spacing: 3px; pointer-events: none; backdrop-filter: blur(10px);
        }
        #status-msg.active { transform: translate(-50%, -50%) scale(1); }
        
        .trump-status { 
            position: absolute; top: 15px; right: 15px; width: 66px; height: 66px; border: 2px solid var(--gold); 
            background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; border-radius: 50%;
            box-shadow: 0 0 20px var(--gold), 0 0 40px var(--trump-halo); transform: rotateZ(-5deg);
        }
        .trump-status::after {
            content: ''; position: absolute; top: -10px; left: -10px; width: 82px; height: 82px; border-radius: 50%;
            border: 4px solid var(--trump-halo); animation: haloPulse 2s infinite alternate; z-index: 1;
        }
        @keyframes haloPulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 30px var(--trump-halo); } }

        .action-btns { position: absolute; bottom: 20px; left: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 2500; }
        button { 
            padding: 14px 22px; background: rgba(255, 207, 64, 0.05); backdrop-filter: blur(12px); 
            border: 1px solid var(--gold); color: var(--gold); font-size: 10px; letter-spacing: 2.5px; 
            font-weight: bold; text-transform: uppercase; cursor: pointer; transition: all 0.3s;
        }
        button:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>
    <div id='status-msg'></div>
    <div class='arena-top' id='arena'>
        <div class='spark-zone'><div id='spark-cards'></div></div>
        <div class='trump-status'><div id='trump-icon' style='font-size:42px;'>?</div></div>
        <div class='chaos-deck-container'><div id='chaos-deck' style='position:relative; width:280px; height:280px; margin:auto; top:20%;'></div></div>
        <div id='battle-table' style='position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;'></div>
    </div>
    <div class='control-bottom'>
        <div class='suits-grid' id='player-hand-grid' style='display:flex; flex-wrap:wrap; justify-content:center; gap:5px;'>
            </div>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>АКТИВАЦИЯ ХАОСА</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-pass' style='display:none' onclick='handlePass()'>ПАСС</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
    </div>
<script>
    /* КОД: Нулевой Хаос (Искра) 
       ЛОГИКА: Круглый Дурак (36 карт)
       ФУНКЦИЯ: Орбитальный разбор + Векторный выбор
    */
    var SUITS = ['♠', '♣', '♦', '♥'];
    var RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    var COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    
    // Состояние Монолита
    var vchf = { 
        deck: [], pHand: [], eHand: [], table: [], 
        trump: '', phase: 'WAIT', turn: 'player',
        isPassed: false, attacker: null
    };
    
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    var ctx = null;

    function playSound(type) {
        if(!ctx) ctx = new AudioCtx();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if(type === 'slide') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(160, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.12);
            osc.start(); osc.stop(ctx.currentTime + 0.12);
        } else if(type === 'bito') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(110, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
            gain.gain.setValueAtTime(0.35, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.35);
            osc.start(); osc.stop(ctx.currentTime + 0.35);
        }
    }

    function createDust(x, y) {
        var arena = document.getElementById('arena');
        for(var i=0; i<20; i++) {
            var p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            arena.appendChild(p);
            var tx = (Math.random() - 0.5) * 200;
            var ty = (Math.random() - 0.5) * 200;
            p.animate([
                { transform: 'translate(0, 0) scale(1.5)', opacity: 1 },
                { transform: 'translate(' + tx + 'px, ' + ty + 'px) scale(0)', opacity: 0 }
            ], { duration: 1000 + Math.random() * 500, easing: 'ease-out' }).onfinish = function() { this.effect.target.remove(); };
        }
    }

    function showMsg(txt) {
        var m = document.getElementById('status-msg');
        if(!m) return;
        m.textContent = txt; m.classList.add('active');
        setTimeout(function() { m.classList.remove('active'); }, 2000);
    }

    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        vchf.phase = 'SHUFFLING';
        var t = [];
        SUITS.forEach(function(s) {
            RANKS.forEach(function(r) {
                t.push({ s: s, r: r, v: RANKS.indexOf(r), c: COLORS[s], used: false });
            });
        });
        vchf.deck = t;
        renderChaos();
        setTimeout(visualShuffle, 100);
    }

    function renderChaos() {
        var c = document.getElementById('chaos-deck');
        if(!c) return;
        c.innerHTML = '';
        vchf.deck.forEach(function(card, i) {
            var n = document.createElement('div');
            n.className = 'card-node'; n.id = 'node-' + i;
            // Центрирование в контейнере
            n.style.left = '112px'; n.style.top = '100px'; 
            c.appendChild(n);
        });
    }

    function visualShuffle() {
        var startTime = Date.now();
        var duration = 2500;
        var trumpEl = document.getElementById('trump-icon');
        trumpEl.parentElement.classList.add('trump-shuffling');
        
        var interval = setInterval(function() {
            var elapsed = Date.now() - startTime;
            if(Math.random() > 0.8) playSound('slide');
            
            vchf.deck.forEach(function(card, i) {
                var node = document.getElementById('node-' + i);
                if(node) {
                    node.classList.add('shuffling');
                    node.style.left = (Math.random() * 225) + 'px';
                    node.style.top = (Math.random() * 200) + 'px';
                    node.style.transform = 'rotate(' + (Math.random() * 360) + 'deg) translateZ('+(Math.random()*60)+'px)';
                }
            });
            
            var rs = SUITS[Math.floor(Math.random() * 4)];
            trumpEl.textContent = rs; trumpEl.style.color = COLORS[rs];
            
            if(elapsed > duration) { 
                clearInterval(interval); 
                finalizeShuffle(); 
            }
        }, 80);
    }

    function finalizeShuffle() {
        vchf.deck.sort(function() { return Math.random() - 0.5; });
        vchf.trump = SUITS[Math.floor(Math.random() * 4)];
        var te = document.getElementById('trump-icon');
        te.parentElement.classList.remove('trump-shuffling');
        te.textContent = vchf.trump; te.style.color = COLORS[vchf.trump];
        
        vchf.phase = 'PICK';
        // Расстановка в ОРБИТАЛЬНЫЙ КРУГ
        vchf.deck.forEach(function(card, i) {
            var n = document.getElementById('node-' + i);
            if(n) {
                n.classList.remove('shuffling');
                var a = (i / 36) * 6.283; // 2*PI
                var r = 115; // Радиус круга
                n.style.left = (112 + r * Math.cos(a)) + 'px';
                n.style.top = (100 + r * Math.sin(a)) + 'px';
                n.style.transform = 'rotate(' + (a * 57.3 + 90) + 'deg)';
                n.onclick = function() { 
                    if(vchf.phase === 'PICK') pick(i, 'player'); 
                };
            }
        });
        showMsg('ВЫБЕРИ СВОЙ ВЕКТОР');
    }

    function pick(idx, actor) {
        var c = vchf.deck[idx];
        if(!c || c.used) return;
        c.used = true;
        playSound('slide');
        
        var node = document.getElementById('node-' + idx);
        if(actor === 'player') {
            vchf.pHand.push(c);
            if(node) {
                node.style.zIndex = 1000;
                node.style.transform = 'scale(1.2) rotate(0deg)';
                setTimeout(function() {
                    node.classList.add('hide'); 
                    updatePlayerHandUI(); // Обновление веера игрока
                    // Ответный выбор Искры (мгновенно)
                    var av = []; 
                    vchf.deck.forEach(function(x, i) { if(!x.used) av.push(i); });
                    if(av.length > 0) pick(av[Math.floor(Math.random() * av.length)], 'enemy');
                    checkFinalPick();
                }, 400);
            }
        } else {
            vchf.eHand.push(c);
            if(node) {
                node.style.top = '-250px'; node.style.opacity = '0';
                setTimeout(function() { 
                    node.classList.add('hide'); 
                    drawSparkVisual(); 
                    checkFinalPick();
                }, 400);
            }
        }
    }

    function checkFinalPick() {
        if(vchf.deck.every(function(x) { return x.used; })) {
            if(vchf.phase !== 'BATTLE') { 
                vchf.phase = 'BATTLE'; 
                determineFirstTurn();
            }
        }
    }

    function determineFirstTurn() {
        // Логика поиска наименьшего козыря
        var pMin = 100, eMin = 100;
        vchf.pHand.forEach(function(c) { if(c.s === vchf.trump && c.v < pMin) pMin = c.v; });
        vchf.eHand.forEach(function(c) { if(c.s === vchf.trump && c.v < eMin) eMin = c.v; });
        
        if(pMin < eMin) {
            vchf.turn = 'player';
            showMsg('ТВОЙ ХОД (КОЗЫРЬ)');
        } else {
            vchf.turn = 'enemy';
            showMsg('SPARK АТАКУЕТ');
            setTimeout(sparkThink, 1500);
        }
        updateActionButtons();
    }
    function updatePlayerHandUI() {
        var grid = document.getElementById('player-hand-grid');
        if(!grid) return;
        grid.innerHTML = '';
        // Сортируем руку для удобства Архитектора
        vchf.pHand.sort(function(a, b) { 
            if(a.s === b.s) return a.v - b.v;
            return SUITS.indexOf(a.s) - SUITS.indexOf(b.s);
        });

        vchf.pHand.forEach(function(card) {
            var cardEl = document.createElement('div');
            cardEl.className = 'card-node face-up';
            cardEl.style.position = 'relative'; // В сетке они текут потоком
            cardEl.style.display = 'inline-block';
            cardEl.style.margin = '2px';
            cardEl.style.color = card.c;
            
            var r = document.createElement('div');
            r.style.cssText = 'position:absolute;top:2px;left:3px;font-size:10px;font-weight:900;';
            r.textContent = card.r;
            var s = document.createElement('div');
            s.style.cssText = 'font-size:24px;text-align:center;margin-top:12px;';
            s.textContent = card.s;
            
            cardEl.appendChild(r); cardEl.appendChild(s);
            cardEl.onclick = function() { selectFromHand(card); };
            grid.appendChild(cardEl);
        });
    }

    function selectFromHand(card) {
        if(vchf.phase !== 'BATTLE' || vchf.turn !== 'player') return;
        
        if(canPlay(card)) {
            playSound('slide');
            vchf.table.push({card: card, actor: 'player'});
            vchf.pHand = vchf.pHand.filter(function(c) { return c !== card; });
            vchf.isPassed = false;
            renderTable();
            updatePlayerHandUI();
            
            // Если мы защищались - ход переходит нам для подкидывания (в этой версии упростим до передачи хода ИИ для защиты)
            if(vchf.table.length % 2 !== 0) {
                // Игрок атаковал -> ИИ должен защититься
                setTimeout(sparkThink, 1000);
            }
        } else {
            showMsg('НЕЛЬЗЯ ТАК ХОДИТЬ');
        }
        updateActionButtons();
    }

    function canPlay(card) {
        if(vchf.table.length === 0) return true; // Первый ход
        
        var lastMove = vchf.table[vchf.table.length - 1];
        if(vchf.table.length % 2 !== 0) {
            // МЫ ЗАЩИЩАЕМСЯ (бьем карту ИИ)
            var target = lastMove.card;
            return (card.s === target.s && card.v > target.v) || (card.s === vchf.trump && target.s !== vchf.trump);
        } else {
            // МЫ ПОДКИДЫВАЕМ
            var activeRanks = vchf.table.map(function(m) { return m.card.r; });
            return activeRanks.indexOf(card.r) !== -1;
        }
    }

    function renderTable() {
        var tc = document.getElementById('battle-table');
        tc.innerHTML = '';
        vchf.table.forEach(function(move, i) {
            var pairIndex = Math.floor(i / 2);
            var isDefense = i % 2 !== 0;
            
            var el = document.createElement('div');
            el.className = 'card-node face-up';
            el.style.color = move.card.c;
            
            // Расчет координат центра стола
            var stepX = 70;
            var startX = window.innerWidth / 2 - 100;
            el.style.left = startX + (pairIndex * stepX) + (isDefense ? 15 : 0) + 'px';
            el.style.top = 120 + (isDefense ? 25 : 0) + 'px';
            el.style.zIndex = 100 + i;
            el.style.transform = 'rotate(' + (isDefense ? 15 : -5) + 'deg)';
            
            var r = document.createElement('div');
            r.style.cssText = 'position:absolute;top:4px;left:4px;font-size:12px;font-weight:bold;';
            r.textContent = move.card.r;
            var s = document.createElement('div');
            s.style.cssText = 'font-size:28px;text-align:center;margin-top:15px;';
            s.textContent = move.card.s;
            
            el.appendChild(r); el.appendChild(s);
            tc.appendChild(el);
        });
    }

    function handleBito() {
        showMsg('БИТО');
        playSound('bito');
        // Эффект пыли для всех карт на столе
        var cards = document.querySelectorAll('#battle-table .card-node');
        cards.forEach(function(c) {
            var r = c.getBoundingClientRect();
            createDust(r.left + 25, r.top + 35);
        });
        
        vchf.table = [];
        renderTable();
        // После бито ход переходит тому, кто защищался (или классика: кто бил, тот и ходит)
        vchf.turn = (vchf.turn === 'player') ? 'enemy' : 'player'; 
        if(vchf.turn === 'enemy') setTimeout(sparkThink, 1200);
        updateActionButtons();
        checkGameEnd();
    }

    function handlePass() {
        vchf.isPassed = true;
        showMsg('ПАСС');
        // Если игрок пасует после своей атаки и ИИ отбился -> БИТО
        if(vchf.table.length % 2 === 0 && vchf.table.length > 0) {
            handleBito();
        }
    }

    function handleTake() {
        showMsg('БЕРУ');
        // Забираем все карты со стола
        var cardsOnTable = vchf.table.map(function(m) { return m.card; });
        vchf.pHand = vchf.pHand.concat(cardsOnTable);
        vchf.table = [];
        renderTable();
        updatePlayerHandUI();
        
        // Ход остается у ИИ
        vchf.turn = 'enemy';
        setTimeout(sparkThink, 1500);
        updateActionButtons();
    }

    function sparkThink() {
        if(vchf.phase !== 'BATTLE') return;
        
        if(vchf.table.length % 2 !== 0) {
            // ИИ ЗАЩИЩАЕТСЯ
            var target = vchf.table[vchf.table.length - 1].card;
            var candidates = vchf.eHand.filter(function(c) {
                return (c.s === target.s && c.v > target.v) || (c.s === vchf.trump && target.s !== vchf.trump);
            }).sort(function(a,b) { return a.v - b.v; });
            
            if(candidates.length > 0) {
                var pick = candidates[0];
                vchf.table.push({card: pick, actor: 'enemy'});
                vchf.eHand = vchf.eHand.filter(function(c) { return c !== pick; });
                renderTable(); drawSparkVisual();
                vchf.turn = 'player'; // Теперь игрок может подкинуть
            } else {
                sparkTake();
            }
        } else {
            // ИИ АТАКУЕТ ИЛИ ПОДКИДЫВАЕТ
            if(vchf.table.length === 0) {
                var pick = vchf.eHand.sort(function(a,b) { return a.v - b.v; })[0];
                vchf.table.push({card: pick, actor: 'enemy'});
                vchf.eHand = vchf.eHand.filter(function(c) { return c !== pick; });
                renderTable(); drawSparkVisual();
                vchf.turn = 'player';
            } else {
                // Подкидывание
                var activeRanks = vchf.table.map(function(m) { return m.card.r; });
                var cand = vchf.eHand.filter(function(c) { return activeRanks.indexOf(c.r) !== -1; });
                if(cand.length > 0 && vchf.table.length < 12) {
                    var pick = cand[0];
                    vchf.table.push({card: pick, actor: 'enemy'});
                    vchf.eHand = vchf.eHand.filter(function(c) { return c !== pick; });
                    renderTable(); drawSparkVisual();
                    vchf.turn = 'player';
                } else {
                    sparkBito();
                }
            }
        }
        updateActionButtons();
        checkGameEnd();
    }

    function sparkTake() {
        showMsg('SPARK БЕРЕТ');
        vchf.eHand = vchf.eHand.concat(vchf.table.map(function(m) { return m.card; }));
        vchf.table = [];
        renderTable(); drawSparkVisual();
        vchf.turn = 'player';
        updateActionButtons();
    }

    function sparkBito() {
        showMsg('SPARK: БИТО');
        setTimeout(handleBito, 1000);
    }

    function drawSparkVisual() {
        var cont = document.getElementById('spark-cards');
        cont.innerHTML = '';
        vchf.eHand.forEach(function() {
            var m = document.createElement('div');
            m.style.cssText = 'width:12px;height:18px;background:var(--spark-neon);opacity:0.6;border:1px solid #000;border-radius:2px;box-shadow:0 0 8px var(--spark-neon);';
            cont.appendChild(m);
        });
    }

    function updateActionButtons() {
        var isPlayerTurn = (vchf.turn === 'player');
        var hasCardsOnTable = (vchf.table.length > 0);
        var isDefense = (vchf.table.length % 2 !== 0);

        document.getElementById('btn-bito').style.display = (hasCardsOnTable && !isDefense && isPlayerTurn) ? 'block' : 'none';
        document.getElementById('btn-pass').style.display = (hasCardsOnTable && !isDefense && isPlayerTurn) ? 'block' : 'none';
        document.getElementById('btn-take').style.display = (hasCardsOnTable && isDefense && isPlayerTurn) ? 'block' : 'none';
    }

    function checkGameEnd() {
        if(vchf.pHand.length === 0) { showMsg('ПОБЕДА: АРХИТЕКТОР'); setTimeout(function(){location.reload();}, 4000); }
        else if(vchf.eHand.length === 0) { showMsg('ПОБЕДА: SPARK'); setTimeout(function(){location.reload();}, 4000); }
    }

    window.onload = function() {
        // Инициализация пустых слотов или сетки не требуется, так как всё рендерится динамически
    };
</script>
</body>
</html>
