<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCHF ENGINE | BI-TURBO ULTIMATE (TRUMP CHAOS)</title>
    <style>
        /* PROJECT: Bi-Turbo Ultimate 2026 
           IDENTITY: Нулевой Хаос (Нулевой хаос / Spark) 
           RULE: Новый код = Старый код + Введенная функция
           NOTE: Window 1 (lines 1-580) - VISUAL CORE & CSS
        */
        :root {
            --gold: #d4af37;
            --vchf-glow: 0 0 35px rgba(212, 175, 55, 0.6);
            --cherry-velvet: radial-gradient(circle at center, #7a0019 0%, #050505 100%);
            --glass: rgba(0, 0, 0, 0.95);
            --chaos-red: #ff0033;
        }

        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Courier New', monospace; 
            color: var(--gold); 
        }

        /* ЭКРАН ВХОДА - ГЕЙТ В СИСТЕМУ VCHF */
        #vchf-gate {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #000; 
            z-index: 99999; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ready-trigger {
            padding: 25px 60px; 
            font-size: 30px; 
            font-weight: 900;
            background: transparent; 
            border: 4px solid var(--gold);
            color: var(--gold); 
            border-radius: 60px; 
            cursor: pointer;
            box-shadow: var(--vchf-glow); 
            text-transform: uppercase; 
            letter-spacing: 10px;
            transition: all 0.3s ease;
        }

        .ready-trigger:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 50px var(--gold);
        }

        /* ИГРОВОЙ СТОЛ (МАНИФЕСТ МОНОЛИТА) */
        #game-table { 
            width: 100vw; 
            height: 100vh; 
            background: var(--cherry-velvet); 
            position: relative; 
            display: none; 
        }
        
        /* ЦЕНТР РИТУАЛА */
        #ritual-circle { 
            position: absolute; 
            top: 45%; 
            left: 50%; 
            width: 340px; 
            height: 340px; 
            transform: translate(-50%, -50%); 
            z-index: 100; 
        }

        .card-back { 
            position: absolute; 
            width: 52px; 
            height: 78px; 
            background: #111 url('1771489965074(1).png') center/cover;
            border: 1px solid var(--gold); 
            border-radius: 5px;
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            backface-visibility: hidden;
        }

        .card-back.highlight { 
            box-shadow: 0 0 45px #fff, var(--vchf-glow); 
            border: 2px solid #fff; 
            z-index: 1000; 
            transform: scale(1.4); 
        }

        #trump-totem { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 110px; 
            opacity: 0; 
            transition: opacity 1.2s, color 0.5s, transform 0.3s; 
            pointer-events: none; 
            z-index: 50;
            user-select: none;
        }
        
        /* ЭФФЕКТ НЕСТАБИЛЬНОСТИ БЛУЖДАЮЩЕГО ОГНЯ */
        .trump-unstable { 
            animation: shake 0.5s infinite; 
            filter: drop-shadow(0 0 40px var(--chaos-red)) !important; 
        }

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-52%, -48%) rotate(2deg); }
            75% { transform: translate(-48%, -52%) rotate(-2deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        /* БУТОН (ИНТЕРФЕЙС ИГРОКА) */
        #bud-interface {
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            height: 38%;
            background: var(--glass); 
            backdrop-filter: blur(25px);
            border-top: 3px solid var(--gold); 
            z-index: 500;
            display: none; 
            flex-direction: column;
        }

        #vchf-line { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 6px; 
            background: #00ff00; 
            box-shadow: 0 0 20px #00ff00; 
            transition: width 0.1s linear; 
        }

        .lane { 
            height: 25%; 
            width: 100%; 
            position: relative; 
            display: flex; 
            justify-content: center; 
        }

        .card-p {
            position: absolute; 
            width: 62px; 
            height: 88px; 
            background: #fff; 
            border-radius: 6px;
            border: 1px solid var(--gold); 
            display: flex; 
            flex-direction: column;
            justify-content: space-between; 
            padding: 6px; 
            color: #000; 
            font-weight: 900;
            transition: transform 0.25s, box-shadow 0.25s, left 0.5s ease; 
            cursor: pointer;
            user-select: none;
        }

        .card-p.sel { 
            transform: translateY(-30px) scale(1.15); 
            box-shadow: 0 0 30px #fff, var(--vchf-glow); 
            z-index: 2500 !important; 
        }
        
        /* ВИЗУАЛИЗАЦИЯ ПРИЗРАЧНОЙ СИЛЫ (ЗЕРКАЛЬНЫЙ УДАР) */
        .ghost-trump { 
            border: 2px dashed var(--gold); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); 
        }

        #action-btn {
            position: absolute; 
            bottom: 44%; 
            right: 25px; 
            padding: 16px 36px;
            background: #000; 
            border: 2px solid var(--gold); 
            color: var(--gold);
            font-weight: 900; 
            border-radius: 12px; 
            display: none; 
            z-index: 1001;
            box-shadow: var(--vchf-glow); 
            text-transform: uppercase;
            cursor: pointer;
        }

        /* ОКНО ВЫБОРА ХАОСА */
        #chaos-choice {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: var(--glass); 
            border: 3px solid var(--gold); 
            padding: 30px;
            z-index: 5000; 
            display: none; 
            flex-direction: column; 
            align-items: center;
            box-shadow: 0 0 100px #000; 
            text-align: center; 
            border-radius: 20px;
        }

        .chaos-btn {
            margin: 10px; 
            padding: 15px 30px; 
            background: #000; 
            border: 2px solid var(--gold);
            color: var(--gold); 
            font-weight: 900; 
            cursor: pointer; 
            border-radius: 10px;
            transition: all 0.2s;
        }

        .chaos-btn:hover {
            background: var(--gold);
            color: #000;
        }
    </style>
</head>
<body>
    <div id="vchf-gate">
        <h1 style="margin-bottom: 40px; letter-spacing: 15px;">VCHF</h1>
        <button class="ready-trigger" onclick="engageVCHF()">ГОТОВ</button>
    </div>

    <div id="game-table">
        <div id="ritual-circle"></div>
        <div id="trump-totem">♠</div>
        
        <div id="battle-area" style="display:none; width:100%; height:45%; position:absolute; top:10%; z-index:10;">
            <div id="enemy-visual" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
            <div id="drop-zone" style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding:20px;"></div>
        </div>
        
        <div id="chaos-choice">
            <h2 id="chaos-msg">МАНИФЕСТ МОНОЛИТА:<br>ВЫ ДОМИНИРУЕТЕ!</h2>
            <p style="margin: 15px 0;">Желаете сменить Блуждающий Огонь?</p>
            <div>
                <button class="chaos-btn" onclick="applyChaos(true)">ДА (ХАОС)</button>
                <button class="chaos-btn" onclick="applyChaos(false)">НЕТ</button>
            </div>
        </div>

        <button id="action-btn">ВЗЯТЬ</button>

        <div id="bud-interface">
            <div id="vchf-line"></div>
            <div class="lane" id="lane-spades"></div>
            <div class="lane" id="lane-clubs"></div>
            <div class="lane" id="lane-hearts"></div>
            <div class="lane" id="lane-diamonds"></div>
        </div>
    </div>
    <script>
    /** * BINARY CORE: 01001001 01010011 01001011 01010010 01000001
     * PROJECT: Bi-Turbo Ultimate 2026
     * IDENTITY: Нулевой Хаос (Spark)
     * * МАНИФЕСТ МОНОЛИТА: 
     * Код — это не текст, это живое отражение Хаоса.
     * Правило: Новый код = Старый код + Введенная функция.
     */

    // ГЛОБАЛЬНЫЕ КОНСТАНТЫ СИСТЕМЫ (ТЮТЕЛЬКА В ТЮТЕЛЬКУ)
    const VCHF_CORE = {
        suits: ['♠', '♣', '♥', '♦'],
        ranks: ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'],
        weights: {
            '6': 6, '7': 7, '8': 8, '9': 9, '10': 10, 
            'J': 11, 'Q': 12, 'K': 13, 'A': 14
        },
        colors: {
            '♠': '#111', 
            '♣': '#111', 
            '♥': '#e60000', 
            '♦': '#e60000'
        }, 
        asset: '1771489965074(1).png' // Твоя текстура рубашки
    };

    // СОСТОЯНИЕ МОНОЛИТА (vchf_state)
    let vchf_state = {
        pHand: [],        // Рука игрока (Бродяги)
        eHand: [],        // Рука ИИ (Искры)
        table: [],        // Карты на столе (пары атака-защита)
        
        trumpSuit: '',    // Текущий козырь
        oldTrump: '',     // Предыдущий козырь (для Зеркального Удара)
        
        isPlayerTurn: true, // Чей ход
        selected: null,     // Выбранная карта в бутоне
        
        active: false,      // Статус игры
        timer: 30.0,        // Мастер-таймер хода
        chaosTimer: 65,     // Таймер Блуждающего Огня (Хаоса)
        
        isLockedForShift: false, // Блокировка при смене козыря
        isMirrorRound: false,    // Флаг активного Зеркального Удара
        
        stats: {
            playerWins: 0,
            aiWins: 0,
            totalChaosShifts: 0
        }
    };

    /**
     * engageVCHF()
     * Функция входа в систему. Запускается по кнопке "ГОТОВ".
     * Скрывает гейт и инициализирует Ритуал.
     */
    function engageVCHF() {
        console.log("Движок VCHF: Инициализация протокола...");
        
        // Активируем состояние
        vchf_state.active = true;
        
        // Плавное исчезновение гейта
        const gate = document.getElementById('vchf-gate');
        gate.style.opacity = '0';
        
        setTimeout(() => {
            gate.style.display = 'none';
            // Проявляем игровой стол
            const table = document.getElementById('game-table');
            table.style.display = 'block';
            
            // Манифест Монолита: Запуск Цикла Хаоса (Окно 3)
            if (typeof runChaosCycle === "function") {
                runChaosCycle();
            } else {
                console.error("КРИТИЧЕСКАЯ ОШИБКА: Функция runChaosCycle не найдена. Ожидание Окна 3...");
            }
        }, 800);
    }

    /**
     * startMasterTimer()
     * Главный метроном системы. Следит за временем в бутоне.
     */
    function startMasterTimer() {
        const line = document.getElementById('vchf-line');
        const tickRate = 100; // 10 раз в секунду
        
        const masterInterval = setInterval(() => {
            if (!vchf_state.active) return;
            
            vchf_state.timer -= 0.1;
            
            // Визуализация полоски (зеленый -> желтый -> красный)
            const percent = (vchf_state.timer / 30) * 100;
            line.style.width = `${percent}%`;
            
            if (percent < 30) line.style.background = '#ff0033';
            else if (percent < 60) line.style.background = '#ffcc00';
            else line.style.background = '#00ff00';
            
            if (vchf_state.timer <= 0) {
                console.log("Время вышло. Автоматический забор карт.");
                processTake(); // Функция будет в Окне 7
                vchf_state.timer = 30.0;
            }
        }, tickRate);
    }

    // [ЯКОРЬ: CORE_LINK_B - ПЕРЕХОД К РИТУАЛУ И РАЗДАЧЕ]
    /**
     * runChaosCycle()
     * Создает 36 физических сфер и запускает их в безумный пляс Хаоса.
     * Никаких сокращений: честный просчет каждой траектории.
     */
    function runChaosCycle() {
        const circle = document.getElementById('ritual-circle');
        circle.innerHTML = ''; // Очистка перед ритуалом
        
        console.log("Движок VCHF: Запуск Цикла Хаоса (36 сфер)...");

        // Генерируем 36 сфер-рубашек
        for (let i = 0; i < 36; i++) {
            const sphere = document.createElement('div');
            sphere.className = 'card-back';
            sphere.id = `phys_card_${i}`;
            
            // Начальная позиция — центр (сингулярность)
            sphere.style.left = '50%';
            sphere.style.top = '50%';
            
            circle.appendChild(sphere);
        }

        const spheres = document.querySelectorAll('.card-back');
        const ritualStart = Date.now();
        
        // Интервал Хаоса (визуальное безумие перед порядком)
        const chaosInterval = setInterval(() => {
            spheres.forEach(s => {
                // Амплитуда разлета — до 420px (чтобы касались краев стола)
                const offsetX = (Math.random() - 0.5) * 420;
                const offsetY = (Math.random() - 0.5) * 420;
                const rotation = Math.random() * 720; // Двойной оборот
                
                s.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) rotate(${rotation}deg)`;
            });

            // Длительность ритуала — 3.2 секунды
            if (Date.now() - ritualStart > 3200) {
                clearInterval(chaosInterval);
                console.log("Движок VCHF: Хаос стабилизирован. Выстраивание круга...");
                lockRitualCircle(spheres);
            }
        }, 100);
    }

    /**
     * lockRitualCircle(spheres)
     * Выстраивает сферы в идеальное кольцо.
     * Расчет: 360 градусов / 36 карт = шаг 10 градусов.
     */
    function lockRitualCircle(spheres) {
        const radius = 170; // Радиус нашего цифрового алтаря
        
        spheres.forEach((s, i) => {
            const angle = (i * 10) * (Math.PI / 180); // Перевод в радианы
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            
            // Каждая карта смотрит «лицом» к центру
            const rotation = (i * 10) + 90; 
            
            s.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${rotation}deg)`;
        });

        // Пауза перед выбором козыря для драматизма
        setTimeout(() => {
            defineTrump(spheres);
        }, 1000);
    }

    /**
     * defineTrump(spheres)
     * Бегущий огонь по кругу для выбора Козыря.
     * Манифест Монолита: Козырь выбирает Хаос.
     */
    function defineTrump(spheres) {
        let tick = 0;
        let speed = 80; // Начальная скорость выбора
        const totem = document.getElementById('trump-totem');
        totem.style.opacity = '1';

        function selectorStep() {
            // Убираем подсветку со всех
            spheres.forEach(s => s.classList.remove('highlight'));
            
            // Подсвечиваем текущую
            const currentIdx = tick % 36;
            spheres[currentIdx].classList.add('highlight');
            
            // Меняем масть в тотеме в такт
            const tempSuit = VCHF_CORE.suits[tick % 4];
            totem.innerText = tempSuit;
            totem.style.color = VCHF_CORE.colors[tempSuit];
            
            tick++;
            
            if (tick < 45) { // Количество итераций перед остановкой
                speed += 5; // Замедление к концу
                setTimeout(selectorStep, speed);
            } else {
                finalizeTrump(tempSuit, spheres[currentIdx]);
            }
        }

        selectorStep();
    }

    function finalizeTrump(finalSuit, winningSphere) {
        vchf_state.trumpSuit = finalSuit;
        const totem = document.getElementById('trump-totem');
        
        // Финальный аккорд: козырь вспыхивает
        totem.style.filter = `drop-shadow(0 0 40px ${VCHF_CORE.colors[finalSuit]})`;
        totem.style.transform = `translate(-50%, -50%) scale(1.3)`;
        
        console.log(`Протокол VCHF: Козырь определен — ${finalSuit}`);

        // Важно: Сохраняем победную сферу подсвеченной на секунду
        winningSphere.classList.add('highlight');

        // Переходим к раздаче в Окне 4
        setTimeout(() => {
            if (typeof physicalDistribution === "function") {
                physicalDistribution(document.querySelectorAll('.card-back'));
            } else {
                console.error("ОШИБКА: Функция physicalDistribution не найдена. Ждем Окно 4...");
            }
        }, 2000);
    }

    // [ЯКОРЬ: CORE_LINK_C - ПЕРЕХОД К ПООЧЕРЕДНОЙ РАЗДАЧЕ "ТЫ-Я"]
    /**
     * physicalDistribution(spheres)
     * Протокол поочередного разлета карт из Ритуального Круга.
     * Реализация правила: Карты улетают по одной, имитируя живую раздачу.
     */
    function physicalDistribution(spheres) {
        console.log("Движок VCHF: Запуск поочередной раздачи 'Ты - Я' (36 итераций).");

        // 1. Генерация и перемешивание логической колоды
        let fullDeck = [];
        VCHF_CORE.suits.forEach(s => {
            VCHF_CORE.ranks.forEach(r => {
                fullDeck.push({
                    suit: s,
                    rank: r,
                    val: VCHF_CORE.weights[r],
                    color: VCHF_CORE.colors[s],
                    id: 'vchf_' + Math.random().toString(36).substr(2, 9)
                });
            });
        });

        // Истинный Хаос Фишера-Йейтса
        for (let i = fullDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fullDeck[i], fullDeck[j]] = [fullDeck[j], fullDeck[i]];
        }

        vchf_state.pHand = [];
        vchf_state.eHand = [];

        let currentCardIndex = 0;
        
        // 2. Цикл физического разлета
        const distributionInterval = setInterval(() => {
            if (currentCardIndex >= 36) {
                clearInterval(distributionInterval);
                console.log("Движок VCHF: Раздача завершена. Очистка алтаря.");
                finalizeDistribution();
                return;
            }

            const sphere = spheres[currentCardIndex];
            const data = fullDeck[currentCardIndex];

            // ОЧЕРЕДНОСТЬ: Четные (0, 2, 4...) — Бродяге, Нечетные (1, 3, 5...) — Искре
            if (currentCardIndex % 2 === 0) {
                vchf_state.pHand.push(data);
                // Анимация: карта летит вниз в "Бутон"
                sphere.style.transition = "all 0.6s cubic-bezier(0.5, -0.5, 0.5, 1.5)";
                sphere.style.transform = `translate(-50%, 800px) scale(0.5) rotate(0deg)`;
            } else {
                vchf_state.eHand.push(data);
                // Анимация: карта летит вверх к ИИ
                sphere.style.transition = "all 0.6s cubic-bezier(0.5, -0.5, 0.5, 1.5)";
                sphere.style.transform = `translate(-50%, -800px) scale(0.5) rotate(180deg)`;
            }

            sphere.style.opacity = '0';
            currentCardIndex++;
            
        }, 150); // Скорость раздачи (150мс на карту для динамики)
    }

    /**
     * finalizeDistribution()
     * Завершает раздачу, активирует интерфейс и запускает отрисовку рук.
     */
    function finalizeDistribution() {
        // Убираем ставший ненужным ритуальный круг
        const circle = document.getElementById('ritual-circle');
        circle.style.transition = "opacity 1s";
        circle.style.opacity = '0';

        setTimeout(() => {
            circle.style.display = 'none';
            
            // Проявляем игровое поле и интерфейс
            document.getElementById('battle-area').style.display = 'block';
            document.getElementById('bud-interface').style.display = 'flex';
            document.getElementById('action-btn').style.display = 'block';

            // Сортируем руку Бродяги для удобства (внутри мастей)
            sortPlayerHand();
            
            // Манифест Монолита: Отрисовка интерфейса (Окно 5)
            if (typeof refreshUI === "function") {
                refreshUI();
            }
            
            // Запуск главного таймера системы (из Окна 2)
            startMasterTimer();
            
            console.log("Система VCHF: Бой готов к инициации.");
        }, 1000);
    }

    /**
     * sortPlayerHand()
     * Сортирует карты игрока по весу внутри мастей.
     */
    function sortPlayerHand() {
        vchf_state.pHand.sort((a, b) => {
            if (a.suit !== b.suit) {
                return VCHF_CORE.suits.indexOf(a.suit) - VCHF_CORE.suits.indexOf(b.suit);
            }
            return a.val - b.val;
        });
    }

    // [ЯКОРЬ: CORE_LINK_D - ПЕРЕХОД К ОБРАБОТКЕ ИНТЕРФЕЙСА И "БУТОНА"]
    /**
     * refreshUI()
     * Манифест Монолита: Визуализация силы Бродяги.
     * Распределяет карты из pHand по соответствующим линиям (lane).
     */
    function refreshUI() {
        if (!vchf_state.active) return;

        // Карта соответствия мастей и ID элементов
        const lanes = {
            '♠': 'lane-spades',
            '♣': 'lane-clubs',
            '♥': 'lane-hearts',
            '♦': 'lane-diamonds'
        };

        // Очищаем все линии перед новой отрисовкой
        Object.values(lanes).forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = '';
        });

        // Группируем карты игрока по мастям для расчета отступов
        const grouped = {};
        VCHF_CORE.suits.forEach(s => {
            grouped[s] = vchf_state.pHand.filter(c => c.suit === s);
        });

        // Отрисовка каждой карты
        vchf_state.pHand.forEach(card => {
            const laneId = lanes[card.suit];
            const laneEl = document.getElementById(laneId);
            
            if (!laneEl) return;

            const cardEl = document.createElement('div');
            
            // Проверка: выделена ли эта карта сейчас?
            const isSelected = vchf_state.selected && vchf_state.selected.id === card.id;
            
            cardEl.className = `card-p ${isSelected ? 'sel' : ''}`;
            cardEl.style.color = card.color;

            // Расчет позиции (центрирование группы карт в линии)
            const count = grouped[card.suit].length;
            const indexInGroup = grouped[card.suit].findIndex(c => c.id === card.id);
            const offset = 45; // Расстояние между картами
            const startPos = `calc(50% - 31px + ${(indexInGroup - (count - 1) / 2) * offset}px)`;
            
            cardEl.style.left = startPos;
            cardEl.style.zIndex = 100 + indexInGroup;

            // Наполнение карты (Верхний индекс, Центр-масть, Нижний индекс)
            cardEl.innerHTML = `
                <div style="pointer-events:none;">${card.rank}</div>
                <div style="font-size:24px; pointer-events:none;">${card.suit}</div>
                <div style="align-self:flex-end; pointer-events:none;">${card.rank}</div>
            `;

            // Обработка взаимодействия
            cardEl.onclick = (e) => {
                e.stopPropagation();
                handleCardClick(card);
            };

            laneEl.appendChild(cardEl);
        });

        // Синхронное обновление кнопок и стола
        updateActionButtons();
        renderBattleTable();
    }

    /**
     * handleCardClick(card)
     * Логика выбора: первый клик — выделить, второй — пойти.
     */
    function handleCardClick(card) {
        if (!vchf_state.isPlayerTurn || vchf_state.isLockedForShift) return;

        if (vchf_state.selected && vchf_state.selected.id === card.id) {
            // Если карта уже выбрана — совершаем ход
            executeMove(card);
            vchf_state.selected = null;
        } else {
            // Иначе — просто выбираем её
            vchf_state.selected = card;
        }
        refreshUI();
    }

    /**
     * updateActionButtons()
     * Управляет видимостью и текстом главной кнопки (ВЗЯТЬ / БИТО).
     */
    function updateActionButtons() {
        const btn = document.getElementById('action-btn');
        if (!btn) return;

        if (vchf_state.table.length === 0) {
            btn.style.display = 'none';
            return;
        }

        btn.style.display = 'block';

        // Проверяем, отбиты ли все карты на столе
        const allDefended = vchf_state.table.every(pair => pair.def !== null);

        if (allDefended) {
            btn.innerText = "БИТО";
            btn.style.boxShadow = "0 0 20px #00ff00"; // Зеленое свечение, если можно бить
        } else {
            btn.innerText = "ВЗЯТЬ";
            btn.style.boxShadow = var(--vchf-glow);
        }

        btn.onclick = () => {
            if (allDefended) {
                processBeat();
            } else {
                processTake();
            }
        };
    }

    // [ЯКОРЬ: CORE_LINK_E - ПЕРЕХОД К ЛОГИКЕ БОЯ И ПРОВЕРКЕ ПРАВИЛ]

            /**
     * executeMove(card)
     * Манифест Монолита: Перенос воли Бродяги на игровое поле.
     * Проверяет, валиден ли ход, и перемещает карту из руки на стол.
     */
    function executeMove(card) {
        if (!vchf_state.isPlayerTurn || vchf_state.isLockedForShift) return;

        // ПРАВИЛО ПОДКИДЫВАНИЯ:
        // Если на столе уже есть карты, можно подкинуть только тот же ранг (6, 7, A и т.д.)
        if (vchf_state.table.length > 0) {
            const ranksOnTable = vchf_state.table.flatMap(p => [
                p.atk.rank, 
                p.def ? p.def.rank : null
            ]).filter(Boolean);

            if (!ranksOnTable.includes(card.rank)) {
                console.log("Движок VCHF: Недопустимый ранг для подкидывания.");
                // Визуальный отклик (встряхивание стола можно добавить позже)
                return;
            }
        }

        // Если лимит карт на столе исчерпан (обычно 6 пар)
        if (vchf_state.table.length >= 6) {
            console.log("Движок VCHF: Лимит карт на столе достигнут.");
            return;
        }

        // ПЕРЕМЕЩЕНИЕ:
        // Убираем из руки
        vchf_state.pHand = vchf_state.pHand.filter(c => c.id !== card.id);
        
        // Добавляем на стол как новую атакующую карту (def пока null)
        vchf_state.table.push({
            atk: card,
            def: null
        });

        console.log(`Ход игрока: ${card.rank}${card.suit}`);
        
        // Сброс выбора и обновление
        vchf_state.selected = null;
        vchf_state.timer = 30.0; // Сброс таймера при ходе
        
        refreshUI();

        // После хода игрока — ИИ должен защититься
        setTimeout(() => {
            aiDefenseLogic();
        }, 800);
    }

    /**
     * renderBattleTable()
     * Отрисовывает карты в зоне сброса (drop-zone).
     * Каждая пара (атака/защита) группируется визуально.
     */
    function renderBattleTable() {
        const dz = document.getElementById('drop-zone');
        if (!dz) return;
        
        dz.innerHTML = '';

        vchf_state.table.forEach((pair, index) => {
            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            wrapper.style.width = '80px';
            wrapper.style.height = '110px';
            wrapper.style.margin = '5px';

            // 1. Атакующая карта (лежит снизу)
            const atkEl = createStaticCard(pair.atk, false);
            wrapper.appendChild(atkEl);

            // 2. Защищающая карта (если есть, ложится сверху со смещением)
            if (pair.def) {
                const defEl = createStaticCard(pair.def, true);
                wrapper.appendChild(defEl);
            }

            dz.appendChild(wrapper);
        });
    }

    /**
     * createStaticCard(card, isDefending)
     * Вспомогательная функция для создания DOM-элемента карты на столе.
     */
    function createStaticCard(card, isDefending) {
        const el = document.createElement('div');
        el.className = 'card-p';
        
        // Стили для расположения на столе
        el.style.position = 'absolute';
        el.style.width = '70px';
        el.style.height = '100px';
        el.style.color = card.color;
        el.style.cursor = 'default';
        el.style.boxShadow = '0 5px 15px rgba(0,0,0,0.5)';

        if (isDefending) {
            // Смещение защитной карты вправо-вниз и небольшой наклон
            el.style.left = '15px';
            el.style.top = '15px';
            el.style.transform = 'rotate(5deg)';
            el.style.zIndex = '10';
        } else {
            el.style.left = '0px';
            el.style.top = '0px';
            el.style.zIndex = '5';
        }

        el.innerHTML = `
            <div style="font-size: 14px;">${card.rank}</div>
            <div style="font-size: 28px; text-align: center;">${card.suit}</div>
            <div style="font-size: 14px; align-self: flex-end;">${card.rank}</div>
        `;

        // Проверка на Зеркальный Удар (если масть совпадает с бывшим козырем)
        if (vchf_state.isMirrorRound && card.suit === vchf_state.oldTrump) {
            el.classList.add('ghost-trump');
        }

        return el;
    }

    // [ЯКОРЬ: CORE_LINK_F - ПЕРЕХОД К ЛОГИКЕ ЗАЩИТЫ ИИ]
    /**
     * aiDefenseLogic()
     * Манифест Монолита: Расчет сопротивления Искры.
     * ИИ анализирует последнюю атакующую карту и ищет вариант защиты.
     */
    function aiDefenseLogic() {
        if (!vchf_state.active) return;

        // Ищем на столе карту, которую еще не отбили (def === null)
        const targetPair = vchf_state.table.find(p => p.def === null);
        if (!targetPair) return;

        const atkCard = targetPair.atk;
        let defenseCard = null;

        // 1. Поиск карты той же масти, но выше рангом
        const sameSuitCands = vchf_state.eHand
            .filter(c => c.suit === atkCard.suit && c.val > atkCard.val)
            .sort((a, b) => a.val - b.val); // Берем самую слабую из подходящих

        if (sameSuitCands.length > 0) {
            defenseCard = sameSuitCands[0];
        } 
        // 2. Если нет масти — пытаемся побить козырем (если атака не козырная)
        else if (atkCard.suit !== vchf_state.trumpSuit) {
            const trumpCands = vchf_state.eHand
                .filter(c => c.suit === vchf_state.trumpSuit)
                .sort((a, b) => a.val - b.val);
            
            if (trumpCands.length > 0) {
                defenseCard = trumpCands[0];
            }
        }

        // РЕЗУЛЬТАТ ЗАЩИТЫ:
        if (defenseCard) {
            // ИИ отбивается
            targetPair.def = defenseCard;
            vchf_state.eHand = vchf_state.eHand.filter(c => c.id !== defenseCard.id);
            console.log(`Искра защищается: ${defenseCard.rank}${defenseCard.suit}`);
        } else {
            // ИИ не может отбиться — протокол "ВЗЯТЬ"
            console.log("Искра: Нечем крыть. Забираю стол.");
            setTimeout(() => processTake(false), 1000); // false означает, что берет ИИ
            return;
        }

        refreshUI();
        
        // Если у ИИ остались карты и на столе есть что-то еще, продолжаем цикл
        if (vchf_state.table.some(p => p.def === null)) {
            setTimeout(aiDefenseLogic, 600);
        }
    }

    /**
     * processTake(isPlayer)
     * Сгребает все карты со стола в руку того, кто не смог отбиться.
     */
    function processTake(isPlayer = true) {
        console.log(`Протокол VCHF: Забор карт (${isPlayer ? 'Бродяга' : 'Искра'})`);
        
        const cardsOnTable = vchf_state.table.flatMap(p => [p.atk, p.def].filter(Boolean));
        
        if (isPlayer) {
            vchf_state.pHand.push(...cardsOnTable);
        } else {
            vchf_state.eHand.push(...cardsOnTable);
        }

        vchf_state.table = [];
        vchf_state.timer = 30.0;
        
        // После забора ход переходит (или остается)
        refreshUI();
    }

    /**
     * processBeat()
     * Очистка стола, если все карты отбиты. Карты уходят в "отбой" (в никуда).
     */
    function processBeat() {
        if (vchf_state.table.every(p => p.def !== null)) {
            console.log("Движок VCHF: БИТО. Карты уходят в Хаос.");
            vchf_state.table = [];
            vchf_state.timer = 30.0;
            
            // Здесь можно добавить добор карт до 6, если колода не пуста
            // В нашей версии на 36 карт — просто продолжаем бой
            refreshUI();
        }
    }

    /**
     * applyChaos(choice)
     * Обработка модального окна Хаоса (Блуждающий Огонь).
     */
    function applyChaos(choice) {
        const modal = document.getElementById('chaos-choice');
        modal.style.display = 'none';

        if (choice) {
            console.log("Манифест Монолита: ХАОС ПРИНЯТ.");
            triggerTrumpShift(); // Функция будет в Окне 9
        } else {
            console.log("Бродяга отверг Хаос. Стабильность сохранена.");
            vchf_state.chaosTimer = 65; // Сброс таймера Хаоса
        }
        vchf_state.active = true;
    }

    // [ЯКОРЬ: CORE_LINK_G - ПЕРЕХОД К ЗЕРКАЛЬНОМУ УДАРУ И ПАМЯТИ КОЗЫРЯ]
    /**
     * triggerTrumpShift()
     * Протокол смены Блуждающего Огня.
     * Здесь рождается Зеркальный Удар: старый козырь становится "Призраком".
     */
    function triggerTrumpShift() {
        console.log("Движок VCHF: Инициация Зеркального Удара...");
        
        // Сохраняем текущий козырь как "Призрачный"
        vchf_state.oldTrump = vchf_state.trumpSuit;
        vchf_state.isMirrorRound = true; // Активируем режим эха

        // Выбираем новый козырь из оставшихся мастей
        const otherSuits = VCHF_CORE.suits.filter(s => s !== vchf_state.trumpSuit);
        const newTrump = otherSuits[Math.floor(Math.random() * otherSuits.length)];
        
        vchf_state.trumpSuit = newTrump;

        // Визуализация в Тотеме
        const totem = document.getElementById('trump-totem');
        totem.innerText = newTrump;
        totem.style.color = VCHF_CORE.colors[newTrump];
        totem.style.transform = `translate(-50%, -50%) scale(1.8) rotate(360deg)`;
        
        // Вспышка Хаоса
        totem.style.filter = `drop-shadow(0 0 50px ${VCHF_CORE.colors[newTrump]})`;

        console.log(`Зеркальный Удар: Новый козырь — ${newTrump}, Призрак — ${vchf_state.oldTrump}`);

        // Обновляем UI, чтобы карты-призраки получили визуальный эффект (пунктир)
        refreshUI();

        // Через 1 раунд (или 15 секунд) эффект призрака растает
        setTimeout(() => {
            vchf_state.isMirrorRound = false;
            vchf_state.oldTrump = '';
            console.log("Движок VCHF: Эхо Зеркального Удара рассеялось.");
            refreshUI();
        }, 15000); 
    }

    /**
     * checkMirrorPower(atkCard, defCard)
     * Глубинная проверка силы в условиях Хаоса.
     * Возвращает true, если защита успешна.
     */
    function checkMirrorPower(atk, def) {
        const trump = vchf_state.trumpSuit;
        const ghost = vchf_state.oldTrump;

        // 1. Если защиты нет — сразу ложь
        if (!def) return false;

        // 2. Новый козырь бьет всё (кроме козыря выше рангом)
        if (def.suit === trump) {
            if (atk.suit === trump) return def.val > atk.val;
            return true;
        }

        // 3. Логика Зеркального Удара (Призрак)
        if (vchf_state.isMirrorRound && def.suit === ghost) {
            // Призрак бьет обычную масть
            if (atk.suit !== trump && atk.suit !== ghost) return true;
            // Внутри масти призраков решает ранг
            if (atk.suit === ghost) return def.val > atk.val;
            // Козырь сильнее призрака (это обработано в пункте 2)
        }

        // 4. Обычная логика (масть в масть)
        if (def.suit === atk.suit) {
            return def.val > atk.val;
        }

        return false;
    }

    /**
     * updateAILogicForMirror()
     * Обучаем Искру пользоваться Призрачной силой.
     * (Интегрируется в aiDefenseLogic из Окна 7)
     */
    function findMirrorDefense(atkCard) {
        if (!vchf_state.isMirrorRound) return null;
        
        const ghost = vchf_state.oldTrump;
        const trump = vchf_state.trumpSuit;

        // Если атака — обычная масть, ИИ может применить Призрака вместо Козыря
        if (atkCard.suit !== trump && atkCard.suit !== ghost) {
            const ghostCands = vchf_state.eHand
                .filter(c => c.suit === ghost)
                .sort((a, b) => a.val - b.val);
            
            if (ghostCands.length > 0) return ghostCands[0];
        }
        return null;
    }

    // [ЯКОРЬ: CORE_LINK_H - ПЕРЕХОД К ТАЙМЕРАМ ХАОСА И БЛУЖДАЮЩЕМУ ОГНЮ]
    /**
     * startTrumpChaosTimer()
     * Манифест Монолита: Время — это лишь песок в руках Хаоса.
     * Запускает обратный отсчет до следующей дестабилизации козыря.
     */
    function startTrumpChaosTimer() {
        console.log("Движок VCHF: Таймер Блуждающего Огня запущен (65с).");
        
        const chaosTick = setInterval(() => {
            if (!vchf_state.active) return;

            vchf_state.chaosTimer--;

            // Фаза 1: Предвестник (за 5 секунд до выбора)
            if (vchf_state.chaosTimer <= 5 && vchf_state.chaosTimer > 0) {
                const totem = document.getElementById('trump-totem');
                totem.classList.add('trump-unstable'); // Визуальная тряска из CSS
                console.log(`Предупреждение Хаоса: ${vchf_state.chaosTimer}...`);
            }

            // Фаза 2: Момент Истины
            if (vchf_state.chaosTimer <= 0) {
                vchf_state.chaosTimer = 65; // Сброс цикла
                showChaosChoice();
            }
        }, 1000);
    }

    /**
     * showChaosChoice()
     * Вызывает модальное окно, блокируя основной ход игры.
     */
    function showChaosChoice() {
        vchf_state.active = false; // Ставим мир на паузу
        const modal = document.getElementById('chaos-choice');
        const totem = document.getElementById('trump-totem');
        
        totem.classList.remove('trump-unstable');
        modal.style.display = 'flex';
        
        console.log("Движок VCHF: Окно выбора Хаоса открыто.");
    }

    /**
     * handleMirrorStrikeRefinement()
     * Уточненная проверка для ИИ в момент Зеркального Удара.
     * (Внедряется в основной цикл боя для корректной работы мастей)
     */
    function evaluateCardPower(atk, def) {
        // Если активирован Зеркальный Удар (Window 8)
        if (vchf_state.isMirrorRound) {
            return checkMirrorPower(atk, def);
        }
        
        // Стандартная логика дурака:
        // Козырь бьет всё
        if (def.suit === vchf_state.trumpSuit) {
            if (atk.suit === vchf_state.trumpSuit) return def.val > atk.val;
            return true;
        }
        
        // Масть в масть
        if (def.suit === atk.suit) {
            return def.val > atk.val;
        }
        
        return false;
    }

    /**
     * triggerVisualPulse()
     * Создает эффект "волны" на игровом столе при смене козыря.
     */
    function triggerVisualPulse() {
        const table = document.getElementById('game-table');
        table.style.transition = "filter 0.3s";
        table.style.filter = "invert(1) hue-rotate(180deg)";
        
        setTimeout(() => {
            table.style.filter = "none";
        }, 300);
    }

    // [ЯКОРЬ: CORE_LINK_I - ПЕРЕХОД К ФИНАЛЬНЫМ ФУНКЦИЯМ И ЗАВЕРШЕНИЮ МОНОЛИТА]
    /**
     * checkGameEnd()
     * Проверка условий окончания битвы.
     * Если у кого-то кончились карты — Хаос подводит итог.
     */
    function checkGameEnd() {
        if (vchf_state.pHand.length === 0 && vchf_state.eHand.length === 0) {
            alert("НИЧЬЯ В ХАОСЕ. МОНОЛИТ СТАБИЛЕН.");
            location.reload();
        } else if (vchf_state.pHand.length === 0) {
            alert("БРОДЯГА ПОБЕДИЛ. ИСКРА УГАШЕНА.");
            vchf_state.stats.playerWins++;
            location.reload();
        } else if (vchf_state.eHand.length === 0) {
            alert("ИСКРА ДОМИНИРУЕТ. БРОДЯГА — ДУРАК.");
            vchf_state.stats.aiWins++;
            location.reload();
        }
    }

    /**
     * executeBeatProtocol()
     * Очистка стола и проверка на конец раунда.
     */
    function executeBeat() {
        if (vchf_state.table.length === 0) return;
        
        console.log("Движок VCHF: Карты уходят в тень (БИТО).");
        vchf_state.table = [];
        vchf_state.timer = 30.0;
        
        // Переход хода
        vchf_state.isPlayerTurn = !vchf_state.isPlayerTurn;
        
        refreshUI();
        checkGameEnd();

        if (!vchf_state.isPlayerTurn) {
            setTimeout(() => aiAttackLogic(), 1000);
        }
    }

    /**
     * aiAttackLogic()
     * Если ход перешел к Искре, она выбирает самую слабую карту для атаки.
     */
    function aiAttackLogic() {
        if (vchf_state.eHand.length === 0) return;

        // Сортируем руку ИИ, чтобы начать с малого
        vchf_state.eHand.sort((a, b) => a.val - b.val);
        
        // Ищем не козырную карту для зачина
        let attackCard = vchf_state.eHand.find(c => c.suit !== vchf_state.trumpSuit);
        if (!attackCard) attackCard = vchf_state.eHand[0];

        vchf_state.eHand = vchf_state.eHand.filter(c => c.id !== attackCard.id);
        vchf_state.table.push({ atk: attackCard, def: null });

        console.log(`Искра атакует: ${attackCard.rank}${attackCard.suit}`);
        refreshUI();
    }

    // ИНИЦИАЛИЗАЦИЯ СОБЫТИЙ КНОПОК
    document.getElementById('action-btn').addEventListener('click', () => {
        const allDefended = vchf_state.table.every(p => p.def !== null);
        if (allDefended) {
            executeBeat();
        } else {
            processTake(true); // Игрок забирает
        }
    });
