<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, vertical-align=top">
    
    <meta name="theme-color" content="#1a1c1e">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="color-scheme" content="dark">

    <title>ZERO_CHAOS // TERMINAL_1000_SLOTS</title>
    <style>
        :root {
            /* ПАЛИТРА: ТЕХНО-АНТРАЦИТ И МЕТАЛЛИЗИРОВАННЫЙ МАХАГОН */
            --bg: radial-gradient(circle at top, #1a1c1e 0%, #050607 100%);
            --gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            --gold-solid: #fcf6ba;
            --steel: rgba(45, 45, 48, 0.6);
            --glass: rgba(74, 4, 4, 0.22); 
            --danger: #ff5f5f;
            --spotlight: radial-gradient(circle at 50% 0%, rgba(252, 246, 186, 0.22) 0%, transparent 75%);
            
            /* ФОРМУЛА: КОНТРАСТНЫЙ СРЕЗ */
            --rings: radial-gradient(circle at var(--ox, -10%) var(--oy, -10%), 
                transparent 0%, 
                transparent 35%, 
                rgba(0, 0, 0, 0.5) 36%, 
                rgba(94, 10, 10, 0.12) 37%,
                transparent 39%, 
                transparent 60%,
                rgba(0, 0, 0, 0.55) 61%,
                rgba(74, 4, 4, 0.18) 62%,
                transparent 65%);
            
            /* ПАТТЕРН ИНЖЕНЕРНОЙ СЕТКИ */
            --grid: linear-gradient(rgba(252, 246, 186, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(252, 246, 186, 0.03) 1px, transparent 1px);
        }
        
        body {
            background: var(--bg);
            background-image: var(--grid);
            background-size: 20px 20px;
            background-attachment: fixed;
            color: var(--gold-solid);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 20px;
            padding-bottom: 120px;
            letter-spacing: 0.5px;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            color-scheme: dark;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(252, 246, 186, 0.2);
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
            cursor: crosshair;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* КАРТОЧКА: ТЕХНО-ЛОЖЕМЕНТ */
        .card {
            position: relative;
            background: var(--glass);
            background-image: var(--rings); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(252, 246, 186, 0.1);
            border-left: 2px solid rgba(252, 246, 186, 0.2);
            border-top: 1px solid rgba(252, 246, 186, 0.45); 
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.9), inset 0 0 30px rgba(74, 4, 4, 0.3);
            overflow: hidden;
        }

        /* УНИКАЛЬНЫЕ СРЕЗЫ */
        .card:nth-child(3n) { --ox: 110%; --oy: -20%; }
        .card:nth-child(3n+1) { --ox: -40%; --oy: 120%; }
        .card:nth-child(3n+2) { --ox: 60%; --oy: -40%; }
        .card:nth-child(5n) { --ox: 20%; --oy: 140%; }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: var(--spotlight);
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 2;
        }

        .card:active {
            transform: scale(0.97);
            border-color: var(--gold-solid);
            box-shadow: 0 0 50px rgba(74, 4, 4, 0.8);
        }

        .card-img {
            width: 100%; height: 130px;
            background: linear-gradient(180deg, #000 0%, #1a0101 100%);
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; color: #4a0404;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }

        .price { 
            color: rgba(252, 246, 186, 0.85); 
            font-size: 0.85rem; 
            margin: 10px 0;
            font-weight: bold;
            position: relative; z-index: 1;
        }

        button {
            margin-top: 10px; width: 100%;
            background: var(--gold);
            border: none; border-radius: 6px;
            color: #000; padding: 10px; 
            font-weight: bold; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
            position: relative; z-index: 3;
        }

        #cart-bar {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: rgba(10, 11, 12, 0.98);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(252, 246, 186, 0.35);
            border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; box-sizing: border-box; z-index: 100;
            box-shadow: 0 -15px 60px rgba(0,0,0,0.95);
        }

        #cart-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; 
            background: radial-gradient(circle, #1a1c1e 0%, #050607 100%);
            z-index: 200; overflow-y: auto; padding: 30px; box-sizing: border-box;
        }

        .cart-item {
            display: flex; justify-content: space-between;
            border-bottom: 1px solid rgba(252, 246, 186, 0.1); 
            padding: 15px 0;
        }

        .close-btn { 
            color: #888; float: right; cursor: pointer; 
            font-size: 0.8rem; letter-spacing: 2px;
        }

        /* АДМИН-ПАНЕЛЬ (НОВАЯ ФУНКЦИЯ) */
        #admin-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #050607; z-index: 500; padding: 20px; box-sizing: border-box; 
            border: 2px solid var(--gold-solid); overflow-y: auto;
        }
        .admin-input { 
            background: #1a1c1e; border: 1px solid var(--gold-solid); 
            color: #fff; width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; 
            box-sizing: border-box; font-family: monospace;
        }
    </style>
</head>
<body onclick="activateFullscreen()">

    <h2 id="logo" onclick="adminTrigger()">VCHF // ARSENAL</h2>
    
    <div class="shop-grid" id="main-grid"></div>

    <div id="cart-bar" onclick="toggleCart(event)">
        <span id="cart-info" style="font-size: 0.8rem; font-weight: bold;">СЕЙФ ПУСТ</span>
        <button style="width: auto; margin: 0; padding: 8px 20px; background: none; border: 1px solid var(--gold-solid); color: var(--gold-solid);">ОТКРЫТЬ</button>
    </div>

    <div id="admin-panel">
        <span class="close-btn" onclick="adminTrigger()">[ ЗАКРЫТЬ КОНСОЛЬ ]</span>
        <h3 style="color: var(--gold-solid); font-weight: 300; letter-spacing: 4px;">CONSOLE // ADMIN_0000</h3>
        <div style="height: 1px; background: var(--gold); margin: 20px 0;"></div>
        
        <p style="font-size: 0.7rem; color: var(--gold-solid);">АКТИВАЦИЯ СЛОТА (ДЛЯ АРХИТЕКТОРА)</p>
        <input type="number" id="slot-id" class="admin-input" placeholder="ID Слота (1-1000)">
        <textarea id="slot-key" class="admin-input" placeholder="Вставьте ключ от продавца" rows="3"></textarea>
        <button onclick="activateSlot()">ПРИМЕНИТЬ К МОНОЛИТУ</button>

        <p style="font-size: 0.7rem; color: var(--gold-solid); margin-top: 40px;">ГЕНЕРАТОР КЛЮЧА (ДЛЯ ПРОДАВЦА)</p>
        <input type="text" id="p-name" class="admin-input" placeholder="Название товара">
        <input type="number" id="p-price" class="admin-input" placeholder="Цена VCHF">
        <input type="text" id="p-img" class="admin-input" placeholder="Ссылка на фото (URL)">
        <button onclick="generateKey()" style="background: var(--steel); color: #fff;">СФОРМИРОВАТЬ КЛЮЧ</button>
        <div id="key-output" style="font-size: 0.6rem; word-break: break-all; margin-top: 15px; color: #555; background: #000; padding: 10px; border-radius: 4px;"></div>
    </div>

    <div id="cart-modal">
        <span class="close-btn" onclick="toggleCart(event)">[ ВЕРНУТЬСЯ К ОБЗОРУ ]</span>
        <h3 style="border-bottom: 1px solid var(--gold-solid); padding-bottom: 15px; font-weight: 300; letter-spacing: 3px;">ДЕПОЗИТАРИЙ</h3>
        <div id="cart-list"></div>
        <div id="cart-total" style="margin-top: 30px; text-align: right; font-size: 1.2rem; color: var(--gold-solid);"></div>
        <button onclick="clearCart(event)" style="color: var(--danger); border-color: var(--danger); background: none; margin-top: 40px; border: 1px solid var(--danger);">ОБНУЛИТЬ СЕЙФ</button>
    </div>

    <script>
        // МАНИФЕСТ МОНОЛИТА: Старый код + Новая функция
        const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, duration) {
            if (AudioCtx.state === 'suspended') AudioCtx.resume();
            const osc = AudioCtx.createOscillator();
            const gain = AudioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, AudioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(AudioCtx.destination);
            osc.start(); osc.stop(AudioCtx.currentTime + duration);
        }

        function activateFullscreen() {
            let doc = window.document;
            let docEl = doc.documentElement;
            let requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if (!doc.fullscreenElement) requestFullScreen.call(docEl);
        }

        // АДМИН-ЛОГИКА
        let adminClicks = 0;
        function adminTrigger() {
            adminClicks++;
            if(adminClicks >= 3) {
                const p = prompt("ENTER ACCESS CODE:");
                if(p === "0000") {
                    document.getElementById('admin-panel').style.display = 'block';
                    playSfx(440, 'square', 0.2);
                }
                adminClicks = 0;
            } else if (document.getElementById('admin-panel').style.display === 'block') {
                document.getElementById('admin-panel').style.display = 'none';
            }
        }

        // БАЗА ДАННЫХ
        let products = JSON.parse(localStorage.getItem('monolith_db')) || [];
        if(products.length === 0) {
            for (let i = 1; i <= 15; i++) {
                products.push({ id: i, name: `MOTIVE_0${i}`, price: (1000 + i * 150), img: '' });
            }
        }

        let cart = JSON.parse(localStorage.getItem('monolith_cart')) || [];
        
        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            products.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img">${item.img ? `<img src="${item.img}">` : `VCHF_UNIT_${item.id}`}</div>
                    <div style="font-size: 0.75rem; letter-spacing: 1px;">${item.name}</div>
                    <div class="price">${item.price} VCHF</div>
                    <button onclick="event.stopPropagation(); addToCart(${item.id})">В СЕЙФ</button>
                `;
                grid.appendChild(card);
            });
        }

        function generateKey() {
            const data = {
                n: document.getElementById('p-name').value,
                p: document.getElementById('p-price').value,
                i: document.getElementById('p-img').value
            };
            const key = btoa(encodeURIComponent(JSON.stringify(data)));
            document.getElementById('key-output').innerText = key;
            playSfx(600, 'sine', 0.2);
        }

        function activateSlot() {
            const id = document.getElementById('slot-id').value;
            const key = document.getElementById('slot-key').value;
            try {
                const data = JSON.parse(decodeURIComponent(atob(key)));
                const index = products.findIndex(p => p.id == id);
                if(index !== -1) {
                    products[index].name = data.n;
                    products[index].price = parseInt(data.p);
                    products[index].img = data.i;
                    localStorage.setItem('monolith_db', JSON.stringify(products));
                    renderGrid();
                    playSfx(1000, 'sine', 0.5);
                    alert("СЛОТ " + id + " ОБНОВЛЕН.");
                }
            } catch(e) { alert("ОШИБКА КЛЮЧА"); }
        }

        function addToCart(id) {
            playSfx(880, 'sine', 0.1);
            const product = products.find(p => p.id === id);
            cart.push(product);
            saveCart();
        }

        function saveCart() {
            localStorage.setItem('monolith_cart', JSON.stringify(cart));
            document.getElementById('cart-info').innerText = cart.length > 0 ? `АКТИВОВ В СЕЙФЕ: ${cart.length}` : 'СЕЙФ ПУСТ';
        }

        function toggleCart(e) {
            if(e) e.stopPropagation();
            playSfx(110, 'triangle', 0.2);
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalDiv = document.getElementById('cart-total');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item) => {
                total += item.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <span style="font-size: 0.9rem;">${item.name}</span>
                        <span style="color: var(--gold-solid);">${item.price} VCHF</span>
                    </div>
                `;
            });
            totalDiv.innerText = `ИТОГО К ДЕПОЗИТУ: ${total} VCHF`;
        }

        function clearCart(e) {
            if(e) e.stopPropagation();
            playSfx(50, 'sawtooth', 0.4);
            cart = [];
            saveCart();
            toggleCart();
        }

        renderGrid();
        saveCart();
    </script>
</body>
</html>
