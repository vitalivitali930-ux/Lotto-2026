<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Online Duel</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --gold: #ffcf40; --space-dark: #121625; --nebula-core: #222a44; 
            --spark-neon: #00fa9a; --trump-halo: #8a2be2; --cherry-pulse: #4a0404; 
            --bg-card: #ffffff; --grid-color: rgba(255, 207, 64, 0.08); 
            --card-w: 55px; --card-h: 77px; --micro-scale: 0.25;
            --tg-blue: #24A1DE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505; color: #e0e6ff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; perspective: 1500px;
        }

        /* КРАСИВАЯ РАМКА ID (Telegram Style) */
        #net-status {
            position: fixed; top: 15px; left: 15px; z-index: 6000;
            background: rgba(12, 15, 24, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(36, 161, 222, 0.4);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(36, 161, 222, 0.1);
            cursor: pointer; transition: 0.3s;
        }
        #net-status:active { transform: scale(0.95); border-color: var(--spark-neon); }

        .net-logo {
            width: 35px; height: 35px; border-radius: 8px;
            background: url('1771489965074(1).png') center/cover;
            border: 1px solid var(--gold);
        }

        .net-info { display: flex; flex-direction: column; }
        .net-info span:first-child { font-size: 9px; color: var(--tg-blue); letter-spacing: 1px; font-weight: bold; }
        #peer-id { font-size: 11px; color: #fff; font-family: monospace; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }

        .arena-top {
            flex: 1; position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 10s infinite ease-in-out;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            border-bottom: 2px solid rgba(255, 207, 64, 0.3);
            overflow: hidden; transform-style: preserve-3d; transform: rotateX(10deg); z-index: 1;
        }

        @keyframes tableBreathe {
            0%, 100% { filter: brightness(0.8); }
            50% { background: radial-gradient(circle at 50% 45%, #3a0a1a 0%, var(--cherry-pulse) 70%, #050000 100%); filter: brightness(1.1); }
        }

        .arena-top::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.5;
        }

        .trump-status { 
            position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; 
            border: 2px solid var(--gold); background: #000; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; z-index: 5000;
            box-shadow: 0 0 25px var(--gold), 0 0 50px var(--trump-halo);
        }

        #trump-icon { font-size: 44px; text-shadow: 0 0 15px #fff, 0 0 30px var(--trump-halo); }

        .card-node {
            position: absolute; width: var(--card-w); height: var(--card-h);
            background: #1a1a1a url('1771489965074(1).png') center/cover;
            border: 1px solid rgba(255, 207, 64, 0.5); border-radius: 6px;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1); transform-style: preserve-3d; z-index: 10;
        }

        .card-node.face-up { background: var(--bg-card) !important; border: 1px solid #fff; }

        .control-bottom {
            height: 130px; position: relative; background: linear-gradient(to top, #000 10%, #0c0f18 100%);
            border-top: 1px solid rgba(255, 207, 64, 0.3); transition: 0.6s cubic-bezier(0.075, 0.82, 0.165, 1); z-index: 4000;
        }
        .control-bottom.expanded { height: 350px; }

        .suits-grid { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 15px; }
        .suit-row { display: flex; height: 22px; transition: 0.4s; }

        .slot { 
            width: var(--card-w); height: var(--card-h); background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,207,64,0.2); margin-left: -42px; transform: scale(var(--micro-scale));
            transform-origin: center bottom; transition: 0.5s; border-radius: 4px;
        }
        .slot.filled { background: var(--bg-card); border: 1px solid #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }

        .control-bottom.expanded .suit-row { height: 65px; margin-bottom: 5px; }
        .control-bottom.expanded .slot { transform: scale(1.1) translateY(-15px); margin-left: -18px; }

        #status-msg {
            position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
            z-index: 9999; color: var(--gold); font-weight: bold; letter-spacing: 4px;
            text-shadow: 0 0 20px var(--gold); opacity: 0; transition: 0.6s; text-align: center;
        }
        #status-msg.active { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        .action-btns { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 4500; }
        button { 
            padding: 12px 18px; background: rgba(16,20,32,0.9); border: 1px solid var(--gold); 
            color: var(--gold); font-size: 10px; letter-spacing: 2px; font-weight: 900; text-transform: uppercase;
        }
        .particle { position: absolute; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="net-status" onclick="copyMyID()">
        <div class="net-logo"></div>
        <div class="net-info">
            <span id="room-info">CONNECTING...</span>
            <span id="peer-id">TAP TO COPY ID</span>
        </div>
    </div>

    <div id='status-msg'>VCHF MONOLITH ACTIVE</div>
    <div class='trump-status'><div id='trump-icon'>?</div></div>

    <div class='arena-top' id='arena'>
        <div id="enemy-stat" style="position:absolute; top:10px; left:50%; transform:translateX(-50%); color:var(--spark-neon); font-size:10px; letter-spacing:2px; z-index:100;"></div>
        <div id='chaos-deck'></div>
        <div id='battle-table'></div>
    </div>

    <div class='control-bottom' id='ctrl-panel'>
        <div style="position:absolute; top:-30px; right:30px; z-index:4600;">
            <button id='btn-zoom' style="width:55px; height:55px; border-radius:50%; font-size:22px;" onclick='toggleHand()'>↕</button>
        </div>
        <div class='suits-grid' id='main-hand'>
            <div id='s-spades' class='suit-row'></div>
            <div id='s-clubs' class='suit-row'></div>
            <div id='s-diamonds' class='suit-row'></div>
            <div id='s-hearts' class='suit-row'></div>
        </div>
        <div class='action-btns'>
            <button id='btn-net' onclick='startNetwork()'>ПОДКЛЮЧЕНИЕ</button>
            <button id='btn-ready' style="display:none" onclick='sendReady()'>ГОТОВНОСТЬ</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ КАРТЫ</button>
        </div>
    </div>
<script>
    const SUITS = ['♠', '♣', '♦', '♥'];
    const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    
    let vchf = {
        deck: [], pHand: [], eCount: 0, table: [],
        trump: '', phase: 'WAIT', turn: 'host', pickTurn: 'host'
    };

    let peer = null, conn = null, myRole = 'host';
    let localReady = false, remoteReady = false;
    let isExpanded = false, audioCtx = null;

    // --- ФУНКЦИЯ КОПИРОВАНИЯ ID ---
    function copyMyID() {
        const idLabel = document.getElementById('peer-id');
        const currentID = idLabel.getAttribute('data-id');
        
        if (!currentID || currentID === "CONNECTING...") return;

        navigator.clipboard.writeText(currentID).then(() => {
            showMsg("ID СКОПИРОВАН В БУФЕР");
            playSound('slide');
        }).catch(() => {
            // Резервный метод для старых браузеров
            const el = document.createElement('textarea');
            el.value = currentID;
            document.body.appendChild(el); el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showMsg("ID СКОПИРОВАН");
        });
    }

    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'slide') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'bito') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
    }

    function showMsg(t) {
        const m = document.getElementById('status-msg');
        m.textContent = t; m.classList.add('active');
        setTimeout(() => m.classList.remove('active'), 3000);
    }

    function startNetwork() {
        const targetId = prompt("ID ДРУГА (пусто, если ты HOST):");
        peer = new Peer();

        peer.on('open', (id) => {
            const idLabel = document.getElementById('peer-id');
            idLabel.textContent = id.substring(0, 8) + "... (TAP)";
            idLabel.setAttribute('data-id', id); // Сохраняем полный ID
            document.getElementById('room-info').textContent = "MY ID (ACTIVE)";

            if (targetId) {
                myRole = 'guest';
                conn = peer.connect(targetId);
                setupConn();
            } else {
                showMsg("ЖДЕМ ПОДКЛЮЧЕНИЯ...");
            }
        });

        peer.on('connection', (c) => { if (!conn) { conn = c; setupConn(); } });
    }

    function setupConn() {
        conn.on('open', () => {
            document.getElementById('room-info').textContent = (myRole==='host'?'ROOM: HOST':'ROOM: GUEST');
            document.getElementById('btn-net').style.display = 'none';
            document.getElementById('btn-ready').style.display = 'block';
            showMsg("СВЯЗЬ УСТАНОВЛЕНА");
            conn.on('data', (data) => handleNetData(data));
        });
        conn.on('close', () => { showMsg("СВЯЗЬ ПОТЕРЯНА"); setTimeout(() => location.reload(), 3000); });
    }

    // --- (ОСТАЛЬНАЯ ЛОГИКА handleNetData И Т.Д. ИЗ ЭТАЛОНА) ---
    function startChaosPhase() {
        vchf.phase = 'PICK';
        syncTrumpUI();
        renderChaosInitial();
        showMsg("ВЫБИРАЙТЕ ПО ОДНОЙ");
    }

    function syncTrumpUI() {
        const ti = document.getElementById('trump-icon');
        ti.textContent = vchf.trump;
        ti.style.color = COLORS[vchf.trump];
    }

    function renderChaosInitial() {
        const container = document.getElementById('chaos-deck');
        container.innerHTML = '';
        
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight * 0.4;
        const radius = 140;

        vchf.deck.forEach((card, i) => {
            const node = document.createElement('div');
            node.className = 'card-node';
            node.id = `node-${i}`;
            
            // Начальная позиция (стопка в центре)
            node.style.left = centerX - 27 + 'px';
            node.style.top = centerY - 38 + 'px';
            container.appendChild(node);

            // Анимация разлета в круг (Эталонный визуал)
            setTimeout(() => {
                const angle = (i / 36) * Math.PI * 2;
                node.style.left = (centerX - 27 + Math.cos(angle) * radius) + 'px';
                node.style.top = (centerY - 38 + Math.sin(angle) * radius) + 'px';
                node.style.transform = `rotate(${angle * 57.3 + 90}deg)`;
            }, i * 20);

            node.onclick = () => tryPick(i);
        });
        updatePickTurnUI();
    }

    function tryPick(idx) {
        if (vchf.phase !== 'PICK' || vchf.pickTurn !== myRole) return;
        if (vchf.deck[idx].used) return;

        executePick(idx, 'player');
        conn.send({ type: 'PICK', idx: idx });
    }

    function executePick(idx, actor) {
        const card = vchf.deck[idx];
        const node = document.getElementById(`node-${idx}`);
        card.used = true;
        playSound('slide');

        if (actor === 'player') {
            vchf.pHand.push(card);
            // Находим слот в руке для этой масти и ранга
            const slot = document.getElementById(`slot-${card.s}-${card.r}`);
            const rect = slot.getBoundingClientRect();
            const arenaRect = document.getElementById('arena').getBoundingClientRect();

            node.style.zIndex = "5000";
            node.style.left = (rect.left - arenaRect.left + 5) + 'px';
            node.style.top = (rect.top - arenaRect.top + 5) + 'px';
            node.style.transform = "rotate(0deg) scale(0.4)";
            
            setTimeout(() => {
                node.style.opacity = "0";
                fillSlot(card);
                setTimeout(() => node.remove(), 500);
            }, 600);
        } else {
            // Карта летит к врагу (вверх и в небытие)
            vchf.eCount++;
            node.style.top = "-150px";
            node.style.opacity = "0";
            node.style.transform = "scale(0.2) rotate(360deg)";
            setTimeout(() => node.remove(), 700);
        }

        // Передача хода выбора
        vchf.pickTurn = (vchf.pickTurn === 'host' ? 'guest' : 'host');
        updatePickTurnUI();
        
        // Проверка конца раздачи
        if (vchf.deck.every(c => c.used)) {
            vchf.phase = 'BATTLE';
            showMsg("БОЙ НАЧИНАЕТСЯ!");
            renderBattleTable();
        }
    }

    function fillSlot(card) {
        const el = document.getElementById(`slot-${card.s}-${card.r}`);
        el.classList.add('filled');
        el.style.color = card.c;
        el.innerHTML = `<div style="position:absolute; top:2px; left:4px; font-size:10px; font-weight:900;">${card.r}</div><div style="font-size:28px;">${card.s}</div>`;
        el.onclick = (e) => {
            e.stopPropagation();
            if (vchf.phase === 'BATTLE' && vchf.turn === myRole) playCard(card);
            else if (!isExpanded) toggleHand();
        };
    }

    function updatePickTurnUI() {
        const isMy = (vchf.pickTurn === myRole);
        showMsg(isMy ? "ТВОЙ ВЫБОР" : "ДРУГ ВЫБИРАЕТ...");
        document.getElementById('enemy-stat').textContent = `КАРТ У ВРАГА: ${vchf.eCount}`;
    }
    function playCard(card) {
        if (vchf.phase !== 'BATTLE' || vchf.turn !== myRole) return;

        // Валидация хода (Атака или Защита)
        const isDefense = (vchf.table.length % 2 !== 0);
        if (isDefense) {
            if (!canDefend(card)) { showMsg("НЕЛЬЗЯ ТАК ПОБИТЬ!"); return; }
        } else {
            if (!canAttack(card)) { showMsg("НЕВЕРНЫЙ ВЕКТОР!"); return; }
        }

        // Удаляем из руки и очищаем слот
        vchf.pHand = vchf.pHand.filter(c => c !== card);
        const slot = document.getElementById(`slot-${card.s}-${card.r}`);
        slot.classList.remove('filled');
        slot.innerHTML = '';

        // Выполняем ход локально и шлем другу
        executeMove(card, 'player');
        conn.send({ type: 'MOVE', card: card });
    }

    function executeMove(card, actor) {
        playSound('slide');
        vchf.table.push({ card: card, actor: actor });
        if (actor === 'enemy') vchf.eCount--;
        
        renderBattleTable();
        checkBattleEnd();
    }

    function canAttack(card) {
        if (vchf.table.length === 0) return true;
        if (vchf.table.length >= 12) return false;
        // Подкидывать можно только те ранги, что уже на столе
        return vchf.table.some(m => m.card.r === card.r);
    }

    function canDefend(card) {
        const target = vchf.table[vchf.table.length - 1].card;
        const sameSuitHigher = (card.s === target.s && card.v > target.v);
        const trumpBeat = (card.s === vchf.trump && target.s !== vchf.trump);
        return sameSuitHigher || trumpBeat;
    }

    function renderBattleTable() {
        const container = document.getElementById('battle-table');
        container.innerHTML = '';
        
        vchf.table.forEach((move, i) => {
            const node = document.createElement('div');
            node.className = 'card-node face-up';
            node.style.color = move.card.c;
            
            // Расчет позиции на столе (сетка 2x3 пар)
            const pairIdx = Math.floor(i / 2);
            const isDef = (i % 2 !== 0);
            const x = (pairIdx % 3) * 80 - 80;
            const y = Math.floor(pairIdx / 3) * 90 - 40;

            node.style.left = `calc(50% + ${x + (isDef ? 15 : 0)}px)`;
            node.style.top = `calc(40% + ${y + (isDef ? 20 : 0)}px)`;
            node.style.zIndex = 100 + i;
            if (isDef) node.style.transform = "rotate(10deg)";

            node.innerHTML = `
                <div style="position:absolute; top:4px; left:6px; font-size:12px; font-weight:900;">${move.card.r}</div>
                <div style="font-size:32px; text-align:center; margin-top:18px;">${move.card.s}</div>
            `;
            container.appendChild(node);
        });

        updateActionBtns();
    }

    function updateActionBtns() {
        const isMyTurn = (vchf.turn === myRole);
        const hasCards = (vchf.table.length > 0);
        const isDefending = (vchf.table.length % 2 !== 0);

        // Показываем БИТО только атакующему, если все карты покрыты
        document.getElementById('btn-bito').style.display = (isMyTurn && hasCards && !isDefending) ? 'block' : 'none';
        // Показываем ВЗЯТЬ только защищающемуся
        document.getElementById('btn-take').style.display = (!isMyTurn && hasCards && isDefending) ? 'block' : 'none';
        
        document.getElementById('enemy-stat').textContent = `КАРТ У ВРАГА: ${vchf.eCount}`;
    }

    function handleBito() {
        syncBito();
        conn.send({ type: 'ACTION', cmd: 'BITO' });
    }

    function syncBito() {
        playSound('bito');
        createDustCloud();
        vchf.table = [];
        vchf.turn = (vchf.turn === 'host' ? 'guest' : 'host');
        setTimeout(renderBattleTable, 500);
    }

    function handleTake() {
        syncTake();
        conn.send({ type: 'ACTION', cmd: 'TAKE' });
    }

    function syncTake() {
        showMsg("ПРИЁМ КАРТ");
        const cardsToTake = vchf.table.map(m => m.card);
        
        if (vchf.turn !== myRole) {
            // Если я защищался и взял
            vchf.pHand.push(...cardsToTake);
            cardsToTake.forEach(c => fillSlot(c));
        } else {
            // Если взял враг
            vchf.eCount += cardsToTake.length;
        }

        vchf.table = [];
        // При "Взять" ход не переходит к другому, а остается у того же атакующего
        setTimeout(renderBattleTable, 500);
    }
    // --- ЭФФЕКТЫ И ВИЗУАЛИЗАЦИЯ ---
    function createDustCloud() {
        const arena = document.getElementById('arena');
        const cardsOnTable = document.querySelectorAll('#battle-table .card-node');
        
        cardsOnTable.forEach(card => {
            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = centerX + 'px';
                p.style.top = centerY + 'px';
                arena.appendChild(p);

                const tx = (Math.random() - 0.5) * 300;
                const ty = (Math.random() - 0.5) * 300;
                
                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 600,
                    easing: 'ease-out'
                }).onfinish = () => p.remove();
            }
            card.style.transform = "scale(0) rotate(180deg)";
            card.style.opacity = "0";
        });
    }

    // --- ЛОГИКА ЗАВЕРШЕНИЯ ---
    function checkBattleEnd() {
        if (vchf.phase !== 'BATTLE') return;

        // Пауза, чтобы игрок увидел последнюю карту
        setTimeout(() => {
            const iAmOut = (vchf.pHand.length === 0);
            const enemyOut = (vchf.eCount === 0);

            if (iAmOut && enemyOut) {
                endGame("НИЧЬЯ В ПУСТОТЕ");
            } else if (iAmOut) {
                endGame("ТЫ ПОБЕДИЛА. ВЕКТОР ОЧИЩЕН");
            } else if (enemyOut) {
                endGame("ПРОИГРЫШ. ХАОС ПОГЛОТИЛ ТЕБЯ");
            }
        }, 1000);
    }

    function endGame(msg) {
        vchf.phase = 'END';
        showMsg(msg);
        document.getElementById('btn-bito').style.display = 'none';
        document.getElementById('btn-take').style.display = 'none';
        
        // Кнопка рестарта
        const btnReady = document.getElementById('btn-ready');
        btnReady.textContent = "НОВАЯ ДУЭЛЬ";
        btnReady.style.display = "block";
        btnReady.onclick = () => location.reload();
    }

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---
    function toggleHand() {
        isExpanded = !isExpanded;
        const panel = document.getElementById('ctrl-panel');
        const btn = document.getElementById('btn-zoom');
        if (isExpanded) {
            panel.classList.add('expanded');
            btn.textContent = '✕';
        } else {
            panel.classList.remove('expanded');
            btn.textContent = '↕';
        }
        playSound('slide');
    }

    function initLayout() {
        const rows = { '♠': 's-spades', '♣': 's-clubs', '♦': 's-diamonds', '♥': 's-hearts' };
        SUITS.forEach(s => {
            const container = document.getElementById(rows[s]);
            container.innerHTML = '';
            RANKS.forEach(rank => {
                const sl = document.createElement('div');
                sl.className = 'slot';
                sl.id = `slot-${s}-${rank}`;
                container.appendChild(sl);
            });
        });
    }

    // ТОЧКА ВХОДА МОНОЛИТА
    window.onload = () => {
        initLayout();
        showMsg("СИСТЕМА ГОТОВА К ЗАПУСКУ");
        // Инициализация аудио при первом взаимодействии
        document.body.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }, { once: true });
    };
</script>
</body>
</html>
