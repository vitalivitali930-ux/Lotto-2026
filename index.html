<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERO CHAOS | IMPERIAL VAULT</title>
    
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #ffef8a;
            --cherry: #4a0404;
            --cherry-dark: #1a0000;
            --neon: #00ff41;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; overflow: hidden; font-family: 'Georgia', serif;
        }

        /* --- СТВОРКИ СЕЙФА (GATES) --- */
        #vault-wrapper {
            position: fixed; width: 100vw; height: 100vh;
            display: flex; z-index: 100;
            transition: transform 1.8s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .gate {
            width: 50%; height: 100%; position: relative;
            background: radial-gradient(circle at center, var(--cherry) 0%, var(--cherry-dark) 100%);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.1);
            overflow: hidden;
        }

        /* Текстура бархата через градиент-шум */
        .gate::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            opacity: 0.2; pointer-events: none;
        }

        .gate-left { border-right: 2px solid var(--gold); box-shadow: inset -50px 0 100px rgba(0,0,0,0.8); }
        .gate-right { border-left: 2px solid var(--gold); box-shadow: inset 50px 0 100px rgba(0,0,0,0.8); }

        /* --- ШТУРВАЛ (MASTER WHEEL) --- */
        .hub-container {
            position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%);
            width: 400px; height: 400px; z-index: 200;
            display: flex; align-items: center; justify-content: center;
            transition: 1s;
        }

        .main-ring {
            width: 240px; height: 240px; border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #050505 100%);
            border: 5px double var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px var(--gold);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; z-index: 5;
        }

        .skull {
            font-size: 100px; color: var(--gold); 
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
            transition: 0.3s; user-select: none;
        }

        /* ОРБИТА ВАЛЮТ */
        .orbit {
            position: absolute; width: 400px; height: 400px;
            animation: rotateOrbit 120s linear infinite;
        }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .currency-btn {
            position: absolute; width: 65px; height: 65px;
            background: #000; border: 2px solid var(--gold); border-radius: 50%;
            color: var(--gold); display: flex; align-items: center; justify-content: center;
            font-size: 1.6em; font-weight: bold; cursor: pointer;
            transition: 0.4s; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .currency-btn:hover { 
            color: var(--neon); border-color: var(--neon); 
            box-shadow: 0 0 20px var(--neon); transform: scale(1.1);
        }

        /* Позиции */
        .c1 { top: 0; left: 50%; transform: translateX(-50%); }
        .c2 { top: 25%; right: 0; }
        .c3 { bottom: 25%; right: 0; }
        .c4 { bottom: 0; left: 50%; transform: translateX(-50%); }
        .c5 { bottom: 25%; left: 0; }
        .c6 { top: 25%; left: 0; }

        /* --- ВВОД (FOOTER) --- */
        .auth-box {
            position: absolute; bottom: 80px; width: 100%; text-align: center; z-index: 200;
        }
        .auth-box input {
            display: block; width: 260px; margin: 10px auto;
            background: rgba(0,0,0,0.7); border: 1px solid var(--gold);
            padding: 12px; color: var(--gold); text-align: center;
            letter-spacing: 5px; font-family: monospace; outline: none;
        }

        /* --- ЭФФЕКТ РАЗРЫВА --- */
        .opened #g-left { transform: translateX(-100%); opacity: 0; }
        .opened #g-right { transform: translateX(100%); opacity: 0; }
        .opened .hub-container, .opened .auth-box { opacity: 0; transform: translate(-50%, -50%) scale(2); }

    </style>
</head>
<body>

<div id="vault-wrapper">
    <div id="g-left" class="gate gate-left"></div>
    <div id="g-right" class="gate gate-right"></div>

    <div class="hub-container">
        <div class="orbit">
            <div class="currency-btn c1" onclick="tapKey('$')">$</div>
            <div class="currency-btn c2" onclick="tapKey('€')">€</div>
            <div class="currency-btn c3" onclick="tapKey('₣')">₣</div>
            <div class="currency-btn c4" onclick="tapKey('£')">£</div>
            <div class="currency-btn c5" onclick="tapKey('¥')">¥</div>
            <div class="currency-btn c6" onclick="tapKey('₿')">₿</div>
        </div>
        <div class="main-ring" onclick="unlock()">
            <div class="skull">☠</div>
        </div>
    </div>

    <div class="auth-box">
        <input type="text" placeholder="IDENTITY" id="uid">
        <input type="password" placeholder="SECRET" id="ukey">
    </div>
</div>

<script>
    function tapKey(s) { 
        document.getElementById('ukey').value += "*"; 
        // Визуальный отклик штурвала
        document.querySelector('.main-ring').style.boxShadow = '0 0 40px var(--neon)';
        setTimeout(() => { document.querySelector('.main-ring').style.boxShadow = ''; }, 200);
    }

    function unlock() {
        if (!document.getElementById('uid').value) return alert("IDENTITÄT!");
        document.getElementById('vault-wrapper').classList.add('opened');
        setTimeout(() => { window.location.href = 'terminal.html'; }, 2000);
    }
</script>

</body>
</html>
