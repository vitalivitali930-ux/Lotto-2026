<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DURAK - ROUND TURBO (VCHF ENGINE)</title>
    <style>
        :root {
            --vchf-glow: 0 0 15px #00ff00;
            --chaos-red: #ff0033;
            --bg-deep: #0a0a0a;
            --card-gold: #ffd700;
        } 

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-deep);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
        } 

        #ritual-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        } 

        .game-container {
            display: flex; flex-direction: column;
            justify-content: space-between;
            height: 100vh; padding: 20px;
            box-sizing: border-box;
        } 

        .enemy-zone {
            display: flex; justify-content: center;
            height: 120px; perspective: 1000px;
        }
        
        .enemy-card-shadow {
            width: 60px; height: 90px;
            background: linear-gradient(135deg, #111, #222);
            border: 1px solid #333;
            border-radius: 6px;
            margin: -15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .battle-ground {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 15px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 0, 0.05);
            position: relative;
        } 

        .card {
            width: 80px; height: 120px;
            background: #fff; border-radius: 8px;
            color: #000; position: relative;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-weight: bold; font-size: 18px;
            user-select: none;
        }
        
        .card.on-table { cursor: default; }
        .card:hover:not(.on-table) { transform: translateY(-10px); box-shadow: var(--vchf-glow); }
        .card.trump { border: 2px solid var(--card-gold); }
        .card.mirror { animation: pulse 0.5s infinite; border: 2px solid var(--chaos-red); }
        .card.disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        .ui-layer {
            display: flex; justify-content: center; gap: 20px; padding: 10px;
        }
        
        .vchf-btn {
            padding: 12px 30px; font-size: 16px;
            background: transparent; color: #00ff00;
            border: 2px solid #00ff00; border-radius: 20px;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }
        
        .vchf-btn:hover:not(:disabled) { background: #00ff00; color: #000; box-shadow: var(--vchf-glow); }
        .vchf-btn:disabled { opacity: 0.2; cursor: not-allowed; border-color: #333; color: #333; }

        .status-panel {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            text-align: center;
        }
        
        #vchf-line { width: 4px; height: 150px; background: #222; margin: 10px auto; position: relative; }
        #vchf-progress { width: 100%; height: 100%; background: #00ff00; transition: height 0.1s linear; }
        #current-trump { font-size: 32px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        #game-msg { position: absolute; top: 20px; width: 100%; text-align: center; color: var(--chaos-red); font-size: 14px; }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px var(--chaos-red); }
            50% { box-shadow: 0 0 20px var(--chaos-red); }
            100% { box-shadow: 0 0 5px var(--chaos-red); }
        }
    </style>
</head>
<body>
    <canvas id="ritual-canvas"></canvas>
    <div id="game-msg"></div>
    <div class="game-container">
        <div class="enemy-zone" id="enemy-hand-visual"></div> 

        <div class="battle-ground" id="battle-table"></div> 

        <div class="enemy-zone" id="player-hand-visual"></div> 

        <div class="ui-layer">
            <button id="btn-take" class="vchf-btn" onclick="handleTake()">ВЗЯТЬ</button>
            <button id="btn-bito" class="vchf-btn" onclick="handleBito()" disabled>БИТО</button>
        </div>
    </div> 

    <div class="status-panel">
        <div id="current-trump">?</div>
        <div id="vchf-line"><div id="vchf-progress"></div></div>
        <div style="font-size: 9px; opacity: 0.5;">ENGINE VCHF 1.1</div>
    </div>

    <script>
        // --- КОНСТАНТЫ И СОСТОЯНИЕ ---
        const SUITS = ['♠', '♣', '♥', '♦'];
        const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
        const RANK_VALUES = { '6':6, '7':7, '8':8, '9':9, '10':10, 'J':11, 'Q':12, 'K':13, 'A':14 };

        let state = {
            deck: [], pHand: [], eHand: [], table: [],
            trump: null, oldTrump: null, isMirror: false,
            turn: 'player', phase: 'attack', // attack, defend, transit
            active: true
        };

        // Инициализация "Круглого дурака" 18х18
        function initGame() {
            let fullDeck = [];
            SUITS.forEach(s => RANKS.forEach(r => {
                fullDeck.push({ suit: s, rank: r, val: RANK_VALUES[r], id: Math.random().toString(36).substr(2, 9) });
            }));
            for (let i = fullDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [fullDeck[i], fullDeck[j]] = [fullDeck[j], fullDeck[i]];
            }
            state.pHand = fullDeck.slice(0, 18);
            state.eHand = fullDeck.slice(18, 36);
            state.trump = SUITS[Math.floor(Math.random() * SUITS.length)];
            updateUI();
            startChaosCycle();
        }
        // --- ЛОГИКА ОБНОВЛЕНИЯ ИНТЕРФЕЙСА ---
        function updateUI() {
            const pZone = document.getElementById('player-hand-visual');
            const eZone = document.getElementById('enemy-hand-visual');
            const tEl = document.getElementById('current-trump');
            
            pZone.innerHTML = '';
            eZone.innerHTML = '';
            tEl.innerText = state.trump;
            tEl.style.color = (state.trump === '♥' || state.trump === '♦') ? 'var(--chaos-red)' : '#fff';

            // Отрисовка руки игрока с защитой от дурака
            state.pHand.sort((a, b) => a.val - b.val).forEach(card => {
                const cardEl = document.createElement('div');
                const canUse = checkCardAvailability(card);
                cardEl.className = `card ${card.suit === state.trump ? 'trump' : ''} ${!canUse ? 'disabled' : ''}`;
                if (state.isMirror && card.suit === state.oldTrump) cardEl.classList.add('mirror');
                
                cardEl.innerHTML = `<div>${card.rank}</div><div>${card.suit}</div>`;
                cardEl.style.color = (card.suit === '♥' || card.suit === '♦') ? 'var(--chaos-red)' : '#000';
                
                if (canUse) cardEl.onclick = () => handlePlayerAction(card);
                pZone.appendChild(cardEl);
            });

            // Отрисовка рубашек ИИ (Спарк)
            for(let i=0; i < state.eHand.length; i++) {
                const shadow = document.createElement('div');
                shadow.className = 'enemy-card-shadow';
                if (state.eHand.length <= 3) shadow.style.borderColor = 'var(--chaos-red)';
                eZone.appendChild(shadow);
            }

            // Управление кнопками
            const isDefending = (state.turn === 'player' && state.phase === 'defend');
            const hasUnbeaten = state.table.some(t => t.type === 'attack' && !t.covered);
            
            document.getElementById('btn-take').disabled = !isDefending;
            document.getElementById('btn-bito').disabled = (state.turn !== 'player' || hasUnbeaten || state.table.length === 0);
        }

        // ПРОВЕРКА: Можно ли кликнуть на карту? (Защита от дурака)
        function checkCardAvailability(card) {
            if (state.turn !== 'player') return false;
            
            // Фаза атаки: можно ходить любой (если стол пуст) или по номиналу
            if (state.phase === 'attack') {
                if (state.table.length === 0) return true;
                if (state.table.length >= 12) return false;
                // Нельзя подкинуть больше, чем карт у ИИ
                const attackCount = state.table.filter(t => t.type === 'attack').length;
                if (attackCount >= state.eHand.length + (state.table.some(t => t.type === 'attack' && !t.covered) ? 0 : 0)) {
                    // Упрощенная проверка лимита подкидывания
                }
                return state.table.some(t => t.card.rank === card.rank);
            }
            
            // Фаза защиты: только если карта бьет атакующую
            if (state.phase === 'defend') {
                const target = state.table.find(t => t.type === 'attack' && !t.covered);
                return target ? canCardBeat(card, target.card) : false;
            }
            return false;
        }

        function canCardBeat(c, a) {
            // Обычный козырь
            if (c.suit === state.trump && a.suit !== state.trump) return true;
            if (c.suit === a.suit && c.val > a.val) return true;
            // Зеркальный удар (старый козырь бьет всё кроме нового козыря)
            if (state.isMirror && c.suit === state.oldTrump && a.suit !== state.trump) return true;
            return false;
        }

        // --- ДЕЙСТВИЯ ИГРОКА ---
        function handlePlayerAction(card) {
            if (state.phase === 'attack') {
                moveCardToTable(card, 'player', 'attack');
                state.phase = 'defend';
                setTimeout(enemyLogic, 800);
            } else if (state.phase === 'defend') {
                const target = state.table.find(t => t.type === 'attack' && !t.covered);
                target.covered = true;
                moveCardToTable(card, 'player', 'defend');
                state.phase = 'attack';
                updateUI();
            }
        }

        // --- SPARK ENGINE (ИИ) ---
        function enemyLogic() {
            if (!state.active) return;

            if (state.turn === 'player') {
                // ИИ ЗАЩИЩАЕТСЯ
                const target = state.table.find(t => t.type === 'attack' && !t.covered);
                if (!target) return;

                const defenseCard = state.eHand
                    .filter(c => canCardBeat(c, target.card))
                    .sort((a, b) => a.val - b.val)[0]; // Берет самую слабую для защиты

                if (defenseCard) {
                    target.covered = true;
                    moveCardToTable(defenseCard, 'enemy', 'defend');
                    state.phase = 'attack';
                } else {
                    handleTake('enemy');
                }
            } else {
                // ИИ АТАКУЕТ
                let attackCard;
                if (state.table.length === 0) {
                    attackCard = state.eHand.sort((a,b) => a.val - b.val)[0];
                } else {
                    attackCard = state.eHand.find(c => state.table.some(t => t.card.rank === c.rank));
                    // Лимит: ИИ не подкидывает больше, чем карт у игрока
                    const currentAttacks = state.table.filter(t => t.type === 'attack').length;
                    if (currentAttacks >= state.pHand.length) attackCard = null;
                }

                if (attackCard) {
                    moveCardToTable(attackCard, 'enemy', 'attack');
                    state.phase = 'defend';
                } else {
                    handleBito();
                }
            }
            updateUI();
        }

        function moveCardToTable(card, owner, type) {
            const hand = owner === 'player' ? state.pHand : state.eHand;
            const idx = hand.findIndex(c => c.id === card.id);
            hand.splice(idx, 1);
            state.table.push({ card, type, covered: type === 'defend' });
            
            const tableEl = document.getElementById('battle-table');
            const cardEl = document.createElement('div');
            cardEl.className = `card on-table ${card.suit === state.trump ? 'trump' : ''} ${type}`;
            cardEl.innerHTML = `<div>${card.rank}</div><div>${card.suit}</div>`;
            cardEl.style.color = (card.suit === '♥' || card.suit === '♦') ? 'var(--chaos-red)' : '#000';
            
            // Визуальное смещение для защиты
            if (type === 'defend') {
                cardEl.style.marginTop = "20px";
                cardEl.style.marginLeft = "-40px";
            }
            
            tableEl.appendChild(cardEl);
            checkWin();
        }
        // --- МЕХАНИКА ВЗЯТЬ / БИТО ---
        function handleTake(who = 'player') {
            const msgEl = document.getElementById('game-msg');
            msgEl.innerText = who === 'player' ? "ТЫ ЗАБИРАЕШЬ КАРТЫ" : "СПАРК ЗАБИРАЕТ КАРТЫ";
            
            // В "Круглом дураке" переход хода после взятия обязателен
            setTimeout(() => {
                const tableCards = state.table.map(t => t.card);
                if (who === 'player') {
                    state.pHand.push(...tableCards);
                    state.turn = 'enemy';
                    state.phase = 'attack';
                } else {
                    state.eHand.push(...tableCards);
                    state.turn = 'player';
                    state.phase = 'attack';
                }
                clearTable();
                msgEl.innerText = "";
                if (state.turn === 'enemy') setTimeout(enemyLogic, 1000);
                updateUI();
            }, 1000);
        }

        function handleBito() {
            if (state.table.some(t => t.type === 'attack' && !t.covered)) return;

            const msgEl = document.getElementById('game-msg');
            msgEl.innerText = "БИТО — ХАОС ОЧИЩЕН";
            
            setTimeout(() => {
                state.turn = state.turn === 'player' ? 'enemy' : 'player';
                state.phase = 'attack';
                clearTable();
                msgEl.innerText = "";
                if (state.turn === 'enemy') setTimeout(enemyLogic, 1000);
                updateUI();
            }, 800);
        }

        function clearTable() {
            state.table = [];
            document.getElementById('battle-table').innerHTML = '';
        }

        // --- БЛУЖДАЮЩИЙ ОГОНЬ (ЦИКЛ ХАОСА) ---
        function startChaosCycle() {
            let timeLeft = 100;
            const step = 0.4; // Скорость смены козыря

            setInterval(() => {
                if (!state.active) return;
                
                timeLeft -= step;
                document.getElementById('vchf-progress').style.height = timeLeft + '%';

                if (timeLeft <= 0) {
                    state.oldTrump = state.trump;
                    let nextTrump;
                    do {
                        nextTrump = SUITS[Math.floor(Math.random() * SUITS.length)];
                    } while (nextTrump === state.trump);
                    
                    state.trump = nextTrump;
                    state.isMirror = true;
                    
                    // Зеркальный удар активен 7 секунд (старый козырь бьет всё)
                    setTimeout(() => { 
                        state.isMirror = false; 
                        updateUI();
                    }, 7000);
                    
                    timeLeft = 100;
                    updateUI();
                }
            }, 100);
        }

        // --- ПРОВЕРКА ФИНАЛА ---
        function checkWin() {
            if (state.pHand.length === 0 && state.eHand.length === 0) {
                endGame("НИЧЬЯ — ПОЛНЫЙ ХАОС");
            } else if (state.pHand.length === 0) {
                endGame("WANDERER ПОБЕДИЛ. СИСТЕМА ВЗЛОМАНА!");
            } else if (state.eHand.length === 0) {
                endGame("СПАРК ДОМИНИРУЕТ. ТЫ ОСТАЛСЯ В ДУРАКАХ.");
            }
        }

        function endGame(msg) {
            state.active = false;
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.95); z-index: 10000;
                display: flex; flex-direction: column; justify-content: center;
                align-items: center; font-family: 'Orbitron', sans-serif; color: #00ff00;
            `;
            overlay.innerHTML = `
                <h1 style="text-shadow: var(--vchf-glow);">${msg}</h1>
                <button class="vchf-btn" onclick="location.reload()">ПЕРЕЗАГРУЗИТЬ ЦИКЛ</button>
            `;
            document.body.appendChild(overlay);
        }

        // --- РИТУАЛЬНЫЙ ХОЛСТ (VISUALS) ---
        const canvas = document.getElementById('ritual-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawBG() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = state.isMirror ? 'rgba(255, 0, 51, 0.2)' : 'rgba(0, 255, 0, 0.1)';
            for(let i=0; i<15; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2);
                ctx.fill();
            }
            requestAnimationFrame(drawBG);
        }

        window.onload = () => {
            initGame();
            drawBG();
        };

        console.log("Движок VCHF 1.1 'Круглый Дурак' активирован. Манифест Монолита соблюден.");
    </script>
</body>
</html>
