<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Ultimate Monolith</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --gold: #ffcf40; --space-dark: #121625; --nebula-core: #222a44; 
            --spark-neon: #00fa9a; --tg-blue: #24A1DE; --bg-card: #ffffff;
            --card-w: 55px; --card-h: 77px; --grid-color: rgba(255, 207, 64, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #050505; color: #e0e6ff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; perspective: 1500px;
        }

        /* Сетевой статус */
        #net-status {
            position: fixed; top: 15px; left: 15px; z-index: 6000;
            background: rgba(12, 15, 24, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(36, 161, 222, 0.6); border-radius: 12px; padding: 10px 15px;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
        }
        .net-logo-wrapper { position: relative; width: 40px; height: 40px; }
        .net-logo { width: 100%; height: 100%; border-radius: 8px; background: url('1771489965074(1).png') center/cover; border: 2px solid var(--gold); position: relative; z-index: 2; }
        .radar-ping { position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border: 3px solid var(--spark-neon); border-radius: 12px; opacity: 0; animation: radarBeam 2s infinite; }
        @keyframes radarBeam { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        /* Чат */
        #chat-overlay {
            position: fixed; bottom: 140px; left: 15px; right: 15px; height: 250px;
            background: rgba(12, 15, 24, 0.95); border: 1px solid var(--tg-blue); border-radius: 12px;
            display: none; flex-direction: column; z-index: 8000; backdrop-filter: blur(15px);
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
        .msg { padding: 6px 10px; border-radius: 8px; max-width: 85%; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--tg-blue); }
        .msg.him { align-self: flex-start; background: var(--nebula-core); border: 1px solid var(--gold); }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        #chat-input { flex: 1; background: #000; border: 1px solid var(--gold); color: white; border-radius: 20px; padding: 8px 15px; outline: none; }
        .chat-toggle-btn { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; background: var(--space-dark); border: 1px solid var(--tg-blue); border-radius: 50%; z-index: 7500; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; }
        .unread-badge { position: absolute; top: 0; right: 0; width: 14px; height: 14px; background: #ff4444; border-radius: 50%; display: none; }

        /* Арена */
        .arena-top { flex: 1; position: relative; background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%); transform: rotateX(12deg); overflow: hidden; }
        .arena-top::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.6; }
        
        #status-msg { position: fixed; top: 110px; left: 50%; transform: translateX(-50%); z-index: 9999; color: var(--gold); font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 20px var(--gold); opacity: 0; transition: 0.4s; }
        #status-msg.active { opacity: 1; transform: translateX(-50%) translateY(0); }

        #btn-ready-action { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%); z-index: 9000; display: none; }
        .btn-glow { padding: 15px 30px; background: var(--spark-neon); border: none; border-radius: 8px; color: #000; font-weight: 900; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 20px var(--spark-neon); }
    </style>
</head>
<body>
    <div id="search-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:6500; display:none; flex-direction:column; align-items:center; justify-content:center;">
        <div style="width:200px; height:2px; background:var(--spark-neon); box-shadow:0 0 15px var(--spark-neon); animation:scanMove 2s infinite ease-in-out;"></div>
        <div style="color:var(--spark-neon); margin-top:50px; font-size:12px; letter-spacing:4px;">КВАНТОВЫЙ ПОИСК...</div>
    </div>

    <div id="net-status" onclick="copyMyID()">
        <div class="net-logo-wrapper"><div id="radar" class="radar-ping"></div><div class="net-logo"></div></div>
        <div class="net-info"><span id="room-info" style="font-size:9px; color:var(--tg-blue); font-weight:bold;">OFFLINE</span><br><span id="peer-id" style="font-size:11px; color:#fff; font-family:monospace;">TAP TO START</span></div>
    </div>

    <button id="btn-start-center" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:7000; padding:20px 40px; background:none; border:2px solid var(--spark-neon); color:var(--spark-neon); border-radius:50px; cursor:pointer;" onclick="startNetwork()">ВХОД В МОНОЛИТ</button>
    <div id='status-msg'>VCHF MONOLITH</div>

    <div class='arena-top' id='arena'>
        <div id='chaos-deck'></div>
        <div id='battle-table'></div>
    </div>

    <div id="btn-ready-action"><button class="btn-glow" onclick="setLocalReady()">Я ГОТОВ</button></div>

    <div id="chat-overlay">
        <div style="padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 10px; color: var(--gold);">SECURE CHANNEL</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area"><input type="text" id="chat-input" placeholder="Сигнал..."><button style="color:var(--spark-neon); margin-left:10px; background:none; border:none;" onclick="sendChatMessage()">OK</button></div>
    </div>

    <div class="chat-toggle-btn" onclick="toggleChat()">💬<div id="unread" class="unread-badge"></div></div>

<script>
    const SUITS = ['♠', '♣', '♦', '♥'], RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    let vchf = { deck: [], pHand: [], eCount: 0, table: [], trump: '', phase: 'WAIT', turn: 'host', attacker: 'host' };
    let peer = null, conn = null, myRole = 'host', currentRoom = '', localReady = false, remoteReady = false;

    function showMsg(text) { const m = document.getElementById('status-msg'); m.textContent = text; m.classList.add('active'); setTimeout(() => m.classList.remove('active'), 2500); }

    function startNetwork() {
        const urlParams = new URLSearchParams(window.location.search);
        let roomNum = urlParams.get('room') || prompt("НОМЕР КОМНАТЫ:");
        if (!roomNum) return;
        currentRoom = roomNum.trim();
        document.getElementById('btn-start-center').style.display = 'none';
        document.getElementById('search-overlay').style.display = 'flex';
        initPeerSession();
    }

    function initPeerSession() {
        if (peer) peer.destroy();
        peer = new Peer(null, { debug: 2, config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]} });
        peer.on('open', (id) => {
            const targetID = "VCHF_MONO_CORE_" + currentRoom;
            let connAttempt = peer.connect(targetID, { reliable: true });
            let timeout = setTimeout(() => { if (!conn || !conn.open) { connAttempt.close(); peer.destroy(); setupAsHost(targetID); } }, 3000);
            connAttempt.on('open', () => { clearTimeout(timeout); conn = connAttempt; myRole = 'guest'; bindConnEvents(); showMsg("ГОСТЬ В СЕТИ"); document.getElementById('search-overlay').style.display = 'none'; });
        });
    }

    function setupAsHost(targetID) {
        peer = new Peer(targetID);
        peer.on('open', () => { myRole = 'host'; showMsg("ТЫ ХОЗЯИН"); document.getElementById('search-overlay').style.display = 'none'; document.getElementById('peer-id').textContent = "ЖДУ ИГРОКА..."; });
        peer.on('connection', (c) => { conn = c; bindConnEvents(); showMsg("ИГРОК ВОШЕЛ"); });
    }

    function bindConnEvents() {
        conn.on('data', (data) => {
            if (data.type === 'CHAT') renderMessage(data.message, 'him');
            if (data.type === 'READY') { remoteReady = true; showMsg("ВРАГ ГОТОВ"); if (localReady) startChaos(); }
        });
        document.getElementById('room-info').textContent = "ROOM: " + currentRoom;
        document.getElementById('peer-id').textContent = myRole.toUpperCase() + " ACTIVE";
        document.getElementById('btn-ready-action').style.display = 'block';
        document.getElementById('radar').style.animationDuration = '1s';
    }

    function toggleChat() {
        const c = document.getElementById('chat-overlay');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
        if (c.style.display === 'flex') document.getElementById('unread').style.display = 'none';
    }

    function sendChatMessage() {
        const i = document.getElementById('chat-input'), t = i.value.trim();
        if (!t || !conn) return;
        conn.send({ type: 'CHAT', message: t });
        renderMessage(t, 'me'); i.value = '';
    }

    function renderMessage(t, side) {
        const m = document.getElementById('chat-messages'), d = document.createElement('div');
        d.className = `msg ${side}`; d.textContent = t; m.appendChild(d);
        m.scrollTop = m.scrollHeight;
        if (side === 'him' && document.getElementById('chat-overlay').style.display !== 'flex') document.getElementById('unread').style.display = 'block';
    }

    function setLocalReady() {
        localReady = true; document.getElementById('btn-ready-action').style.display = 'none';
        showMsg("ЖДЕМ ВРАГА..."); if (conn) conn.send({ type: 'READY' });
        if (remoteReady) startChaos();
    }

    function startChaos() { showMsg("НАЧАЛО РАЗДАЧИ..."); /* Window 3 Logic */ }
    function copyMyID() { const url = window.location.origin + window.location.pathname + "?room=" + currentRoom; navigator.clipboard.writeText(url).then(() => showMsg("ССЫЛКА В БУФЕРЕ")); }
</script>
</body>
</html>
