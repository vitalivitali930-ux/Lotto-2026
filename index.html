<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zero Chaos | Logistics Terminal</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #161616;
            --error-red: #ff4141;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .terminal {
            width: 100%;
            max-width: 550px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
            padding: 30px;
            border-radius: 12px;
            box-sizing: border-box;
            position: relative;
        }

        h1 {
            color: var(--neon-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.4rem;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            padding-bottom: 15px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: var(--neon-green);
            text-transform: uppercase;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #222;
            color: var(--neon-green);
            box-sizing: border-box;
            outline: none;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
            background: #050505;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--neon-green);
            color: black;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 2px;
            margin-top: 10px;
        }

        button:hover {
            box-shadow: 0 0 40px var(--neon-green);
            transform: scale(1.03);
            background: #00cc33;
        }

        .wa-link {
            display: block;
            width: 100%;
            background: #25D366;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 25px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .wa-link:hover {
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.6);
            filter: brightness(1.1);
        }

        #status {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            min-height: 1.5em;
            color: var(--neon-green);
            border: 1px solid rgba(0, 255, 65, 0.1);
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        /* АНИМАЦИЯ HALO PULSE */
        .halo-pulse {
            animation: pulse 2.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.3); }
            70% { box-shadow: 0 0 0 20px rgba(0, 255, 65, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }

        .system-note {
            font-size: 0.6rem;
            color: #444;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="terminal halo-pulse">
    <h1>SYSTEM: ZERO CHAOS</h1>
    
    <div class="input-group">
        <label>📍 ТОЧКА ОТПРАВЛЕНИЯ (ГОРОД):</label>
        <input type="text" id="fromCity" placeholder="Введите город">
    </div>

    <div class="input-group">
        <label>🏁 ТОЧКА НАЗНАЧЕНИЯ (ГОРОД):</label>
        <input type="text" id="toCity" placeholder="Введите город">
    </div>

    <div class="input-group">
        <label>🚛 ПАРАМЕТРЫ ГРУЗА:</label>
        <input type="text" id="cargoInfo" placeholder="Вес, объем, тип груза">
    </div>

    <button id="sendBtn" onclick="sendData()">ОТПРАВИТЬ В КАНАЛ ХАОСА</button>
    
<a href="https://wa.me/41793666072" target="_blank" style="text-decoration: none;">
    <button type="button" style="background: #25D366; color: white; padding: 15px; width: 100%; border: none; font-weight: bold; margin-top: 20px; cursor: pointer;">
        СВЯЗАТЬСЯ В WHATSAPP
    </button>
</a>


    <div id="status">TERMINAL_READY_V1.4_GH</div>
    
    <div class="system-note">
        Note: This note will not be deleted. Replace window x protocol active.
    </div>
</div>

<script>
    // КОНФИГУРАЦИЯ (Window 2)
    const CONFIG = {
        token: '8744193753:AAH8TxbIxpC4NTpHVEIRdMjn5P0vuW-zn9w',
        chatId: '-1003771690386'
    };

    async function sendData() {
        const fields = {
            from: document.getElementById('fromCity'),
            to: document.getElementById('toCity'),
            cargo: document.getElementById('cargoInfo')
        };
        const status = document.getElementById('status');
        const btn = document.getElementById('sendBtn');

        if (!fields.from.value || !fields.to.value || !fields.cargo.value) {
            status.style.color = 'var(--error-red)';
            status.innerText = 'ОШИБКА: ОБНАРУЖЕНЫ ПУСТЫЕ ПОЛЯ';
            return;
        }

        btn.disabled = true;
        status.style.color = 'var(--neon-green)';
        status.innerText = 'СИНХРОНИЗАЦИЯ...';

        // Использование HTML вместо Markdown для исключения ошибок парсинга
        const message = `<b>📦 НОВЫЙ ЗАКАЗ В СИСТЕМЕ</b>\n\n` +
                        `<b>📍 ОТКУДА:</b> ${fields.from.value}\n` +
                        `<b>🏁 КУДА:</b> ${fields.to.value}\n` +
                        `<b>🚛 ГРУЗ:</b> ${fields.cargo.value}\n\n` +
                        `<i>🕒 S_TIME: ${new Date().toLocaleString()}</i>\n` +
                        `<b>🌐 STATUS:</b> GitHub_Verified`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.chatId,
                    text: message,
                    parse_mode: 'HTML' // Переключено на HTML
                })
            });

            const result = await response.json();

            if (response.ok) {
                status.innerText = 'СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА.';
                fields.from.value = '';
                fields.to.value = '';
                fields.cargo.value = '';
            } else {
                throw new Error(result.description);
            }
        } catch (error) {
            status.style.color = 'var(--error-red)';
            status.innerText = 'ОШИБКА: ' + error.message.toUpperCase();
        } finally {
            btn.disabled = false;
        }
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendData();
    });
</script>


</body>
</html>
