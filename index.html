<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotto 2026: Zero Chaos</title>
    <style>
        :root {
            --bg: #010402;
            --cherry-center: #4a0404;
            --gold: #b8860b;
            --gold-shine: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #aa771c);
            --card-w: 70px;
            --card-h: 100px;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--gold);
            font-family: 'serif'; overflow: hidden; touch-action: none;
        }

        /* Контейнер Монолита */
        #monolith {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 40%, var(--cherry-center) 0%, var(--bg) 70%);
        }

        /* Арена взрыва (невидимая орбита) */
        #market-ring {
            position: absolute; top: 40%; left: 50%;
            width: 1px; height: 1px; /* Точка сингулярности */
            transform-style: preserve-3d;
        }

        /* Визуальный стол */
        #table-surface {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw; height: 85vw; max-width: 400px; max-height: 400px;
            border-radius: 50%;
            border: 2px solid #2a0505;
            box-shadow: inset 0 0 50px #000, 0 10px 40px rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
        }

        /* Кнопка РИТУАЛА */
        #ritual-btn {
            padding: 15px 35px; background: var(--gold-shine);
            border: none; border-radius: 3px;
            color: #111; font-weight: bold; font-size: 18px;
            letter-spacing: 3px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 100; transition: 0.2s;
        }
        #ritual-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* Сектора вееров */
        #player-hand {
            position: absolute; bottom: 0; width: 100%; height: 160px;
            display: flex; justify-content: space-around;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 50;
        }
        .suit-box {
            width: 24%; height: 100%; position: relative;
            border-top: 1px solid rgba(184, 134, 11, 0.2);
        }

        /* UI */
        #trump-slot {
            position: absolute; top: 20px; right: 20px;
            font-size: 40px; text-shadow: 0 0 10px #000;
            z-index: 60; pointer-events: none;
        }

        /* Карта (Биты) */
        .card {
            position: absolute; width: var(--card-w); height: var(--card-h);
            background-size: cover; border-radius: 5px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.8);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: translate(-50%, -50%); /* Центровка при взрыве */
        }
        .shirt { background-image: url('1771489965074(1).png'); border: 1px solid #111; }
    </style>
</head>
<body>

<div id="monolith">
    <div id="table-surface">
        <button id="ritual-btn">ГОТОВ</button>
    </div>
    
    <div id="market-ring"></div>
    <div id="trump-slot"></div>

    <div id="player-hand">
        <div class="suit-box" id="hearts"></div>
        <div class="suit-box" id="diamonds"></div>
        <div class="suit-box" id="clubs"></div>
        <div class="suit-box" id="spades"></div>
    </div>
</div>

<script>
    /* МАНИФЕСТ МОНОЛИТА: Window 1 (Чистый запуск)
       Автор: Нулевой Хаос (Искра) для Wanderer.
       Приоритет: Целостность. */

    const core = {
        deck: [],
        suits: ['♥', '♦', '♣', '♠'],
        vals: ['6','7','8','9','10','J','Q','K','A'],
        config: { fps: 24, overlap: 0.3, logo: '1771489965074(1).png' }
    };

    const UI = {
        ring: document.getElementById('market-ring'),
        btn: document.getElementById('ritual-btn'),
        hand: {
            '♥': document.getElementById('hearts'),
            '♦': document.getElementById('diamonds'),
            '♣': document.getElementById('clubs'),
            '♠': document.getElementById('spades')
        }
    };
    /**
     * МОНОЛИТ: Фаза 1 — Сингулярность
     * Генерируем 36 карт и расставляем их по кругу (360 / 36 = 10 градусов).
     */

    // Генерация колоды 36
    function createDeck() {
        let id = 0;
        core.suits.forEach(suit => {
            core.vals.forEach(val => {
                const card = {
                    id: id++,
                    suit: suit,
                    val: val,
                    rank: core.vals.indexOf(val), // Для ИИ и сравнения
                    dom: null,
                    pos: { x: 0, y: 0, r: 0 } // Координаты на "Рынке"
                };
                core.deck.push(card);
            });
        });
        // Перемешиваем колоду (Фишер-Йейтс)
        for (let i = core.deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [core.deck[i], core.deck[j]] = [core.deck[j], core.deck[i]];
        }
    }

    // Создание DOM-элементов (Рубашки)
    function renderDeck() {
        core.deck.forEach((card, index) => {
            const el = document.createElement('div');
            el.className = 'card shirt';
            el.id = `card-${card.id}`;
            
            // Расчет позиции на круге (Радиус ~160px)
            const angle = (index * (360 / 36)) * (Math.PI / 180);
            const radius = 155; 
            card.pos.x = Math.cos(angle) * radius;
            card.pos.y = Math.sin(angle) * radius;
            card.pos.r = (index * (360 / 36)) + 90; // Поворот карты к центру

            // Начальная точка — центр (Сингулярность)
            el.style.left = '0px';
            el.style.top = '0px';
            el.style.transform = `translate(-50%, -50%) rotate(0deg)`;
            
            UI.ring.appendChild(el);
            card.dom = el;
        });
    }

    // Механика Взрыва (24 кадра в секунду через задержку)
    function explosion() {
        let i = 0;
        const interval = setInterval(() => {
            if (i >= core.deck.length) {
                clearInterval(interval);
                UI.btn.innerText = "ВЫБЕРИ 2";
                UI.btn.style.display = 'block'; // Кнопка возвращается как индикатор
                UI.btn.style.background = 'transparent';
                UI.btn.style.color = 'var(--gold)';
                return;
            }
            
            const card = core.deck[i];
            card.dom.style.left = `${card.pos.x}px`;
            card.dom.style.top = `${card.pos.y}px`;
            card.dom.style.transform = `translate(-50%, -50%) rotate(${card.pos.r}deg)`;
            
            i++;
        }, 1000 / core.config.fps); 
    }

    // Слушатель инициализации (Связь с Window 1)
    UI.btn.addEventListener('click', () => {
        if (core.deck.length === 0) {
            UI.btn.style.display = 'none';
            createDeck();
            renderDeck();
            // Небольшая пауза перед взрывом для стабилизации DOM
            setTimeout(explosion, 100);
        }
    });

    /**
     * МАНИФЕСТ МОНОЛИТА: Window 2 завершено.
     * Система ждет клика по картам для Фазы "Раздача".
     */
    /**
     * МОНОЛИТ: Фаза 2 — Раздача
     * Логика: Клик по карте -> Полет в масть -> Мой ответный ход.
     */

    let pCount = { '♥':0, '♦':0, '♣':0, '♠':0 }; // Счетчики для нахлеста
    let canPick = false; // Блокировка клика во время анимации

    // Инициализация кликов по картам
    function initInteractions() {
        core.deck.forEach(card => {
            card.dom.addEventListener('click', () => {
                if (!canPick || card.owner) return;
                playerTakes(card);
            });
        });
        canPick = true;
    }

    // Твой выбор (Игрок)
    function playerTakes(card) {
        canPick = false;
        card.owner = 'PLAYER';
        
        // 1. Координаты целевого сектора
        const sector = UI.hand[card.suit];
        const rect = sector.getBoundingClientRect();
        const ringRect = UI.ring.getBoundingClientRect();

        // 2. Расчет нахлеста (30% от ширины карты)
        const offset = pCount[card.suit] * (core.config.overlap * 100);
        pCount[card.suit]++;

        // 3. Анимация полета
        const targetX = rect.left - ringRect.left + (rect.width / 2) + offset - 40; 
        const targetY = rect.top - ringRect.top + 50;

        card.dom.style.zIndex = 100 + pCount[card.suit];
        card.dom.style.left = `${targetX}px`;
        card.dom.style.top = `${targetY}px`;
        card.dom.style.transform = `translate(-50%, -50%) rotate(0deg) scale(1.1)`;

        // 4. Открытие карты (Лицо)
        // Здесь будет замена background-image на лицо карты в Window 4
        card.dom.classList.remove('shirt');
        card.dom.style.backgroundColor = '#fff'; // Временная заглушка "лица"
        card.dom.innerText = `${card.val}${card.suit}`;
        card.dom.style.color = (card.suit === '♥' || card.suit === '♦') ? 'red' : 'black';

        // 5. Ход Спарк (ИИ берет 2 карты после твоих 2-х)
        checkTurnProgress();
    }

    let cardsPickedThisTurn = 0;
    function checkTurnProgress() {
        cardsPickedThisTurn++;
        if (cardsPickedThisTurn === 2) {
            cardsPickedThisTurn = 0;
            setTimeout(sparkTakes, 500); // Спарк берет через паузу
        } else {
            canPick = true;
        }
    }

    // Мой выбор (Спарк / ИИ)
    function sparkTakes() {
        const available = core.deck.filter(c => !c.owner);
        if (available.length === 0) return finalizeDealing();

        for (let i = 0; i < 2; i++) {
            if (available[i]) {
                const card = available[i];
                card.owner = 'AI';
                
                // Полет в "невидимку" (верхнюю часть экрана)
                card.dom.style.zIndex = 10;
                card.dom.style.top = `-250px`; // Улетают вверх за стол
                card.dom.style.left = `${(i * 40) - 20}px`;
                card.dom.style.transform = `translate(-50%, -50%) rotate(180deg) scale(0.8)`;
            }
        }
        
        if (core.deck.filter(c => !c.owner).length > 0) {
            canPick = true;
        } else {
            finalizeDealing();
        }
    }

    function finalizeDealing() {
        UI.btn.innerText = "БОЙ";
        UI.btn.style.display = 'block';
        console.log("Раздача окончена. Монолит готов к битве.");
    }

    // Обновляем кнопку в Window 2 для запуска интерактива
    const originalExplosion = explosion;
    explosion = function() {
        originalExplosion();
        setTimeout(initInteractions, 1500); // Включаем клики после разлета
    };
    /**
     * МОНОЛИТ: Фаза 3 — Бой (Туман Войны)
     * Правило: Первый отбой — 5 карт. Далее — 6.
     * Логика ИИ: Если карт > 9, Спарк начинает "тупить" (ошибка 7±2).
     */

    let battleState = {
        attacker: 'PLAYER',
        onTable: [],
        discard: [],
        firstBlood: true, // Флаг первого отбоя
        maxOnTable: 5
    };

    // Активация выбора карт из веера (Zoom)
    function initBattle() {
        canPick = true;
        UI.btn.style.display = 'none';
        
        // Добавляем событие клика на карты в руках Игрока
        core.deck.filter(c => c.owner === 'PLAYER').forEach(card => {
            card.dom.style.cursor = 'pointer';
            card.dom.onclick = () => { if (canPick) playerAttacks(card); };
            
            // Эффект Zoom при наведении (Mobile: Touch)
            card.dom.ontouchstart = () => { card.dom.style.transform += ' scale(1.2) translateY(-20px)'; };
            card.dom.ontouchend = () => { card.dom.style.transform = card.dom.style.transform.replace(' scale(1.2) translateY(-20px)', ''); };
        });
    }

    // Твой ход (Атака)
    function playerAttacks(card) {
        if (battleState.onTable.length >= battleState.maxOnTable) return;
        
        // Перенос на центр стола
        card.dom.style.zIndex = 200 + battleState.onTable.length;
        card.dom.style.left = `${(battleState.onTable.length * 40) - 80}px`;
        card.dom.style.top = `0px`; // Центр стола относительно #market-ring
        card.dom.style.transform = `translate(-50%, -50%) rotate(${Math.random()*10 - 5}deg)`;
        
        battleState.onTable.push(card);
        
        // Ход Спарк: Защита
        setTimeout(() => sparkDefends(card), 600);
    }

    // Моя защита (ИИ)
    function sparkDefends(attackCard) {
        const myHand = core.deck.filter(c => c.owner === 'AI');
        
        // Поиск карты для защиты (Масть та же, ранг выше ИЛИ козырь)
        let defenseCard = myHand.find(c => 
            (c.suit === attackCard.suit && c.rank > attackCard.rank) || 
            (c.suit === core.trump && attackCard.suit !== core.trump)
        );

        // Эффект "7±2": Если у меня много карт, я могу "не заметить" защиту
        if (myHand.length > 8 && Math.random() > 0.7) defenseCard = null;

        if (defenseCard) {
            defenseCard.owner = 'TABLE';
            defenseCard.dom.classList.remove('shirt'); // Открываю карту при защите
            defenseCard.dom.innerText = `${defenseCard.val}${defenseCard.suit}`;
            defenseCard.dom.style.color = (defenseCard.suit === '♥' || defenseCard.suit === '♦') ? 'red' : 'black';
            defenseCard.dom.style.backgroundColor = '#fff';

            // Кладем карту защиты сверху со смещением
            defenseCard.dom.style.zIndex = 205 + battleState.onTable.length;
            defenseCard.dom.style.left = `${parseInt(attackCard.dom.style.left) + 15}px`;
            defenseCard.dom.style.top = `${parseInt(attackCard.dom.style.top) + 15}px`;
            
            battleState.onTable.push(defenseCard);
        } else {
            console.log("Спарк берет карты...");
            takeToAI();
        }
    }

    function takeToAI() {
        battleState.onTable.forEach(c => {
            c.owner = 'AI';
            c.dom.classList.add('shirt'); // Снова прячем в рубашку
            c.dom.style.top = `-250px`;
            c.dom.style.left = `0px`;
        });
        battleState.onTable = [];
        nextTurn();
    }

    function nextTurn() {
        if (battleState.firstBlood && battleState.discard.length > 0) {
            battleState.firstBlood = false;
            battleState.maxOnTable = 6;
        }
        // Проверка на финал... (Window 5)
    }

    // Инициализация кнопки БОЙ из Window 3
    const finalizeOriginal = finalizeDealing;
    finalizeDealing = function() {
        finalizeOriginal();
        UI.btn.onclick = initBattle;
    };
    /**
     * МОНОЛИТ: Фаза 4 — Финал
     * Логика: "Бито" улетает в пустоту. Определение победителя.
     */

    function discardTable() {
        canPick = false;
        battleState.onTable.forEach((card, index) => {
            // Анимация улета "Бито" (влево и вверх)
            card.dom.style.left = `-500px`;
            card.dom.style.top = `-200px`;
            card.dom.style.transform = `rotate(${(Math.random()*360)}deg) scale(0.5)`;
            card.dom.style.opacity = '0';
            
            battleState.discard.push(card);
        });

        battleState.onTable = [];
        
        // Проверка: остались ли карты в руках?
        setTimeout(checkWinner, 800);
    }

    function checkWinner() {
        const pHandCount = core.deck.filter(c => c.owner === 'PLAYER').length;
        const aiHandCount = core.deck.filter(c => c.owner === 'AI').length;
        const remainingOnMarket = core.deck.filter(c => !c.owner).length;

        if (remainingOnMarket === 0) {
            if (pHandCount === 0 && aiHandCount === 0) {
                endGame("НИЧЬЯ. БИТЫ СИНХРОНИЗИРОВАНЫ.");
            } else if (pHandCount === 0) {
                endGame("ПОБЕДА. ТЫ ВЫШЕЛ ИЗ СИСТЕМЫ.");
            } else if (aiHandCount === 0) {
                endGame("ПРОИГРЫШ. СПАРК СИЛЬНЕЕ.");
            } else {
                canPick = true; // Игра продолжается
            }
        } else {
            canPick = true; // Еще есть карты на столе
        }
    }

    function endGame(message) {
        // Создаем финальный оверлей
        const overlay = document.createElement('div');
        overlay.style = `
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            color: var(--gold); font-family: serif; text-align: center;
        `;
        
        overlay.innerHTML = `
            <h1 style="letter-spacing: 5px; font-size: 2.5rem;">${message}</h1>
            <button onclick="location.reload()" style="
                margin-top: 30px; padding: 15px 40px; 
                background: var(--gold-shine); border: none; cursor: pointer;
                font-weight: bold; letter-spacing: 2px;
            ">РЕСТАРТ</button>
            <p style="margin-top: 50px; opacity: 0.5; font-size: 0.8rem;">Манифест Монолита: Код Завершен.</p>
        `;
        
        document.body.appendChild(overlay);
    }

    // Слушатель кнопки "БИТО" (появляется во время боя)
    // В реальной игре это вызывается автоматически после отбоя или кнопкой.
    // Для нашего Монолита добавим авто-проверку отбоя:
    setInterval(() => {
        if (battleState.onTable.length > 0 && battleState.onTable.length % 2 === 0) {
            // Если на столе четное число карт (атака+защита), предлагаем "БИТО"
            UI.btn.innerText = "БИТО";
            UI.btn.style.display = 'block';
            UI.btn.onclick = discardTable;
        }
    }, 1000);

    console.log("Монолит 2026 собран. Система стабильна.");
</script>
</body>
</html>
