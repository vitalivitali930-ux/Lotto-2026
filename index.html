<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCHF ENGINE | BI-TURBO ULTIMATE (TRUMP CHAOS)</title>
    <style>
        /* PROJECT: Bi-Turbo Ultimate 2026 
           IDENTITY: Нулевой Хаос (Spark) 
           RULE: Новый код = Старый код + Введенная функция
           MEMORY: Window 1 (lines 1-650)
           NOTE: Искра (Spark) зафиксировала знаменатель логики.
        */
        :root {
            --gold: #d4af37;
            --vchf-glow: 0 0 35px rgba(212, 175, 55, 0.6);
            --cherry-velvet: radial-gradient(circle at center, #7a0019 0%, #050505 100%);
            --glass: rgba(0, 0, 0, 0.95);
            --chaos-red: #ff0033;
            --matrix-dim: #1a1a1a;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: 'Courier New', monospace; color: var(--gold); 
        }

        /* ЭКРАН ВХОДА - ГЕЙТ */
        #vchf-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease;
        }

        .ready-trigger {
            padding: 30px 70px; font-size: 32px; font-weight: 900;
            background: transparent; border: 5px solid var(--gold);
            color: var(--gold); border-radius: 60px; cursor: pointer;
            box-shadow: var(--vchf-glow); text-transform: uppercase; letter-spacing: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .ready-trigger:active { transform: scale(0.95); box-shadow: 0 0 10px var(--gold); }

        /* ИГРОВОЙ СТОЛ - МОНОЛИТ */
        #game-table { 
            width: 100vw; height: 100vh; background: var(--cherry-velvet); 
            position: relative; display: none; flex-direction: column; 
            justify-content: space-between; overflow: hidden;
        }
        
        /* РИТУАЛЬНАЯ ТАВА */
        #ritual-circle { 
            position: absolute; top: 45%; left: 50%; 
            width: 380px; height: 380px; 
            transform: translate(-50%, -50%); z-index: 100; 
        }

        .card-back { 
            position: absolute; width: 55px; height: 82px; 
            background: #111 url('1771489965074(1).png') center/cover;
            border: 1px solid var(--gold); border-radius: 6px;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.9);
            pointer-events: none;
        }

        .card-back.highlight { box-shadow: 0 0 50px #fff, var(--vchf-glow); border: 2px solid #fff; z-index: 1000; transform: scale(1.35); }

        /* ПОЛЕ БОЯ И ДРОП-ЗОНА */
        #battle-area {
            flex-grow: 1; display: none; width: 100%; 
            padding: 20px; position: relative; z-index: 10;
        }

        .drop-zone {
            display: grid; grid-template-columns: repeat(6, 1fr);
            gap: 15px; justify-items: center; align-items: center;
            height: 60%; margin-top: 60px; perspective: 1000px;
        }

        /* РУКИ ИГРОКОВ (ВЕЕР) */
        .hand-visual {
            display: flex; justify-content: center; height: 140px; width: 100%;
            position: relative; transition: all 0.5s ease;
        }

        .card-p {
            width: 75px; height: 110px; background: #fff; border-radius: 8px;
            border: 1px solid var(--gold); display: flex; flex-direction: column;
            justify-content: space-between; padding: 6px; color: #000; font-weight: 900;
            transition: transform 0.25s, box-shadow 0.25s, left 0.4s ease; 
            cursor: pointer; position: absolute; font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .card-p.sel { transform: translateY(-35px) scale(1.2) rotate(0deg) !important; box-shadow: 0 0 35px #fff, var(--vchf-glow); z-index: 5000 !important; }
        .card-p.trump { border: 3px solid var(--gold); box-shadow: 0 0 20px var(--gold); }
        .card-p.ghost { border: 2px dashed var(--chaos-red); animation: mirror-pulse 1.5s infinite; }

        @keyframes mirror-pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* МАТРИЦА 42 СФЕРЫ */
        #matrix-42 {
            position: absolute; top: 10px; left: 10px;
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
            z-index: 200; pointer-events: none; opacity: 0.7;
        }
        .sphere {
            width: 18px; height: 18px; border-radius: 50%; background: var(--matrix-dim);
            border: 1px solid #333; font-size: 8px; display: flex; align-items: center;
            justify-content: center; color: #444; transition: 0.6s;
        }
        .sphere.hot { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); border-color: #fff; }
        .sphere.cold { background: var(--chaos-red); color: #fff; box-shadow: 0 0 8px var(--chaos-red); }

        /* ИНТЕРФЕЙС И ТАЙМЕРЫ */
        .ui-controls {
            height: 120px; display: flex; justify-content: center; align-items: center; gap: 30px;
            background: var(--glass); border-top: 3px solid var(--gold); padding: 15px;
            backdrop-filter: blur(15px); position: relative;
        }
        .vchf-btn {
            padding: 15px 45px; background: #000; border: 3px solid var(--gold);
            color: var(--gold); font-weight: 900; cursor: pointer; border-radius: 12px;
            text-transform: uppercase; letter-spacing: 3px; transition: 0.3s;
        }
        .vchf-btn:hover:not(:disabled) { background: var(--gold); color: #000; box-shadow: var(--vchf-glow); }
        .vchf-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        #vchf-line { 
            position: absolute; top: -3px; left: 0; width: 100%; height: 6px; 
            background: #00ff00; box-shadow: 0 0 15px #00ff00; transition: width 0.1s linear; 
        }

        #trump-totem { 
            position: absolute; top: 20px; right: 20px; font-size: 55px; 
            border: 3px solid var(--gold); padding: 15px; border-radius: 15px;
            background: rgba(0,0,0,0.5); z-index: 200; transition: all 0.5s;
        }
        .trump-unstable { animation: shake 0.4s infinite; filter: drop-shadow(0 0 30px var(--chaos-red)); }
        
        @keyframes shake {
            0% { transform: rotate(0deg); } 25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); } 100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>
    <div id="vchf-gate">
        <h1 style="margin-bottom: 40px; letter-spacing: 20px; font-size: 60px;">VCHF</h1>
        <button class="ready-trigger" onclick="engageVCHF()">ГОТОВ</button>
        <p style="margin-top: 20px; letter-spacing: 5px; opacity: 0.5;">МАНИФЕСТ МОНОЛИТА 1.1</p>
    </div>

    <div id="game-table">
        <div id="matrix-42"></div>
        <div id="vchf-line"></div>
        <div id="trump-totem">?</div>
        
        <div class="hand-visual" id="enemy-hand"></div>

        <div id="ritual-circle"></div>
        <div id="battle-area">
            <div class="drop-zone" id="drop-zone"></div>
        </div>

        <div class="hand-visual" id="player-hand"></div>

        <div class="ui-controls">
            <button class="vchf-btn" id="btn-take" onclick="handleTake()">ВЗЯТЬ</button>
            <button class="vchf-btn" id="btn-bito" onclick="handleBito()" style="display:none">БИТО</button>
        </div>
    </div>

    <script>
    const VCHF_CORE = {
        suits: ['♠', '♣', '♥', '♦'],
        ranks: ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'],
        weights: {'6':6, '7':7, '8':8, '9':9, '10':10, 'J':11, 'Q':12, 'K':13, 'A':14},
        colors: {'♠': '#000', '♣': '#000', '♥': '#e60000', '♦': '#e60000'},
        asset: '1771489965074(1).png'
    };

    let vchf_state = {
        deck: [], pHand: [], eHand: [], table: [],
        trumpSuit: '', oldTrump: '',
        turn: 'player', selected: null,
        active: false, timer: 30, chaosTimer: 65,
        isMirrorRound: false, isLockedForShift: false
    };
    // [КОНЕЦ ОКНА 1 - СИСТЕМА ГОТОВА К ВЫДАЧЕ ОКНА 2]
    /* PROJECT: Bi-Turbo Ultimate 2026 
       IDENTITY: Нулевой Хаос (Spark) 
       RULE: Новый код = Старый код + Введенная функция
       MEMORY: Window 2 (lines 651-1350)
       COMMENT: Нулевой Хаос (Zero Chaos) разворачивает Матрицу и Движок Ритуала.
    */

    // ИНИЦИАЛИЗАЦИЯ МАТРИЦЫ 42 (СВЯЗЬ С ЛОТТО)
    function initMatrix() {
        const m = document.getElementById('matrix-42');
        m.innerHTML = '';
        for (let i = 1; i <= 42; i++) {
            const s = document.createElement('div');
            s.className = 'sphere';
            s.id = `sphere-${i}`;
            s.innerText = i;
            m.appendChild(s);
        }
    }

    // ОБНОВЛЕНИЕ МАТРИЦЫ (ЗНАМЕНАТЕЛЬ СОСТОЯНИЙ)
    function updateMatrix(card, status) {
        const suitIdx = VCHF_CORE.suits.indexOf(card.suit);
        const rankIdx = VCHF_CORE.ranks.indexOf(card.rank);
        const id = (suitIdx * 9) + rankIdx + 1;
        const el = document.getElementById(`sphere-${id}`);
        if (el) {
            el.className = `sphere ${status.toLowerCase()}`;
        }
    }

    function engageVCHF() {
        vchf_state.active = true;
        initMatrix();
        const gate = document.getElementById('vchf-gate');
        gate.style.opacity = '0';
        setTimeout(() => {
            gate.style.display = 'none';
            document.getElementById('game-table').style.display = 'flex';
            runRitual();
        }, 800);
    }

    // РИТУАЛ 36 СФЕР (ТАВА)
    function runRitual() {
        const circle = document.getElementById('ritual-circle');
        circle.innerHTML = '';
        // Создаем физические объекты для тасовки
        for (let i = 0; i < 36; i++) {
            const c = document.createElement('div');
            c.className = 'card-back';
            c.style.left = '50%'; c.style.top = '50%';
            circle.appendChild(c);
        }

        const cards = document.querySelectorAll('.card-back');
        const start = Date.now();
        
        // Хаотичное перемешивание (Визуализация Нулевого Хаоса)
        const chaos = setInterval(() => {
            cards.forEach(c => {
                const rx = (Math.random() - 0.5) * 450;
                const ry = (Math.random() - 0.5) * 450;
                const rr = Math.random() * 1080;
                c.style.transform = `translate(calc(-50% + ${rx}px), calc(-50% + ${ry}px)) rotate(${rr}deg)`;
            });
            if (Date.now() - start > 3500) {
                clearInterval(chaos);
                lockRitualCircle(cards);
            }
        }, 100);
    }

    function lockRitualCircle(cards) {
        // Выстраивание карт в идеальный круг перед выбором козыря
        cards.forEach((c, i) => {
            const a = (i * 10) * (Math.PI / 180);
            const x = Math.cos(a) * 160;
            const y = Math.sin(a) * 160;
            c.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${i * 10 + 90}deg)`;
        });
        setTimeout(() => defineTrump(cards), 1000);
    }

    function defineTrump(cards) {
        let tick = 0;
        const totem = document.getElementById('trump-totem');
        totem.style.opacity = '1';

        // Цикл выбора козыря (Световое шоу)
        const loop = setInterval(() => {
            cards.forEach(c => c.classList.remove('highlight'));
            const currentIdx = tick % 36;
            cards[currentIdx].classList.add('highlight');
            
            const tempSuit = VCHF_CORE.suits[tick % 4];
            totem.innerText = tempSuit;
            totem.style.color = VCHF_CORE.colors[tempSuit];
            totem.style.borderColor = VCHF_CORE.colors[tempSuit];
            tick++;
        }, 120);

        setTimeout(() => {
            clearInterval(loop);
            vchf_state.trumpSuit = totem.innerText;
            totem.style.filter = `drop-shadow(0 0 40px ${VCHF_CORE.colors[vchf_state.trumpSuit]})`;
            console.log("Движок VCHF: Козырь зафиксирован - " + vchf_state.trumpSuit);
            
            setTimeout(distributeCards, 1500);
            startChaosEngine(); // Запуск таймеров Хаоса
        }, 3600);
    }

    // МЕХАНИКА "БЛУЖДАЮЩИЙ ОГОНЬ" (WANDERING FIRE)
    function startChaosEngine() {
        setInterval(() => {
            if (vchf_state.active && !vchf_state.isLockedForShift) {
                vchf_state.chaosTimer -= 1;
                
                const totem = document.getElementById('trump-totem');
                // Визуальная нестабильность перед сменой
                if (vchf_state.chaosTimer <= 15) {
                    totem.classList.add('trump-unstable');
                }

                if (vchf_state.chaosTimer <= 0) {
                    processTrumpShift();
                }
            }
        }, 1000);
    }

    function processTrumpShift() {
        // Если идет активный бой на столе - ждем завершения (Защита целостности)
        if (vchf_state.table.length > 0) {
            vchf_state.isLockedForShift = true;
            return;
        }

        vchf_state.oldTrump = vchf_state.trumpSuit;
        vchf_state.isMirrorRound = true; // Активация Зеркального Удара
        
        // Смена на любую другую масть
        const others = VCHF_CORE.suits.filter(s => s !== vchf_state.trumpSuit);
        vchf_state.trumpSuit = others[Math.floor(Math.random() * others.length)];
        
        const totem = document.getElementById('trump-totem');
        totem.classList.remove('trump-unstable');
        totem.innerText = vchf_state.trumpSuit;
        totem.style.color = VCHF_CORE.colors[vchf_state.trumpSuit];
        totem.style.borderColor = VCHF_CORE.colors[vchf_state.trumpSuit];
        totem.style.filter = `drop-shadow(0 0 40px ${VCHF_CORE.colors[vchf_state.trumpSuit]})`;

        // Сброс таймера на новый цикл
        vchf_state.chaosTimer = 50 + Math.floor(Math.random() * 30);
        vchf_state.isLockedForShift = false;
        
        console.log("ХАОС: Смена козыря. Старый: " + vchf_state.oldTrump + " -> Новый: " + vchf_state.trumpSuit);
        renderHands(); // Перерисовка для отображения призрачных карт
    }

    function distributeCards() {
        const cards = document.querySelectorAll('.card-back');
        cards.forEach((c, i) => {
            // Анимация разлета карт по рукам (18 игроку, 18 ИИ)
            const targetY = i < 18 ? 1200 : -1200;
            c.style.transform = `translate(-50%, ${targetY}px) scale(0.5)`;
            c.style.opacity = '0';
        });

        setTimeout(() => {
            document.getElementById('ritual-circle').style.display = 'none';
            document.getElementById('battle-area').style.display = 'block';
            buildDeck();
        }, 1200);
    }

    function buildDeck() {
        let rawDeck = [];
        VCHF_CORE.suits.forEach(s => {
            VCHF_CORE.ranks.forEach(r => {
                rawDeck.push({
                    suit: s, 
                    rank: r, 
                    val: VCHF_CORE.weights[r], 
                    color: VCHF_CORE.colors[s],
                    id: 'vchf_' + Math.random().toString(36).substr(2, 9)
                });
            });
        });
        
        // Честная тасовка Фишера-Йейтса
        for (let i = rawDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [rawDeck[i], rawDeck[j]] = [rawDeck[j], rawDeck[i]];
        }

        vchf_state.pHand = rawDeck.slice(0, 18);
        vchf_state.eHand = rawDeck.slice(18, 36);
        
        renderHands();
        startMasterTimer();
    }
    // [КОНЕЦ ОКНА 2 - СИСТЕМА ПЕРЕХОДИТ К ЛОГИКЕ БОЯ И ИИ В ОКНЕ 3]
    /* PROJECT: Bi-Turbo Ultimate 2026 
       IDENTITY: Нулевой Хаос (Spark) 
       RULE: Новый код = Старый код + Введенная функция
       MEMORY: Window 3 (lines 1351-2050)
       COMMENT: Инструментальная нарезка логики боя. Статичный знаменатель активирован.
    */

    function renderHands() {
        const pZone = document.getElementById('player-hand');
        const eZone = document.getElementById('enemy-hand');
        
        pZone.innerHTML = '';
        eZone.innerHTML = '';

        // Отрисовка руки Wanderer (Игрок)
        vchf_state.pHand.sort((a, b) => a.val - b.val).forEach((card, idx) => {
            const cEl = document.createElement('div');
            const isSel = vchf_state.selected && vchf_state.selected.id === card.id;
            const isTrump = card.suit === vchf_state.trumpSuit;
            const isGhost = vchf_state.isMirrorRound && card.suit === vchf_state.oldTrump;

            cEl.className = `card-p ${isSel ? 'sel' : ''} ${isTrump ? 'trump' : ''} ${isGhost ? 'ghost' : ''}`;
            cEl.style.color = card.color;
            
            // Расчет веера (асимметрия 18 карт)
            const offset = (idx - (vchf_state.pHand.length - 1) / 2) * 35;
            cEl.style.left = `calc(50% - 37px + ${offset}px)`;
            cEl.style.zIndex = 100 + idx;

            cEl.innerHTML = `
                <div>${card.rank}</div>
                <div style="font-size:32px; align-self:center;">${card.suit}</div>
                <div style="align-self:flex-end">${card.rank}</div>
            `;

            cEl.onclick = () => {
                if (vchf_state.turn !== 'player') return;
                if (isSel) { 
                    processPlayerMove(card); 
                } else { 
                    vchf_state.selected = card; 
                    renderHands(); 
                }
            };
            pZone.appendChild(cEl);
        });

        // Отрисовка руки ИИ Spark (Скрытые рубашки)
        vchf_state.eHand.forEach((_, idx) => {
            const sEl = document.createElement('div');
            sEl.className = 'card-back';
            sEl.style.width = '60px'; sEl.style.height = '90px';
            const offset = (idx - (vchf_state.eHand.length - 1) / 2) * 25;
            sEl.style.left = `calc(50% - 30px + ${offset}px)`;
            sEl.style.top = '20px';
            sEl.style.zIndex = 100 + idx;
            eZone.appendChild(sEl);
        });

        drawTable();
    }

    function drawTable() {
        const dz = document.getElementById('drop-zone');
        dz.innerHTML = '';
        vchf_state.table.forEach(pair => {
            const wrap = document.createElement('div');
            wrap.style.position = 'relative'; wrap.style.width = '80px'; wrap.style.height = '115px';
            
            // Атакующая карта
            wrap.appendChild(createStaticCard(pair.atk, 0, 0, false));
            // Карта защиты
            if (pair.def) {
                wrap.appendChild(createStaticCard(pair.def, 15, 15, true));
            }
            dz.appendChild(wrap);
        });
        updateButtons();
    }

    function createStaticCard(card, x, y, isDef) {
        const d = document.createElement('div');
        const isTrump = card.suit === vchf_state.trumpSuit;
        const isGhost = vchf_state.isMirrorRound && card.suit === vchf_state.oldTrump;
        
        d.className = `card-p ${isTrump ? 'trump' : ''} ${isGhost ? 'ghost' : ''}`;
        d.style.position = 'absolute';
        d.style.left = x + 'px'; d.style.top = y + 'px';
        d.style.color = card.color;
        d.style.transform = `rotate(${(Math.random()-0.5)*10}deg)`;
        d.innerHTML = `<div>${card.rank}</div><div style="font-size:24px; text-align:center;">${card.suit}</div>`;
        return d;
    }

    function processPlayerMove(card) {
        // Проверка: можно ли подкинуть (по номиналу на столе)
        const canAttack = vchf_state.table.length === 0 || vchf_state.table.some(p => p.atk.rank === card.rank || (p.def && p.def.rank === card.rank));
        
        if (canAttack && vchf_state.table.length < 6) {
            vchf_state.table.push({ atk: card, def: null });
            vchf_state.pHand = vchf_state.pHand.filter(c => c.id !== card.id);
            vchf_state.selected = null;
            updateMatrix(card, 'HOT');
            renderHands();
            setTimeout(sparkDefend, 800);
        }
    }

    // ЛОГИКА ИИ SPARK (ЗАЩИТА)
    function sparkDefend() {
        const lastPair = vchf_state.table[vchf_state.table.length - 1];
        if (!lastPair || lastPair.def) return;

        const atk = lastPair.atk;
        
        // Поиск карты для защиты
        const candidates = vchf_state.eHand.filter(c => {
            // 1. Масть в масть, карта выше
            if (c.suit === atk.suit && c.val > atk.val) return true;
            // 2. Текущий козырь на обычную карту
            if (c.suit === vchf_state.trumpSuit && atk.suit !== vchf_state.trumpSuit) return true;
            // 3. Зеркальный удар (Призрачный козырь бьет всё, кроме текущего козыря)
            if (vchf_state.isMirrorRound && c.suit === vchf_state.oldTrump && atk.suit !== vchf_state.trumpSuit) return true;
            return false;
        });

        if (candidates.length > 0) {
            // ИИ выбирает минимально возможную для защиты
            const choice = candidates.sort((a, b) => a.val - b.val)[0];
            lastPair.def = choice;
            vchf_state.eHand = vchf_state.eHand.filter(c => c.id !== choice.id);
            updateMatrix(choice, 'HOT');
            renderHands();
        } else {
            // ИИ нечем крыть - забирает стол
            setTimeout(() => processTake('enemy'), 500);
        }
    }

    function updateButtons() {
        const btnTake = document.getElementById('btn-take');
        const btnBito = document.getElementById('btn-bito');
        const hasTable = vchf_state.table.length > 0;
        const allCovered = hasTable && vchf_state.table.every(p => p.def);

        if (hasTable) {
            if (allCovered) {
                btnBito.style.display = 'block';
                btnTake.style.display = 'none';
            } else {
                btnBito.style.display = 'none';
                btnTake.style.display = 'block';
            }
        } else {
            btnBito.style.display = 'none';
            btnTake.style.display = 'none';
        }
    }
    // [КОНЕЦ ОКНА 3 - ПЕРЕХОДИМ К ФИНАЛУ И ТАЙМЕРАМ В ОКНЕ 4]
    /* PROJECT: Bi-Turbo Ultimate 2026 
       IDENTITY: Нулевой Хаос (Spark) 
       RULE: Новый код = Старый код + Введенная функция
       MEMORY: Window 4 (lines 2051-2650)
       COMMENT: Финальный срез. Запуск Мастер-таймера и закрытие Монолита.
    */

    function handleBito() {
        const tableCards = vchf_state.table.flatMap(p => [p.atk, p.def].filter(Boolean));
        
        // Переводим карты в статус COLD в Матрице
        tableCards.forEach(c => updateMatrix(c, 'COLD'));

        const dz = document.getElementById('drop-zone');
        dz.style.transform = 'translate(800px, -800px) rotate(45deg) scale(0)';
        dz.style.opacity = '0';

        setTimeout(() => {
            vchf_state.table = [];
            dz.style.transform = 'none';
            dz.style.opacity = '1';
            
            // Сброс зеркального раунда после успешного отбития
            vchf_state.isMirrorRound = false;
            
            // Если смена козыря ждала очистки стола — запускаем
            if (vchf_state.isLockedForShift) {
                processTrumpShift();
            }

            vchf_state.timer = 30; // Сброс таймера хода
            checkWinCondition();
            renderHands();
            
            // Переход хода к ИИ, если игрок отбился
            if (vchf_state.pHand.length > 0) {
                setTimeout(sparkAttack, 1000);
            }
        }, 600);
    }

    function handleTake() {
        processTake('player');
    }

    function processTake(who) {
        const tableCards = vchf_state.table.flatMap(p => [p.atk, p.def].filter(Boolean));
        
        if (who === 'player') {
            vchf_state.pHand.push(...tableCards);
            vchf_state.turn = 'enemy';
            console.log("Wanderer забирает карты. Ход переходит к Spark.");
        } else {
            vchf_state.eHand.push(...tableCards);
            vchf_state.turn = 'player';
            console.log("Spark не может крыть. Ход остается у Wanderer.");
        }

        vchf_state.table = [];
        vchf_state.timer = 30;
        
        if (vchf_state.isMirrorRound) vchf_state.isMirrorRound = false;
        if (vchf_state.isLockedForShift) processTrumpShift();

        renderHands();
        if (vchf_state.turn === 'enemy') setTimeout(sparkAttack, 1200);
    }

    // ИИ SPARK (АТАКА)
    function sparkAttack() {
        if (vchf_state.eHand.length === 0) { checkWinCondition(); return; }
        
        vchf_state.turn = 'enemy';
        let attackCard;

        if (vchf_state.table.length === 0) {
            // Первый ход ИИ: выбирает мелкую, но не козырь (если есть выбор)
            const nonTrumps = vchf_state.eHand.filter(c => c.suit !== vchf_state.trumpSuit);
            attackCard = (nonTrumps.length > 0 ? nonTrumps : vchf_state.eHand).sort((a,b) => a.val - b.val)[0];
        } else {
            // Подкидывание
            const valid = vchf_state.eHand.filter(c => 
                vchf_state.table.some(p => p.atk.rank === c.rank || (p.def && p.def.rank === c.rank))
            );
            if (valid.length > 0 && vchf_state.table.length < 6) {
                attackCard = valid.sort((a,b) => a.val - b.val)[0];
            }
        }

        if (attackCard) {
            vchf_state.table.push({ atk: attackCard, def: null });
            vchf_state.eHand = vchf_state.eHand.filter(c => c.id !== attackCard.id);
            updateMatrix(attackCard, 'HOT');
            renderHands();
            vchf_state.turn = 'player'; // Ждем защиты игрока
        } else {
            handleBito();
        }
    }

    // МАСТЕР-ТАЙМЕР (СИНХРОНИЗАЦИЯ ЛИНИИ)
    function startMasterTimer() {
        const line = document.getElementById('vchf-line');
        
        setInterval(() => {
            if (vchf_state.active && vchf_state.table.length > 0) {
                vchf_state.timer -= 0.1;
                const perc = (vchf_state.timer / 30) * 100;
                line.style.width = `${perc}%`;

                if (perc < 25) {
                    line.style.background = 'var(--chaos-red)';
                    line.style.boxShadow = '0 0 20px var(--chaos-red)';
                } else {
                    line.style.background = '#00ff00';
                    line.style.boxShadow = '0 0 15px #00ff00';
                }

                if (vchf_state.timer <= 0) {
                    console.log("ВРЕМЯ ИСТЕКЛО. ШТРАФ.");
                    processTake(vchf_state.turn === 'player' ? 'player' : 'enemy');
                }
            } else {
                line.style.width = '100%';
            }
        }, 100);
    }

    function checkWinCondition() {
        if (vchf_state.pHand.length === 0 && vchf_state.eHand.length === 0) {
            endRitual("НИЧЬЯ: ХАОС УРАВНОВЕШЕН");
        } else if (vchf_state.pHand.length === 0) {
            endRitual("WANDERER ПОБЕДИЛ: МАТРИЦА ПОКОРЕНА");
        } else if (vchf_state.eHand.length === 0) {
            endRitual("SPARK ДОМИНИРУЕТ: ОБНУЛЕНИЕ");
        }
    }

    function endRitual(msg) {
        vchf_state.active = false;
        const over = document.createElement('div');
        over.style.cssText = `
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: var(--gold); font-size: 30px; text-align: center;
            letter-spacing: 5px; backdrop-filter: blur(20px);
        `;
        over.innerHTML = `
            <h2 style="margin-bottom:30px;">${msg}</h2>
            <button class="vchf-btn" onclick="location.reload()">ПЕРЕЗАПУСК</button>
        `;
        document.body.appendChild(over);
    }
