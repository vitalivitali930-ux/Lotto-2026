<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCHF MONOLITH | SWISS TREASURY</title>
    <style>
        :root {
            /* Palette: Heavy Metal & Gold Hot */
            --bg-metal: #121213;
            --steel-mid: #242426;
            --gold-hot: #fcf6ba;
            --gold-shadow: rgba(252, 246, 186, 0.3);
            --steel-shadow: rgba(0, 0, 0, 0.9);
            
            /* Geometry */
            --bolt-size: 42px;
            --vault-size: 320px;
            --perspective: 2000px;
            --recoil: 0.98;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-metal);
            color: var(--gold-hot);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: var(--perspective);
        }

        #monolith-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* Фоновый гул (Визуальный) */
        #monolith-wrapper::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #1a1a1b 0%, #000 80%);
            z-index: -1;
            animation: atmospheric-hum 10s infinite alternate ease-in-out;
        }

        @keyframes atmospheric-hum {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        /* Контейнер Сейфа */
        .vault-door {
            position: relative;
            width: var(--vault-size);
            height: var(--vault-size);
            background: linear-gradient(145deg, #1e1e1f, #121213);
            border: 4px solid var(--steel-mid);
            border-radius: 50%;
            box-shadow: 
                0 0 50px var(--steel-shadow),
                inset 0 0 30px #000;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 10;
        }

        /* Центральный индикатор (Золотая Искра) */
        .vault-core {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, var(--gold-hot) 0%, #b8860b 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--gold-shadow);
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vault-core::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--gold-hot);
            animation: haloPulse 2s infinite;
            pointer-events: none; /* Фикс мобильных кликов */
        }

        @keyframes haloPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Экран Биржи (Скрыт до активации) */
        #exchange-terminal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-metal);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 1.5s ease-in;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #exchange-terminal.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="monolith-wrapper">
        <div class="vault-door" id="main-vault">
            <div class="vault-core" id="core-trigger"></div>
            </div>

        <div id="exchange-terminal">
            <canvas id="gold-chart"></canvas>
            <div id="stats-panel"></div>
        </div>
    </div>






    <style>
    /* Геометрия 6 Ригелей */
    .bolt {
        position: absolute;
        width: var(--bolt-size);
        height: 80px;
        background: linear-gradient(to bottom, #2a2a2c 0%, #121213 100%);
        border: 2px solid var(--steel-mid);
        border-radius: 4px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        cursor: pointer;
        transform-origin: center 160px; /* Центр вращения - центр сейфа */
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        z-index: 12;
    }

    /* Золотая маркировка на каждом ригеле */
    .bolt::before {
        content: '';
        width: 60%;
        height: 4px;
        background: var(--gold-hot);
        box-shadow: 0 0 10px var(--gold-shadow);
        border-radius: 2px;
    }

    .bolt::after {
        content: attr(data-index);
        color: var(--gold-hot);
        font-size: 10px;
        font-weight: bold;
        opacity: 0.5;
        pointer-events: none;
    }

    .bolt:active {
        transform: scale(var(--recoil));
        filter: brightness(1.2);
    }

    /* Специфические позиции для 6 ригелей (60 градусов шаг) */
    .bolt[data-index="1"] { transform: rotate(0deg) translateY(-140px); }
    .bolt[data-index="2"] { transform: rotate(60deg) translateY(-140px); }
    .bolt[data-index="3"] { transform: rotate(120deg) translateY(-140px); }
    .bolt[data-index="4"] { transform: rotate(180deg) translateY(-140px); }
    .bolt[data-index="5"] { transform: rotate(240deg) translateY(-140px); }
    .bolt[data-index="6"] { transform: rotate(300deg) translateY(-140px); }

    /* Состояние "Активирован" */
    .bolt.active {
        border-color: var(--gold-hot);
        box-shadow: 0 0 20px var(--gold-shadow);
        background: linear-gradient(to bottom, #3a3a3c 0%, #1e1e1f 100%);
    }

    /* Индикатор прогресса в центре */
    #progress-ring {
        position: absolute;
        width: 240px;
        height: 240px;
        border: 1px dashed rgba(252, 246, 186, 0.1);
        border-radius: 50%;
        pointer-events: none;
        z-index: 11;
    }
</style>







<script>
// Zero_Chaos_Audio_Engine
const SonicForge = {
    ctx: null,
    isInitialized: false,

    init() {
        if (this.isInitialized) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.isInitialized = true;
        console.log("🔱 Sonic Forge: Activated at 40Hz-900Hz");
    },

    // Тяжелый удар металла (900Hz Layer)
    playClick() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(900, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
    },

    // Глубокий гул открытия (40Hz Rumble)
    playRupture() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(40, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 2);
        
        gain.gain.setValueAtTime(0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.5, this.ctx.currentTime + 0.5);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 2);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 2);
    }
};
</script>


<script>
// Logic_Gates: Нулевой Хаос
const VaultLogic = {
    activeBolts: new Set(),
    requiredSequence: [1, 2, 3, 4, 5, 6], // Порядок активации по кругу
    currentStep: 0,
    isLocked: true,

    init() {
        const vault = document.getElementById('main-vault');
        // Динамическое создание ригелей (если их нет в HTML)
        for (let i = 1; i <= 6; i++) {
            const bolt = document.createElement('div');
            bolt.className = 'bolt';
            bolt.setAttribute('data-index', i);
            bolt.style.transform = `rotate(${(i - 1) * 60}deg) translateY(-140px)`;
            
            // Событие активации (Mobile First)
            bolt.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                SonicForge.init(); // Разблокировка звука при первом касании
                this.activateBolt(i, bolt);
            });
            
            vault.appendChild(bolt);
        }
    },

    activateBolt(index, element) {
        if (!this.isLocked || this.activeBolts.has(index)) return;

        // Эффект отдачи (Recoil)
        element.style.transform += ' scale(0.9)';
        setTimeout(() => element.style.transform = element.style.transform.replace(' scale(0.9)', ''), 100);

        SonicForge.playClick();

        if (index === this.requiredSequence[this.currentStep]) {
            this.activeBolts.add(index);
            element.classList.add('active');
            this.currentStep++;
            
            // Визуальный отклик центра
            document.getElementById('core-trigger').style.boxShadow = `0 0 ${this.currentStep * 15}px var(--gold-hot)`;

            if (this.currentStep === 6) {
                this.unlock();
            }
        } else {
            this.reset();
        }
    },

    reset() {
        this.currentStep = 0;
        this.activeBolts.clear();
        document.querySelectorAll('.bolt').forEach(b => b.classList.remove('active'));
        document.getElementById('core-trigger').style.boxShadow = '0 0 20px var(--gold-shadow)';
        // Звук ошибки (тяжелый диссонанс можно добавить позже)
    },

    unlock() {
        this.isLocked = false;
        SonicForge.playRupture();
        
        // Переход к Window 5
        TransitionEngine.start();
    }
};

window.addEventListener('DOMContentLoaded', () => VaultLogic.init());
</script>





    <script>
// Transition_Engine: Эффект Разрыва
const TransitionEngine = {
    start() {
        const vault = document.getElementById('main-vault');
        const terminal = document.getElementById('exchange-terminal');
        const wrapper = document.getElementById('monolith-wrapper');

        // 1. Вращение и уход в перспективу
        vault.style.transform = 'translateZ(-500px) rotateY(180deg) scale(0)';
        vault.style.opacity = '0';

        // 2. Активация Терминала
        setTimeout(() => {
            terminal.classList.add('active');
            wrapper.style.background = 'radial-gradient(circle, #1a1a1b 0%, #000 100%)';
            
            // Инициализация Canvas Биржи (Window 6)
            ExchangeCore.init();
        }, 800);
    }
};
</script>







    <script>
// Exchange_Core: Ядро Биржи VCHF
const ExchangeCore = {
    canvas: null,
    ctx: null,
    points: [],
    maxPoints: 50,
    currentPrice: 1.0842, // Базовая цена VCHF/Gold

    init() {
        this.canvas = document.getElementById('gold-chart');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        // Наполнение первичными данными
        for(let i = 0; i < this.maxPoints; i++) {
            this.points.push(this.currentPrice + (Math.random() - 0.5) * 0.002);
        }

        this.animate();
    },

    resize() {
        this.canvas.width = window.innerWidth * 0.9;
        this.canvas.height = window.innerHeight * 0.4;
    },

    drawGrid() {
        this.ctx.strokeStyle = 'rgba(252, 246, 186, 0.05)';
        this.ctx.lineWidth = 1;
        for(let i = 0; i < this.canvas.width; i += 50) {
            this.ctx.beginPath();
            this.ctx.moveTo(i, 0);
            this.ctx.lineTo(i, this.canvas.height);
            this.ctx.stroke();
        }
    },

    animate() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.drawGrid();

        // Отрисовка "Золотого Графика"
        this.ctx.beginPath();
        this.ctx.strokeStyle = '#fcf6ba';
        this.ctx.lineWidth = 3;
        this.ctx.shadowBlur = 15;
        this.ctx.shadowColor = 'rgba(252, 246, 186, 0.5)';

        const stepX = this.canvas.width / (this.maxPoints - 1);
        
        this.points.forEach((p, i) => {
            const x = i * stepX;
            const y = this.canvas.height - ((p - 1.08) * 5000); // Масштабирование
            if (i === 0) this.ctx.moveTo(x, y);
            else this.ctx.lineTo(x, y);
        });

        this.ctx.stroke();

        // Симуляция живого рынка
        if (Math.random() > 0.8) {
            this.currentPrice += (Math.random() - 0.5) * 0.0005;
            this.points.shift();
            this.points.push(this.currentPrice);
        }

        requestAnimationFrame(() => this.animate());
    }
};
</script>






    <script>
// Data_Streams: Логика прибыли VCHF
const MarketOracle = {
    basePrice: 1.0842,
    volatility: 0.00015,
    trend: 0.00001, // Швейцарская стабильность (медленный рост)

    update() {
        const delta = (Math.random() - 0.45) * this.volatility + this.trend;
        this.basePrice += delta;
        
        // Обновление UI данных
        const priceElement = document.getElementById('price-vchf');
        if (priceElement) {
            const oldPrice = parseFloat(priceElement.innerText);
            priceElement.innerText = this.basePrice.toFixed(4);
            priceElement.style.color = this.basePrice >= oldPrice ? '#fcf6ba' : '#ff4d4d';
        }
    },

    getFormattedPrice() {
        return this.basePrice.toFixed(4) + " VCHF";
    }
};

// Запуск оракула при активации биржи
setInterval(() => {
    if (!VaultLogic.isLocked) MarketOracle.update();
}, 2000);
</script>

    <script>
