<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERO_CHAOS // TERMINAL_15</title>
    <style>
        :root {
            --bg: #121213;
            --gold: #fcf6ba;
            --steel: #242426;
        }
        body {
            background: var(--bg); color: var(--gold);
            font-family: sans-serif; margin: 0; padding: 20px;
        }
        /* Сетка магазина */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        /* Карточка товара */
        .card {
            background: #1a1a1b;
            border: 1px solid var(--steel);
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }
        .card:active { border-color: var(--gold); transform: scale(0.95); }
        
        .card-img {
            width: 100%; height: 120px;
            background: #000; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: #444;
        }
        .price { color: #888; font-size: 0.9rem; }
        button {
            margin-top: 10px; width: 100%;
            background: none; border: 1px solid var(--gold);
            color: var(--gold); padding: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 2px; text-align: center;">SHOP // 15_ASSETS</h2>
    
    <div class="shop-grid" id="main-grid">
        </div>

    <script>
        // 1. БАЗА ДАННЫХ (15 ПОЗИЦИЙ)
        const products = [];
        for (let i = 1; i <= 15; i++) {
            products.push({
                id: i,
                name: `Позиция ${i}`,
                price: `${(1000 + i * 100)} VCHF`
            });
        }

        // 2. ГЕНЕРАТОР (КУЗНИЦА)
        const grid = document.getElementById('main-grid');

        products.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img">IMAGE_SLOT_${item.id}</div>
                <div style="font-size: 0.8rem;">${item.name}</div>
                <div class="price">${item.price}</div>
                <button onclick="alert('Выбрано: ${item.name}')">В СЕЙФ</button>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
