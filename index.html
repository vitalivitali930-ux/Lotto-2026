<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werbung To Go | Logistics Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --swiss-red: #D52B1E; --dark-bg: #121212; --gold: #c5a059; --card-bg: #1e1e1e; }
        body { font-family: 'Helvetica', Arial, sans-serif; background: var(--dark-bg); color: #e0e0e0; margin: 0; padding: 0; }
        
        /* Логин */
        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #2c2c2c 0%, #121212 100%); }
        .auth-box { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--swiss-red); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        
        /* Панель управления */
        #admin-panel { display: none; padding: 15px; max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--swiss-red); padding-bottom: 10px; margin-bottom: 20px; }
        
        .card { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .card h3 { color: var(--gold); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: var(--swiss-red); outline: none; }
        
        .btn { width: 100%; background: var(--swiss-red); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #ff2a1a; transform: translateY(-2px); }
        .btn:disabled { background: #555; cursor: not-allowed; }

        .flex-row { display: flex; gap: 10px; align-items: center; }
        .mwst-box { background: #2a2a2a; padding: 10px; border-radius: 6px; display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        
        footer { font-size: 11px; color: #555; text-align: center; margin-top: 40px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="auth-box">
            <h1 style="color: var(--swiss-red); margin: 0;">WERBUNG TO GO</h1>
            <p style="letter-spacing: 2px; font-size: 12px; margin-bottom: 30px;">SWITZERLAND</p>
            <input type="password" id="access-code" placeholder="ACCESS CODE" style="text-align: center;">
            <button class="btn" onclick="checkAccess()">UNLOCK TERMINAL</button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="header">
            <div>
                <span style="color: var(--swiss-red); font-weight: bold;">ZERO CHAOS</span>
                <div style="font-size: 10px;">ID: CHE-376.512.386</div>
            </div>
            <div id="clock" style="color: var(--gold); font-family: monospace;"></div>
        </div>

        <div class="card">
            <h3>LOGISTICS ORDER GENERATOR</h3>
            
            <input type="text" id="order-id" placeholder="Order Number (e.g. WTG-001)">
            <input type="text" id="route-info" placeholder="Route (e.g. Warsaw, PL - Berlin, DE)">
            <input type="text" id="truck-data" placeholder="Truck Plate / Driver Name / Phone">
            
            <div class="flex-row">
                <input type="number" id="net-price" placeholder="Net Rate (€)" oninput="recalc()">
                <div style="min-width: 120px; text-align: right; color: var(--gold); font-weight: bold;" id="total-val">0.00 €</div>
            </div>

            <div class="mwst-box">
                <input type="checkbox" id="mwst-apply" style="width: 20px;" onchange="recalc()">
                <label for="mwst-apply">Apply Swiss VAT (8.1% MWST)</label>
            </div>

            <textarea id="extra-terms" rows="3" placeholder="Additional instructions (Loading time, ADR, etc.)"></textarea>

            <button class="btn" id="gen-btn" onclick="generateContract()">GENERATE & DOWNLOAD PDF</button>
        </div>

        <footer>
            <strong>МАНИФЕСТ МОНОЛИТА</strong><br>
            Интегральность > Краткость. Код защищен. [cite: 2026-02-24]<br>
            Werbung To Go - Information & Logistics Management. Egerkingen, CH.
        </footer>
    </div>

    <script>
        const MASTER_CODE = "777";

        function checkAccess() {
            if(document.getElementById('access-code').value === MASTER_CODE) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                updateClock();
                setInterval(updateClock, 1000);
            } else {
                alert("ACCESS DENIED");
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString('de-CH');
        }

        function recalc() {
            let price = parseFloat(document.getElementById('net-price').value) || 0;
            let total = document.getElementById('mwst-apply').checked ? price * 1.081 : price;
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        function generateContract() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const orderId = document.getElementById('order-id').value || "WTG-" + Math.floor(1000 + Math.random()*9000);
            const route = document.getElementById('route-info').value || "TBA";
            const truck = document.getElementById('truck-data').value || "TBA";
            const price = parseFloat(document.getElementById('net-price').value) || 0;
            const isVat = document.getElementById('mwst-apply').checked;
            const vatVal = isVat ? (price * 0.081).toFixed(2) : "0.00";
            const total = isVat ? (price * 1.081).toFixed(2) : price.toFixed(2);
            const extra = document.getElementById('extra-terms').value;

            // Header Bar
            doc.setFillColor(213, 43, 30);
            doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.setFont("helvetica", "bold");
            doc.text("WERBUNG TO GO", 20, 18);
            doc.setFontSize(8);
            doc.text("LOGISTICS & INFORMATION MANAGEMENT | SWITZERLAND", 20, 25);
            doc.text("UID: CHE-376.512.386\nEgerkingen, CH", 190, 15, null, null, "right");

            // Title
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(14);
            doc.text("TRANSPORT ORDER / CONFIRMATION: #" + orderId, 20, 45);
            
            // Grid
            doc.setDrawColor(0);
            doc.setLineWidth(0.2);
            doc.rect(20, 50, 170, 65); 
            doc.line(20, 72, 190, 72); 
            doc.line(20, 93, 190, 93); 
            doc.line(110, 50, 110, 115); 

            // Data Entries
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            doc.text("CARRIER / VEHICLE:", 25, 56);
            doc.setFont("helvetica", "normal");
            doc.text(truck, 25, 63, {maxWidth: 80});

            doc.setFont("helvetica", "bold");
            doc.text("DATE OF ISSUE:", 115, 56);
            doc.setFont("helvetica", "normal");
            doc.text(new Date().toLocaleDateString('de-CH'), 115, 63);

            doc.setFont("helvetica", "bold");
            doc.text("ROUTE DETAILS:", 25, 78);
            doc.setFont("helvetica", "normal");
            doc.text(route, 25, 85, {maxWidth: 80});

            doc.setFont("helvetica", "bold");
            doc.text("PAYMENT TERMS:", 115, 78);
            doc.setFont("helvetica", "normal");
            doc.text("Standard: 45 days after POD delivery", 115, 85);

            doc.setFont("helvetica", "bold");
            doc.text("TOTAL FREIGHT RATE:", 25, 99);
            doc.setFontSize(11);
            doc.text(total + " EUR (Incl. " + vatVal + " VAT)", 25, 108);

            // THE WALL OF TEXT (Extended Terms & Clauses)
            doc.setFontSize(6.5);
            doc.setFont("helvetica", "bold");
            doc.text("GENERAL TERMS & CONDITIONS (ALLGEMEINE GESCHÄFTSBEDINGUNGEN):", 20, 125);
            doc.setFont("helvetica", "normal");
            const terms = [
                "1. NEUTRALITY: The carrier is obliged to maintain absolute neutrality towards the shipper and consignee. Direct contact is strictly forbidden.",
                "2. INSURANCE: The carrier confirms valid CMR insurance with a minimum coverage of EUR 100,000 per claim. Proof must be provided upon request.",
                "3. PENALTIES: Cancellation of this order by the carrier less than 24 hours before loading results in a penalty of 100% of the freight value.",
                "4. EQUIPMENT: The vehicle must be technically sound, clean, and odor-free. Driver must have helmet, safety vest, and safety shoes.",
                "5. LOADING/UNLOADING: 24h free for loading and 24h for unloading. Demurrage requires a stamped waiting time report signed by the warehouse.",
                "6. CABOTAGE: The carrier is responsible for complying with cabotage regulations and EU mobility package rules in the country of transport.",
                "7. DOCUMENTS: Payment is made only upon receipt of the original CMR, signed and stamped without reservations (Clean POD).",
                "8. NO CO-LOADING: Transshipment or additional loading (co-loading) is strictly prohibited unless confirmed in writing by Werbung To Go.",
                "9. DELAYS: Any delays must be reported immediately. Late arrival may result in a deduction of EUR 150.00 per day from the freight rate.",
                "10. JURISDICTION: This contract is subject to Swiss Law. The place of jurisdiction for all disputes is Solothurn, Switzerland.",
                "11. PALLET EXCHANGE: Pallet exchange is the responsibility of the carrier. Non-returned pallets will be charged at EUR 25.00 per piece.",
                "12. LOADING SECURITY: The driver is responsible for secure loading and lashing of goods according to DIN EN 12642 XL standards."
            ];
            doc.text(terms, 20, 130, {maxWidth: 170});

            // Extra Instructions
            if(extra) {
                doc.setFillColor(245, 245, 245);
                doc.rect(20, 175, 170, 25, 'F');
                doc.setFont("helvetica", "italic");
                doc.setFontSize(8);
                doc.text("SPECIAL INSTRUCTIONS:", 25, 182);
                doc.text(extra, 25, 188, {maxWidth: 160});
            }

            // Signature area
            doc.setDrawColor(150, 150, 150);
            doc.line(20, 245, 85, 245);
            doc.setFontSize(8);
            doc.text("CARRIER STAMP & SIGNATURE", 20, 250);

            // Approved Stamp
            doc.setDrawColor(213, 43, 30);
            doc.setLineWidth(1);
            doc.rect(130, 235, 55, 25);
            doc.setTextColor(213, 43, 30);
            doc.setFontSize(12);
            doc.setFont("helvetica", "bold");
            doc.text("WERBUNG TO GO", 157.5, 245, null, null, "center");
            doc.setFontSize(7);
            doc.text("APPROVED ELECTRONICALLY", 157.5, 253, null, null, "center");

            doc.save(`Transport_Order_${orderId}.pdf`);
        }
    </script>
</body>
</html>
