<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERO CHAOS | MONOLITH v3.6</title>
    <style>
        :root {
            --neon-green: #00ff41; --neon-blue: #00f2ff; --neon-red: #ff3131; --neon-gold: #ffea00;
            --dark-bg: #050505; --panel-bg: #0d0d0d; --font: 'Courier New', monospace;
        }
        body { 
            background-color: var(--dark-bg); color: var(--neon-green); 
            font-family: var(--font); margin: 0; padding: 15px; font-size: 20px; 
        }
        #sync-error { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 0, 0, 0.95); z-index: 9999; text-align: center; 
            padding-top: 20%; font-size: 2em; font-weight: bold; color: white;
        }
        .header { 
            border: 2px solid var(--neon-green); padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .panel { background: var(--panel-bg); border: 1px solid var(--neon-green); padding: 15px; margin-bottom: 25px; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.75em; }
        .log-table th { background: #002b00; padding: 12px; text-align: left; border: 1px solid var(--neon-green); color: var(--neon-blue); }
        .log-table td { padding: 15px 10px; border: 1px solid #333; text-align: center; }
        
        .timer-box { 
            background: #001a1a; color: #fff; padding: 4px 8px; 
            border-radius: 4px; border: 1px solid var(--neon-blue); font-weight: bold;
        }
        .status-live { color: var(--neon-red); font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        .footer-stats { 
            background: #1a1a1a; padding: 20px; border: 2px solid var(--neon-green); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .big-sum { font-size: 1.8em; color: white; text-shadow: 0 0 15px var(--neon-green); }
    </style>
</head>
<body>

<div id="sync-error">SYNC ERROR. DATA IS OUTDATED</div>

<div class="header">
    <div>
        <div id="live-clock" style="font-size: 1.6em; font-weight: bold; color: #fff;">00:00:00</div>
        <div style="font-size: 0.7em; color: var(--neon-blue);">ECHELON PROTOCOL v3.6</div>
    </div>
    <div style="text-align: right;">
        <div style="font-size: 0.6em; color: var(--neon-green);">BANK BALANCE:</div>
        <div class="big-sum"><span id="display-bank">50.00</span> EUR</div>
    </div>
</div>

<div class="panel">
    <div style="color: var(--neon-blue); font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid;">◈ BLUE SECTOR (ОЖИДАНИЕ)</div>
    <table class="log-table">
        <thead>
            <tr>
                <th>МАТЧ</th>
                <th>БЫЛО</th>
                <th>СТАВКА</th>
                <th>WIN</th>
                <th>ОТСЧЕТ (МИНУС ВРЕМЯ)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="text-align:left">Leipzig (П1)</td>
                <td>25.00</td>
                <td>25.00</td>
                <td>37.75</td>
                <td><span id="timer-lpz" class="timer-box">--:--:--</span></td>
            </tr>
            <tr>
                <td style="text-align:left">Napoli (ТБ2.5)</td>
                <td>25.00</td>
                <td>25.00</td>
                <td>47.75</td>
                <td><span id="timer-nap" class="timer-box">--:--:--</span></td>
            </tr>
        </tbody>
    </table>
</div>

<div class="footer-stats">
    <div>
        <div style="font-size: 0.6em;">WEEK START:</div>
        <div style="font-weight: bold;">50.00 EUR</div>
    </div>
    <div style="text-align: right;">
        <div style="font-size: 0.6em;">PROJECTION SUN:</div>
        <div style="font-weight: bold; color: var(--neon-gold); font-size: 1.2em;">~210.00 EUR</div>
    </div>
</div>

<script>
    function updateTimers() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('de-CH', {hour12: false});

        // 20:30 - Leipzig
        renderTimer('timer-lpz', 20, 30);
        // 20:45 - Napoli
        renderTimer('timer-nap', 20, 45);

        if(window.lastSync && Math.abs(Date.now() - window.lastSync) > 1100) {
            document.getElementById('sync-error').style.display = 'block';
        } else {
            document.getElementById('sync-error').style.display = 'none';
        }
        window.lastSync = Date.now();
    }

    function renderTimer(id, h, m) {
        const target = new Date();
        target.setHours(h, m, 0);
        const diff = target - new Date();
        const el = document.getElementById(id);

        if (diff <= 0) {
            el.innerHTML = "LIVE";
            el.className = "status-live";
        } else {
            const hrs = Math.floor(diff / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            el.innerText = `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        }
    }

    setInterval(updateTimers, 1000);
</script>

</body>
</html>
