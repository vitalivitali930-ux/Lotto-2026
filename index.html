<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, vertical-align=top">
    
    <meta name="theme-color" content="#1a1c1e">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="color-scheme" content="dark">

    <title>ZERO_CHAOS // TERMINAL_2x2_CORE</title>
    <style>
        :root {
            /* ПАЛИТРА: ТЕХНО-АНТРАЦИТ И МЕТАЛЛИЗИРОВАННЫЙ МАХАГОН */
            --bg: radial-gradient(circle at top, #1a1c1e 0%, #050607 100%);
            --gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            --gold-solid: #fcf6ba;
            --steel: rgba(45, 45, 48, 0.6);
            --glass: rgba(74, 4, 4, 0.22); 
            --spotlight: radial-gradient(circle at 50% 0%, rgba(252, 246, 186, 0.22) 0%, transparent 75%);
            
            /* ФОРМУЛА: КОНТРАСТНЫЙ СРЕЗ */
            --rings: radial-gradient(circle at var(--ox, -10%) var(--oy, -10%), 
                transparent 0%, 
                transparent 35%, 
                rgba(0, 0, 0, 0.5) 36%, 
                rgba(94, 10, 10, 0.12) 37%,
                transparent 39%, 
                transparent 60%,
                rgba(0, 0, 0, 0.55) 61%,
                rgba(74, 4, 4, 0.18) 62%,
                transparent 65%);
            
            /* ПАТТЕРН ИНЖЕНЕРНОЙ СЕТКИ */
            --grid: linear-gradient(rgba(252, 246, 186, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(252, 246, 186, 0.03) 1px, transparent 1px);
        }
        
        body {
            background: var(--bg);
            background-image: var(--grid); 
            background-size: 20px 20px;
            background-attachment: fixed;
            color: var(--gold-solid);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            letter-spacing: 0.5px;
            overflow: hidden;
            color-scheme: dark;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 12px;
            text-shadow: 0 0 20px rgba(252, 246, 186, 0.2);
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* 🔱 ГЕОМЕТРИЯ 2х2 🔱 */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 1 / 1;
        }

        /* КАРТОЧКА: ТЕХНО-ЛОЖЕМЕНТ (ЭТАЛОН) */
        .card {
            position: relative;
            background: var(--glass);
            background-image: var(--rings); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(252, 246, 186, 0.1);
            border-left: 2px solid rgba(252, 246, 186, 0.2);
            border-top: 1px solid rgba(252, 246, 186, 0.45); 
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.9), inset 0 0 30px rgba(74, 4, 4, 0.3);
            overflow: hidden;
            cursor: pointer;
        }

        /* УНИКАЛЬНЫЕ СРЕЗЫ ДЛЯ 2х2 */
        .card:nth-child(1) { --ox: 110%; --oy: -20%; }
        .card:nth-child(2) { --ox: -40%; --oy: 120%; }
        .card:nth-child(3) { --ox: 60%; --oy: -40%; }
        .card:nth-child(4) { --ox: 20%; --oy: 140%; }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: var(--spotlight);
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 2;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--gold-solid);
            box-shadow: 0 25px 60px rgba(0,0,0,1), 0 0 20px rgba(252, 246, 186, 0.1);
            z-index: 10;
        }

        .card-img {
            width: 80%; height: 50%;
            background: linear-gradient(180deg, #000 0%, #1a0101 100%);
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: #4a0404;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .category-title {
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-solid);
            margin: 5px 0;
            position: relative; z-index: 1;
        }

        .category-desc {
            font-size: 0.65rem; 
            opacity: 0.6; 
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative; z-index: 1;
        }

        /* УДАЛЕНЫ СТИЛИ КОРЗИНЫ И СЕЙФ-БАРА */
    </style>
</head>
<body onclick="activateFullscreen()">

    <h2>VCHF // ARSENAL</h2>
    
    <div class="shop-grid" id="main-grid">
        <div class="card" onclick="openSector('INTELLECT')">
            <div class="card-img">INTELLECT_NODE</div>
            <div class="category-title">Intellect</div>
            <div class="category-desc">Услуги & Креатив</div>
        </div>
        <div class="card" onclick="openSector('CRAFT_FOOD')">
            <div class="card-img">CRAFT_NODE</div>
            <div class="category-title">Craft Food</div>
            <div class="category-desc">Частный ресурс</div>
        </div>
        <div class="card" onclick="openSector('WORKSHOP')">
            <div class="card-img">WORKSHOP_NODE</div>
            <div class="category-title">Workshop</div>
            <div class="category-desc">Мастерская & Цех</div>
        </div>
        <div class="card" onclick="openSector('WAY')">
            <div class="card-img">WAY_NODE</div>
            <div class="category-title">Way</div>
            <div class="category-desc">Логистика & Путь</div>
        </div>
    </div>

    <script>
        function activateFullscreen() {
            let docEl = document.documentElement;
            if (docEl.requestFullscreen) docEl.requestFullscreen();
        }

        function openSector(name) {
            // Базовая логика для будущего перехода
            console.log(`АРХИТЕКТОР: Вход в сектор ${name}`);
            // Здесь будет развертка 25 слотов
        }
    </script>

    <div style="position: fixed; bottom: 20px; opacity: 0.15; font-size: 0.6rem; letter-spacing: 10px;">
        МАНІФЕСТ МОНОЛІТА // 2026
    </div>

</body>
</html>
