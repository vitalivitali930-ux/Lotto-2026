<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotto 2026: VCHF Engine</title>
    <style>
        :root {
            --bg: #050505;
            --cherry-deep: #2a0101;
            --gold-vchf: #d4af37;
            --cw: 16vw; 
            --ch: 23vw;
            --max-cw: 75px;
            --max-ch: 105px;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); overflow: hidden; font-family: sans-serif;
        }

        #viewport {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 45%, var(--cherry-deep) 0%, var(--bg) 90%);
            perspective: 1200px; 
            display: flex; justify-content: center; align-items: center;
        }

        #world {
            position: absolute; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(20deg); 
        }

        #dealer-hub {
            position: absolute; top: 40%; left: 50%;
            width: 0; height: 0; transform-style: preserve-3d;
        }

        .card {
            position: absolute;
            width: var(--cw); height: var(--ch);
            max-width: var(--max-cw); max-height: var(--max-ch);
            background-color: #fff; border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: center bottom;
            cursor: pointer; will-change: transform, opacity;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 5px; box-sizing: border-box; font-weight: bold; font-size: 1.2rem;
            transform: translate(-50%, -50%) scale(0);
        }

        .card.shirt {
            background-image: url('1771489965074(1).png'); 
            background-size: cover; background-position: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        #trump-slot {
            position: absolute; top: 10%; right: 10%;
            width: 60px; height: 85px; border: 2px dashed var(--gold-vchf);
            border-radius: 5px; opacity: 0.3; display: flex; 
            align-items: center; justify-content: center; font-size: 2rem;
            color: var(--gold-vchf); transition: 1s;
        }

        #ritual-btn {
            position: absolute; bottom: 10%; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            background: linear-gradient(to bottom, #d4af37, #aa771c);
            border: none; padding: 12px 30px; border-radius: 20px;
            font-weight: bold; letter-spacing: 2px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="viewport">
    <div id="world">
        <div id="dealer-hub"></div>
    </div>
    <div id="trump-slot">?</div>
    <button id="ritual-btn">ЗАПУСК VCHF</button>
</div>

<script>
    /** * МАНИФЕСТ МОНОЛИТА [cite: 2026-02-24]
     * Кодовое слово: движок vchf [cite: 2026-02-24]
     * Автор: Нулевой Хаос (Zero Chaos) [cite: 2026-02-28]
     */

    const Core = {
        deck: [],
        suits: ['♥', '♦', '♣', '♠'],
        vals: ['6','7','8','9','10','J','Q','K','A'],
        trump: '',
        
        init() {
            this.buildDeck();
            document.getElementById('ritual-btn').onclick = () => this.startChaos();
        },

        buildDeck() {
            const hub = document.getElementById('dealer-hub');
            let id = 0;
            this.suits.forEach(s => {
                this.vals.forEach(v => {
                    const el = document.createElement('div');
                    el.className = 'card shirt';
                    el.id = `card-${id}`;
                    el.dataset.suit = s;
                    el.dataset.val = v;
                    el.dataset.rank = this.vals.indexOf(v);
                    hub.appendChild(el);
                    this.deck.push(el);
                    id++;
                });
            });
        },

        startChaos() {
            document.getElementById('ritual-btn').style.display = 'none';
            this.deck.forEach((card, i) => {
                const angle = Math.random() * 360;
                setTimeout(() => {
                    card.style.transform = `translate(-50%, -50%) rotate(${angle}deg) scale(1)`;
                }, i * 15);
            });
            setTimeout(() => this.launchTrump(), 1200);
        },

        launchTrump() {
            const trumpIdx = Math.floor(Math.random() * this.deck.length);
            const trumpCard = this.deck[trumpIdx];
            this.trump = trumpCard.dataset.suit;
            const slot = document.getElementById('trump-slot');
            const rect = slot.getBoundingClientRect();
            const hubRect = document.getElementById('dealer-hub').getBoundingClientRect();

            trumpCard.style.zIndex = 1000;
            trumpCard.style.left = `${rect.left - hubRect.left + 30}px`;
            trumpCard.style.top = `${rect.top - hubRect.top + 42}px`;
            trumpCard.style.transform = `translate(-50%, -50%) rotate(15deg) scale(0.9)`;
            
            setTimeout(() => {
                slot.innerText = this.trump;
                slot.style.opacity = '1';
                this.distributeToArcs();
            }, 600);
        },

        distributeToArcs() {
            const suitGroups = { '♥': [], '♦': [], '♣': [], '♠': [] };
            this.deck.forEach(c => { if (parseInt(c.style.zIndex) < 1000) suitGroups[c.dataset.suit].push(c); });

            const arcCenters = [
                { x: -window.innerWidth * 0.35, y: window.innerHeight * 0.35, rot: -20 },
                { x: -window.innerWidth * 0.12, y: window.innerHeight * 0.4, rot: -10 },
                { x: window.innerWidth * 0.12, y: window.innerHeight * 0.4, rot: 10 },
                { x: window.innerWidth * 0.35, y: window.innerHeight * 0.35, rot: 20 }
            ];

            Object.keys(suitGroups).forEach((suit, sIdx) => {
                const group = suitGroups[suit];
                const center = arcCenters[sIdx];
                group.forEach((card, cIdx) => {
                    const step = 5; 
                    const offsetX = (cIdx - group.length / 2) * step;
                    const offsetY = Math.abs(cIdx - group.length / 2) * 3;
                    setTimeout(() => {
                        card.style.left = `${center.x + offsetX}px`;
                        card.style.top = `${center.y + offsetY}px`;
                        card.style.transform = `translate(-50%, -50%) rotate(${center.rot + (cIdx - group.length/2) * 2}deg) scale(1)`;
                        card.dataset.owner = 'PLAYER';
                    }, (sIdx * 150) + (cIdx * 25));
                });
            });
            setTimeout(() => Battle.init(), 2000);
        }
    };
    /**
     * МОНОЛИТ: Windows 3-5 — Боевой Контакт и Финал
     * Логика: Твой ход -> Ответ Спарка -> Бито -> Конец игры.
     * Автор: Нулевой Хаос (Zero Chaos) [cite: 2026-02-28]
     */

    const Battle = {
        table: [],
        isFirstTurn: true,
        limit: 5,

        init() {
            Core.deck.forEach(card => {
                card.onclick = () => this.handlePlayerMove(card);
            });
            console.log("Боевой интерфейс активен. [cite: 2026-02-19]");
        },

        handlePlayerMove(card) {
            if (card.dataset.owner !== 'PLAYER' || this.table.length >= this.limit * 2) return;
            this.moveToCenter(card, 'PLAYER');
            setTimeout(() => this.sparkResponse(card), 600);
        },

        moveToCenter(card, side) {
            const index = this.table.length;
            const xOffset = (index * 35) - 70;
            const yOffset = (side === 'PLAYER') ? 50 : -50;

            card.style.zIndex = 500 + index;
            card.style.left = `${xOffset}px`;
            card.style.top = `${yOffset}px`;
            
            if (side === 'AI' || card.classList.contains('shirt')) {
                card.classList.remove('shirt');
                const color = (card.dataset.suit === '♥' || card.dataset.suit === '♦') ? 'red' : 'black';
                card.innerHTML = `<div style="color:${color}">${card.dataset.val}${card.dataset.suit}</div>`;
            }

            card.style.transform = `translate(-50%, -50%) rotateZ(${Math.random()*10 - 5}deg) scale(1.1)`;
            this.table.push(card);
            this.checkBitoState();
        },

        sparkResponse(attackCard) {
            // Имитация ИИ "Спарк" (7±2) [cite: 2026-02-19]
            const myCards = Core.deck.filter(c => !c.dataset.owner && !this.table.includes(c));
            let defense = myCards.find(c => 
                c.dataset.suit === attackCard.dataset.suit && 
                parseInt(c.dataset.rank) > parseInt(attackCard.dataset.rank)
            );

            if (!defense && attackCard.dataset.suit !== Core.trump) {
                defense = myCards.find(c => c.dataset.suit === Core.trump);
            }

            if (defense) {
                this.moveToCenter(defense, 'AI');
            }
        },

        checkBitoState() {
            const btn = document.getElementById('ritual-btn');
            if (this.table.length > 0 && this.table.length % 2 === 0) {
                btn.innerText = "БИТО";
                btn.style.display = 'block';
                btn.onclick = () => this.executeBito();
            }
        },

        executeBito() {
            this.table.forEach(card => {
                card.style.transition = "all 0.8s ease-in";
                card.style.left = "-200vw";
                card.dataset.owner = 'DISCARD';
            });
            this.table = [];
            document.getElementById('ritual-btn').style.display = 'none';
            this.checkFinal();
        },

        checkFinal() {
            const remaining = Core.deck.filter(c => c.dataset.owner === 'PLAYER').length;
            if (remaining === 0) {
                alert("ТЫ ВЫШЕЛ! Манифест Монолита исполнен. [cite: 2026-02-24]");
                location.reload();
            }
        }
    };

    // Запуск проекта "Лотто" [cite: 2026-02-19]
    Core.init();

    /* [2026-02-23] Примечание: Код написан с приоритетом целостности над краткостью. */
</script>
</body>
</html>
