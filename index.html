<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Living Monolith (Pulsar Zoom Edition)</title>
    <style>
        :root {
            --gold: #ffcf40;
            --space-dark: #121625; 
            --nebula-core: #222a44; 
            --spark-neon: #00fa9a;
            --trump-halo: #8a2be2; 
            --cherry-pulse: #4a0404; 
            --bg-card: #ffffff;
            --grid-color: rgba(255, 207, 64, 0.06); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #050505; 
            color: #e0e6ff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            perspective: 1200px; 
        }
        .arena-top {
            height: 62%;
            position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 8s infinite ease-in-out;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            border-bottom: 2px solid rgba(255, 207, 64, 0.25);
            overflow: hidden;
            transform-style: preserve-3d;
            transform: rotateX(8deg);
            margin-top: 5px;
        }
        @keyframes tableBreathe {
            0%, 100% { 
                background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
                filter: brightness(0.8);
            }
            50% { 
                background: radial-gradient(circle at 50% 45%, #3a0a1a 0%, var(--cherry-pulse) 65%, #050000 100%);
                filter: brightness(1.2);
            }
        }
        .arena-top::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 44px 44px; 
            pointer-events: none;
            z-index: 0;
        }
        .arena-top::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255, 207, 64, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: nebulaPulse 10s infinite alternate;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes nebulaPulse {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }
        .control-bottom {
            height: 38%;
            position: relative;
            background: linear-gradient(to top, #000 0%, #0c0f18 100%);
            padding: 10px 5px;
            border-top-left-radius: 50% 30px;
            border-top-right-radius: 50% 30px;
            z-index: 2000;
            border-top: 1px solid rgba(255, 207, 64, 0.2);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .control-bottom.expanded {
            height: 55%;
            background: linear-gradient(to top, #000 0%, #1a1a1a 100%);
            transform: translateY(-20px);
        }
        .card-node {
            position: absolute;
            width: 55px; height: 77px;
            background-color: #1a1a1a;
            background-image: url('1771489965074(1).png');
            background-size: cover;
            border: 1px solid rgba(255, 207, 64, 0.4);
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            cursor: pointer;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }
        .card-node.face-up { 
            background-image: none !important; 
            background-color: var(--bg-card);
            border: 1px solid #fff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .card-node.hide { opacity: 0; pointer-events: none; transform: scale(0.5) rotateX(90deg); }
        
        .suits-grid { 
            display: flex; flex-direction: column; height: 100%; position: relative; 
            padding-left: 20px; align-items: center; justify-content: center;
            transition: all 0.5s ease;
        }
        .suit-row { display: flex; height: 35px; margin-top: -5px; transition: all 0.4s ease; }
        
        .slot { 
            width: 38px; height: 52px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 207, 64, 0.15); 
            position: relative; display: flex; align-items: center; justify-content: center;
            margin-left: -15px; border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(2px);
            font-size: 8px;
        }
        .slot.filled { 
            background: var(--bg-card); border: 1px solid #fff; z-index: 5; 
            box-shadow: -3px 0 10px rgba(0,0,0,0.5); 
        }

        /* ZOOM MODE */
        .control-bottom.expanded .suit-row { height: 65px; margin-top: 5px; }
        .control-bottom.expanded .slot { 
            width: 58px; height: 82px; margin-left: -10px; 
            font-size: 14px; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        .control-bottom.expanded .slot.filled:hover { 
            transform: translateY(-40px) scale(1.3) rotate(0deg); 
            z-index: 1000 !important; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 20px var(--gold);
        }

        .action-btns { position: absolute; bottom: 20px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 2500; }
        .ui-controls { position: absolute; top: -15px; right: 20px; z-index: 2600; display: flex; gap: 10px; }
        
        button { 
            padding: 12px 18px; background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(12px); border: 1px solid var(--gold); color: var(--gold); 
            font-size: 9px; letter-spacing: 2px; font-weight: bold; 
            text-transform: uppercase; cursor: pointer; transition: all 0.3s;
        }
        .btn-circle { width: 40px; height: 40px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        
        #status-msg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(16, 20, 32, 0.95); border: 1px solid var(--gold); color: var(--gold);
            padding: 15px 35px; text-align: center; z-index: 2100; font-weight: bold;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #status-msg.active { transform: translate(-50%, -50%) scale(1); }
</style>
</head>
<body>
    <div id='status-msg'></div>
    <div class='arena-top' id='arena'>
        <div class='spark-zone'><span style='font-size:9px; color:var(--spark-neon); letter-spacing:4px; font-weight:bold;'>SPARK CORE ONLINE</span><div id='spark-cards' style='margin-left:15px;'></div></div>
        <div class='trump-status'><div id='trump-icon'>?</div></div>
        <div class='chaos-deck-container'><div id='chaos-deck'></div></div>
        <div id='battle-table'></div>
    </div>
    <div class='control-bottom' id='ctrl-panel'>
        <div class='ui-controls'>
            <button id='btn-zoom' class='btn-circle' onclick='toggleZoom()'>↕</button>
        </div>
        <div class='suits-grid' id='hand-grid' onclick='if(!isZoomed) toggleZoom()'>
            <div id='s-spades' class='suit-row'></div><div id='s-clubs' class='suit-row'></div>
            <div id='s-diamonds' class='suit-row'></div><div id='s-hearts' class='suit-row'></div>
        </div>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>АКТИВАЦИЯ</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-pass' style='display:none' onclick='handlePass()'>ПАСС</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
    </div>

<script>
    var SUITS = ['♠', '♣', '♦', '♥'];
    var RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    var COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    var vchf = { deck: [], pHand: [], eHand: [], table: [], trump: '', phase: 'WAIT', turn: 'player' };
    var isZoomed = false;
    
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    var ctx = null;

    function toggleZoom() {
        isZoomed = !isZoomed;
        var p = document.getElementById('ctrl-panel');
        var b = document.getElementById('btn-zoom');
        if(isZoomed) {
            p.classList.add('expanded'); b.textContent = '✕';
        } else {
            p.classList.remove('expanded'); b.textContent = '↕';
        }
        playSound('slide');
    }

    function playSound(type) {
        if(!ctx) ctx = new AudioCtx();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if(type === 'slide') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(160, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.12);
            osc.start(); osc.stop(ctx.currentTime + 0.12);
        } else if(type === 'bito') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(110, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
            gain.gain.setValueAtTime(0.35, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.35);
            osc.start(); osc.stop(ctx.currentTime + 0.35);
        }
    }

    function createDust(x, y) {
        var arena = document.getElementById('arena');
        for(var i=0; i<20; i++) {
            var p = document.createElement('div');
            p.className = 'particle'; p.style.left = x + 'px'; p.style.top = y + 'px';
            arena.appendChild(p);
            var tx = (Math.random() - 0.5) * 200, ty = (Math.random() - 0.5) * 200;
            p.animate([{ transform: 'translate(0, 0) scale(1.5)', opacity: 1 }, { transform: 'translate('+tx+'px,'+ty+'px) scale(0)', opacity: 0 }], 
            { duration: 1000 + Math.random() * 500, easing: 'ease-out' }).onfinish = function() { this.effect.target.remove(); };
        }
    }
    function showMsg(txt) {
        var m = document.getElementById('status-msg');
        if(!m) return;
        m.textContent = txt; m.classList.add('active');
        setTimeout(function() { m.classList.remove('active'); }, 2000);
    }

    function initLayout() {
        var rows = {'♠': 's-spades', '♣': 's-clubs', '♦': 's-diamonds', '♥': 's-hearts'};
        SUITS.forEach(function(s) {
            var r = document.getElementById(rows[s]);
            if(r) {
                r.innerHTML = '';
                RANKS.forEach(function(rank) {
                    var sl = document.createElement('div');
                    sl.className = 'slot'; sl.id = 'slot-' + s + '-' + rank;
                    r.appendChild(sl);
                });
            }
        });
    }

    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        vchf.phase = 'SHUFFLING';
        var t = [];
        SUITS.forEach(function(s) {
            RANKS.forEach(function(r) {
                t.push({ s: s, r: r, v: RANKS.indexOf(r), c: COLORS[s], used: false });
            });
        });
        vchf.deck = t;
        renderChaos();
        setTimeout(visualShuffle, 100);
    }

    function renderChaos() {
        var c = document.getElementById('chaos-deck');
        if(!c) return;
        c.innerHTML = '';
        vchf.deck.forEach(function(card, i) {
            var n = document.createElement('div');
            n.className = 'card-node'; n.id = 'node-' + i;
            n.style.left = '112px'; n.style.top = '100px'; 
            c.appendChild(n);
        });
    }

    function visualShuffle() {
        var startTime = Date.now(), duration = 2500;
        var trumpEl = document.getElementById('trump-icon');
        trumpEl.parentElement.classList.add('trump-shuffling');
        var interval = setInterval(function() {
            var elapsed = Date.now() - startTime;
            if(Math.random() > 0.8) playSound('slide');
            vchf.deck.forEach(function(card, i) {
                var node = document.getElementById('node-' + i);
                if(node) {
                    node.classList.add('shuffling');
                    node.style.left = (Math.random() * 225) + 'px';
                    node.style.top = (Math.random() * 200) + 'px';
                    node.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
                }
            });
            var rs = SUITS[Math.floor(Math.random() * 4)];
            trumpEl.textContent = rs; trumpEl.style.color = COLORS[rs];
            if(elapsed > duration) { clearInterval(interval); finalizeShuffle(); }
        }, 80);
    }

    function finalizeShuffle() {
        vchf.deck.sort(function() { return Math.random() - 0.5; });
        vchf.trump = SUITS[Math.floor(Math.random() * 4)];
        var te = document.getElementById('trump-icon');
        te.parentElement.classList.remove('trump-shuffling');
        te.textContent = vchf.trump; te.style.color = COLORS[vchf.trump];
        vchf.phase = 'PICK';
        vchf.deck.forEach(function(card, i) {
            var n = document.getElementById('node-' + i);
            if(n) {
                n.classList.remove('shuffling');
                var a = (i / 36) * 6.283, r = 115;
                n.style.left = (112 + r * Math.cos(a)) + 'px';
                n.style.top = (100 + r * Math.sin(a)) + 'px';
                n.style.transform = 'rotate(' + (a * 57.3 + 90) + 'deg)';
                n.onclick = function() { if(vchf.phase === 'PICK') pick(idxToDeck(card), 'player'); };
            }
        });
        showMsg('ВЫБЕРИ СВОЙ ВЕКТОР');
    }

    function idxToDeck(card) {
        for(var i=0; i<vchf.deck.length; i++) {
            if(vchf.deck[i].s === card.s && vchf.deck[i].r === card.r) return i;
        }
        return -1;
    }
    function pick(idx, actor) {
        var c = vchf.deck[idx];
        if(!c || c.used) return;
        c.used = true; playSound('slide');
        var node = document.getElementById('node-' + idx);
        if(actor === 'player') {
            vchf.pHand.push(c);
            if(node) {
                var target = document.getElementById('slot-' + c.s + '-' + c.r);
                var rect = target.getBoundingClientRect();
                var parent = document.getElementById('chaos-deck').getBoundingClientRect();
                node.style.left = (rect.left - parent.left) + 'px';
                node.style.top = (rect.top - parent.top) + 'px';
                setTimeout(function() {
                    node.classList.add('hide'); updateSlot(c);
                    var av = []; vchf.deck.forEach(function(x, i) { if(!x.used) av.push(i); });
                    if(av.length > 0) pick(av[Math.floor(Math.random() * av.length)], 'enemy');
                    checkFinal();
                }, 450);
            }
        } else {
            vchf.eHand.push(c);
            if(node) {
                node.style.top = '-250px'; node.style.opacity = '0';
                setTimeout(function() { node.classList.add('hide'); drawSparkVisual(); checkFinal(); }, 450);
            }
        }
    }

    function checkFinal() {
        if(vchf.deck.every(function(x) { return x.used; })) {
            if(vchf.phase !== 'BATTLE') { vchf.phase = 'BATTLE'; showMsg('БОЙ НАЧАТ'); updateActionButtons(); }
        }
    }

    function updateSlot(card) {
        var el = document.getElementById('slot-' + card.s + '-' + card.r);
        if(!el) return;
        el.classList.add('filled'); el.style.color = card.c; el.innerHTML = '';
        var t = document.createElement('div');
        t.style.cssText = 'position:absolute;top:3px;left:4px;font-weight:900;pointer-events:none;';
        t.textContent = card.r;
        var m = document.createElement('div');
        m.style.cssText = 'pointer-events:none;'; m.textContent = card.s;
        el.appendChild(t); el.appendChild(m);
        el.onclick = function(e) { 
            e.stopPropagation();
            if(vchf.phase === 'BATTLE' && isZoomed) selectFromHand(card); 
            else if(!isZoomed) toggleZoom();
        };
    }

    function renderTable() {
        var tc = document.getElementById('battle-table');
        if(!tc) return; tc.innerHTML = '';
        vchf.table.forEach(function(move, i) {
            var pairIndex = Math.floor(i / 2), isDefense = i % 2 !== 0;
            var pos = getTableCoords(pairIndex);
            var el = document.createElement('div');
            el.className = 'card-node face-up'; el.style.color = move.card.c;
            el.style.left = pos.x + (isDefense ? 20 : 0) + 'px';
            el.style.top = pos.y + (isDefense ? 30 : 0) + 'px';
            el.style.zIndex = 100 + i;
            var finalRotate = isDefense ? (pos.rotate + 12) : pos.rotate;
            el.style.transform = 'rotate(' + finalRotate + 'deg)';
            el.innerHTML = `<div style="position:absolute;top:4px;left:4px;font-size:12px;font-weight:bold;">${move.card.r}</div><div style="font-size:28px;text-align:center;margin-top:15px;">${move.card.s}</div>`;
            tc.appendChild(el);
        });
        updateActionButtons();
    }

    function getTableCoords(index) {
        var isBottomRow = index >= 3, colIndex = index % 3;
        var screenW = window.innerWidth;
        var startX = screenW / 2 - 110, stepX = 100, startY = isBottomRow ? 180 : 80;
        return { x: startX + (colIndex * stepX), y: startY, rotate: (Math.random() * 16 - 8) };
    }
    function handleBito() {
        if(vchf.table.length % 2 !== 0) return;
        playSound('bito');
        document.querySelectorAll('#battle-table .card-node').forEach(function(card) {
            var rect = card.getBoundingClientRect();
            createDust(rect.left + 28, rect.top + 38);
        });
        vchf.table = []; renderTable(); 
        vchf.turn = (vchf.turn === 'player') ? 'enemy' : 'player'; 
        if(vchf.turn === 'enemy') setTimeout(sparkThink, 1300);
    }

    function handlePass() { if(vchf.table.length > 0 && vchf.table.length % 2 === 0) handleBito(); }

    function handleTake() {
        vchf.pHand = vchf.pHand.concat(vchf.table.map(function(m) { return m.card; }));
        vchf.table = []; vchf.pHand.forEach(function(c) { updateSlot(c); });
        renderTable(); vchf.turn = 'enemy'; setTimeout(sparkThink, 1500);
    }

    function selectFromHand(card) {
        if(vchf.phase !== 'BATTLE' || vchf.turn !== 'player') return;
        if(canPlay(card)) {
            playSound('slide'); vchf.table.push({card: card, actor: 'player'});
            removeFromHand(card, 'player'); renderTable();
            if(vchf.table.length % 2 !== 0) { setTimeout(sparkThink, 1100); }
        }
    }

    function canPlay(card) {
        if(vchf.table.length === 0) return vchf.turn === 'player';
        var last = vchf.table[vchf.table.length - 1].card;
        if(vchf.table.length % 2 !== 0) return (card.s === last.s && card.v > last.v) || (card.s === vchf.trump && last.s !== vchf.trump);
        return vchf.table.some(m => m.card.r === card.r) && vchf.table.length < 12;
    }

    function sparkThink() {
        if(vchf.table.length % 2 !== 0) {
            var target = vchf.table[vchf.table.length - 1].card;
            var cand = vchf.eHand.filter(c => (c.s === target.s && c.v > target.v) || (c.s === vchf.trump && target.s !== vchf.trump)).sort((a,b)=>a.v-b.v);
            if(cand.length > 0) {
                var ch = cand[0]; vchf.table.push({card: ch, actor: 'enemy'});
                removeFromHand(ch, 'enemy'); playSound('slide'); renderTable();
            } else { sparkTake(); }
        } else {
            if(vchf.table.length === 0) {
                var ch = vchf.eHand.sort((a,b)=>a.v-b.v)[0];
                vchf.table.push({card: ch, actor: 'enemy'});
                removeFromHand(ch, 'enemy'); renderTable();
            } else {
                var activeRanks = vchf.table.map(m => m.card.r);
                var cand = vchf.eHand.filter(c => activeRanks.indexOf(c.r) !== -1);
                if(cand.length > 0 && vchf.table.length < 12 && vchf.table.length/2 < vchf.pHand.length + vchf.table.length/2) {
                    var ch = cand[0]; vchf.table.push({card: ch, actor: 'enemy'});
                    removeFromHand(ch, 'enemy'); renderTable();
                } else { setTimeout(handleBito, 1200); }
            }
        }
    }

    function sparkTake() {
        showMsg('SPARK: БЕРУ');
        vchf.eHand = vchf.eHand.concat(vchf.table.map(m => m.card));
        vchf.table = []; drawSparkVisual(); renderTable(); vchf.turn = 'player';
    }

    function removeFromHand(card, actor) {
        if(actor === 'player') {
            vchf.pHand = vchf.pHand.filter(c => !(c.s === card.s && c.r === card.r));
            var slot = document.getElementById('slot-' + card.s + '-' + card.r);
            if(slot) { slot.classList.remove('filled'); slot.innerHTML = ''; }
        } else {
            vchf.eHand = vchf.eHand.filter(c => !(c.s === card.s && c.r === card.r));
            drawSparkVisual();
        }
    }

    function drawSparkVisual() {
        var cont = document.getElementById('spark-cards'); if(!cont) return; cont.innerHTML = '';
        vchf.eHand.forEach(() => {
            var m = document.createElement('div');
            m.style.cssText = 'width:14px;height:20px;background:var(--spark-neon);opacity:0.6;border-radius:2px;box-shadow:0 0 12px var(--spark-neon);';
            cont.appendChild(m);
        });
    }

    function updateActionButtons() {
        var isP = vchf.turn === 'player', hasT = vchf.table.length > 0, isDef = vchf.table.length % 2 !== 0;
        document.getElementById('btn-bito').style.display = (hasT && !isDef && isP) ? 'block' : 'none';
        document.getElementById('btn-pass').style.display = (hasT && !isDef && isP) ? 'block' : 'none';
        document.getElementById('btn-take').style.display = (hasT && isDef) ? 'block' : 'none';
    }

    window.onload = function() { initLayout(); };
</script>
</body>
</html>
