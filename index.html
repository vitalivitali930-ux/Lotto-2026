<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zero Chaos | Logistics Terminal</title>
    <meta name="description" content="Zero Chaos Logistics Terminal - High-end logistics solutions in Switzerland and European Union. Operated by Werbung To Go.">
    <meta name="keywords" content="Logistik, Transport, Schweiz, Europa, Cargo, Zero Chaos, Spedition, UID CHE-376.512.386">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LogisticsService",
      "name": "Zero Chaos Logistics",
      "url": "https://zero-chaos.ch",
      "identifier": "CHE-376.512.386",
      "areaServed": ["CH", "DE", "AT", "FR", "IT", "ES", "PL", "BE", "NL", "EU"],
      "provider": {
        "@type": "LocalBusiness",
        "name": "Werbung To Go",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Egerkingen",
          "addressCountry": "CH"
        }
      }
    }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            /* Soft Pearl Rose: Жемчужный розовый с мягким glow */
            --gold: #f4e4e4; 
            --gold-shadow: rgba(244, 228, 228, 0.35);
            --bg: #0a0101; /* Фон осветлен */
            --cherry: #320404;
            --glass: rgba(20, 4, 4, 0.96);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(180, 40, 40, 0.25) 0%, transparent 75%),
                linear-gradient(rgba(244, 228, 228, 0.04) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(244, 228, 228, 0.04) 1px, transparent 1px);
            background-size: 100% 100%, 45px 45px, 45px 45px;
            color: var(--gold);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        #swiss-clock {
            font-size: 0.75rem; letter-spacing: 6px; padding: 25px;
            text-align: center; width: 100%; color: var(--gold);
            text-shadow: 0 0 12px var(--gold-shadow); opacity: 0.9;
        }

        .terminal {
            width: 100%; max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(244, 228, 228, 0.12);
            box-shadow: 0 60px 150px rgba(0,0,0,0.9);
            padding: 35px; border-radius: 2px; box-sizing: border-box;
            position: relative;
            z-index: 10;
            /* Анимация раскрытия сайта */
            transform: scaleX(0);
            opacity: 0;
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s ease;
        }
        
        .terminal.revealed {
            transform: scaleX(1);
            opacity: 1;
        }

        .terminal::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.5;
        }

        h1 {
            color: var(--gold); text-align: center; text-transform: uppercase;
            letter-spacing: clamp(8px, 3vw, 14px); font-size: 1.1rem; margin-bottom: 40px;
            font-weight: 300; opacity: 0.9;
        }

        .tabs { display: flex; gap: 2px; margin-bottom: 40px; background: rgba(255,255,255,0.03); padding: 4px; }
        .tab-btn {
            flex: 1; padding: 14px; background: transparent; border: none;
            color: var(--gold); cursor: pointer; opacity: 0.4;
            text-transform: uppercase; font-size: 0.65rem; letter-spacing: 3px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active { opacity: 1; background: rgba(244, 228, 228, 0.06); border-bottom: 1px solid var(--gold); }

        .input-group { margin-bottom: 30px; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 0.55rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; opacity: 0.5; }
        input {
            width: 100%; padding: 10px 0; background: transparent; border: none;
            border-bottom: 1px solid rgba(244, 228, 228, 0.15); color: #fff;
            outline: none; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-bottom: 1px solid var(--gold); }

        #map {
            width: 280px; height: 280px; margin: 0 auto 30px;
            border: 1px solid rgba(244, 228, 228, 0.2); border-radius: 50%;
            overflow: hidden; filter: grayscale(1) brightness(0.8) contrast(1.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }
        .hidden-map { display: none !important; }

        .action-btn {
            width: 100%; padding: 22px; background: transparent;
            border: 1px solid var(--gold); color: var(--gold);
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            letter-spacing: 5px; font-size: 0.75rem; transition: 0.4s;
        }
        .action-btn:hover { background: var(--gold); color: #000; }

        .connect-btn {
            display: inline-block; padding: 10px 24px; border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none; font-size: 0.65rem;
            letter-spacing: 3px; margin-top: 10px; transition: 0.3s;
        }
        .connect-btn:hover { background: var(--gold); color: #000; }

        #status { margin-top: 35px; text-align: center; font-size: 0.65rem; letter-spacing: 4px; color: var(--gold); opacity: 0.6; text-transform: uppercase; }

        .cargo-card {
            border-left: 2px solid var(--gold); background: rgba(255,255,255,0.03);
            padding: 22px; margin-bottom: 18px; animation: slideIn 0.6s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none; }

        /* ИНТРО: ГЕОМЕТРИЯ БАБОЧКИ И КРЫЛЬЕВ */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
            transition: 1s ease-in-out;
        }
        .butterfly-container {
            position: relative; display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 300px; transition: transform 0.8s ease-in;
        }
        .butterfly-body {
            width: 2px; height: 120px; 
            background: linear-gradient(to bottom, transparent, var(--gold), transparent);
            box-shadow: 0 0 25px var(--gold);
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            animation: pulseBody 3s infinite ease-in-out;
            z-index: 5;
        }
        .wing {
            flex: 1; text-align: center; color: var(--gold); 
            font-size: clamp(0.5rem, 2vw, 0.7rem); letter-spacing: 6px; 
            line-height: 2.5; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.7;
        }
        .wing-left { 
            text-align: right; padding-right: clamp(30px, 8vw, 60px); 
            transform: skewY(-5deg);
        }
        .wing-right { 
            text-align: left; padding-left: clamp(30px, 8vw, 60px); 
            transform: skewY(5deg);
        }

        /* 3D ZOOM PORTAL (НАБЕГАНИЕ) */
        #zoom-portal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.05);
            color: var(--gold); font-size: 3rem; font-weight: 200; letter-spacing: 40px;
            white-space: nowrap; opacity: 0; pointer-events: none; z-index: 10000;
            text-shadow: 
                0 0 20px var(--gold-shadow),
                0 0 40px var(--gold-shadow),
                4px 4px 15px rgba(0,0,0,0.9);
            filter: blur(15px);
        }

        .zoom-active {
            animation: cinematicFly 3s cubic-bezier(0.15, 0, 0.15, 1) forwards;
        }

        @keyframes cinematicFly {
            0% { transform: translate(-50%, -50%) scale(0.05); opacity: 0; filter: blur(20px); }
            15% { opacity: 1; filter: blur(5px); }
            45% { filter: blur(0); }
            100% { transform: translate(-50%, -50%) scale(40); opacity: 0; filter: blur(10px); }
        }

        .eintritt-btn {
            margin-top: 80px; font-size: 0.55rem; color: var(--gold);
            letter-spacing: 10px; opacity: 0.4; animation: blink 4s infinite;
            transition: opacity 0.5s ease;
        }
        @keyframes pulseBody { 0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scaleY(0.9); } 50% { opacity: 1; transform: translate(-50%, -50%) scaleY(1.1); } }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } }

        /* LEGAL FOOTER */
        .impressum {
            margin-top: 40px; padding-top: 20px;
            border-top: 1px solid rgba(244, 228, 228, 0.1);
            font-size: 0.5rem; letter-spacing: 2px; color: var(--gold);
            opacity: 0.3; line-height: 1.8; text-align: center;
            text-transform: uppercase; transition: 0.3s;
        }
        .impressum:hover { opacity: 0.6; }
        
        /* PROTECTION FROM WRONG TRANSLATION */
        .notranslate { unicode-bidi: isolate; }
    </style>
</head>
<body>

<div id="intro-overlay" onclick="initMonolith()">
    <div class="butterfly-container" id="btf-box">
        <div class="butterfly-body"></div>
        <div class="wing wing-left" id="wl">
            HEAR THE<br>BUTTERFLIES<br>SING
        </div>
        <div class="wing wing-right" id="wr">
            SEE THE<br>CHAOS<br>VANISH
        </div>
    </div>
    <div class="eintritt-btn" id="ebtn">[ EINTRITT ]</div>
</div>

<div id="zoom-portal" class="notranslate">ZERO CHAOS</div>

<div id="swiss-clock" class="notranslate">ZÜRICH: --:--:--</div>

<div class="terminal" id="main-terminal">
    <h1 class="notranslate">ZERO CHAOS</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('sender')">Kunde</button>
        <button class="tab-btn" onclick="switchTab('driver')">Fahrer</button>
    </div>
    
    <div id="senderView">
        <div class="input-group">
            <label>👤 Vor- und Nachname</label>
            <input type="text" id="userName" placeholder="Name">
        </div>
        <div class="input-group">
            <label>📞 Telefonnummer</label>
            <input type="tel" id="userPhone" placeholder="+41...">
        </div>
        <div class="input-group">
            <label>📍 Abfahrtsort</label>
            <input type="text" id="fromCity" placeholder="Stadt">
        </div>
        <div class="input-group">
            <label>🏁 Zielort</label>
            <input type="text" id="toCity" placeholder="Stadt">
        </div>
        <div class="input-group">
            <label>🚛 Frachtdetails</label>
            <input type="text" id="cargoInfo" placeholder="Details">
        </div>
        <button class="action-btn" onclick="sendData()">Daten Senden</button>
    </div>

    <div id="driverView" class="hidden">
        <div id="map" class="hidden-map"></div>
        <button class="action-btn" style="margin-bottom:30px; font-size:0.6rem; border-color:rgba(244,228,228,0.25);" onclick="toggleMap()" id="mapBtn">Radar Aktivieren [+]</button>
        
        <div class="input-group">
            <label>📍 Aktuelle Position</label>
            <input type="text" id="driverPos" placeholder="Stadt">
        </div>
        <div class="input-group" style="border:none;">
            <label>🛰 Scan-Radius: <span id="radiusVal">50</span> KM</label>
            <input type="range" id="radiusRange" min="0" max="250" value="50" oninput="document.getElementById('radiusVal').innerText = this.value" style="width:100%; accent-color:var(--gold); margin-top:15px;">
        </div>
        <button class="action-btn" onclick="scanCargo()">Sektor Scannen</button>
    </div>

    <div id="status" class="notranslate">TERMINAL_READY_V2.6</div>
    <div id="resultsDisplay" class="hidden"></div>

    <div class="impressum">
        System Zero Chaos<br>
        Operated by Werbung To Go<br>
        <span class="notranslate">UID: CHE-376.512.386</span> | Egerkingen, CH
    </div>
</div>
<script>
    const CONFIG = {
        token: '8744193753:AAH8TxbIxpC4NTpHVEIRdMjn5P0vuW-zn9w',
        chatId: '-1003771690386',
        ghToken: 'ghp_5qDCiJDPLX1hn5' + 'BZjKwXlDIm4nrwX42jxyLY',
        gistName: 'chaos_cargo_db.json'
    };

    let map, markerLayer;

    function playCrystalSound() {
        try {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(2800, context.currentTime);
            gain.gain.setValueAtTime(0.02, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.6);
            osc.connect(gain); gain.connect(context.destination);
            osc.start(); osc.stop(context.currentTime + 0.6);
        } catch(e) {}
    }

    function initMonolith() {
        playCrystalSound();
        const overlay = document.getElementById('intro-overlay');
        const portal = document.getElementById('zoom-portal');
        const terminal = document.getElementById('main-terminal');
        const wl = document.getElementById('wl');
        const wr = document.getElementById('wr');
        const ebtn = document.getElementById('ebtn');
        const btfBox = document.getElementById('btf-box');

        wl.style.transform = 'translateX(80px) scaleX(0) skewY(-15deg)';
        wr.style.transform = 'translateX(-80px) scaleX(0) skewY(15deg)';
        wl.style.opacity = '0';
        wr.style.opacity = '0';
        ebtn.style.opacity = '0';
        
        setTimeout(() => {
            btfBox.style.opacity = '0'; 
            portal.classList.add('zoom-active');
            overlay.style.background = 'transparent';
        }, 600);

        setTimeout(() => {
            overlay.style.opacity = '0';
            terminal.classList.add('revealed'); 
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 1000);
        }, 2800); 
    }

    function updateSwissClock() {
        const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Europe/Zurich' };
        document.getElementById('swiss-clock').innerText = `ZÜRICH: ${new Date().toLocaleTimeString('de-CH', options)}`;
    }
    setInterval(updateSwissClock, 1000); updateSwissClock();

    function initMap() {
        if (map) return;
        map = L.map('map', { attributionControl: false, zoomControl: false }).setView([47.3769, 8.5417], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        markerLayer = L.layerGroup().addTo(map);
    }

    function toggleMap() {
        const m = document.getElementById('map');
        const b = document.getElementById('mapBtn');
        if (m.classList.contains('hidden-map')) {
            m.classList.remove('hidden-map'); b.innerText = "Radar Schliessen [-]";
            setTimeout(() => { initMap(); map.invalidateSize(); loadMarkers(); }, 300);
        } else { m.classList.add('hidden-map'); b.innerText = "Radar Aktivieren [+]"; }
    }

    async function getCoords(city) {
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
            const d = await r.json(); return d.length > 0 ? { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) } : null;
        } catch(e) { return null; }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1.25;
    }

    async function getCloudData() {
        try {
            const gists = await fetch('https://api.github.com/gists', { headers: { 'Authorization': `token ${CONFIG.ghToken}` } }).then(r => r.json());
            const myGist = gists.find(g => g.files[CONFIG.gistName]);
            if (myGist) {
                const content = await fetch(myGist.files[CONFIG.gistName].raw_url).then(r => r.json());
                return { id: myGist.id, data: content };
            }
        } catch(e) {}
        return { id: null, data: [] };
    }

    async function saveToCloud(orders) {
        const { id } = await getCloudData();
        const cleanData = orders.filter(o => (Date.now() - o.timestamp) < 43200000);
        const url = id ? `https://api.github.com/gists/${id}` : 'https://api.github.com/gists';
        const res = await fetch(url, {
            method: id ? 'PATCH' : 'POST',
            headers: { 'Authorization': `token ${CONFIG.ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ public: false, files: { [CONFIG.gistName]: { content: JSON.stringify(cleanData) } } })
        });
        return res.ok;
    }

    function switchTab(role) {
        document.getElementById('resultsDisplay').classList.add('hidden');
        document.getElementById('resultsDisplay').innerHTML = '';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', (role === 'sender' && b.innerText === 'KUNDE') || (role === 'driver' && b.innerText === 'FAHRER')));
        document.getElementById('senderView').classList.toggle('hidden', role !== 'sender');
        document.getElementById('driverView').classList.toggle('hidden', role === 'sender');
    }

    async function loadMarkers() {
        const { data } = await getCloudData();
        if(!markerLayer) return; markerLayer.clearLayers();
        data.forEach(o => {
            if(o.lat && o.lon) {
                const icon = L.divIcon({ html: '<div style="width:10px;height:10px;background:var(--gold);border-radius:50%;box-shadow:0 0 12px var(--gold-shadow);"></div>', className: '' });
                L.marker([o.lat, o.lon], { icon }).addTo(markerLayer);
            }
        });
    }

    async function sendData() {
        const fields = { name: document.getElementById('userName').value, phone: document.getElementById('userPhone').value, from: document.getElementById('fromCity').value, to: document.getElementById('toCity').value, cargo: document.getElementById('cargoInfo').value };
        const status = document.getElementById('status');
        if (!fields.name || !fields.from) { status.innerText = 'DATA_MISSING'; return; }
        
        status.innerText = 'SYNCING_MONOLITH...';
        const coords = await getCoords(fields.from);
        const { data } = await getCloudData();
        data.push({ ...fields, lat: coords ? coords.lat : null, lon: coords ? coords.lon : null, timestamp: Date.now() });
        const ok = await saveToCloud(data);
        
        await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CONFIG.chatId, text: `📦 <b>NEU</b>\n👤 ${fields.name}\n📍 ${fields.from} -> ${fields.to}\n🚛 ${fields.cargo}\n📞 ${fields.phone}`, parse_mode: 'HTML' })
        });
        
        if(ok) {
            status.innerText = 'TRANSACTION_SUCCESS';
            playCrystalSound();
            ['userName', 'userPhone', 'fromCity', 'toCity', 'cargoInfo'].forEach(id => document.getElementById(id).value = '');
        }
    }

    async function scanCargo() {
        const pos = document.getElementById('driverPos').value;
        const rad = parseInt(document.getElementById('radiusRange').value);
        const resArea = document.getElementById('resultsDisplay');
        const status = document.getElementById('status');
        
        status.innerText = 'SCANNING_SECTOR...';
        const coords = await getCoords(pos);
        if(!coords) { status.innerText = 'POSITION_NOT_FOUND'; return; }
        
        const { data } = await getCloudData();
        const filtered = data.filter(o => o.lat && calculateDistance(coords.lat, coords.lon, o.lat, o.lon) <= rad);
        
        resArea.classList.remove('hidden');
        resArea.innerHTML = filtered.length === 0 ? '<div style="text-align:center; opacity:0.5; padding:30px; font-size:0.7rem;">NO_UNITS_FOUND</div>' : filtered.map(o => `
            <div class="cargo-card">
                <div style="font-size:0.5rem; letter-spacing:2px; opacity:0.4; margin-bottom:8px;">UNIT_FOUND</div>
                <b>${o.from} ➔ ${o.to}</b><br>
                <div style="font-size:0.85rem; margin:12px 0; opacity:0.85;">${o.cargo}</div>
                <a href="https://wa.me/${o.phone.replace(/\+/g,'')}" target="_blank" class="connect-btn">CONNECT</a>
            </div>
        `).join('');
        status.innerText = `SCAN_COMPLETE: ${filtered.length} UNITS`;
    }
    /* MOUSE & KEYBOARD LOCK: MONOLITH PROTECT */

// 1. Убиваем правую кнопку мыши
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    // Можно добавить тонкий троллинг в консоль, если она открыта
    console.log("System: Access Denied.");
}, false);

// 2. Блокируем горячие клавиши (Ctrl+U, Ctrl+Shift+I, F12)
document.addEventListener('keydown', function(e) {
    if (
        e.keyCode === 123 || // F12
        (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || // Ctrl+Shift+I/J
        (e.ctrlKey && e.keyCode === 85) // Ctrl+U
    ) {
        e.preventDefault();
        return false;
    }
});

// 3. Запрещаем выделение текста (через CSS и JS для надежности)
document.onselectstart = function() { return false; }; // Для старых браузеров
/* ANTI-DEBUGGER LOCK: ZERO CHAOS */
setInterval(function() {
    (function() {
        return false;
    }['constructor']('debugger')['call']());
}, 50);

</script>
</body>
</html>
