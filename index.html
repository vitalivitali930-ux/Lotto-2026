<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCHF 2.0 | MATRIX 36 | BI-TURBO</title>
    <style>
        /* PROJECT: VCHF 2.0 (Bi-Turbo Ultimate)
           IDENTITY: Нулевой Хаос (Zero Chaos)
           RULE: Новый код = Старый код + Геометрия 50/50
           MEMORY: Window 1 (lines 1-700)
           NOTE: Искра (Spark) зафиксировала 4 ряда по мастям.
        */
        :root {
            --gold: #d4af37;
            --vchf-glow: 0 0 25px rgba(212, 175, 55, 0.5);
            --cherry-velvet: radial-gradient(circle at center, #4a0010 0%, #000 100%);
            --glass: rgba(0, 0, 0, 0.85);
            --chaos: #ff0033;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: 'Courier New', monospace; color: var(--gold); 
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР 50/50 */
        #main-monolith {
            display: flex; flex-direction: column; width: 100vw; height: 100vh;
        }

        /* ВЕРХНЯЯ ЗОНА: ПОЛЕ БИТВЫ (50%) */
        #battle-sector {
            height: 50%; position: relative; background: var(--cherry-velvet);
            border-bottom: 2px solid var(--gold); overflow: hidden;
        }

        /* СТУЛЬЯ (PIG.RU STYLE) */
        .seat { position: absolute; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        #seat-top { top: 10px; left: 50%; transform: translateX(-50%); }
        #seat-left { top: 40%; left: 10px; transform: rotate(-90deg) translateY(-50%); }
        #seat-right { top: 40%; right: 10px; transform: rotate(90deg) translateY(-50%); }

        /* МАТРИЦА 36 В ЦЕНТРЕ */
        #matrix-36 {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px;
            width: 280px; height: 280px; z-index: 10;
        }
        .sphere-36 {
            width: 40px; height: 40px; border: 1px solid #333; border-radius: 4px;
            background: rgba(0,0,0,0.5); display: flex; align-items: center;
            justify-content: center; font-size: 10px; cursor: pointer; transition: 0.3s;
        }
        .sphere-36.hidden { background: #111 url('1771489965074(1).png') center/cover; }
        .sphere-36.active { border-color: var(--gold); box-shadow: var(--vchf-glow); }

        /* НИЖНЯЯ ЗОНА: КОМАНДНЫЙ ЦЕНТР (50%) */
        #player-sector {
            height: 50%; background: #000; position: relative;
            display: flex; flex-direction: column; padding: 5px;
        }

        /* 4 РЯДА ПО МАСТЯМ */
        .suit-row {
            flex: 1; display: flex; position: relative; 
            border-bottom: 1px solid #111; align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .suit-row:active { transform: scale(1.05); z-index: 100; background: rgba(212,175,55,0.1); }

        .card-slot {
            width: 11%; height: 85%; margin-right: -2%;
            background: #0a0a0a; border: 1px solid #222; border-radius: 4px;
            position: relative; transition: all 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 2px; font-size: 10px; color: transparent; /* Скрыто до активации */
        }
        .card-slot.active { color: inherit; background: #fff; border-color: var(--gold); box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .card-slot.selected { transform: translateY(-20px); z-index: 200; box-shadow: var(--vchf-glow); border: 2px solid #fff; }

        /* ИНТЕРФЕЙСНЫЕ КНОПКИ */
        #action-bar {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px;
        }
        .vchf-btn {
            padding: 10px 25px; background: #000; border: 2px solid var(--gold);
            color: var(--gold); font-weight: 900; border-radius: 20px;
            font-size: 14px; box-shadow: 0 0 15px #000; display: none;
        }

        #trump-indicator {
            position: absolute; bottom: 10px; right: 10px;
            font-size: 40px; opacity: 0.3; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="main-monolith">
        <div id="battle-sector">
            <div id="seat-top" class="seat">ИИ SPARK</div>
            <div id="seat-left" class="seat">Слот 2</div>
            <div id="seat-right" class="seat">Слот 4</div>
            
            <div id="matrix-36"></div>
            
            <div id="battle-display" style="position:absolute; top:60%; left:50%; transform:translateX(-50%); display:flex; gap:10px;">
                </div>
        </div>

        <div id="player-sector">
            <div id="action-bar">
                <button class="vchf-btn" id="btn-take" onclick="handleTake()">ВЗЯТЬ</button>
                <button class="vchf-btn" id="btn-bito" onclick="handleBito()">БИТО</button>
            </div>

            <div class="suit-row" id="row-spades"></div>
            <div class="suit-row" id="row-clubs"></div>
            <div class="suit-row" id="row-diamonds"></div>
            <div class="suit-row" id="row-hearts"></div>
            
            <div id="trump-indicator"></div>
        </div>
    </div>

    <script>
    const SUITS = ['♠', '♣', '♦', '♥'];
    const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const COLORS = {'♠': '#000', '♣': '#000', '♦': '#e60000', '♥': '#e60000'};

    let vchf_state = {
        matrix: [], // 36 позиций фрактала
        pHand: Array(36).fill(null), // Жесткая сетка игрока
        eHand: [], 
        table: [],
        trump: '',
        turn: 'player',
        phase: 'PICK' // Начальная фаза выбора
    };

    function initLayout() {
        // Создаем пустые слоты в руке игрока (4х9)
        const rows = {
            '♠': document.getElementById('row-spades'),
            '♣': document.getElementById('row-clubs'),
            '♦': document.getElementById('row-diamonds'),
            '♥': document.getElementById('row-hearts')
        };

        SUITS.forEach(suit => {
            rows[suit].innerHTML = '';
            RANKS.forEach(rank => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.id = `slot-${suit}-${rank}`;
                slot.dataset.suit = suit;
                slot.dataset.rank = rank;
                rows[suit].appendChild(slot);
            });
        });
    }

    // [КОНЕЦ ОКНА 1 - ГЕОМЕТРИЯ ЗАКРЕПЛЕНА]
    /* PROJECT: VCHF 2.0 (Bi-Turbo Ultimate)
       IDENTITY: Нулевой Хаос (Zero Chaos)
       RULE: Новый код = Старый код + Механика Слепого Выбора
       MEMORY: Window 2 (lines 701-1400)
       NOTE: Станок не экономит токены. Код полноразмерный.
    */

    // ГЕНЕРАЦИЯ ФРАКТАЛЬНОЙ МАТРИЦЫ (36 КАРТ)
    function buildFractalDeck() {
        let raw = [];
        SUITS.forEach(s => {
            RANKS.forEach(r => {
                raw.push({
                    suit: s,
                    rank: r,
                    val: RANKS.indexOf(r) + 6,
                    color: COLORS[s],
                    id: `vchf_${Math.random().toString(36).substr(2, 9)}`,
                    revealed: false
                });
            });
        });

        // 36-кратный цикл перемешивания (Фрактальное сито)
        for (let cycle = 0; cycle < 36; cycle++) {
            for (let i = raw.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [raw[i], raw[j]] = [raw[j], raw[i]];
            }
        }
        vchf_state.matrix = raw;
        renderMatrix();
    }

    // ОТРИСОВКА МАТРИЦЫ 36 НА ПОЛЕ БОЯ
    function renderMatrix() {
        const container = document.getElementById('matrix-36');
        container.innerHTML = '';
        
        vchf_state.matrix.forEach((card, index) => {
            const sphere = document.createElement('div');
            sphere.className = 'sphere-36 hidden';
            sphere.id = `matrix-pos-${index}`;
            
            // Механика выбора
            sphere.onclick = () => {
                if (vchf_state.phase === 'PICK') {
                    processPick(index, 'player');
                }
            };
            
            container.appendChild(sphere);
        });
    }

    // ЛОГИКА СЛЕПОГО ВЫБОРА (PICK)
    function processPick(index, actor) {
        const card = vchf_state.matrix[index];
        if (!card || card.picked) return;

        card.picked = true;
        const sphere = document.getElementById(`matrix-pos-${index}`);
        sphere.style.transform = 'scale(0) rotate(720deg)';
        sphere.style.opacity = '0';

        if (actor === 'player') {
            addCardToHand(card);
        } else {
            vchf_state.eHand.push(card);
        }

        // Проверка завершения фазы раздачи
        checkPickPhaseProgress();
    }

    // ДОБАВЛЕНИЕ В ЗАКРЕПЛЕННЫЙ СЛОТ (4 РЯДА)
    function addCardToHand(card) {
        const slotId = `slot-${card.suit}-${card.rank}`;
        const slot = document.getElementById(slotId);
        
        if (slot) {
            slot.classList.add('active');
            slot.style.color = card.color;
            slot.innerHTML = `
                <div style="font-weight:900">${card.rank}</div>
                <div style="font-size:22px; align-self:center">${card.suit}</div>
                <div style="align-self:flex-end; font-weight:900">${card.rank}</div>
            `;
            
            slot.onclick = () => selectCardFromHand(card);
        }
    }

    function checkPickPhaseProgress() {
        const pickedCount = vchf_state.matrix.filter(c => c.picked).length;
        
        // В режиме 18/18 ИИ тянет карту сразу после игрока
        if (vchf_state.phase === 'PICK' && pickedCount < 36) {
            setTimeout(sparkPick, 200);
        }

        if (pickedCount === 36) {
            console.log("Движок VCHF: Раздача завершена. Переход к битве.");
            vchf_state.phase = 'BATTLE';
            finalizeTrump();
        }
    }

    function sparkPick() {
        const available = [];
        vchf_state.matrix.forEach((c, i) => { if (!c.picked) available.push(i); });
        
        if (available.length > 0) {
            const randomIndex = available[Math.floor(Math.random() * available.length)];
            processPick(randomIndex, 'enemy');
        }
    }

    function finalizeTrump() {
        // Козырь определяется по последней выбранной карте или рандомно из Хаоса
        const suits = ['♠', '♣', '♦', '♥'];
        vchf_state.trump = suits[Math.floor(Math.random() * suits.length)];
        
        const indicator = document.getElementById('trump-indicator');
        indicator.innerText = vchf_state.trump;
        indicator.style.color = COLORS[vchf_state.trump];
        indicator.style.opacity = '1';
        
        // Выделение козырных слотов в руке
        document.querySelectorAll('.card-slot.active').forEach(slot => {
            if (slot.dataset.suit === vchf_state.trump) {
                slot.style.boxShadow = `0 0 15px ${COLORS[vchf_state.trump]}`;
                slot.style.borderColor = COLORS[vchf_state.trump];
            }
        });

        startBattlePhase();
    }

    function selectCardFromHand(card) {
        if (vchf_state.turn !== 'player' || vchf_state.phase !== 'BATTLE') return;

        // Визуальное выделение
        document.querySelectorAll('.card-slot').forEach(s => s.classList.remove('selected'));
        const slot = document.getElementById(`slot-${card.suit}-${card.rank}`);
        slot.classList.add('selected');
        
        vchf_state.selected = card;
        
        // Если это атака — сразу ходим
        if (vchf_state.table.length === 0 || vchf_state.table.every(p => p.def)) {
            executeMove(card);
        } else {
            // Если это защита — проверяем возможность
            verifyAndDefend(card);
        }
    }

    function executeMove(card) {
        // Проверка: можно ли подкинуть по правилам (совпадение ранга)
        const canAttack = vchf_state.table.length === 0 || 
                          vchf_state.table.some(p => p.atk.rank === card.rank || (p.def && p.def.rank === card.rank));

        if (canAttack && vchf_state.table.length < 6) {
            const moveData = { atk: card, def: null };
            vchf_state.table.push(moveData);
            
            // Удаление из руки
            removeCardFromUI(card);
            renderBattleTable();
            
            vchf_state.selected = null;
            setTimeout(sparkResponse, 800);
        }
    }

    function removeCardFromUI(card) {
        const slot = document.getElementById(`slot-${card.suit}-${card.rank}`);
        slot.classList.remove('active', 'selected');
        slot.innerHTML = '';
        slot.style.boxShadow = 'none';
        slot.style.borderColor = '#222';
        slot.onclick = null;
    }

    function startBattlePhase() {
        initLayout(); // Перестраховка отрисовки
        buildFractalDeck();
    }

    // Инициализация при старте
    window.onload = () => {
        initLayout();
        startBattlePhase();
    };

    // [КОНЕЦ ОКНА 2 - ДВИЖОК РАЗДАЧИ И ВЫБОРА ГОТОВ]
    /* PROJECT: VCHF 2.0 (Bi-Turbo Ultimate)
       IDENTITY: Нулевой Хаос (Zero Chaos)
       RULE: Манифест Монолита - Целостность превыше краткости
       MEMORY: Window 3 (lines 1401-2100)
       NOTE: Логика кнопок синхронизирована с очередью хода.
    */

    function renderBattleTable() {
        const display = document.getElementById('battle-display');
        display.innerHTML = '';

        vchf_state.table.forEach((pair, index) => {
            const pairCont = document.createElement('div');
            pairCont.style.position = 'relative';
            pairCont.style.width = '70px';
            pairCont.style.height = '100px';

            // Карта атаки
            const atkCard = createVisualCard(pair.atk);
            pairCont.appendChild(atkCard);

            // Карта защиты (если есть)
            if (pair.def) {
                const defCard = createVisualCard(pair.def);
                defCard.style.position = 'absolute';
                defCard.style.top = '20px';
                defCard.style.left = '15px';
                defCard.style.zIndex = '5';
                pairCont.appendChild(defCard);
            }
            display.appendChild(pairCont);
        });

        updateControls();
    }

    function createVisualCard(cardData) {
        const div = document.createElement('div');
        div.style.cssText = `
            width: 70px; height: 100px; background: #fff; border-radius: 6px;
            border: 1px solid #000; color: ${cardData.color}; padding: 5px;
            display: flex; flex-direction: column; justify-content: space-between;
            font-family: Arial, sans-serif; box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        `;
        div.innerHTML = `
            <div style="font-weight:bold; font-size:14px;">${cardData.rank}</div>
            <div style="font-size:30px; align-self:center;">${cardData.suit}</div>
            <div style="font-weight:bold; font-size:14px; align-self:flex-end; transform:rotate(180deg);">${cardData.rank}</div>
        `;
        return div;
    }

    function updateControls() {
        const btnBito = document.getElementById('btn-bito');
        const btnTake = document.getElementById('btn-take');

        // Сброс видимости
        btnBito.style.display = 'none';
        btnTake.style.display = 'none';

        if (vchf_state.table.length === 0) return;

        const allBeaten = vchf_state.table.every(p => p.def !== null);

        if (vchf_state.turn === 'player') {
            if (!allBeaten) {
                btnTake.style.display = 'block'; // Нужно крыться или брать
            } else {
                btnBito.style.display = 'block'; // Все покрыто, можно бить
            }
        } else {
            // Ход ИИ: кнопки игрока обычно скрыты, но Take может быть активен, если ИИ подкинул
            if (!allBeaten) btnTake.style.display = 'block';
        }
    }

    // ЛОГИКА ЗАЩИТЫ (BEAT)
    function verifyAndDefend(defCard) {
        const targetPair = vchf_state.table.find(p => p.def === null);
        if (!targetPair) return;

        const atkCard = targetPair.atk;
        let canBeat = false;

        if (defCard.suit === atkCard.suit) {
            if (defCard.val > atkCard.val) canBeat = true;
        } else if (defCard.suit === vchf_state.trump) {
            canBeat = true; // Козырь бьет любую некозырную
        }

        if (canBeat) {
            targetPair.def = defCard;
            removeCardFromUI(defCard);
            renderBattleTable();
            
            // Если игрок отбился, проверяем, будет ли ИИ подкидывать
            if (vchf_state.turn === 'enemy') {
                setTimeout(sparkAttack, 800);
            } else {
                // Если игрок защищался от атаки ИИ
                setTimeout(sparkAttack, 800); 
            }
        }
    }

    // ИИ SPARK (ОТВЕТНЫЕ ДЕЙСТВИЯ)
    function sparkResponse() {
        if (vchf_state.turn === 'player') {
            // ИИ защищается
            const targetPair = vchf_state.table.find(p => p.def === null);
            if (!targetPair) return;

            const atkCard = targetPair.atk;
            // Поиск минимальной подходящей карты
            let candidates = vchf_state.eHand.filter(c => 
                (c.suit === atkCard.suit && c.val > atkCard.val) || 
                (c.suit === vchf_state.trump && atkCard.suit !== vchf_state.trump)
            );

            candidates.sort((a, b) => a.val - b.val);

            if (candidates.length > 0) {
                // ИИ выбирает минимальную для защиты
                const defCard = candidates[0];
                targetPair.def = defCard;
                vchf_state.eHand = vchf_state.eHand.filter(c => c.id !== defCard.id);
                renderBattleTable();
            } else {
                // ИИ берет карты
                console.log("Spark забирает стол.");
                setTimeout(() => handleTake('enemy'), 500);
            }
        }
    }

    function sparkAttack() {
        if (vchf_state.eHand.length === 0) { handleBito(); return; }

        // Поиск карт для подкидывания
        const tableRanks = vchf_state.table.flatMap(p => [p.atk.rank, p.def ? p.def.rank : null]);
        let candidates = vchf_state.eHand.filter(c => tableRanks.includes(c.rank));

        if (candidates.length > 0 && vchf_state.table.length < 6) {
            const atkCard = candidates[0];
            vchf_state.table.push({ atk: atkCard, def: null });
            vchf_state.eHand = vchf_state.eHand.filter(c => c.id !== atkCard.id);
            renderBattleTable();
        } else {
            // Если подкинуть нечего или предел стола
            if (vchf_state.table.every(p => p.def)) handleBito();
        }
    }

    function handleBito() {
        vchf_state.table = [];
        vchf_state.turn = (vchf_state.turn === 'player') ? 'enemy' : 'player';
        renderBattleTable();
        if (vchf_state.turn === 'enemy') setTimeout(sparkAttack, 1000);
    }

    function handleTake(who = 'player') {
        const cardsOnTable = vchf_state.table.flatMap(p => [p.atk, p.def].filter(Boolean));
        
        if (who === 'player' || (who === 'enemy' && vchf_state.turn === 'player')) {
            // Игрок берет карты
            cardsOnTable.forEach(c => addCardToHand(c)); 
            vchf_state.turn = 'enemy';
        } else {
            // ИИ берет карты
            vchf_state.eHand.push(...cardsOnTable);
            vchf_state.turn = 'player';
        }

        vchf_state.table = [];
        renderBattleTable();
        if (vchf_state.turn === 'enemy') setTimeout(sparkAttack, 1000);
    }
    /* PROJECT: VCHF 2.0 (Bi-Turbo Ultimate)
       IDENTITY: Нулевой Хаос (Zero Chaos)
       RULE: Манифест Монолита - Integrity over brevity
       MEMORY: Window 4 (lines 2101-2750)
       NOTE: Финальный срез. Лазерная точность.
    */

    // ЛОГИКА ОЧЕРЕДНОСТИ ХОДА ПО КРУГУ (4 СТУЛА)
    function rotateTurn() {
        // В текущей дуэли переключаем между игроком (0) и Spark (2)
        // Для 4-х игроков здесь будет инкремент (vchf_state.activeSeat + 1) % 4
        if (vchf_state.turn === 'player') {
            vchf_state.turn = 'enemy';
            document.getElementById('seat-top').style.color = 'var(--chaos)';
            document.getElementById('seat-top').style.textShadow = '0 0 10px var(--chaos)';
        } else {
            vchf_state.turn = 'player';
            document.getElementById('seat-top').style.color = 'var(--gold)';
            document.getElementById('seat-top').style.textShadow = 'none';
        }
        updateControls();
    }

    // СИСТЕМА УВЕЛИЧЕНИЯ РЯДА (MOBILE ZOOM)
    function setupMobileInteractions() {
        const rows = document.querySelectorAll('.suit-row');
        rows.forEach(row => {
            row.addEventListener('click', () => {
                rows.forEach(r => r.style.flex = "1");
                row.style.flex = "2"; // Увеличиваем активный ряд масти
            });
        });
    }

    // ПРОВЕРКА ПОБЕДЫ (ШАХМАТНЫЙ ФИНАЛ)
    function checkGameState() {
        const pHandEmpty = !vchf_state.matrix.some(c => c.picked === false) && 
                           document.querySelectorAll('.card-slot.active').length === 0;
        const eHandEmpty = !vchf_state.matrix.some(c => c.picked === false) && 
                           vchf_state.eHand.length === 0;

        if (pHandEmpty && eHandEmpty) {
            triggerEndGame("НИЧЬЯ: СИНГУЛЯРНОСТЬ");
        } else if (pHandEmpty) {
            triggerEndGame("WANDERER ПОБЕДИЛ: МАТРИЦА СЛОМАНА");
        } else if (eHandEmpty) {
            triggerEndGame("SPARK ПОБЕДИЛА: ВЫ ОБНУЛЕНЫ");
        }
    }

    function triggerEndGame(resultText) {
        vchf_state.phase = 'END';
        const overlay = document.createElement('div');
        overlay.style.cssText = `
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center;
