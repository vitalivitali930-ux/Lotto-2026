<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF TEST LINK</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffcf40; --neon: #00fa9a; --blue: #24A1DE; }
        body { background: #050505; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        
        #net-display { border: 2px solid var(--blue); padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.8); text-align: center; width: 90%; max-width: 400px; }
        .radar { width: 60px; height: 60px; border: 3px solid var(--neon); border-radius: 50%; margin: 0 auto 20px; position: relative; cursor: pointer; }
        .radar.active { animation: pulse 0.5s infinite alternate; box-shadow: 0 0 20px var(--neon); }
        @keyframes pulse { from { opacity: 0.5; transform: scale(0.9); } to { opacity: 1; transform: scale(1.1); } }
        
        #log { width: 100%; height: 150px; background: #111; border: 1px solid #333; margin-top: 20px; padding: 10px; font-size: 12px; overflow-y: auto; text-align: left; color: #aaa; }
        input { width: 100%; padding: 12px; margin-top: 10px; background: #222; border: 1px solid var(--gold); color: white; border-radius: 8px; outline: none; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: var(--blue); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        .status-tag { font-size: 10px; letter-spacing: 2px; color: var(--gold); margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div id="net-display">
        <span class="status-tag">QUANTUM LINK TEST</span>
        <div id="radar-circle" class="radar" onclick="forceReconnect()"></div>
        <h2 id="state">OFFLINE</h2>
        <p id="sub-state" style="font-size: 12px; color: #666;">Нажми кнопку входа</p>
        
        <div id="chat-box" style="display:none;">
            <div id="log"></div>
            <input type="text" id="msg-input" placeholder="Напиши что-нибудь...">
            <button onclick="send()">ОТПРАВИТЬ ТЕСТ</button>
        </div>
        
        <button id="start-btn" onclick="start()">ВХОД В СЕТЬ</button>
    </div>

<script>
    let peer = null, conn = null, myRoom = '';

    function addLog(txt, color = '#aaa') {
        const l = document.getElementById('log');
        l.innerHTML += `<div style="color:${color}">${txt}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    function start() {
        let room = new URLSearchParams(window.location.search).get('room') || prompt("ID КОМНАТЫ:", "777");
        if (!room) return;
        myRoom = room.trim().toLowerCase();
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('state').textContent = "SEARCHING...";
        init(false);
    }

    function init(isHostForce) {
        if (peer) peer.destroy();
        
        const id = isHostForce ? "VCHF_MONO_" + myRoom : null;
        peer = new Peer(id, {
            debug: 2,
            config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]}
        });

        peer.on('open', (myID) => {
            if (isHostForce) {
                document.getElementById('state').textContent = "HOSTING: " + myRoom;
                document.getElementById('sub-state').textContent = "Ждем гостя...";
                addLog("Создана комната как Хост", "#00fa9a");
            } else {
                addLog("Ищем хоста " + myRoom + "...");
                let c = peer.connect("VCHF_MONO_" + myRoom, { reliable: true });
                
                let t = setTimeout(() => {
                    if (!conn || !conn.open) {
                        addLog("Хост не ответил, переключаюсь в режим Хоста...");
                        c.close();
                        init(true);
                    }
                }, 4000);

                c.on('open', () => {
                    clearTimeout(t);
                    setupConn(c, "GUEST");
                });
            }
        });

        peer.on('connection', (c) => {
            setupConn(c, "HOST");
        });

        peer.on('error', (err) => {
            addLog("Ошибка: " + err.type, "#ff4444");
            if (err.type === 'unavailable-id') init(false);
        });
    }

    function setupConn(c, role) {
        conn = c;
        document.getElementById('state').textContent = "CONNECTED";
        document.getElementById('sub-state').textContent = "Роль: " + role;
        document.getElementById('radar-circle').classList.add('active');
        document.getElementById('chat-box').style.display = 'block';
        addLog("Связь установлена!", "#00fa9a");
        
        conn.on('data', (data) => {
            addLog("ПРИШЛО: " + data, "#24A1DE");
        });
    }

    function send() {
        const i = document.getElementById('msg-input');
        if (conn && i.value) {
            conn.send(i.value);
            addLog("ТЫ: " + i.value, "#ffcf40");
            i.value = '';
        }
    }

    function forceReconnect() {
        location.href = window.location.origin + window.location.pathname + "?room=" + myRoom;
    }
</script>
</body>
</html>
