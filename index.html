<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bi-Turbo Ultimate: Monolith</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: rgba(20, 20, 25, 0.95);
            --gold: #ffd700;
            --vchf: #9d4edd;
            --accent: #00f2ff;
            --slot-size: 42px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- STAGE & PERSPECTIVE --- */
        #game-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            perspective: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
        }

        #battle-table {
            position: absolute;
            width: 90%;
            height: 50%;
            top: 20%;
            transform: rotateX(15deg);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* --- CARDS & SLOTS --- */
        .card-node {
            position: absolute;
            width: 80px;
            height: 110px;
            background: #fff;
            border-radius: 8px;
            color: #000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            cursor: pointer;
        }

        .face-down {
            background: linear-gradient(135deg, #2d00f7, #8900f2);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .face-down::after {
            content: 'vchf';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900; color: rgba(255,255,255,0.1);
        }

        /* --- UI PANELS --- */
        #ctrl-panel {
            position: absolute;
            bottom: 0; width: 100%;
            background: var(--panel);
            border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: height 0.4s ease;
            height: 140px;
        }
        #ctrl-panel.expanded { height: 70vh; }

        .hand-grid {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            height: 100%;
            overflow-y: auto;
        }

        .suit-row {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 4px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .slot {
            width: var(--slot-size);
            height: calc(var(--slot-size) * 1.3);
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .slot.filled { background: #fff; border: none; }
        .slot.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }

        /* --- BUTTONS & STATUS --- */
        #status-msg {
            position: absolute;
            top: 15%;
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--accent);
            opacity: 0;
            transition: 0.3s;
        }
        #status-msg.active { opacity: 1; transform: translateY(-10px); }

        .btn-ui {
            padding: 10px 20px;
            background: var(--vchf);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        #btn-zoom {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--vchf);
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--bg);
            z-index: 101;
        }

        .trump-indicator {
            position: absolute;
            top: 20px; right: 20px;
            width: 60px; height: 80px;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--gold);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            box-shadow: 0 0 15px var(--gold);
            animation: haloPulse 3s infinite alternate;
        }

        @keyframes haloPulse {
            from { box-shadow: 0 0 5px var(--gold); }
            to { box-shadow: 0 0 25px var(--vchf); }
        }

        #enemy-stat {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px; border-radius: 10px;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>
    <div id="game-stage">
        <div id="enemy-stat">ВРАГ: 0 КАРТ</div>
        <div id="status-msg">ИНИЦИАЦИЯ...</div>
        
        <div id="battle-table"></div>

        <div class="trump-indicator" id="trump-icon">?</div>

        <button id="btn-start-center" class="btn-ui" style="position:absolute; z-index:200;">СОЗДАТЬ МОНОЛИТ</button>

        <div id="ctrl-panel">
            <div id="btn-zoom">↕</div>
            <div class="hand-grid">
                <div class="suit-row" id="s-spades"></div>
                <div class="suit-row" id="s-clubs"></div>
                <div class="suit-row" id="s-diamonds"></div>
                <div class="suit-row" id="s-hearts"></div>
            </div>
            <div style="display:flex; justify-content:center; gap:20px; padding:10px;">
                <button class="btn-ui" id="btn-bito" style="display:none; background:#2ecc71;">БИТО</button>
                <button class="btn-ui" id="btn-take" style="display:none; background:#e74c3c;">ВЗЯТЬ</button>
                <button class="btn-ui" id="btn-copy" onclick="copyMyID()">ID</button>
            </div>
        </div>
    </div>
<script>
    // --- КОНСТАНТЫ И СОСТОЯНИЕ ---
    const SUITS = ['♠', '♣', '♦', '♥'];
    const RANKS = ['6','7','8','9','10','J','Q','K','A'];
    const COLORS = {'♠':'#fff','♣':'#fff','♦':'#ff4d4d','♥':'#ff4d4d'};
    
    let vchf = {
        deck: [],
        table: [],
        pHand: [],
        eCount: 0,
        trump: '',
        turn: 'host', // Кто берет карту или кто ходит
        attacker: 'host',
        phase: 'LOBBY', // LOBBY, SHUFFLE, PICK, BATTLE, END
        isHost: false
    };

    let peer, conn, myRole;
    let isExpanded = false;
    let audioCtx;

    // --- АУДИО ДВИЖОК ---
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(type) {
        if (!audioCtx) initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'slide') {
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(110, now + 0.2);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        } else if (type === 'shuffle') {
            // Имитация шуршания через шум
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800;
            noise.connect(filter); filter.connect(gain);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            noise.start(); noise.stop(now + 0.3);
        }
    }

    // --- СЕТЕВАЯ ЛОГИКА ---
    const btnStart = document.getElementById('btn-start-center');

    function initPeer(id = null) {
        peer = new Peer(id, { debug: 1 });
        peer.on('open', (myId) => {
            if (!id) {
                window.location.hash = myId;
                showMsg("ОЖИДАНИЕ БРОДЯГИ...");
            } else {
                conn = peer.connect(id);
                setupConn();
            }
        });
        peer.on('connection', (c) => {
            conn = c;
            setupConn();
        });
    }

    function setupConn() {
        conn.on('open', () => {
            vchf.isHost = (window.location.hash === '');
            myRole = vchf.isHost ? 'host' : 'guest';
            btnStart.style.display = 'none';
            if (vchf.isHost) {
                showMsg("СОЕДИНЕНИЕ УСТАНОВЛЕНО");
                prepareDeck();
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'SYNC_DECK') {
                vchf.deck = data.deck;
                vchf.trump = data.trump;
                vchf.phase = 'SHUFFLE';
                renderTrump();
                startShuffleAnimation();
            }
            if (data.type === 'PICK') syncPick(data.cardIndex, data.actor);
            if (data.type === 'MOVE') executeMove(data.card, 'enemy');
            if (data.type === 'ACTION') {
                if (data.cmd === 'BITO') syncBito();
                if (data.cmd === 'TAKE') syncTake();
            }
        });
    }

    // --- ПОДГОТОВКА ИГРЫ ---
    function prepareDeck() {
        let cards = [];
        SUITS.forEach(s => {
            RANKS.forEach((r, v) => {
                cards.push({ s, r, v: v + 6, c: COLORS[s] });
            });
        });
        // Перемешивание (Fisher-Yates)
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        vchf.deck = cards;
        vchf.trump = SUITS[Math.floor(Math.random() * 4)];
        
        conn.send({ type: 'SYNC_DECK', deck: vchf.deck, trump: vchf.trump });
        vchf.phase = 'SHUFFLE';
        renderTrump();
        startShuffleAnimation();
    }

    function renderTrump() {
        const t = document.getElementById('trump-icon');
        t.textContent = vchf.trump;
        t.style.color = COLORS[vchf.trump];
    }

    function startShuffleAnimation() {
        playSound('shuffle');
        const container = document.getElementById('battle-table');
        container.innerHTML = '';
        
        vchf.deck.forEach((card, i) => {
            const n = document.createElement('div');
            n.className = 'card-node face-down';
            n.id = `deck-card-${i}`;
            // Создаем круг
            const angle = (i / vchf.deck.length) * Math.PI * 2;
            const radius = 150;
            n.style.left = `calc(50% + ${Math.cos(angle) * radius - 40}px)`;
            n.style.top = `calc(50% + ${Math.sin(angle) * radius - 55}px)`;
            n.style.transform = `rotate(${angle + Math.PI/2}rad)`;
            
            n.onclick = () => {
                if (vchf.phase === 'PICK' && vchf.turn === myRole) {
                    pickCard(i);
                }
            };
            container.appendChild(n);
        });

        setTimeout(() => {
            vchf.phase = 'PICK';
            showMsg(vchf.turn === myRole ? "ТВОЙ ВЫБОР" : "ВРАГ ВЫБИРАЕТ");
        }, 1000);
    }
    function pickCard(idx) {
        const card = vchf.deck[idx];
        if (!card) return;

        syncPick(idx, myRole);
        if (conn) conn.send({ type: 'PICK', cardIndex: idx, actor: myRole });
    }

    function syncPick(idx, actor) {
        const card = vchf.deck[idx];
        const el = document.getElementById(`deck-card-${idx}`);
        if (!el) return;

        playSound('slide');
        vchf.deck[idx] = null; // Убираем из круга

        if (actor === myRole) {
            vchf.pHand.push(card);
            el.style.transform = "translateY(400px) scale(0.2)";
            el.style.opacity = "0";
            setTimeout(() => {
                el.remove();
                fillSlot(card);
            }, 500);
        } else {
            vchf.eCount++;
            el.style.transform = "translateY(-400px) scale(0.2)";
            el.style.opacity = "0";
            setTimeout(() => el.remove(), 500);
        }

        // Очередь переходит к другому
        vchf.turn = (vchf.turn === 'host' ? 'guest' : 'host');
        updateEnemyStat();

        // Проверяем, разобрали ли все 36 карт
        const remaining = vchf.deck.filter(c => c !== null).length;
        if (remaining === 0) {
            vchf.phase = 'BATTLE';
            vchf.turn = vchf.attacker; // Первый ход за атакующим
            showMsg("БИТВА НАЧАЛАСЬ!");
        } else {
            showMsg(vchf.turn === myRole ? "ТВОЙ ВЫБОР" : "ВРАГ ВЫБИРАЕТ");
        }
    }

    function fillSlot(card) {
        const el = document.getElementById(`slot-${card.s}-${card.r}`);
        if (!el) return;
        el.classList.add('filled');
        el.style.color = card.c;
        el.innerHTML = `
            <div style="padding:2px; font-size:10px; font-weight:900;">${card.r}</div>
            <div style="font-size:24px; text-align:center;">${card.s}</div>
        `;
        el.onclick = (e) => {
            e.stopPropagation();
            if (vchf.phase === 'BATTLE' && vchf.turn === myRole) {
                tryPlayCard(card);
            } else if (!isExpanded) {
                toggleHand();
            }
        };
    }

    function tryPlayCard(card) {
        const isTableAttack = vchf.table.length % 2 === 0;
        
        if (isTableAttack) {
            if (vchf.attacker !== myRole) return showMsg("ЖДИ ХОДА");
            if (!canAttack(card)) return showMsg("НЕЛЬЗЯ");
            if (vchf.table.length / 2 >= vchf.eCount && vchf.eCount > 0) return showMsg("ЛИМИТ");
        } else {
            if (vchf.attacker === myRole) return showMsg("ОТБИВАЮТСЯ...");
            if (!canDefend(card)) return showMsg("НЕ БЬЕТ");
        }

        vchf.pHand = vchf.pHand.filter(c => c !== card);
        const slot = document.getElementById(`slot-${card.s}-${card.r}`);
        slot.classList.remove('filled');
        slot.innerHTML = '';
        
        executeMove(card, 'player');
        if (conn) conn.send({ type: 'MOVE', card });
    }

    function canAttack(c) {
        if (vchf.table.length === 0) return true;
        return vchf.table.some(m => m.card.r === c.r);
    }

    function canDefend(c) {
        const target = vchf.table[vchf.table.length - 1].card;
        if (c.s === target.s) return c.v > target.v;
        return (c.s === vchf.trump && target.s !== vchf.trump);
    }

    function executeMove(card, actor) {
        playSound('slide');
        vchf.table.push({ card, actor });
        if (actor === 'enemy') vchf.eCount--;
        vchf.turn = (vchf.turn === 'host' ? 'guest' : 'host');
        renderBattleTable();
        checkBattleEnd();
    }

    function renderBattleTable() {
        const container = document.getElementById('battle-table');
        container.innerHTML = '';
        vchf.table.forEach((m, i) => {
            const n = document.createElement('div');
            n.className = 'card-node face-up';
            const pairIdx = Math.floor(i / 2);
            const isDef = i % 2 !== 0;
            n.style.left = `calc(50% + ${(pairIdx % 4) * 85 - 130 + (isDef ? 15 : 0)}px)`;
            n.style.top = `calc(40% + ${Math.floor(pairIdx / 4) * 95 - 40 + (isDef ? 20 : 0)}px)`;
            n.innerHTML = `<div style="padding:4px; font-weight:900;">${m.card.r}</div><div style="font-size:32px; text-align:center;">${m.card.s}</div>`;
            n.style.color = m.card.c;
            container.appendChild(n);
        });
        updateUIControls();
    }

    function syncBito() {
        playSound('shuffle');
        showMsg("БИТО");
        vchf.table = [];
        vchf.attacker = (vchf.attacker === 'host' ? 'guest' : 'host');
        vchf.turn = vchf.attacker;
        renderBattleTable();
    }

    function syncTake() {
        playSound('slide');
        showMsg("ВЗЯТО");
        vchf.table.forEach(m => {
            if (myRole !== vchf.attacker) {
                vchf.pHand.push(m.card);
                fillSlot(m.card);
            } else {
                vchf.eCount++;
            }
        });
        vchf.table = [];
        vchf.turn = vchf.attacker;
        renderBattleTable();
    }

    function updateEnemyStat() {
        document.getElementById('enemy-stat').textContent = `ВРАГ: ${vchf.eCount} КАРТ`;
    }

    function updateUIControls() {
        const isAttack = vchf.table.length % 2 === 0;
        document.getElementById('btn-bito').style.display = (myRole === vchf.attacker && isAttack && vchf.table.length > 0) ? 'block' : 'none';
        document.getElementById('btn-take').style.display = (myRole !== vchf.attacker && !isAttack) ? 'block' : 'none';
    }

    function toggleHand() { isExpanded = !isExpanded; document.getElementById('ctrl-panel').classList.toggle('expanded', isExpanded); }
    function showMsg(t) { const m = document.getElementById('status-msg'); m.textContent = t; m.classList.add('active'); setTimeout(() => m.classList.remove('active'), 2500); }
    function copyMyID() { navigator.clipboard.writeText(window.location.href); showMsg("ССЫЛКА СКОПИРОВАНА"); }

    btnStart.onclick = () => { initPeer(); btnStart.textContent = "ПОДКЛЮЧЕНИЕ..."; };
    document.getElementById('btn-zoom').onclick = toggleHand;
    document.getElementById('btn-bito').onclick = () => { syncBito(); conn.send({type:'ACTION', cmd:'BITO'}); };
    document.getElementById('btn-take').onclick = () => { syncTake(); conn.send({type:'ACTION', cmd:'TAKE'}); };

    if (window.location.hash) {
        btnStart.textContent = "ВХОД В МОНОЛИТ...";
        initPeer(window.location.hash.substring(1));
    }

    window.onload = () => {
        SUITS.forEach(s => {
            const rowId = (s === '♠' ? 's-spades' : s === '♣' ? 's-clubs' : s === '♦' ? 's-diamonds' : 's-hearts');
            const row = document.getElementById(rowId);
            RANKS.forEach(rank => {
                const sl = document.createElement('div');
                sl.className = 'slot'; sl.id = `slot-${s}-${rank}`;
                row.appendChild(sl);
            });
        });
    };
</script>
</body>
</html>
