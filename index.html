<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCHF MONOLITH | ZERO CHAOS</title>
    <style>
        :root {
            --bg-metal: #0d0d0e;
            --steel-dark: #121213;
            --steel-mid: #242426;
            --gold-hot: #fcf6ba;
            --gold-glow: rgba(252, 246, 186, 0.4);
            --vault-size: 300px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg-metal);
            color: var(--gold-hot);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        #monolith-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* Контейнер Сейфа */
        .vault-door {
            position: relative;
            width: var(--vault-size);
            height: var(--vault-size);
            background: radial-gradient(circle at 30% 30%, #1e1e1f, #0d0d0e);
            border: 5px solid var(--steel-mid);
            border-radius: 50%;
            box-shadow: 0 30px 60px #000, inset 0 0 50px #000;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        /* Центр (Ядро) */
        .vault-core {
            position: absolute;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, var(--gold-hot) 0%, #b8860b 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--gold-glow);
            z-index: 5;
            pointer-events: none; /* Фикс клика */
        }

        .vault-core::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px solid var(--gold-hot);
            border-radius: 50%;
            animation: haloPulse 2s infinite;
        }

        @keyframes haloPulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-2deg); }
            75% { transform: translateX(15px) rotate(2deg); }
        }

        /* Терминал Биржи */
        #exchange-terminal {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease;
            z-index: 1;
        }
    </style>



<style>
    .bolt {
        position: absolute;
        width: 65px;
        height: 45px;
        background: linear-gradient(145deg, #2a2a2c, #121213);
        border: 2px solid var(--steel-mid);
        border-radius: 4px;
        cursor: pointer;
        transform-origin: center 150px; /* Орбита вращения */
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 14px;
        color: var(--gold-hot);
        text-shadow: 0 2px 4px #000;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s, box-shadow 0.3s;
        touch-action: none;
    }

    .bolt.active {
        border-color: var(--gold-hot);
        box-shadow: 0 0 25px var(--gold-glow), inset 0 0 10px var(--gold-hot);
        background: #1e1e1f;
        transform: scale(1.05) !important;
    }

    .bolt:active { transform: scale(0.9) !important; }

    /* Позиционирование 6 валют */
    .bolt[data-index="0"] { transform: rotate(0deg) translateY(-135px); }
    .bolt[data-index="1"] { transform: rotate(60deg) translateY(-135px); }
    .bolt[data-index="2"] { transform: rotate(120deg) translateY(-135px); }
    .bolt[data-index="3"] { transform: rotate(180deg) translateY(-135px); }
    .bolt[data-index="4"] { transform: rotate(240deg) translateY(-135px); }
    .bolt[data-index="5"] { transform: rotate(300deg) translateY(-135px); }
</style>
</head>
<body>
    <div id="monolith-wrapper">
        <div class="vault-door" id="main-vault">
            <div class="vault-core"></div>
            </div>

        <div id="exchange-terminal">
            <h1 style="margin-bottom:20px; letter-spacing: 5px;">VCHF CORE</h1>
            <canvas id="gold-chart" style="background:#000; border:1px solid #222;"></canvas>
            <div id="stats-panel" style="width:90%; display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;"></div>
        </div>
    </div>



    <script>
const SonicForge = {
    ctx: null,
    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },
    playClick() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0.2, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.1);
    },
    playRupture() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.frequency.setValueAtTime(40, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 1.5);
        g.gain.setValueAtTime(0.5, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.5);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 1.5);
    }
};

const TransitionEngine = {
    start() {
        const vault = document.getElementById('main-vault');
        const term = document.getElementById('exchange-terminal');
        vault.style.transform = 'scale(0) rotate(720deg)';
        vault.style.opacity = '0';
        setTimeout(() => {
            term.style.opacity = '1';
            term.style.pointerEvents = 'auto';
            ExchangeCore.init();
        }, 800);
    }
};
</script>



    <script>
const VaultLogic = {
    currencies: ["CHF", "GOLD", "USD", "EUR", "GBP", "BTC"],
    activeSteps: 0,
    isLocked: true,

    init() {
        const door = document.getElementById('main-vault');
        this.currencies.forEach((name, i) => {
            const b = document.createElement('div');
            b.className = 'bolt';
            b.setAttribute('data-index', i);
            b.innerText = name;
            
            // Расчет орбиты (как в CSS Window 2)
            const rot = i * 60;
            b.style.transform = `rotate(${rot}deg) translateY(-135px)`;

            b.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                SonicForge.init();
                this.check(i, b);
            });
            door.appendChild(b);
        });
    },

    check(index, el) {
        if (!this.isLocked || el.classList.contains('active')) return;

        SonicForge.playClick();
        
        // Проверка последовательности (CHF -> GOLD -> USD...)
        if (index === this.activeSteps) {
            el.classList.add('active');
            this.activeSteps++;
            if (this.activeSteps === 6) {
                this.isLocked = false;
                SonicForge.playRupture();
                TransitionEngine.start();
            }
        } else {
            this.fail();
        }
    },

    fail() {
        const v = document.getElementById('main-vault');
        v.style.animation = 'shake 0.4s';
        setTimeout(() => {
            v.style.animation = '';
            this.activeSteps = 0;
            document.querySelectorAll('.bolt').forEach(b => b.classList.remove('active'));
        }, 400);
    }
};
</script>


<script>
const ExchangeCore = {
    init() {
        const canvas = document.getElementById('gold-chart');
        const ctx = canvas.getContext('2d');
        const panel = document.getElementById('stats-panel');
        
        canvas.width = window.innerWidth * 0.9;
        canvas.height = 200;
        
        panel.innerHTML = `
            <div style="background:#121213; padding:10px; border:1px solid #242426;">
                <small>VCHF RATE</small><br><span style="font-size:20px; color:#fcf6ba;">1.0842</span>
            </div>
            <div style="background:#121213; padding:10px; border:1px solid #242426;">
                <small>RESERVE</small><br><span style="font-size:20px; color:#fcf6ba;">99.9%</span>
            </div>
        `;

        // Простая анимация графика
        let x = 0;
        function draw() {
            ctx.strokeStyle = '#fcf6ba';
            ctx.lineWidth = 2;
            ctx.lineTo(x, 100 + Math.random() * 20);
            ctx.stroke();
            x += 2;
            if (x > canvas.width) ctx.clearRect(0,0,canvas.width, canvas.height), x=0, ctx.beginPath();
            requestAnimationFrame(draw);
        }
        ctx.beginPath();
        draw();
    }
};

window.addEventListener('load', () => VaultLogic.init());
</script>
</body>
</html>
