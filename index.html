<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Ultimate Monolith</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --gold: #ffcf40; --space-dark: #121625; --nebula-core: #222a44; 
            --spark-neon: #00fa9a; --trump-halo: #8a2be2; --cherry-pulse: #4a0404; 
            --bg-card: #ffffff; --grid-color: rgba(255, 207, 64, 0.08); 
            --card-w: 55px; --card-h: 77px; --micro-scale: 0.25;
            --tg-blue: #24A1DE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505; color: #e0e6ff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; perspective: 1500px;
        }

        /* МАНИФЕСТ МОНОЛИТА: СТАТУС-БАР ТЕЛЕГРАМ */
        #net-status {
            position: fixed; top: 15px; left: 15px; z-index: 6000;
            background: rgba(12, 15, 24, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(36, 161, 222, 0.4);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(36, 161, 222, 0.1);
            cursor: pointer; transition: 0.3s;
        }
        #net-status:active { transform: scale(0.95); border-color: var(--spark-neon); }

        .net-logo {
            width: 35px; height: 35px; border-radius: 8px;
            background: url('1771489965074(1).png') center/cover;
            border: 1px solid var(--gold);
        }

        .net-info { display: flex; flex-direction: column; }
        .net-info span:first-child { font-size: 9px; color: var(--tg-blue); letter-spacing: 1px; font-weight: bold; }
        #peer-id { font-size: 11px; color: #fff; font-family: monospace; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }

        /* КНОПКА ВХОДА - ЦЕНТРАЛЬНЫЙ ПОРТАЛ */
        #btn-start-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 7000; padding: 20px 40px; font-size: 18px; font-weight: 900;
            background: rgba(0, 250, 154, 0.1); border: 2px solid var(--spark-neon);
            color: var(--spark-neon); border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 250, 154, 0.4);
            text-transform: uppercase; letter-spacing: 3px; animation: pulseStart 2s infinite;
        }
        @keyframes pulseStart { 0% { opacity: 0.7; } 50% { opacity: 1; box-shadow: 0 0 50px var(--spark-neon); } 100% { opacity: 0.7; } }

        /* АРЕНА С ЭФФЕКТОМ ГЛУБИНЫ */
        .arena-top {
            flex: 1; position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 10s infinite ease-in-out;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            border-bottom: 2px solid rgba(255, 207, 64, 0.3);
            overflow: hidden; transform-style: preserve-3d; transform: rotateX(10deg); z-index: 1;
        }

        @keyframes tableBreathe {
            0%, 100% { filter: brightness(0.8); }
            50% { background: radial-gradient(circle at 50% 45%, #3a0a1a 0%, var(--cherry-pulse) 70%, #050000 100%); filter: brightness(1.1); }
        }

        /* СЕТКА ХАОСА */
        .arena-top::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.5;
        }
<script>
    // --- ПАРАМЕТРЫ МОНОЛИТА (Нулевой Хаос) ---
    const SUITS = ['♠', '♣', '♦', '♥'];
    const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    
    let vchf = {
        deck: [], pHand: [], eCount: 0, table: [],
        trump: '', phase: 'WAIT', turn: 'host', pickTurn: 'host'
    };

    let peer = null, conn = null, myRole = 'host';
    let localReady = false, remoteReady = false;
    let isExpanded = false, audioCtx = null;

    // --- УМНЫЙ МОСТ "WANDERER" (Авто-вход и генерация ссылок) ---
    function startNetwork() {
        const urlParams = new URLSearchParams(window.location.search);
        let roomNum = urlParams.get('room');

        // Если в ссылке нет комнаты — генерируем или спрашиваем
        if (!roomNum) {
            roomNum = prompt("НОМЕР КОМНАТЫ (ИЛИ OK ДЛЯ СЛУЧАЙНОЙ):", Math.floor(100 + Math.random() * 899));
            if (!roomNum) return;
            // Записываем номер в адресную строку без перезагрузки
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?room=${roomNum}`;
            window.history.pushState({path: newUrl}, '', newUrl);
        }

        const finalID = "VCHF_MONO_" + roomNum.trim();
        document.getElementById('btn-start-center').style.display = 'none';
        
        // Создаем Peer с STUN-серверами для пробоя любых сетей
        peer = new Peer(null, {
            debug: 1,
            config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('open', () => {
            showMsg("СКАНИРОВАНИЕ УЗЛА " + roomNum);
            // Сначала пробуем зайти как гость
            conn = peer.connect(finalID, { reliable: true });
            
            let checkTimeout = setTimeout(() => {
                if (!conn || !conn.open) {
                    peer.destroy(); 
                    // Если за 2.5 сек не нашли хоста — создаем комнату сами
                    createHostRoom(finalID, roomNum);
                }
            }, 2500);

            setupConn();
        });

        peer.on('error', (err) => {
            if (err.type !== 'peer-unavailable') showMsg("СЕТЬ: " + err.type);
        });
    }

    function createHostRoom(targetID, originalNum) {
        peer = new Peer(targetID, {
            debug: 1,
            config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
        });
        peer.on('open', () => {
            myRole = 'host';
            document.getElementById('room-info').textContent = "ROOM: " + originalNum;
            document.getElementById('peer-id').textContent = "TAP TO COPY LINK";
            showMsg("ВЫ СОЗДАТЕЛЬ МОНОЛИТА");
        });
        peer.on('connection', (c) => {
            conn = c;
            setupConn();
            showMsg("ВРАГ ВОШЕЛ В ТЕРМИНАЛ");
        });
    }

    function setupConn() {
        conn.on('open', () => {
            document.getElementById('btn-ready').style.display = 'block';
            document.getElementById('peer-id').textContent = "LINK: " + (myRole === 'host' ? 'MASTER' : 'SLAVE');
            showMsg("КАНАЛ СТАБИЛЕН");
            conn.on('data', handleNetData);
        });
    }

    // Функция копирования ссылки при клике на верхнюю панель
    function copyMyID() {
        navigator.clipboard.writeText(window.location.href);
        showMsg("ССЫЛКА В БУФЕРЕ!");
    }
    // --- ЗВУКОВОЙ ДВИЖОК МОНОЛИТА ---
    function playSound(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'slide') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'bito') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        } catch(e) {}
    }

    function showMsg(t) {
        const m = document.getElementById('status-msg');
        m.textContent = t; m.classList.add('active');
        setTimeout(() => m.classList.remove('active'), 3000);
    }

    // --- ОБРАБОТКА СЕТЕВЫХ КОМАНД ---
    function handleNetData(data) {
        if (data.type === 'READY') { remoteReady = true; showMsg("ДРУГ ГОТОВ"); checkStart(); }
        if (data.type === 'SYNC_DECK') { vchf.deck = data.deck; vchf.trump = data.trump; startChaosPhase(); }
        if (data.type === 'PICK') executePick(data.idx, 'enemy');
        if (data.type === 'MOVE') executeMove(data.card, 'enemy');
        if (data.type === 'ACTION') { 
            if (data.cmd === 'BITO') syncBito(); 
            if (data.cmd === 'TAKE') syncTake(); 
        }
    }

    function sendReady() {
        localReady = true; 
        document.getElementById('btn-ready').style.display = 'none';
        conn.send({type: 'READY'}); 
        showMsg("ГОТОВНОСТЬ ОТПРАВЛЕНА");
        checkStart();
    }

    function checkStart() {
        if (localReady && remoteReady && myRole === 'host') {
            let d = [];
            SUITS.forEach(s => RANKS.forEach(r => d.push({s, r, v: RANKS.indexOf(r), c: COLORS[s], used: false})));
            vchf.deck = d.sort(() => Math.random() - 0.5);
            vchf.trump = SUITS[Math.floor(Math.random() * 4)];
            conn.send({type: 'SYNC_DECK', deck: vchf.deck, trump: vchf.trump});
            startChaosPhase();
        }
    }

    // --- ФАЗА ХАОСА (ВЫБОР КАРТ С ФИКСОМ ОЧЕРЕДИ) ---
    function startChaosPhase() {
        vchf.phase = 'PICK';
        vchf.pickTurn = 'host'; // Всегда начинаем с хоста для синхронизации
        document.getElementById('trump-icon').textContent = vchf.trump;
        document.getElementById('trump-icon').style.color = COLORS[vchf.trump];
        renderChaosInitial();
    }

    function renderChaosInitial() {
        const container = document.getElementById('chaos-deck');
        container.innerHTML = '';
        const cx = window.innerWidth / 2 - 27;
        const cy = window.innerHeight * 0.4 - 38;
        
        vchf.deck.forEach((card, i) => {
            const n = document.createElement('div');
            n.className = 'card-node'; n.id = `node-${i}`;
            n.style.left = cx + 'px'; n.style.top = cy + 'px';
            container.appendChild(n);
            setTimeout(() => {
                const a = (i / 36) * Math.PI * 2;
                n.style.left = (cx + Math.cos(a) * 140) + 'px';
                n.style.top = (cy + Math.sin(a) * 140) + 'px';
                n.style.transform = `rotate(${a * 57.3 + 90}deg)`;
            }, i * 15);

            n.onclick = () => { 
                if (vchf.phase === 'PICK' && vchf.pickTurn === myRole && !card.used) { 
                    executePick(i, 'player'); 
                    conn.send({type: 'PICK', idx: i}); 
                } else if (vchf.phase === 'PICK' && vchf.pickTurn !== myRole) {
                    showMsg("ЖДИ ХОД ВРАГА");
                }
            };
        });
    }

    function executePick(idx, actor) {
        const card = vchf.deck[idx];
        if (!card || card.used) return;
        
        const n = document.getElementById(`node-${idx}`);
        card.used = true; 
        playSound('slide');
        
        if (actor === 'player') {
            vchf.pHand.push(card);
            const slot = document.getElementById(`slot-${card.s}-${card.r}`);
            if (slot) {
                const rect = slot.getBoundingClientRect();
                n.style.zIndex = "5000"; 
                n.style.left = rect.left + 'px'; 
                n.style.top = rect.top + 'px'; 
                n.style.transform = "scale(0.4) rotate(0deg)";
                setTimeout(() => { n.remove(); fillSlot(card); }, 600);
            }
        } else {
            vchf.eCount++;
            if (n) {
                n.style.top = "-150px"; 
                n.style.opacity = "0";
                setTimeout(() => n.remove(), 600);
            }
        }
        
        vchf.pickTurn = (vchf.pickTurn === 'host' ? 'guest' : 'host');
        document.getElementById('enemy-stat').textContent = `КАРТ У ВРАГА: ${vchf.eCount}`;
        
        const totalUsed = vchf.deck.filter(c => c.used).length;
        if (totalUsed >= vchf.deck.length) { 
            vchf.phase = 'BATTLE'; 
            showMsg("БОЙ НАЧАТ!"); 
            renderBattleTable(); 
        }
    }
    function fillSlot(card) {
        const el = document.getElementById(`slot-${card.s}-${card.r}`);
        if (!el) return;
        el.classList.add('filled'); 
        el.style.color = card.c;
        el.innerHTML = `
            <div style="padding:2px; font-size:10px; font-weight:900;">${card.r}</div>
            <div style="font-size:24px; text-align:center;">${card.s}</div>
        `;
        el.onclick = (e) => {
            e.stopPropagation();
            if (vchf.phase === 'BATTLE' && vchf.turn === myRole) playCard(card);
            else if (!isExpanded) toggleHand();
        };
    }

    // --- ЛОГИКА БОЯ (BATTLE) ---
    function playCard(card) {
        const isDef = vchf.table.length % 2 !== 0;
        if (isDef && !canDefend(card)) return showMsg("НЕ БЬЕТ!");
        if (!isDef && !canAttack(card)) return showMsg("НЕТ ВЕКТОРА!");
        
        vchf.pHand = vchf.pHand.filter(c => c !== card);
        const slot = document.getElementById(`slot-${card.s}-${card.r}`);
        slot.classList.remove('filled'); 
        slot.innerHTML = '';
        executeMove(card, 'player');
        conn.send({type: 'MOVE', card});
    }

    function canAttack(c) {
        if (vchf.table.length === 0) return true;
        return vchf.table.some(m => m.card.r === c.r);
    }

    function canDefend(c) {
        const t = vchf.table[vchf.table.length - 1].card;
        const isTrump = c.s === vchf.trump;
        const targetTrump = t.s === vchf.trump;
        if (c.s === t.s) return c.v > t.v;
        if (isTrump && !targetTrump) return true;
        return false;
    }

    function executeMove(card, actor) {
        vchf.table.push({card, actor});
        if (actor === 'enemy') vchf.eCount--;
        renderBattleTable();
        checkBattleEnd();
    }

    function renderBattleTable() {
        const c = document.getElementById('battle-table');
        c.innerHTML = '';
        vchf.table.forEach((m, i) => {
            const n = document.createElement('div');
            n.className = 'card-node face-up';
            const pi = Math.floor(i / 2), isD = i % 2 !== 0;
            n.style.left = `calc(50% + ${(pi % 3) * 85 - 85 + (isD ? 18 : 0)}px)`;
            n.style.top = `calc(40% + ${Math.floor(pi / 3) * 95 - 40 + (isD ? 25 : 0)}px)`;
            n.innerHTML = `
                <div style="padding:4px; font-weight:900; font-size:12px;">${m.card.r}</div>
                <div style="font-size:32px; text-align:center;">${m.card.s}</div>
            `;
            n.style.color = m.card.c;
            c.appendChild(n);
        });

        const isMyTurn = vchf.turn === myRole;
        const isTableAttack = vchf.table.length % 2 === 0;
        document.getElementById('btn-bito').style.display = (isMyTurn && isTableAttack && vchf.table.length > 0) ? 'block' : 'none';
        document.getElementById('btn-take').style.display = (!isMyTurn && !isTableAttack) ? 'block' : 'none';
        document.getElementById('enemy-stat').textContent = `КАРТ У ВРАГА: ${vchf.eCount}`;
    }

    function handleBito() { syncBito(); conn.send({type: 'ACTION', cmd: 'BITO'}); }
    
    function syncBito() {
        playSound('bito'); createDustCloud();
        vchf.table = []; vchf.turn = (vchf.turn === 'host' ? 'guest' : 'host');
        setTimeout(renderBattleTable, 600); showMsg("БИТО");
    }

    function handleTake() { syncTake(); conn.send({type: 'ACTION', cmd: 'TAKE'}); }
    
    function syncTake() {
        vchf.table.forEach(m => {
            if (vchf.turn !== myRole) { vchf.pHand.push(m.card); fillSlot(m.card); }
            else { vchf.eCount++; }
        });
        vchf.table = []; 
        setTimeout(renderBattleTable, 600); showMsg("ЗАБРАЛ");
    }

    function createDustCloud() {
        const arena = document.getElementById('arena');
        document.querySelectorAll('#battle-table .card-node').forEach(card => {
            const r = card.getBoundingClientRect();
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div'); p.className = 'particle';
                p.style.left = (r.left + 27) + 'px'; p.style.top = (r.top + 38) + 'px';
                p.style.background = card.style.color || 'var(--gold)';
                arena.appendChild(p);
                const tx = (Math.random() - 0.5) * 250, ty = (Math.random() - 0.5) * 250;
                p.animate([{ opacity: 1, transform: 'scale(1)' }, { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }], 800).onfinish = () => p.remove();
            }
            card.style.transition = "0.5s"; card.style.transform = "scale(0) rotate(180deg)"; card.style.opacity = "0";
        });
    }

    function checkBattleEnd() {
        if (vchf.phase !== 'BATTLE') return;
        setTimeout(() => {
            const iWin = vchf.pHand.length === 0 && vchf.deck.every(c => c.used);
            const eWin = vchf.eCount === 0 && vchf.deck.every(c => c.used);
            if (iWin && eWin) showMsg("НИЧЬЯ");
            else if (iWin) showMsg("ПОБЕДА!");
            else if (eWin) showMsg("ПОРАЖЕНИЕ");
        }, 1500);
    }

    function toggleHand() {
        isExpanded = !isExpanded;
        document.getElementById('ctrl-panel').classList.toggle('expanded', isExpanded);
        document.getElementById('btn-zoom').textContent = isExpanded ? '✕' : '↕';
        playSound('slide');
    }

    window.onload = () => {
        SUITS.forEach(s => {
            const rowId = (s === '♠'?'spades':s==='♣'?'clubs':s==='♦'?'diamonds':'hearts');
            const row = document.getElementById('s-' + rowId);
            RANKS.forEach(rank => {
                const sl = document.createElement('div'); sl.className = 'slot'; 
                sl.id = `slot-${s}-${rank}`; row.appendChild(sl);
            });
        });
    };
</script>
</body>
</html>
