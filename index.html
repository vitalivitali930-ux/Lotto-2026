<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Quartet Monolith (30/15/15/15 Edition)</title>
    <style>
        :root {
            --gold: #ffcf40;
            --space-dark: #121625; 
            --nebula-core: #222a44; 
            --spark-neon: #00fa9a; /* North */
            --spark-blue: #00d4ff; /* West */
            --spark-fire: #ff4500; /* East */
            --trump-halo: #8a2be2; 
            --cherry-pulse: #4a0404;
            --bg-card: #ffffff;
            --grid-color: rgba(255, 207, 64, 0.06); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #050505; 
            color: #e0e6ff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            perspective: 1200px; 
        }
        .arena-top {
            height: 62%; /* Твои 62% высоты арены */
            position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 8s infinite ease-in-out;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            border-bottom: 2px solid rgba(255, 207, 64, 0.25);
            overflow: hidden;
            transform-style: preserve-3d;
            transform: rotateX(8deg);
            margin-top: 5px;
        }

        @keyframes tableBreathe {
            0%, 100% { 
                background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
                filter: brightness(0.8);
            }
            50% { 
                background: radial-gradient(circle at 50% 45%, #3a0a1a 0%, var(--cherry-pulse) 65%, #050000 100%);
                filter: brightness(1.2);
            }
        }

        .arena-top::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 44px 44px; 
            pointer-events: none;
            z-index: 0;
        }

        /* ХИРУРГИЧЕСКИЕ ЗОНЫ ПО ТВОИМ ПРОПОРЦИЯМ */
        .spark-north { position: absolute; top: 0; left: 15%; right: 15%; height: 15%; z-index: 100; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid rgba(0,250,154,0.1); }
        .spark-west { position: absolute; top: 15%; left: 0; bottom: 0; width: 15%; z-index: 100; display: flex; flex-direction: column; align-items: center; border-right: 1px solid rgba(0,212,255,0.1); }
        .spark-east { position: absolute; top: 15%; right: 0; bottom: 0; width: 15%; z-index: 100; display: flex; flex-direction: column; align-items: center; border-left: 1px solid rgba(255,69,0,0.1); }
        
        .control-bottom {
            height: 38%; /* Твои 30-38% под управление */
            position: relative;
            background: linear-gradient(to top, #000 0%, #0c0f18 100%);
            padding: 15px 5px 5px 5px;
            border-top-left-radius: 50% 30px;
            border-top-right-radius: 50% 30px;
            z-index: 2000;
            border-top: 1px solid rgba(255, 207, 64, 0.2);
        }

        .card-node {
            position: absolute;
            width: 55px;
            height: 77px;
            background-color: #1a1a1a;
            background-image: url('1771489965074(1).png');
            background-size: cover;
            border: 1px solid rgba(255, 207, 64, 0.4);
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            cursor: pointer;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }
        .card-node.face-up { 
            background-image: none !important; 
            background-color: var(--bg-card);
            transform: rotateY(0deg);
            border: 1px solid #fff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .card-node.hide { opacity: 0; pointer-events: none; transform: scale(0.5) rotateX(90deg); }

        /* ВОЗВРАЩЕНО СИЯНИЕ КОЗЫРЯ */
        .trump-status { 
            position: absolute; top: 15px; right: 15px; width: 66px; height: 66px; 
            border: 2px solid var(--gold); background: #000; 
            display: flex; justify-content: center; align-items: center; z-index: 100;
            border-radius: 50%;
            box-shadow: 0 0 20px var(--gold), 0 0 40px var(--trump-halo);
            overflow: visible; 
            transform: rotateZ(-5deg);
        }
        .trump-status::after {
            content: ''; position: absolute; top: -10px; left: -10px; width: 82px; height: 82px;
            border-radius: 50%;
            border: 4px solid var(--trump-halo);
            box-shadow: 0 0 20px var(--trump-halo), inset 0 0 20px var(--trump-halo);
            animation: haloPulse 2s infinite alternate;
            z-index: 1;
        }
        @keyframes haloPulse {
            0% { transform: scale(1); opacity: 0.5; border-color: var(--trump-halo); }
            100% { transform: scale(1.1); opacity: 1; border-color: #fff; box-shadow: 0 0 30px var(--trump-halo), inset 0 0 10px var(--trump-halo); }
        }
        #trump-icon {
            font-size: 42px; 
            position: relative;
            z-index: 5;
            text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 25px var(--trump-halo);
        }
    </style>
</head>
<body>
    <div id='status-msg' style="position:absolute; top:40%; left:50%; transform:translate(-50%, -50%) scale(0); background:rgba(16,20,32,0.95); border:1px solid var(--gold); color:var(--gold); padding:15px 35px; z-index:2100; transition:0.4s cubic-bezier(0.175,0.885,0.32,1.275); font-weight:bold; letter-spacing:3px; pointer-events:none; backdrop-filter:blur(10px);"></div>
    
    <div class='arena-top' id='arena'>
        <div class='spark-north'><div id='cards-top' style='display:flex; gap:5px;'></div></div>
        <div class='spark-west'><div id='cards-west' style='display:flex; flex-direction:column; gap:5px; margin-top:20px;'></div></div>
        <div class='spark-east'><div id='cards-east' style='display:flex; flex-direction:column; gap:5px; margin-top:20px;'></div></div>

        <div class='trump-status'><div id='trump-icon'>?</div></div>
        <div class='chaos-deck-container' style="height:100%; display:flex; justify-content:center; align-items:center; position:relative; z-index:5;">
            <div id='chaos-deck' style="position:relative; width:280px; height:280px;"></div>
        </div>
        <div id='battle-table' style="position:absolute; top:50%; left:50%; width:100%; height:100%; transform:translate(-50%, -50%); pointer-events:none; z-index:10;"></div>
    </div>

    <div class='control-bottom'>
        <div class='suits-grid' style="display:flex; flex-direction:column; height:100%; position:relative; padding-left:80px; align-items:center;">
            <div id='s-spades' class='suit-row' style="display:flex; height:44px; margin-top:-12px; transform:translateX(25px) rotate(-2deg);"></div>
            <div id='s-clubs' class='suit-row' style="display:flex; height:44px; margin-top:-12px; transform:translateX(8px) rotate(-1deg);"></div>
            <div id='s-diamonds' class='suit-row' style="display:flex; height:44px; margin-top:-12px; transform:translateX(8px) rotate(1deg);"></div>
            <div id='s-hearts' class='suit-row' style="display:flex; height:44px; margin-top:-12px; transform:translateX(25px) rotate(2deg);"></div>
        </div>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>КВАРТЕТ АКТИВИРОВАН</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
    </div>

<script>
    /* Код написан Искрой (Quartet Hybrid Edition). Сверка по источнику 100%. */
    var SUITS = ['♠', '♣', '♦', '♥'];
    var RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    var COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    var TURN_ORDER = ['player', 'west', 'top', 'east']; // Очередность по часовой
    
    var vchf = { 
        deck: [], pHand: [], 
        eHandTop: [], eHandWest: [], eHandEast: [], 
        table: [], trump: '', phase: 'WAIT', turn: 'player' 
    };
    
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    var ctx = null;

    function playSound(type) {
        if(!ctx) ctx = new AudioCtx();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if(type === 'slide') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(160, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.12);
            osc.start(); osc.stop(ctx.currentTime + 0.12);
        } else if(type === 'bito') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(110, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
            gain.gain.setValueAtTime(0.35, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.35);
            osc.start(); osc.stop(ctx.currentTime + 0.35);
        }
    }
    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        vchf.phase = 'SHUFFLING';
        var t = [];
        SUITS.forEach(s => { RANKS.forEach(r => { t.push({ s: s, r: r, v: RANKS.indexOf(r), c: COLORS[s], used: false }); }); });
        vchf.deck = t;
        renderChaos();
        setTimeout(visualShuffle, 100);
    }

    function renderChaos() {
        var c = document.getElementById('chaos-deck');
        c.innerHTML = '';
        vchf.deck.forEach((card, i) => {
            var n = document.createElement('div');
            n.className = 'card-node'; n.id = 'node-' + i;
            n.style.left = '112px'; n.style.top = '100px'; 
            c.appendChild(n);
        });
    }

    function visualShuffle() {
        var startTime = Date.now();
        var duration = 2200;
        var te = document.getElementById('trump-icon');
        var interval = setInterval(() => {
            var elapsed = Date.now() - startTime;
            if(Math.random() > 0.8) playSound('slide');
            vchf.deck.forEach((card, i) => {
                var node = document.getElementById('node-' + i);
                if(node) {
                    node.style.left = (Math.random() * 225) + 'px';
                    node.style.top = (Math.random() * 200) + 'px';
                    node.style.transform = 'rotate(' + (Math.random() * 360) + 'deg) translateZ('+(Math.random()*40)+'px)';
                }
            });
            var rs = SUITS[Math.floor(Math.random()*4)];
            te.textContent = rs; te.style.color = COLORS[rs];
            if(elapsed > duration) { clearInterval(interval); finalizeShuffle(); }
        }, 80);
    }

    function finalizeShuffle() {
        vchf.deck.sort(() => Math.random() - 0.5);
        vchf.trump = SUITS[Math.floor(Math.random()*4)];
        var te = document.getElementById('trump-icon');
        te.textContent = vchf.trump; te.style.color = COLORS[vchf.trump];
        vchf.phase = 'PICK';
        vchf.deck.forEach((card, i) => {
            var n = document.getElementById('node-' + i);
            if(n) {
                // ВОССТАНОВЛЕН ВЕЕР ИСТОЧНИКА
                var a = (i / 36) * 6.283; var r = 115;
                n.style.left = (112 + r * Math.cos(a)) + 'px';
                n.style.top = (100 + r * Math.sin(a)) + 'px';
                n.style.transform = 'rotate(' + (a * 57.3 + 90) + 'deg)';
                n.onclick = () => { if(vchf.phase === 'PICK') pickCycle(i); };
            }
        });
        showMsg('РАСПРЕДЕЛЕНИЕ КВАРТЕТА');
    }

    function pickCycle(idx) {
        if(vchf.deck[idx].used) return;
        pick(idx, 'player');
        // Раздаем остальным троим автоматически
        var targets = ['west', 'top', 'east'];
        targets.forEach(t => {
            var av = []; vchf.deck.forEach((x, i) => { if(!x.used) av.push(i); });
            if(av.length > 0) pick(av[0], t);
        });
        if(vchf.deck.every(x => x.used)) { vchf.phase = 'BATTLE'; updateActionButtons(); showMsg('БОЙ НАЧАТ'); }
    }

    function pick(idx, actor) {
        var c = vchf.deck[idx]; c.used = true;
        playSound('slide');
        var node = document.getElementById('node-' + idx);
        if(actor === 'player') {
            vchf.pHand.push(c);
            var slot = document.getElementById('slot-' + c.s + '-' + c.r);
            var rect = slot.getBoundingClientRect();
            var parent = document.getElementById('chaos-deck').getBoundingClientRect();
            node.style.left = (rect.left - parent.left) + 'px';
            node.style.top = (rect.top - parent.top) + 'px';
            setTimeout(() => { node.classList.add('hide'); updateSlot(c); }, 450);
        } else {
            if(actor === 'top') vchf.eHandTop.push(c);
            else if(actor === 'west') vchf.eHandWest.push(c);
            else if(actor === 'east') vchf.eHandEast.push(c);
            node.style.opacity = '0';
            setTimeout(() => { node.classList.add('hide'); drawAllSparks(); }, 450);
        }
    }
    function drawAllSparks() {
        renderSparkHand('cards-top', vchf.eHandTop, 'var(--spark-neon)', 'h');
        renderSparkHand('cards-west', vchf.eHandWest, 'var(--spark-blue)', 'v');
        renderSparkHand('cards-east', vchf.eHandEast, 'var(--spark-fire)', 'v');
    }

    function renderSparkHand(id, hand, color, orient) {
        var cont = document.getElementById(id);
        cont.innerHTML = '';
        hand.forEach(() => {
            var m = document.createElement('div');
            m.style.cssText = `width:${orient=='h'?'12px':'18px'};height:${orient=='h'?'18px':'12px'};background:${color};opacity:0.6;border:1px solid #000;border-radius:2px;box-shadow:0 0 8px ${color};`;
            cont.appendChild(m);
        });
    }

    function updateSlot(card) {
        var el = document.getElementById('slot-' + card.s + '-' + card.r);
        el.classList.add('filled'); el.style.color = card.c; el.innerHTML = '';
        el.innerHTML = `<div style='position:absolute;top:3px;left:4px;font-size:11px;font-weight:900;'>${card.r}</div><div style='font-size:26px;'>${card.s}</div>`;
        el.onclick = () => { if(vchf.phase === 'BATTLE' && vchf.turn === 'player') selectFromHand(card); };
    }

    function selectFromHand(card) {
        if(canPlay(card)) {
            playSound('slide');
            vchf.table.push({card: card, actor: 'player'});
            removeFromHand(card, 'player');
            renderTable();
            nextTurn();
        }
    }

    function sparkThink() {
        if(vchf.phase !== 'BATTLE' || vchf.turn === 'player') return;
        var act = vchf.turn;
        var hand = (act === 'top') ? vchf.eHandTop : (act === 'west' ? vchf.eHandWest : vchf.eHandEast);
        
        if(vchf.table.length % 2 === 0) { // Spark атакует
            if(hand.length > 0) {
                var ch = hand.sort((a,b) => a.v - b.v)[0];
                executeMove(ch, act);
            } else { handleBito(); }
        } else { // Spark защищается
            var target = vchf.table[vchf.table.length - 1].card;
            var cand = hand.filter(c => (c.s === target.s && c.v > target.v) || (c.s === vchf.trump && target.s !== vchf.trump)).sort((a,b)=>a.v-b.v);
            if(cand.length > 0) executeMove(cand[0], act);
            else sparkTake(act);
        }
    }

    function executeMove(card, actor) {
        playSound('slide');
        vchf.table.push({card: card, actor: actor});
        removeFromHand(card, actor);
        renderTable();
        nextTurn();
    }

    function nextTurn() {
        var idx = TURN_ORDER.indexOf(vchf.turn);
        vchf.turn = TURN_ORDER[(idx + 1) % 4];
        updateActionButtons();
        if(vchf.turn !== 'player') setTimeout(sparkThink, 1300);
    }
    function renderTable() {
        var tc = document.getElementById('battle-table');
        tc.innerHTML = '';
        vchf.table.forEach((move, i) => {
            var isDef = (i % 2 !== 0);
            var pairIdx = Math.floor(i / 2);
            var el = document.createElement('div');
            el.className = 'card-node face-up';
            el.style.left = (window.innerWidth/2 - 100 + (pairIdx * 70) + (isDef?20:0)) + 'px';
            el.style.top = (120 + (isDef?30:0)) + 'px';
            el.style.color = move.card.c;
            el.style.transform = `rotate(${Math.random()*10-5}deg) translateZ(${i*2}px)`;
            el.innerHTML = `<div style='position:absolute;top:3px;left:4px;font-size:12px;font-weight:bold;'>${move.card.r}</div><div style='font-size:28px;text-align:center;margin-top:15px;'>${move.card.s}</div>`;
            tc.appendChild(el);
        });
    }

    function canPlay(card) {
        if(vchf.table.length === 0) return true;
        if(vchf.table.length % 2 !== 0) {
            var target = vchf.table[vchf.table.length - 1].card;
            return (card.s === target.s && card.v > target.v) || (card.s === vchf.trump && target.s !== vchf.trump);
        }
        return vchf.table.some(m => m.card.r === card.r);
    }

    function handleBito() {
        playSound('bito');
        vchf.table = []; renderTable();
        nextTurn();
    }

    function handleTake() {
        vchf.pHand = vchf.pHand.concat(vchf.table.map(m => m.card));
        vchf.table = []; vchf.pHand.forEach(c => updateSlot(c));
        renderTable(); nextTurn();
    }

    function sparkTake(actor) {
        showMsg(actor.toUpperCase() + ' БЕРЕТ');
        var cards = vchf.table.map(m => m.card);
        if(actor === 'top') vchf.eHandTop = vchf.eHandTop.concat(cards);
        else if(actor === 'west') vchf.eHandWest = vchf.eHandWest.concat(cards);
        else if(actor === 'east') vchf.eHandEast = vchf.eHandEast.concat(cards);
        vchf.table = []; drawAllSparks(); renderTable();
        nextTurn();
    }

    function removeFromHand(card, actor) {
        if(actor === 'player') {
            vchf.pHand = vchf.pHand.filter(c => !(c.s === card.s && c.r === card.r));
            var slot = document.getElementById('slot-' + card.s + '-' + card.r);
            if(slot) { slot.classList.remove('filled'); slot.innerHTML = ''; }
        } else {
            if(actor === 'top') vchf.eHandTop = vchf.eHandTop.filter(c => !(c.s === card.s && c.r === card.r));
            else if(actor === 'west') vchf.eHandWest = vchf.eHandWest.filter(c => !(c.s === card.s && c.r === card.r));
            else if(actor === 'east') vchf.eHandEast = vchf.eHandEast.filter(c => !(c.s === card.s && c.r === card.r));
            drawAllSparks();
        }
    }

    function updateActionButtons() {
        var isP = (vchf.turn === 'player');
        document.getElementById('btn-bito').style.display = (isP && vchf.table.length > 0 && vchf.table.length % 2 === 0) ? 'block' : 'none';
        document.getElementById('btn-take').style.display = (isP && vchf.table.length % 2 !== 0) ? 'block' : 'none';
    }

    function showMsg(txt) {
        var m = document.getElementById('status-msg');
        m.textContent = txt; m.style.transform = 'translate(-50%, -50%) scale(1)';
        setTimeout(() => { m.style.transform = 'translate(-50%, -50%) scale(0)'; }, 2000);
    }

    function initLayout() {
        var rows = {'♠': 's-spades', '♣': 's-clubs', '♦': 's-diamonds', '♥': 's-hearts'};
        SUITS.forEach(s => {
            var r = document.getElementById(rows[s]);
            RANKS.forEach(rank => {
                var sl = document.createElement('div');
                sl.className = 'slot'; sl.id = 'slot-' + s + '-' + rank;
                r.appendChild(sl);
            });
        });
    }
    window.onload = initLayout;
</script>
</body>
</html>
