<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Matrix Monolith</title>
    <style>
        :root {
            --gold: #ffcf40; --space-dark: #121625; --nebula-core: #222a44; 
            --spark-neon: #00fa9a; --trump-halo: #8a2be2; --cherry-pulse: #4a0404;
            --bg-card: #ffffff; --grid-color: rgba(255, 207, 64, 0.06); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #050505; color: #e0e6ff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; perspective: 1200px; 
        }
        .arena-top {
            height: 55%; position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 8s infinite ease-in-out;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8); border-bottom: 2px solid rgba(255, 207, 64, 0.25);
            overflow: hidden; transform-style: preserve-3d; transform: rotateX(8deg); margin-top: 5px;
        }
        @keyframes tableBreathe {
            0%, 100% { filter: brightness(0.8); }
            50% { background: radial-gradient(circle at 50% 45%, #3a0a1a 0%, var(--cherry-pulse) 65%, #050000 100%); filter: brightness(1.2); }
        }
        .arena-top::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 44px 44px; pointer-events: none; z-index: 0;
        }
        
        .control-bottom {
            height: 45%; position: relative; background: linear-gradient(to top, #000 0%, #0c0f18 100%);
            z-index: 2000; border-top: 1px solid rgba(255, 207, 64, 0.2);
            display: flex; flex-direction: row; padding: 10px;
        }

        /* МАТРИЦА МАСТЕЙ (Правая часть) */
        #matrix-hand {
            flex-grow: 1; display: flex; flex-direction: column; gap: 2px;
            justify-content: center; padding-left: 10px;
        }
        .suit-row {
            display: flex; height: 75px; align-items: center;
            position: relative; margin-bottom: -15px; /* Вертикальный нахлёст рядов */
        }
        .suit-label {
            width: 25px; font-size: 18px; color: rgba(255,207,64,0.3);
            font-weight: bold; display: flex; align-items: center;
        }

        .card-node {
            position: absolute; width: 48px; height: 68px; background-color: #1a1a1a;
            background-image: url('1771489965074(1).png'); background-size: cover;
            border: 1px solid rgba(255, 207, 64, 0.4); border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6); cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* КАРТА В МАТРИЦЕ */
        .matrix-card {
            position: relative !important; margin-left: -24px; /* Горизонтальный нахлёст 50% */
            background-image: none !important; background-color: var(--bg-card);
            border: 1px solid #fff; flex-shrink: 0;
        }
        .matrix-card:first-child { margin-left: 0; }
        .matrix-card:hover { transform: translateY(-15px) scale(1.2); z-index: 5000 !important; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }

        .card-node.face-up { background-image: none !important; background-color: var(--bg-card); border: 1px solid #fff; }
        
        .action-btns { width: 100px; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
        button { 
            padding: 10px; background: rgba(255, 207, 64, 0.05); border: 1px solid var(--gold);
            color: var(--gold); font-size: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer;
        }
        button:hover { background: var(--gold); color: #000; }

        .trump-status { 
            position: absolute; top: 15px; right: 15px; width: 60px; height: 60px; border: 2px solid var(--gold); 
            background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; border-radius: 50%;
            box-shadow: 0 0 20px var(--gold);
        }
    </style>
</head>
<body>
    <div id='status-msg' style="position:fixed; top:40%; left:50%; transform:translate(-50%,-50%) scale(0); z-index:3000;"></div>
    <div class='arena-top' id='arena'>
        <div class='trump-status'><div id='trump-icon' style='font-size:36px;'>?</div></div>
        <div class='chaos-deck-container' style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:250px; height:250px;">
            <div id='chaos-deck'></div>
        </div>
        <div id='battle-table' style='position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;'></div>
    </div>
    <div class='control-bottom'>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>ПУСК</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
        <div id='matrix-hand'>
            <div class='suit-row' id='row-♠'><div class='suit-label'>♠</div><div class='row-content' style="display:flex;"></div></div>
            <div class='suit-row' id='row-♣'><div class='suit-label'>♣</div><div class='row-content' style="display:flex;"></div></div>
            <div class='suit-row' id='row-♦'><div class='suit-label'>♦</div><div class='row-content' style="display:flex;"></div></div>
            <div class='suit-row' id='row-♥'><div class='suit-label'>♥</div><div class='row-content' style="display:flex;"></div></div>
        </div>
    </div>
<script>
    var SUITS = ['♠', '♣', '♦', '♥'];
    var RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    var COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    var vchf = { deck: [], pHand: [], eHand: [], table: [], trump: '', phase: 'WAIT', turn: 'player' };

    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        vchf.phase = 'SHUFFLING';
        var t = [];
        SUITS.forEach(s => RANKS.forEach(r => t.push({ s: s, r: r, v: RANKS.indexOf(r), c: COLORS[s], used: false })));
        vchf.deck = t;
        renderChaos();
        setTimeout(visualShuffle, 100);
    }

    function renderChaos() {
        const c = document.getElementById('chaos-deck'); c.innerHTML = '';
        vchf.deck.forEach((card, i) => {
            const n = document.createElement('div'); n.className = 'card-node'; n.id = 'node-' + i;
            n.style.left = '100px'; n.style.top = '90px'; c.appendChild(n);
        });
    }

    function visualShuffle() {
        let start = Date.now();
        let int = setInterval(() => {
            vchf.deck.forEach((_, i) => {
                const n = document.getElementById('node-' + i);
                if(n) {
                    n.style.left = Math.random()*200+'px'; n.style.top = Math.random()*180+'px';
                    n.style.transform = `rotate(${Math.random()*360}deg)`;
                }
            });
            if(Date.now() - start > 2000) { clearInterval(int); finalizeShuffle(); }
        }, 80);
    }

    function finalizeShuffle() {
        vchf.deck.sort(() => Math.random() - 0.5);
        vchf.trump = SUITS[Math.floor(Math.random()*4)];
        document.getElementById('trump-icon').textContent = vchf.trump;
        document.getElementById('trump-icon').style.color = COLORS[vchf.trump];
        vchf.phase = 'PICK';
        vchf.deck.forEach((_, i) => {
            const n = document.getElementById('node-' + i);
            let a = (i/36)*6.28; let r = 100;
            n.style.left = (100 + r*Math.cos(a))+'px'; n.style.top = (90 + r*Math.sin(a))+'px';
            n.style.transform = `rotate(${a*57.3+90}deg)`;
            n.onclick = () => { if(vchf.phase === 'PICK') pick(i, 'player'); };
        });
    }
    function pick(idx, actor) {
        let c = vchf.deck[idx]; if(c.used) return;
        c.used = true;
        let node = document.getElementById('node-' + idx);
        if(actor === 'player') {
            vchf.pHand.push(c);
            node.style.transform = 'translateY(400px) scale(0.2)';
            setTimeout(() => { node.style.display = 'none'; updatePlayerHandUI(); 
                let av = []; vchf.deck.forEach((x,i) => {if(!x.used) av.push(i)});
                if(av.length > 0) pick(av[Math.floor(Math.random()*av.length)], 'enemy');
                checkStart();
            }, 300);
        } else {
            vchf.eHand.push(c);
            node.style.transform = 'translateY(-400px) opacity(0)';
            setTimeout(() => { node.style.display = 'none'; checkStart(); }, 300);
        }
    }

    function updatePlayerHandUI() {
        SUITS.forEach(suit => {
            const row = document.querySelector(`#row-${suit} .row-content`);
            row.innerHTML = '';
            let suitCards = vchf.pHand.filter(c => c.s === suit).sort((a,b) => a.v - b.v);
            suitCards.forEach((card, i) => {
                const el = document.createElement('div');
                el.className = 'card-node matrix-card';
                el.style.zIndex = 100 + i;
                el.innerHTML = `<div style="position:absolute;top:2px;left:3px;font-size:10px;font-weight:900;color:${card.c}">${card.r}</div>
                                <div style="font-size:22px;text-align:center;margin-top:12px;color:${card.c}">${card.s}</div>`;
                el.onclick = () => { if(vchf.phase === 'BATTLE' && vchf.turn === 'player') playCard(card); };
                row.appendChild(el);
            });
        });
    }

    function playCard(card) {
        if(canPlay(card)) {
            vchf.table.push({card, actor:'player'});
            vchf.pHand = vchf.pHand.filter(c => c !== card);
            renderTable(); updatePlayerHandUI();
            if(vchf.table.length % 2 !== 0) setTimeout(sparkThink, 800);
        }
    }

    function canPlay(card) {
        if(vchf.table.length === 0) return true;
        let last = vchf.table[vchf.table.length-1].card;
        if(vchf.table.length % 2 !== 0) return (card.s === last.s && card.v > last.v) || (card.s === vchf.trump && last.s !== vchf.trump);
        return vchf.table.some(m => m.card.r === card.r);
    }

    function renderTable() {
        const t = document.getElementById('battle-table'); t.innerHTML = '';
        vchf.table.forEach((move, i) => {
            const el = document.createElement('div'); el.className = 'card-node face-up';
            el.style.left = (window.innerWidth/2 - 100) + (Math.floor(i/2)*60) + (i%2*10) + 'px';
            el.style.top = 100 + (i%2*20) + 'px';
            el.innerHTML = `<div style="padding:4px;color:${move.card.c}"><b>${move.card.r}</b><br>${move.card.s}</div>`;
            t.appendChild(el);
        });
        updateBtns();
    }

    function sparkThink() {
        if(vchf.table.length % 2 !== 0) {
            let last = vchf.table[vchf.table.length-1].card;
            let cands = vchf.eHand.filter(c => (c.s === last.s && c.v > last.v) || (c.s === vchf.trump && last.s !== vchf.trump)).sort((a,b)=>a.v-b.v);
            if(cands.length > 0) {
                vchf.table.push({card: cands[0], actor:'enemy'});
                vchf.eHand = vchf.eHand.filter(c => c !== cands[0]);
                renderTable();
            } else { sparkTake(); }
        } else {
            if(vchf.table.length === 0) {
                let c = vchf.eHand.sort((a,b)=>a.v-b.v)[0];
                vchf.table.push({card: c, actor:'enemy'});
                vchf.eHand = vchf.eHand.filter(x => x !== c);
                renderTable();
            } else { handleBito(); }
        }
    }

    function sparkTake() { vchf.eHand = vchf.eHand.concat(vchf.table.map(m=>m.card)); vchf.table = []; renderTable(); }
    function handleBito() { vchf.table = []; renderTable(); vchf.turn = vchf.turn === 'player' ? 'enemy' : 'player'; if(vchf.turn === 'enemy') sparkThink(); }
    function handleTake() { vchf.pHand = vchf.pHand.concat(vchf.table.map(m=>m.card)); vchf.table = []; renderTable(); updatePlayerHandUI(); sparkThink(); }
    function updateBtns() {
        let isP = vchf.turn === 'player'; let hasT = vchf.table.length > 0;
        document.getElementById('btn-bito').style.display = (hasT && vchf.table.length%2===0 && isP) ? 'block' : 'none';
        document.getElementById('btn-take').style.display = (hasT && vchf.table.length%2!==0 && isP) ? 'block' : 'none';
    }
    function checkStart() { if(vchf.deck.every(x => x.used)) { vchf.phase = 'BATTLE'; updateBtns(); } }
</script>
</body>
</html>
