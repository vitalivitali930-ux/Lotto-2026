<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Velvet</title>
    <style>
        :root {
            --gold: #d4af37;
            --velvet-dark: #1a0202;
            --velvet-bright: #4a0404;
            --bg-card: #2d0505;
            --shadow-gold: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--velvet-dark);
            color: #f0e68c;
            font-family: 'Georgia', serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .arena-top {
            height: 70%;
            position: relative;
            border-bottom: 2px solid var(--gold);
            background: radial-gradient(circle at center, var(--velvet-bright) 0%, var(--velvet-dark) 100%);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        .control-bottom {
            height: 30%;
            position: relative;
            background: #0d0101;
            padding: 5px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }
        .side-bar {
            position: absolute;
            top: 0; width: 15%; height: 100%;
            border-color: rgba(212, 175, 55, 0.2);
            border-style: solid;
            z-index: 5;
        }
        .left-bar { left: 0; border-right-width: 1px; }
        .right-bar { right: 0; border-left-width: 1px; }
        .spark-zone {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(212, 175, 55, 0.05);
        }
        #spark-cards { display: flex; gap: 3px; }
        .chaos-deck-container {
            height: calc(100% - 45px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #chaos-deck { position: relative; width: 240px; height: 240px; }
        .card-node {
            position: absolute;
            width: 44px;
            height: 60px;
            background: var(--bg-card);
            border: 1px solid var(--gold);
            border-radius: 3px;
            box-shadow: var(--shadow-gold);
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .card-node.hide { opacity: 0; pointer-events: none; }
        .trump-status {
            position: absolute;
            top: 15px; right: 15px;
            width: 48px; height: 68px;
            border: 2px solid var(--gold);
            background: rgba(45, 5, 5, 0.9);
            box-shadow: 0 0 10px var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .battle-table {
            position: absolute;
            bottom: 20px; width: 70%; left: 15%;
            height: 100px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .suits-grid { display: flex; flex-direction: column; height: 100%; gap: 3px; }
        .suit-row { display: flex; flex: 1; gap: 3px; }
        .slot {
            flex: 1;
            background: rgba(212, 175, 55, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slot.filled { background: var(--bg-card); border: 1px solid var(--gold); }
        .action-btns {
            position: absolute;
            bottom: 20px; right: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 50;
        }
        button {
            padding: 10px 15px;
            background: var(--velvet-bright);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class='arena-top'>
        <div class='side-bar left-bar'></div>
        <div class='side-bar right-bar'></div>
        <div class='spark-zone'>
            <span style='font-size:9px; color:var(--gold);'>SPARK:</span>
            <div id='spark-cards'></div>
        </div>
        <div class='trump-status'>
            <div id='trump-icon' style='font-size:24px;'>?</div>
        </div>
        <div class='chaos-deck-container'>
            <div id='chaos-deck'></div>
        </div>
        <div id='battle-table' class='battle-table'></div>
    </div>
    <div class='control-bottom'>
        <div class='suits-grid'>
            <div class='suit-row' id='s-spades'></div>
            <div class='suit-row' id='s-clubs'></div>
            <div class='suit-row' id='s-diamonds'></div>
            <div class='suit-row' id='s-hearts'></div>
        </div>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>В БОЙ</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
    </div>
<script>
    /* ПРОТОКОЛ АНТИ-НИРВАНА: НИКАКИХ ОБРАТНЫХ КАВЫЧЕК [cite: 2026-03-03] */
    var SUITS = ['♠', '♣', '♦', '♥'];
    var RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    var COLORS = {'♠': '#888', '♣': '#888', '♦': '#ff4d4d', '♥': '#ff4d4d'};

    var vchf = {
        deck: [], pHand: [], eHand: [], table: [],
        trump: '', phase: 'WAIT', turn: 'player'
    };

    function initLayout() {
        var rows = {
            '♠': document.getElementById('s-spades'),
            '♣': document.getElementById('s-clubs'),
            '♦': document.getElementById('s-diamonds'),
            '♥': document.getElementById('s-hearts')
        };
        SUITS.forEach(function(s) {
            if (!rows[s]) return;
            rows[s].innerHTML = '';
            RANKS.forEach(function(r) {
                var slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = 'slot-' + s + '-' + r;
                rows[s].appendChild(slot);
            });
        });
    }

    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        vchf.phase = 'PICK';
        var temp = [];
        SUITS.forEach(function(s) {
            RANKS.forEach(function(r) {
                temp.push({ s: s, r: r, v: RANKS.indexOf(r), c: COLORS[s], used: false });
            });
        });
        vchf.deck = temp.sort(function() { return Math.random() - 0.5; });
        vchf.trump = SUITS[Math.floor(Math.random() * 4)];
        var ti = document.getElementById('trump-icon');
        ti.textContent = vchf.trump;
        ti.style.color = COLORS[vchf.trump];
        renderChaos();
    }

    function renderChaos() {
        var cont = document.getElementById('chaos-deck');
        cont.innerHTML = '';
        vchf.deck.forEach(function(card, i) {
            var n = document.createElement('div');
            n.className = 'card-node';
            n.id = 'node-' + i;
            var ang = (i / 36) * 6.28;
            var rad = 90;
            var x = 100 + rad * Math.cos(ang) + (Math.random() * 20);
            var y = 100 + rad * Math.sin(ang) + (Math.random() * 20);
            n.style.left = x + 'px';
            n.style.top = y + 'px';
            n.style.transform = 'rotate(' + (Math.random() * 40 - 20) + 'deg)';
            n.onclick = function() { if(vchf.phase === 'PICK') pick(i, 'player'); };
            cont.appendChild(n);
        });
    }

    function pick(idx, actor) {
        var c = vchf.deck[idx];
        if(!c || c.used) return;
        c.used = true;
        var node = document.getElementById('node-' + idx);
        if(node) node.classList.add('hide');

        if(actor === 'player') {
            vchf.pHand.push(c);
            updateSlot(c);
            setTimeout(function() {
                var av = [];
                vchf.deck.forEach(function(x, i) { if(!x.used) av.push(i); });
                if(av.length > 0) pick(av[Math.floor(Math.random() * av.length)], 'enemy');
            }, 100);
        } else {
            vchf.eHand.push(c);
            drawSparkVisual();
        }
        if(vchf.deck.every(function(x) { return x.used; })) startBattle();
    }

    function updateSlot(card) {
        var el = document.getElementById('slot-' + card.s + '-' + card.r);
        if(!el) return;
        el.classList.add('filled');
        el.style.color = card.c;
        el.innerHTML = '';
        var t = document.createElement('div');
        t.style.cssText = 'position:absolute;top:2px;left:2px;font-size:10px;font-weight:bold;';
        t.textContent = card.r;
        var m = document.createElement('div');
        m.style.fontSize = '20px';
        m.textContent = card.s;
        el.appendChild(t);
        el.appendChild(m);
        el.onclick = function() { if(vchf.phase === 'BATTLE') selectFromHand(card); };
    }
    function drawSparkVisual() {
        var cont = document.getElementById('spark-cards');
        cont.innerHTML = '';
        vchf.eHand.forEach(function() {
            var m = document.createElement('div');
            m.style.cssText = 'width:7px;height:10px;background:var(--gold);opacity:0.6;';
            cont.appendChild(m);
        });
    }

    function startBattle() {
        vchf.phase = 'BATTLE';
        alert('КОЛОДА ПУСТА. КТО НЕ СПРЯТАЛСЯ - Я НЕ ВИНОВАТА!');
        updateActionButtons();
    }

    function selectFromHand(card) {
        if(vchf.phase !== 'BATTLE' || vchf.turn !== 'player') return;
        if(canPlay(card)) {
            vchf.table.push({card: card, actor: 'player'});
            removeFromHand(card, 'player');
            renderTable();
            if(vchf.table.length % 2 !== 0) {
                vchf.turn = 'enemy';
                setTimeout(sparkThink, 800);
            }
        }
        updateActionButtons();
    }

    function canPlay(card) {
        if(vchf.table.length === 0) return true;
        var lastMove = vchf.table[vchf.table.length - 1];
        if(vchf.table.length % 2 !== 0) {
            var target = lastMove.card;
            if(card.s === target.s && card.v > target.v) return true;
            if(card.s === vchf.trump && target.s !== vchf.trump) return true;
            return false;
        }
        var activeRanks = vchf.table.map(function(m) { return m.card.r; });
        return activeRanks.indexOf(card.r) !== -1;
    }

    function renderTable() {
        var tableCont = document.getElementById('battle-table');
        tableCont.innerHTML = '';
        vchf.table.forEach(function(move, i) {
            var card = move.card;
            var cardEl = document.createElement('div');
            cardEl.className = 'card-node';
            cardEl.style.position = 'relative';
            cardEl.style.display = 'inline-block';
            cardEl.style.color = card.c;
            var r = document.createElement('div');
            r.style.cssText = 'position:absolute;top:2px;left:2px;font-size:9px;';
            r.textContent = card.r;
            var s = document.createElement('div');
            s.style.cssText = 'font-size:18px;text-align:center;margin-top:10px;';
            s.textContent = card.s;
            cardEl.appendChild(r);
            cardEl.appendChild(s);
            if(i % 2 !== 0) cardEl.style.transform = 'translateY(-15px) translateX(-10px) rotate(5deg)';
            tableCont.appendChild(cardEl);
        });
    }
    function sparkThink() {
        if(vchf.phase !== 'BATTLE') return;
        var action = false;
        if(vchf.table.length % 2 !== 0) {
            var target = vchf.table[vchf.table.length - 1].card;
            var candidates = vchf.eHand.filter(function(c) {
                return (c.s === target.s && c.v > target.v) || (c.s === vchf.trump && target.s !== vchf.trump);
            }).sort(function(a,b) { return a.v - b.v; });
            if(candidates.length > 0) {
                var choice = candidates[0];
                vchf.table.push({card: choice, actor: 'enemy'});
                removeFromHand(choice, 'enemy');
                action = true;
            } else { sparkTake(); return; }
        } else {
            if(vchf.table.length === 0) {
                var choice = vchf.eHand.sort(function(a,b) { return a.v - b.v; })[0];
                vchf.table.push({card: choice, actor: 'enemy'});
                removeFromHand(choice, 'enemy');
                action = true;
            } else { sparkBito(); return; }
        }
        renderTable();
        if(action) { vchf.turn = 'player'; checkGameOver(); }
        updateActionButtons();
    }

    function removeFromHand(card, actor) {
        if(actor === 'player') {
            vchf.pHand = vchf.pHand.filter(function(c) { return !(c.s === card.s && c.r === card.r); });
            var slot = document.getElementById('slot-' + card.s + '-' + card.r);
            if(slot) { slot.classList.remove('filled'); slot.innerHTML = ''; }
        } else {
            vchf.eHand = vchf.eHand.filter(function(c) { return !(c.s === card.s && c.r === card.r); });
            drawSparkVisual();
        }
    }

    function updateActionButtons() {
        var bBito = document.getElementById('btn-bito');
        var bTake = document.getElementById('btn-take');
        bBito.style.display = (vchf.table.length > 0 && vchf.table.length % 2 === 0) ? 'block' : 'none';
        bTake.style.display = (vchf.table.length > 0 && vchf.table.length % 2 !== 0) ? 'block' : 'none';
    }

    function handleBito() { vchf.table = []; renderTable(); vchf.turn = 'player'; updateActionButtons(); }
    function handleTake() {
        vchf.pHand = vchf.pHand.concat(vchf.table.map(function(m) { return m.card; }));
        vchf.table = []; vchf.pHand.forEach(function(c) { updateSlot(c); });
        renderTable(); vchf.turn = 'enemy'; updateActionButtons(); setTimeout(sparkThink, 1000);
    }

    function checkGameOver() {
        if(vchf.pHand.length === 0) { alert('ТЫ ПОБЕДИЛ!'); location.reload(); }
        else if(vchf.eHand.length === 0) { alert('SPARK ВЫИГРАЛА!'); location.reload(); }
    }

    window.onload = function() { initLayout(); };
</script>
</body>
</html>
