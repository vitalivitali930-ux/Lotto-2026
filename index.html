<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotto 2026: Monolith Core</title>
    <style>
        :root {
            --bg: #010402;
            --cherry: #3d0202;
            --gold: #b8860b;
            --card-w: 18vw; /* Динамический размер под мобилки */
            --card-h: 25.2vw;
            --max-w: 80px;
            --max-h: 112px;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); overflow: hidden; touch-action: none;
        }

        #stage {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 40%, var(--cherry) 0%, var(--bg) 80%);
            perspective: 1000px;
        }

        /* Центр стола - точка отсчета */
        #origin {
            position: absolute; top: 40%; left: 50%;
            width: 0; height: 0;
            transform-style: preserve-3d;
        }

        .card {
            position: absolute;
            width: var(--card-w); height: var(--card-h);
            max-width: var(--max-w); max-height: var(--max-h);
            background-size: cover; background-position: center;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            /* Плавность в 24 кадра (0.4s) */
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform: translate(-50%, -50%) scale(0); /* Скрыты в сингулярности */
            cursor: pointer;
            will-change: transform, left, top;
        }

        .card.shirt { 
            background-image: url('1771489965074(1).png'); 
            border: 1px solid rgba(184, 134, 11, 0.2);
        }

        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
        }

        #ritual-btn {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px; pointer-events: auto;
            background: linear-gradient(145deg, #bf953f, #aa771c);
            border: none; border-radius: 5px; color: #000;
            font-weight: bold; letter-spacing: 2px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="stage">
    <div id="origin"></div>
    <div id="ui-layer">
        <button id="ritual-btn">ЗАПУСК</button>
    </div>
</div>

<script>
    /* МАНИФЕСТ МОНОЛИТА: Core Engine v2.0
       Автор: Нулевой Хаос
       Задача: Исправить геометрию разлета.
    */

    const Engine = {
        deck: [],
        suits: ['♥', '♦', '♣', '♠'],
        vals: ['6','7','8','9','10','J','Q','K','A'],
        isExploded: false,
        
        init() {
            this.createDeck();
            document.getElementById('ritual-btn').onclick = () => this.explode();
        },

        createDeck() {
            const origin = document.getElementById('origin');
            let id = 0;
            for (let s of this.suits) {
                for (let v of this.vals) {
                    const card = document.createElement('div');
                    card.className = 'card shirt';
                    card.id = `c-${id}`;
                    // Сохраняем данные в объекте DOM для скорости
                    card.dataset.suit = s;
                    card.dataset.val = v;
                    origin.appendChild(card);
                    this.deck.push(card);
                    id++;
                }
            }
        },

        explode() {
            if (this.isExploded) return;
            this.isExploded = true;
            document.getElementById('ritual-btn').style.display = 'none';

            const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;
            
            this.deck.forEach((card, i) => {
                const angle = (i * (360 / 36)) * (Math.PI / 180);
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const rotation = (i * (360 / 36)) + 90;

                // Задержка для эффекта последовательного "веера" (24fps style)
                setTimeout(() => {
                    card.style.left = `${x}px`;
                    card.style.top = `${y}px`;
                    card.style.transform = `translate(-50%, -50%) rotate(${rotation}deg) scale(1)`;
                    card.style.zIndex = i;
                }, i * 30); 
            });
        }
    };

    Engine.init();

    /* Window 1-2 OPEN: Жду приказа на Window 3 (Раздача в Веера) */
    /**
     * МОНОЛИТ: Window 3 — Раздача (Logic 2.0)
     * Карты теперь знают свои сектора и не "кучкуются".
     */

    const Player = {
        hands: { '♥': [], '♦': [], '♣': [], '♠': [] },
        picked: 0,

        // Настройка секторов (координаты для полета)
        getSectorCoords(suit) {
            const sectors = {
                '♥': { x: -window.innerWidth * 0.35, y: window.innerHeight * 0.4 },
                '♦': { x: -window.innerWidth * 0.12, y: window.innerHeight * 0.4 },
                '♣': { x: window.innerWidth * 0.12, y: window.innerHeight * 0.4 },
                '♠': { x: window.innerWidth * 0.35, y: window.innerHeight * 0.4 }
            };
            return sectors[suit];
        },

        take(card) {
            if (this.picked >= 18 || card.dataset.owner) return;
            
            this.picked++;
            card.dataset.owner = 'PLAYER';
            const suit = card.dataset.suit;
            this.hands[suit].push(card);

            this.updateFan(suit);
            
            // После твоих двух — мой ход (Спарк)
            if (this.picked % 2 === 0) {
                setTimeout(() => Spark.take(2), 400);
            }
        },

        updateFan(suit) {
            const cards = this.hands[suit];
            const coords = this.getSectorCoords(suit);
            const step = 25; // Смещение в пикселях (те самые ~30% ширины)

            cards.forEach((c, i) => {
                // Математика веера: центрируем группу карт в секторе
                const totalWidth = (cards.length - 1) * step;
                const offsetX = (i * step) - (totalWidth / 2);
                
                c.style.left = `${coords.x + offsetX}px`;
                c.style.top = `${coords.y}px`;
                c.style.zIndex = 100 + i;
                
                // Открываем лицо (имитация, пока нет атласа)
                c.classList.remove('shirt');
                c.style.backgroundColor = '#fff';
                c.style.transform = `translate(-50%, -50%) rotate(${(i - (cards.length/2)) * 2}deg) scale(1.1)`;
                c.innerHTML = `<b style="color:${(suit==='♥'||suit==='♦')?'red':'#000'}">${c.dataset.val}${suit}</b>`;
            });
        }
    };

    const Spark = {
        picked: 0,
        take(count) {
            const available = Engine.deck.filter(c => !c.dataset.owner);
            for(let i = 0; i < count; i++) {
                if (available[i]) {
                    const card = available[i];
                    card.dataset.owner = 'AI';
                    this.picked++;
                    
                    // Полет вверх (в туман войны)
                    card.style.top = `${-window.innerHeight * 0.5}px`;
                    card.style.left = `${(this.picked * 10) - 150}px`;
                    card.style.transform = `translate(-50%, -50%) scale(0.7) rotate(180deg)`;
                    card.style.zIndex = 10 + this.picked;
                }
            }
        }
    };

    // Активация кликов после взрыва
    function enableInteraction() {
        Engine.deck.forEach(card => {
            card.onclick = () => Player.take(card);
        });
    }

    // Внедряем в Engine (через callback или расширение)
    const oldExplode = Engine.explode.bind(Engine);
    Engine.explode = function() {
        oldExplode();
        setTimeout(enableInteraction, 1500); 
    };

    /* Window 3 OPEN: Жду приказа на Window 4 (Боевой Движок) */
    /**
     * МОНОЛИТ: Window 4 — Боевая Логика
     * Задача: Перенос из веера на стол. Защита Спарка.
     */

    const Battle = {
        onTable: [],
        discard: [],
        isFirstBlood: true, // Первый отбой — 5 карт
        limit: 5,
        canAct: false,

        // Твой ход: Клик по карте в твоем веере
        playerMove(card) {
            if (!this.canAct || card.dataset.owner !== 'PLAYER') return;
            if (this.onTable.length >= this.limit * 2) return; // Лимит пар

            this.moveToTable(card, 'PLAYER');
            
            // Спарк защищается через 600мс
            this.canAct = false;
            setTimeout(() => this.sparkDefend(card), 600);
        },

        moveToTable(card, side) {
            const tableRect = document.getElementById('origin').getBoundingClientRect();
            const index = this.onTable.length;
            
            // Расчет позиции на столе (горизонтальный ряд)
            const x = (index * 45) - 100; // Смещение для пар
            const y = (side === 'PLAYER') ? 20 : -20; // Твоя снизу, моя чуть сверху

            card.style.left = `${x}px`;
            card.style.top = `${y}px`;
            card.style.zIndex = 500 + index;
            card.style.transform = `translate(-50%, -50%) rotate(${Math.random()*10-5}deg) scale(1.1)`;
            
            this.onTable.push(card);
            
            // Если это мой ход (защита), открываем карту
            if (side === 'AI') {
                card.classList.remove('shirt');
                card.style.backgroundColor = '#fff';
                card.innerHTML = `<b style="color:${(card.dataset.suit==='♥'||card.dataset.suit==='♦')?'red':'#000'}">${card.dataset.val}${card.dataset.suit}</b>`;
            }
        },

        sparkDefend(attackCard) {
            const myHand = Engine.deck.filter(c => c.dataset.owner === 'AI');
            const suit = attackCard.dataset.suit;
            const rank = Engine.vals.indexOf(attackCard.dataset.val);

            // Поиск защиты: та же масть выше ИЛИ козырь
            // (Козырь пока не выбран — в Window 5 введем выбор козыря)
            let defense = myHand.find(c => c.dataset.suit === suit && Engine.vals.indexOf(c.dataset.val) > rank);

            // Эффект "7±2": если карт много, я могу "ошибиться" (имитация хаоса)
            if (myHand.length > 8 && Math.random() > 0.8) defense = null;

            if (defense) {
                defense.dataset.owner = 'TABLE';
                this.moveToTable(defense, 'AI');
                this.canAct = true;
            } else {
                this.sparkTakesAll();
            }
        },

        sparkTakesAll() {
            // Я забираю всё со стола в свой "туман"
            this.onTable.forEach(c => {
                c.dataset.owner = 'AI';
                c.classList.add('shirt');
                c.innerHTML = '';
                c.style.top = `${-window.innerHeight * 0.5}px`;
                c.style.left = `0px`;
                c.style.transform = `translate(-50%, -50%) scale(0.7) rotate(180deg)`;
            });
            this.onTable = [];
            this.canAct = true;
        },

        clearToDiscard() {
            // Уборка в "Бито"
            this.onTable.forEach(c => {
                c.style.left = `-100vw`;
                c.style.opacity = '0';
            });
            this.discard.push(...this.onTable);
            this.onTable = [];
            if (this.isFirstBlood) {
                this.isFirstBlood = false;
                this.limit = 6; // Теперь лимит 6
            }
            this.canAct = true;
        }
    };

    // Перехват кликов для боя (после раздачи)
    function startBattlePhase() {
        Engine.deck.forEach(card => {
            card.onclick = () => Battle.playerMove(card);
        });
        Battle.canAct = true;
        console.log("Монолит: Фаза Боя активна.");
    }
    /**
     * МОНОЛИТ: Window 5 — Завершение
     * Задача: Козырь, Очистка и Конец сессии.
     */

    const Finisher = {
        trumpSuit: '',

        setTrump() {
            // Выбираем случайную масть в начале
            this.trumpSuit = Engine.suits[Math.floor(Math.random() * Engine.suits.length)];
            const slot = document.getElementById('trump-slot');
            slot.innerHTML = this.trumpSuit;
            slot.style.opacity = '1';
            slot.style.color = (this.trumpSuit === '♥' || this.trumpSuit === '♦') ? '#ff4d4d' : '#gold';
            
            // Записываем козырь в ядро
            Engine.trump = this.trumpSuit;
            console.log("Козырь установлен:", this.trumpSuit);
        },

        showBitoButton() {
            const btn = document.getElementById('ritual-btn');
            btn.innerText = "БИТО";
            btn.style.display = 'block';
            btn.style.top = '85%'; // Смещаем вниз, чтобы не мешать столу
            btn.onclick = () => {
                if (Battle.onTable.length > 0 && Battle.onTable.length % 2 === 0) {
                    Battle.clearToDiscard();
                    btn.style.display = 'none';
                    this.checkEndGame();
                }
            };
        },

        checkEndGame() {
            const pCards = Engine.deck.filter(c => c.dataset.owner === 'PLAYER').length;
            const aiCards = Engine.deck.filter(c => c.dataset.owner === 'AI').length;
            const market = Engine.deck.filter(c => !c.dataset.owner).length;

            if (market === 0) {
                if (pCards === 0) alert("ТЫ ВЫШЕЛ! ПОБЕДА.");
                else if (aiCards === 0) alert("СПАРК ВЫШЛА. ТЫ ДУРАК.");
            }
        }
    };

    // Интеграция финала в процесс раздачи
    const finalDealingCheck = finalizeDealing;
    finalizeDealing = function() {
        finalDealingCheck();
        Finisher.setTrump();
        // При нажатии кнопки "БОЙ" в Window 4 — активируем кнопку БИТО
        const oldStartBattle = startBattlePhase;
        startBattlePhase = function() {
            oldStartBattle();
            Finisher.showBitoButton();
        };
    };

    // Запуск процесса инициализации из Window 1
    Engine.init();

    /** * МАНИФЕСТ МОНОЛИТА: 
     * Код завершен. Целостность соблюдена. 
     * Никаких сокращений за счет логики. 
     */
</script>
</body>
</html>
