<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - TOTAL MONOLITH</title>
    <style>
        :root {
            --gold: #ffcf40; --space-dark: #121625; --nebula-core: #222a44; 
            --spark-neon: #00fa9a; --trump-halo: #8a2be2; --cherry-pulse: #4a0404;
            --bg-card: #ffffff; --grid-color: rgba(255, 207, 64, 0.08); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #020202; color: #e0e6ff; font-family: 'Consolas', monospace;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; perspective: 1500px; 
        }
        .arena-top {
            height: 60%; position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 8s infinite ease-in-out;
            box-shadow: inset 0 0 120px rgba(0,0,0,0.95); border-bottom: 2px solid rgba(255, 207, 64, 0.35);
            overflow: hidden; transform-style: preserve-3d; transform: rotateX(8deg); margin-top: 5px;
        }
        @keyframes tableBreathe {
            0%, 100% { filter: brightness(0.8); }
            50% { background: radial-gradient(circle at 50% 45%, #5a0a1a 0%, var(--cherry-pulse) 70%, #050000 100%); filter: brightness(1.2); }
        }
        .arena-top::after {
            content: ''; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 42px 42px; pointer-events: none; z-index: 0; transform: rotateZ(15deg);
        }
        .trump-status { 
            position: absolute; top: 25px; right: 25px; width: 75px; height: 75px; 
            border: 3px solid var(--gold); background: #000; display: flex; 
            justify-content: center; align-items: center; z-index: 1000; border-radius: 50%;
            box-shadow: 0 0 35px var(--gold), 0 0 60px var(--trump-halo);
        }
        .trump-status::after {
            content: ''; position: absolute; width: 95px; height: 95px; border-radius: 50%;
            border: 2px solid var(--trump-halo); animation: haloPulse 2.5s infinite alternate;
        }
        @keyframes haloPulse { 0% { transform: scale(1); opacity: 0.2; } 100% { transform: scale(1.3); opacity: 0.9; } }

        .card-node {
            position: absolute; width: 52px; height: 72px; background-color: #1a1a1a;
            background-image: url('1771489965074(1).png'); background-size: 100% 100%;
            border: 1px solid rgba(255, 207, 64, 0.5); border-radius: 5px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.8); cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), box-shadow 0.3s, opacity 0.5s;
            transform-style: preserve-3d;
        }
        .face-up { background-image: none !important; background-color: var(--bg-card); border: 2px solid #fff; }
        .particle { position: absolute; width: 5px; height: 5px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 3500; }

        .control-bottom {
            height: 40%; background: linear-gradient(to top, #000 0%, #080a12 100%);
            z-index: 2000; border-top: 1px solid rgba(255, 207, 64, 0.25); display: flex; padding: 12px;
        }
        .action-btns { width: 130px; display: flex; flex-direction: column; gap: 12px; justify-content: center; flex-shrink: 0; }
        button { 
            padding: 15px 5px; background: rgba(0, 0, 0, 0.8); border: 1.5px solid var(--gold);
            color: var(--gold); font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
        }
        button:hover:not(:disabled) { background: var(--gold); color: #000; box-shadow: 0 0 25px var(--gold); }
        button:disabled { opacity: 0.15; cursor: not-allowed; }

        #matrix-hand { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; padding-left: 10px; }
        .suit-row { display: flex; height: 65px; align-items: center; position: relative; }
        .suit-label { width: 35px; font-size: 24px; color: var(--gold); opacity: 0.2; font-weight: bold; }
        .row-content { display: flex; flex-grow: 1; }
        .matrix-card { position: relative !important; margin-left: -28px; flex-shrink: 0; }
        .matrix-card:hover { transform: translateY(-30px) scale(1.4); z-index: 6000 !important; }

        #status-msg {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(10, 12, 20, 0.98); border: 2px solid var(--gold); color: var(--gold);
            padding: 20px 45px; text-align: center; z-index: 5000; font-weight: bold; transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #status-msg.active { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>
    <div id='status-msg'></div>
    <div class='arena-top' id='arena'>
        <div class='trump-status'><div id='trump-icon' style='font-size:45px;'>?</div></div>
        <div id='chaos-deck' style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:300px; height:300px;"></div>
        <div id='battle-table' style='position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:500;'></div>
    </div>
    <div class='control-bottom'>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>ЗАПУСК</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО</button>
            <button id='btn-pass' style='display:none' onclick='handlePass()'>ПАСС</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ</button>
        </div>
        <div id='matrix-hand'>
            <div class='suit-row' id='row-♠'><div class='suit-label'>♠</div><div class='row-content'></div></div>
            <div class='suit-row' id='row-♣'><div class='suit-label'>♣</div><div class='row-content'></div></div>
            <div class='suit-row' id='row-♦'><div class='suit-label'>♦</div><div class='row-content'></div></div>
            <div class='suit-row' id='row-♥'><div class='suit-label'>♥</div><div class='row-content'></div></div>
        </div>
    </div>

<script>
    var SUITS = ['♠', '♣', '♦', '♥'], RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    var COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    var vchf = { deck: [], pHand: [], eHand: [], table: [], trump: '', phase: 'WAIT', turn: 'player', attackLimit: 6 };
    var audio = null;

    function playSfx(f, d) {
        try {
            if(!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
            let o = audio.createOscillator(), g = audio.createGain();
            o.connect(g); g.connect(audio.destination);
            o.frequency.setValueAtTime(f, audio.currentTime);
            g.gain.setValueAtTime(0.1, audio.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + d);
            o.start(); o.stop(audio.currentTime + d);
        } catch(e){}
    }

    function createDust(x, y) {
        const arena = document.getElementById('arena');
        for(let i=0; i<35; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.style.background = Math.random() > 0.5 ? 'var(--gold)' : 'var(--trump-halo)';
            arena.appendChild(p);
            const tx = (Math.random() - 0.5) * 300, ty = (Math.random() - 0.5) * 300;
            p.animate([{ transform: 'translate(0,0) scale(2)', opacity: 1 },
                       { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }], 
                       { duration: 800 + Math.random()*600, easing: 'ease-out' }).onfinish = () => p.remove();
        }
    }

    function showMsg(t) {
        let m = document.getElementById('status-msg');
        m.textContent = t; m.classList.add('active');
        setTimeout(() => m.classList.remove('active'), 1500);
    }
    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        playSfx(100, 1);
        vchf.phase = 'SHUFFLING';
        let t = [];
        SUITS.forEach(s => RANKS.forEach(r => t.push({ s: s, r: r, v: RANKS.indexOf(r), c: COLORS[s], used: false })));
        vchf.deck = t;
        const c = document.getElementById('chaos-deck'); c.innerHTML = '';
        vchf.deck.forEach((_, i) => {
            const n = document.createElement('div'); n.className = 'card-node'; n.id = 'node-' + i;
            n.style.left = '120px'; n.style.top = '110px'; c.appendChild(n);
        });
        
        let start = Date.now();
        let int = setInterval(() => {
            vchf.deck.forEach((_, i) => {
                const n = document.getElementById('node-' + i);
                if(n) {
                    n.style.left = Math.random()*220+'px'; n.style.top = Math.random()*200+'px';
                    n.style.transform = `rotate(${Math.random()*360}deg) translateZ(${Math.random()*60}px)`;
                }
            });
            if(Date.now() - start > 2000) { clearInterval(int); finalizeShuffle(); }
        }, 60);
    }

    function finalizeShuffle() {
        vchf.deck.sort(() => Math.random() - 0.5);
        vchf.trump = SUITS[Math.floor(Math.random()*4)];
        const ti = document.getElementById('trump-icon');
        ti.textContent = vchf.trump; ti.style.color = COLORS[vchf.trump];
        vchf.phase = 'PICK';
        vchf.deck.forEach((_, i) => {
            const n = document.getElementById('node-' + i);
            let a = (i/36)*6.28, r = 110;
            n.style.left = (120 + r*Math.cos(a))+'px'; n.style.top = (110 + r*Math.sin(a))+'px';
            n.style.transform = `rotate(${a*57.3+90}deg)`;
            n.onclick = () => { if(vchf.phase === 'PICK') pick(i, 'player'); };
        });
        showMsg("ВЫБЕРИТЕ ВЕКТОР");
    }

    function pick(idx, actor) {
        let c = vchf.deck[idx]; if(c.used) return;
        c.used = true; playSfx(400, 0.1);
        let node = document.getElementById('node-' + idx);
        if(actor === 'player') {
            vchf.pHand.push(c);
            node.style.transform = 'translateY(600px) scale(0) rotate(720deg)';
            setTimeout(() => { node.style.display = 'none'; updatePlayerHandUI(); 
                let av = []; vchf.deck.forEach((x,i) => {if(!x.used) av.push(i)});
                if(av.length > 0) pick(av[Math.floor(Math.random()*av.length)], 'enemy');
                checkBattleTrigger();
            }, 400);
        } else {
            vchf.eHand.push(c);
            node.style.transform = 'translateY(-600px) opacity(0) scale(0)';
            setTimeout(() => { node.style.display = 'none'; checkBattleTrigger(); }, 400);
        }
    }
    function checkBattleTrigger() {
        // Условие: кнопки появляются, когда у каждого по 6 карт или колода пуста
        if(vchf.pHand.length >= 6 && vchf.eHand.length >= 6 || vchf.deck.every(x => x.used)) {
            vchf.phase = 'BATTLE'; updateBtns();
            if(vchf.turn === 'enemy') setTimeout(sparkThink, 1000);
        }
    }

    function updatePlayerHandUI() {
        SUITS.forEach(suit => {
            const row = document.querySelector(`#row-${suit} .row-content`);
            row.innerHTML = '';
            let suitCards = vchf.pHand.filter(c => c.s === suit).sort((a,b) => a.v - b.v);
            suitCards.forEach((card, i) => {
                const el = document.createElement('div');
                el.className = 'card-node matrix-card face-up';
                el.style.zIndex = 100 + i;
                el.innerHTML = `<div style="padding:4px; font-weight:bold; color:${card.c}">${card.r}</div>
                                <div style="font-size:26px; text-align:center; margin-top:10px; color:${card.c}">${card.s}</div>`;
                el.onclick = () => { if(vchf.phase === 'BATTLE' && vchf.turn === 'player') playCard(card); 
                                     if(vchf.phase === 'BATTLE' && vchf.turn === 'enemy' && vchf.table.length%2!==0) playCard(card); };
                row.appendChild(el);
            });
        });
    }

    function renderTable() {
        const t = document.getElementById('battle-table'); t.innerHTML = '';
        vchf.table.forEach((move, i) => {
            const pairIdx = Math.floor(i/2);
            const isDef = i % 2 !== 0;
            const el = document.createElement('div');
            el.className = 'card-node face-up';
            let baseX = (window.innerWidth/2 - 130) + (pairIdx % 3 * 90);
            let baseY = (window.innerHeight * 0.18) + (Math.floor(pairIdx / 3) * 110);
            el.style.left = baseX + (isDef ? 20 : 0) + 'px';
            el.style.top = baseY + (isDef ? 25 : 0) + 'px';
            el.style.transform = `rotate(${(Math.random()*18-9) + (isDef ? 12 : -6)}deg)`;
            el.innerHTML = `<div style="padding:6px; color:${move.card.c}; font-size:14px;"><b>${move.card.r}</b><br>${move.card.s}</div>`;
            t.appendChild(el);
        });
        updateBtns();
    }

    function canPlay(card) {
        if(vchf.table.length === 0) return vchf.turn === 'player';
        let last = vchf.table[vchf.table.length-1].card;
        // Если игрок защищается
        if(vchf.table.length % 2 !== 0) {
            return (card.s === last.s && card.v > last.v) || (card.s === vchf.trump && last.s !== vchf.trump);
        }
        // Если игрок подкидывает
        return vchf.table.some(m => m.card.r === card.r) && vchf.table.length < 12;
    }

    function playCard(card) {
        if(canPlay(card)) {
            vchf.table.push({card, actor:'player'});
            vchf.pHand = vchf.pHand.filter(c => c !== card);
            playSfx(600, 0.1); renderTable(); updatePlayerHandUI();
            if(vchf.table.length % 2 !== 0) setTimeout(sparkThink, 1200);
        }
    }
    function sparkThink() {
        const isDefense = vchf.table.length % 2 !== 0;
        if(isDefense) {
            let last = vchf.table[vchf.table.length-1].card;
            let cands = vchf.eHand.filter(c => (c.s === last.s && c.v > last.v) || (c.s === vchf.trump && last.s !== vchf.trump)).sort((a,b)=>a.v-b.v);
            if(cands.length > 0) {
                vchf.table.push({card: cands[0], actor:'enemy'});
                vchf.eHand = vchf.eHand.filter(c => c !== cands[0]);
                setTimeout(() => { playSfx(500, 0.1); renderTable(); }, 600);
            } else { setTimeout(sparkTake, 1000); }
        } else {
            // Искра атакует или подкидывает
            if(vchf.table.length === 0) {
                let c = vchf.eHand.sort((a,b)=>a.v-b.v)[0];
                vchf.table.push({card: c, actor:'enemy'});
                vchf.eHand = vchf.eHand.filter(x => x !== c);
                renderTable();
            } else {
                let activeRanks = vchf.table.map(m => m.card.r);
                let cand = vchf.eHand.filter(c => activeRanks.includes(c.r));
                // Лимит: не больше карт, чем у игрока
                if(cand.length > 0 && vchf.table.length < 12 && vchf.table.length/2 < vchf.pHand.length + vchf.table.length/2) {
                    vchf.table.push({card: cand[0], actor:'enemy'});
                    vchf.eHand = vchf.eHand.filter(c => c !== cand[0]);
                    setTimeout(renderTable, 800);
                } 
            }
        }
    }

    function handleBito() {
        if(vchf.table.length % 2 !== 0) return;
        showMsg("БИТО"); playSfx(100, 0.5);
        document.querySelectorAll('#battle-table .card-node').forEach(c => {
            let r = c.getBoundingClientRect();
            createDust(r.left + 26, r.top + 36); c.remove();
        });
        vchf.table = []; vchf.turn = (vchf.turn === 'player') ? 'enemy' : 'player';
        updateBtns(); if(vchf.turn === 'enemy') setTimeout(sparkThink, 1000);
    }

    function handlePass() { if(vchf.table.length > 0) handleBito(); }

    function handleTake() {
        showMsg("БЕРУ");
        vchf.pHand = vchf.pHand.concat(vchf.table.map(m => m.card));
        vchf.table = []; renderTable(); updatePlayerHandUI();
        vchf.turn = 'enemy'; setTimeout(sparkThink, 1200);
    }

    function sparkTake() {
        showMsg("ИСКРА БЕРЕТ");
        vchf.eHand = vchf.eHand.concat(vchf.table.map(m => m.card));
        vchf.table = []; renderTable(); vchf.turn = 'player'; updateBtns();
    }

    function updateBtns() {
        const isP = vchf.turn === 'player', hasT = vchf.table.length > 0, isDef = vchf.table.length % 2 !== 0;
        document.getElementById('btn-bito').style.display = (hasT && !isDef && isP) ? 'block' : 'none';
        document.getElementById('btn-pass').style.display = (hasT && !isDef && isP) ? 'block' : 'none';
        document.getElementById('btn-take').style.display = (hasT && isDef && !isP) ? 'none' : (hasT && isDef ? 'block' : 'none');
    }
</script>
</body>
</html>
