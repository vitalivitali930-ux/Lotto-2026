<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zero Chaos | Logistics Terminal</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #161616;
            --error-red: #ff4141;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .terminal {
            width: 100%;
            max-width: 550px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
            padding: 30px;
            border-radius: 12px;
            box-sizing: border-box;
            position: relative;
        }

        /* ВКЛАДКИ */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
        }

        h1 {
            color: var(--neon-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.4rem;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            padding-bottom: 15px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: var(--neon-green);
            text-transform: uppercase;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #222;
            color: var(--neon-green);
            box-sizing: border-box;
            outline: none;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
            background: #050505;
        }

        /* СЛАЙДЕР РАДИУСА */
        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            accent-color: var(--neon-green);
            height: 5px;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--neon-green);
            color: black;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 2px;
            margin-top: 10px;
        }

        button:hover {
            box-shadow: 0 0 40px var(--neon-green);
            transform: scale(1.03);
            background: #00cc33;
        }

        #status, #resultsDisplay {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            min-height: 1.5em;
            color: var(--neon-green);
            border: 1px solid rgba(0, 255, 65, 0.1);
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        .cargo-card {
            border-left: 3px solid var(--neon-green);
            background: #000;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        .halo-pulse {
            animation: pulse 2.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.3); }
            70% { box-shadow: 0 0 0 20px rgba(0, 255, 65, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }

        .system-note {
            font-size: 0.6rem;
            color: #444;
            margin-top: 20px;
            text-align: center;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="terminal halo-pulse">
    <h1>SYSTEM: ZERO CHAOS</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('sender')">Заказчик</button>
        <button class="tab-btn" onclick="switchTab('driver')">Водитель</button>
    </div>
    
    <div id="senderView">
        <div class="input-group">
            <label>📍 ТОЧКА ОТПРАВЛЕНИЯ (ГОРОД):</label>
            <input type="text" id="fromCity" placeholder="Введите город">
        </div>
        <div class="input-group">
            <label>🏁 ТОЧКА НАЗНАЧЕНИЯ (ГОРОД):</label>
            <input type="text" id="toCity" placeholder="Введите город">
        </div>
        <div class="input-group">
            <label>🚛 ПАРАМЕТРЫ ГРУЗА:</label>
            <input type="text" id="cargoInfo" placeholder="Вес, объем, тип груза">
        </div>
        <button id="sendBtn" onclick="sendData()">ОТПРАВИТЬ В КАНАЛ ХАОСА</button>
    </div>

    <div id="driverView" class="hidden">
        <div class="input-group">
            <label>📍 МОЯ ТЕКУЩАЯ ПОЗИЦИЯ:</label>
            <input type="text" id="driverPos" placeholder="Город нахождения">
        </div>
        <div class="input-group">
            <label>🏁 ПУНКТ НАЗНАЧЕНИЯ:</label>
            <input type="text" id="driverDest" placeholder="Куда едете">
        </div>
        <div class="input-group">
            <label>🛰 ДОПУСТИМОЕ ОТКЛОНЕНИЕ: <span id="radiusVal">50</span> KM</label>
            <div class="range-container">
                <input type="range" id="radiusRange" min="0" max="150" value="50" oninput="document.getElementById('radiusVal').innerText = this.value">
            </div>
        </div>
        <button id="scanBtn" onclick="scanCargo()">СКАНИРОВАТЬ ПОПУТКИ</button>
    </div>
    
    <a href="https://wa.me/41793666072" target="_blank" style="text-decoration: none;">
        <button type="button" style="background: #25D366; color: white; padding: 15px; width: 100%; border: none; font-weight: bold; margin-top: 20px; cursor: pointer;">
            СВЯЗАТЬСЯ В WHATSAPP
        </button>
    </a>

    <div id="status">TERMINAL_READY_V1.6</div>
    <div id="resultsDisplay" class="hidden"></div>
    
    <div class="system-note">
        Note: This note will not be deleted. Replace window x protocol active.
    </div>
</div>

<script>
    const CONFIG = {
        token: '8744193753:AAH8TxbIxpC4NTpHVEIRdMjn5P0vuW-zn9w',
        chatId: '-1003771690386'
    };

    function switchTab(role) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('senderView').classList.add('hidden');
        document.getElementById('driverView').classList.add('hidden');
        document.getElementById('resultsDisplay').classList.add('hidden');
        
        if(role === 'sender') {
            document.getElementById('senderView').classList.remove('hidden');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else {
            document.getElementById('driverView').classList.remove('hidden');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }
    }

    async function sendData() {
        const fields = {
            from: document.getElementById('fromCity'),
            to: document.getElementById('toCity'),
            cargo: document.getElementById('cargoInfo')
        };
        const status = document.getElementById('status');
        const btn = document.getElementById('sendBtn');

        if (!fields.from.value || !fields.to.value || !fields.cargo.value) {
            status.style.color = 'var(--error-red)';
            status.innerText = 'ОШИБКА: ОБНАРУЖЕНЫ ПУСТЫЕ ПОЛЯ';
            return;
        }

        btn.disabled = true;
        status.style.color = 'var(--neon-green)';
        status.innerText = 'СИНХРОНИЗАЦИЯ...';

        const message = `<b>📦 НОВЫЙ ЗАКАЗ В СИСТЕМЕ</b>\n\n` +
                        `<b>📍 ОТКУДА:</b> ${fields.from.value}\n` +
                        `<b>🏁 КУДА:</b> ${fields.to.value}\n` +
                        `<b>🚛 ГРУЗ:</b> ${fields.cargo.value}\n\n` +
                        `<i>🕒 S_TIME: ${new Date().toLocaleString()}</i>\n` +
                        `<b>🌐 STATUS:</b> GitHub_Verified`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.chatId,
                    text: message,
                    parse_mode: 'HTML'
                })
            });

            if (response.ok) {
                status.innerText = 'СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА.';
                fields.from.value = ''; fields.to.value = ''; fields.cargo.value = '';
            } else { throw new Error('API_REJECTION'); }
        } catch (error) {
            status.style.color = 'var(--error-red)';
            status.innerText = 'ОШИБКА ПЕРЕДАЧИ';
        } finally { btn.disabled = false; }
    }

    // ИМИТАЦИЯ СКАНЕРА ГРУЗОВ (Window 3 Logic)
    function scanCargo() {
        const pos = document.getElementById('driverPos').value;
        const res = document.getElementById('resultsDisplay');
        const status = document.getElementById('status');
        
        if(!pos) {
            status.innerText = "УКАЖИТЕ ВАШЕ МЕСТОПОЛОЖЕНИЕ";
            return;
        }

        status.innerText = "СКАНИРОВАНИЕ КОРИДОРА...";
        res.classList.remove('hidden');
        res.innerHTML = `
            <div class="cargo-card">
                <b>📦 ГРУЗ НАЙДЕН (ПО ПУТИ)</b><br>
                📍 Локация: Fulda<br>
                🛣 Отклонение: +14 км<br>
                🚛 Тип: 12т, Железо
            </div>
            <div class="cargo-card" style="border-color: #444; opacity: 0.6;">
                <b>📦 ГРУЗ ВНЕ РАДИУСА</b><br>
                📍 Локация: Berlin (+400 км)
            </div>
        `;
    }

    document.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendData(); });
</script>
</body>
</html>
