<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERO_CHAOS // MONOLITH_ETALON</title>
    <style>
        :root {
            --bg: radial-gradient(circle at top, #1a1c1e 0%, #050607 100%);
            --gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            --gold-solid: #fcf6ba;
            --glass: rgba(74, 4, 4, 0.22); 
            --rings: radial-gradient(circle at var(--ox, -10%) var(--oy, -10%), transparent 0%, transparent 35%, rgba(0, 0, 0, 0.5) 36%, rgba(94, 10, 10, 0.12) 37%, transparent 39%, transparent 60%, rgba(0, 0, 0, 0.55) 61%, rgba(74, 4, 4, 0.18) 62%, transparent 65%);
            --grid: linear-gradient(rgba(252, 246, 186, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(252, 246, 186, 0.03) 1px, transparent 1px);
        }
        body { 
            background: var(--bg); background-image: var(--grid); background-size: 20px 20px; 
            color: var(--gold-solid); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; 
            min-height: 100vh; overflow-x: hidden;
        }
        h2 { font-weight: 300; letter-spacing: 12px; text-align: center; text-transform: uppercase; margin: 60px 0; color: #fff; text-shadow: 0 0 30px rgba(252,246,186,0.3); }

        /* 🔱 КАТЕГОРИИ (ДОПОЛНЕНИЕ БЕЗ ПОТЕРИ СТИЛЯ) */
        .category-nav { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 50px; }
        .cat-btn { 
            background: var(--glass); border: 1px solid var(--gold-solid); color: var(--gold-solid);
            padding: 15px 30px; border-radius: 8px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 3px; font-size: 0.8rem; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .cat-btn:hover, .cat-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(191, 149, 63, 0.5); }

        /* 🔱 СЕТКА (ЭТАЛОННАЯ СТРУКТУРА) */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 35px; max-width: 1600px; margin: 0 auto; }
        
        .card {
            position: relative; background: var(--glass); background-image: var(--rings); backdrop-filter: blur(15px);
            border: 1px solid rgba(252, 246, 186, 0.1); border-left: 2px solid rgba(252, 246, 186, 0.3); border-top: 1px solid rgba(252, 246, 186, 0.5); 
            border-radius: 16px; padding: 25px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.9); 
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer; text-decoration: none; display: block;
            transform: rotateZ(-1.2deg);
        }
        .card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(252,246,186,0.1) 0%, transparent 50%); pointer-events: none; border-radius: 16px; }
        
        .card:hover { 
            transform: translateY(-20px) rotateZ(1.2deg) scale(1.08); 
            border-color: var(--gold-solid); 
            box-shadow: 0 0 40px rgba(191, 149, 63, 0.5); 
            z-index: 10;
        }

        .card-img { 
            width: 100%; height: 140px; background: #000; border-radius: 10px; margin-bottom: 18px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.08); position: relative;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .card.active::before {
            content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: var(--gold); z-index: -1; border-radius: 19px; opacity: 0.2;
            animation: haloPulse 2.5s infinite ease-in-out;
        }

        @keyframes haloPulse { 0% { opacity: 0.1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.04); } 100% { opacity: 0.1; transform: scale(1); } }

        .price { font-weight: bold; font-size: 1.1rem; margin-top: 15px; color: var(--gold-solid); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .slot-num { position: absolute; top: 12px; right: 15px; font-size: 0.65rem; opacity: 0.4; letter-spacing: 2px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>ARSENAL // MONOLITH</h2>

    <div class="category-nav">
        <div class="cat-btn active" onclick="filterCat('INTELLECT', this)">Intellect</div>
        <div class="cat-btn" onclick="filterCat('CRAFT_FOOD', this)">Craft Food</div>
        <div class="cat-btn" onclick="filterCat('WORKSHOP', this)">Workshop</div>
        <div class="cat-btn" onclick="filterCat('WAY', this)">Way</div>
    </div>

    <div class="shop-grid" id="main-grid"></div>

    <script>
        /* 🔱 DATABASE (100% АДАПТАЦИЯ) 🔱 */
        const DATABASE = {
            'INTELLECT': [
                { id: 1, name: "GITHUB_HUB", price: 200, url: "https://github.com", img: "https://github.githubassets.com/favicons/favicon.svg" },
                { id: 2, name: "OPEN_AI", price: 198, url: "https://openai.com", img: "https://openai.com/favicon.ico" },
                { id: 3, name: "WIKIPEDIA", price: 196, url: "https://wikipedia.org", img: "https://wikipedia.org/static/favicon/wikipedia.ico" }
            ],
            'CRAFT_FOOD': [],
            'WORKSHOP': [],
            'WAY': []
        };

        function fillGaps() {
            const cats = Object.keys(DATABASE);
            cats.forEach((cat, idx) => {
                const startId = (idx * 25) + 1;
                while(DATABASE[cat].length < 25) {
                    const cid = startId + DATABASE[cat].length;
                    DATABASE[cat].push({ id: cid, name: `VACANT_${cid}`, price: 200 - (cid*2), url: "#", img: "" });
                }
            });
        }

        function filterCat(catName, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            
            DATABASE[catName].forEach(item => {
                const card = document.createElement('a');
                card.href = item.url;
                card.target = "_blank";
                card.className = `card ${item.img ? 'active' : ''}`;
                card.style.setProperty('--ox', (Math.random() * 100) + '%');
                card.style.setProperty('--oy', (Math.random() * 100) + '%');
                
                card.innerHTML = `
                    <div class="slot-num">№${item.id}</div>
                    <div class="card-img">
                        ${item.img ? `<img src="${item.img}">` : `<span style="opacity:0.1">VACANT</span>`}
                    </div>
                    <div style="letter-spacing: 2px; font-size: 0.85rem; text-transform: uppercase;">${item.name}</div>
                    <div class="price">${item.price > 0 ? item.price : 0} VCHF</div>
                `;
                grid.appendChild(card);
            });
        }

        fillGaps();
        filterCat('INTELLECT', document.querySelector('.cat-btn'));
    </script>

    <div style="text-align:center; padding: 80px 0; opacity: 0.15; font-size: 0.6rem; letter-spacing: 8px;">
        МАНІФЕСТ МОНОЛІТА // 2026 // π₁(M³) = 0
    </div>

</body>
</html>
