<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCHF ENGINE | BI-TURBO ULTIMATE</title>
    <style>
        :root { --gold: #d4af37; --vchf-glow: 0 0 35px rgba(212, 175, 55, 0.6); --cherry-velvet: radial-gradient(circle at center, #7a0019 0%, #050505 100%); --glass: rgba(0, 0, 0, 0.95); --chaos-red: #ff0033; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: var(--gold); }
        #vchf-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s; }
        .ready-trigger { padding: 25px 60px; font-size: 30px; font-weight: 900; background: transparent; border: 4px solid var(--gold); color: var(--gold); border-radius: 60px; cursor: pointer; box-shadow: var(--vchf-glow); text-transform: uppercase; letter-spacing: 10px; }
        #game-table { width: 100vw; height: 100vh; background: var(--cherry-velvet); position: relative; display: none; }
        #ritual-circle { position: absolute; top: 45%; left: 50%; width: 340px; height: 340px; transform: translate(-50%, -50%); z-index: 100; }
        .card-back { position: absolute; width: 52px; height: 78px; background: #111 url('1771489965074(1).png') center/cover; border: 1px solid var(--gold); border-radius: 5px; transition: all 0.7s; backface-visibility: hidden; }
        .card-back.highlight { box-shadow: 0 0 45px #fff, var(--vchf-glow); border: 2px solid #fff; z-index: 1000; transform: scale(1.4); }
        #trump-totem { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 110px; opacity: 0; transition: all 0.5s; z-index: 50; user-select: none; }
        #bud-interface { position: absolute; bottom: 0; width: 100%; height: 38%; background: var(--glass); backdrop-filter: blur(25px); border-top: 3px solid var(--gold); z-index: 500; display: none; flex-direction: column; }
        #vchf-line { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: #00ff00; transition: width 0.1s; }
        .lane { height: 25%; width: 100%; position: relative; display: flex; justify-content: center; }
        .card-p { position: absolute; width: 62px; height: 88px; background: #fff; border-radius: 6px; border: 1px solid var(--gold); display: flex; flex-direction: column; justify-content: space-between; padding: 6px; color: #000; font-weight: 900; transition: all 0.25s; cursor: pointer; }
        .card-p.sel { transform: translateY(-30px) scale(1.15); box-shadow: 0 0 30px #fff; z-index: 2500 !important; }
        #action-btn { position: absolute; bottom: 44%; right: 25px; padding: 16px 36px; background: #000; border: 2px solid var(--gold); color: var(--gold); border-radius: 12px; display: none; z-index: 1001; cursor: pointer; }
        .trump-unstable { animation: shake 0.5s infinite; filter: drop-shadow(0 0 40px red) !important; }
        @keyframes shake { 0% { transform: translate(-50%, -50%) rotate(0deg); } 50% { transform: translate(-52%, -48%) rotate(2deg); } 100% { transform: translate(-50%, -50%) rotate(0deg); } }
    </style>
</head>
<body>
    <div id="vchf-gate">
        <h1 style="margin-bottom: 40px; letter-spacing: 15px;">VCHF</h1>
        <button class="ready-trigger" onclick="engageVCHF()">ГОТОВ</button>
    </div>

    <div id="game-table">
        <div id="ritual-circle"></div>
        <div id="trump-totem">♠</div>
        <div id="battle-area" style="display:none; width:100%; height:45%; position:absolute; top:10%; z-index:10;">
            <div id="drop-zone" style="display:flex; justify-content:center; gap:12px; padding:20px;"></div>
        </div>
        <button id="action-btn">ВЗЯТЬ</button>
        <div id="bud-interface">
            <div id="vchf-line"></div>
            <div class="lane" id="lane-spades"></div><div class="lane" id="lane-clubs"></div>
            <div class="lane" id="lane-hearts"></div><div class="lane" id="lane-diamonds"></div>
        </div>
    </div>

    <script>
    /* --- CORE ENGINE START --- */
    const VCHF_CORE = {
        suits: ['♠', '♣', '♥', '♦'],
        ranks: ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'],
        weights: {'6':6, '7':7, '8':8, '9':9, '10':10, 'J':11, 'Q':12, 'K':13, 'A':14},
        colors: {'♠':'#111', '♣':'#111', '♥':'#e60000', '♦':'#e60000'}
    };

    let vchf_state = {
        pHand: [], eHand: [], table: [], trumpSuit: '', oldTrump: '',
        isPlayerTurn: true, selected: null, active: false, timer: 30.0,
        chaosTimer: 65, isMirrorRound: false
    };

    function engageVCHF() {
        vchf_state.active = true;
        document.getElementById('vchf-gate').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('vchf-gate').style.display = 'none';
            document.getElementById('game-table').style.display = 'block';
            runChaosCycle();
            startMasterTimer();
        }, 800);
    }
    function runChaosCycle() {
        const circle = document.getElementById('ritual-circle');
        circle.innerHTML = '';
        for (let i = 0; i < 36; i++) {
            const s = document.createElement('div');
            s.className = 'card-back';
            s.style.left = '50%'; s.style.top = '50%';
            circle.appendChild(s);
        }
        const spheres = document.querySelectorAll('.card-back');
        const start = Date.now();
        const chaos = setInterval(() => {
            spheres.forEach(s => {
                const ox = (Math.random()-0.5)*400; const oy = (Math.random()-0.5)*400;
                s.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px)) rotate(${Math.random()*360}deg)`;
            });
            if (Date.now() - start > 2000) { clearInterval(chaos); lockCircle(spheres); }
        }, 100);
    }

    function lockCircle(spheres) {
        spheres.forEach((s, i) => {
            const a = (i * 10) * (Math.PI / 180);
            const x = Math.cos(a) * 160; const y = Math.sin(a) * 160;
            s.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${(i*10)+90}deg)`;
        });
        setTimeout(() => pickTrump(spheres), 1000);
    }

    function pickTrump(spheres) {
        let t = 0; const totem = document.getElementById('trump-totem');
        totem.style.opacity = '1';
        const int = setInterval(() => {
            spheres.forEach(s => s.classList.remove('highlight'));
            const cur = t % 36; spheres[cur].classList.add('highlight');
            vchf_state.trumpSuit = VCHF_CORE.suits[t % 4];
            totem.innerText = vchf_state.trumpSuit;
            totem.style.color = VCHF_CORE.colors[vchf_state.trumpSuit];
            t++;
            if (t > 20) { clearInterval(int); distribute(spheres); }
        }, 100);
    }

    function distribute(spheres) {
        let deck = [];
        VCHF_CORE.suits.forEach(s => VCHF_CORE.ranks.forEach(r => deck.push({suit:s, rank:r, val:VCHF_CORE.weights[r], color:VCHF_CORE.colors[s], id:Math.random()})));
        deck.sort(() => Math.random() - 0.5);
        let i = 0;
        const dist = setInterval(() => {
            if (i >= 36) { clearInterval(dist); finalizeDist(); return; }
            const s = spheres[i];
            if (i % 2 === 0) { vchf_state.pHand.push(deck[i]); s.style.transform = `translate(-50%, 800px) scale(0)`; }
            else { vchf_state.eHand.push(deck[i]); s.style.transform = `translate(-50%, -800px) scale(0)`; }
            i++;
        }, 80);
    }

    function finalizeDist() {
        document.getElementById('ritual-circle').style.display = 'none';
        document.getElementById('battle-area').style.display = 'block';
        document.getElementById('bud-interface').style.display = 'flex';
        document.getElementById('action-btn').style.display = 'block';
        refreshUI();
    }

    function refreshUI() {
        const lanes = {'♠':'lane-spades', '♣':'lane-clubs', '♥':'lane-hearts', '♦':'lane-diamonds'};
        Object.values(lanes).forEach(id => document.getElementById(id).innerHTML = '');
        vchf_state.pHand.sort((a,b) => a.val - b.val).forEach(card => {
            const el = document.createElement('div');
            el.className = 'card-p'; el.style.color = card.color;
            el.innerHTML = `<div>${card.rank}</div><div style="font-size:20px">${card.suit}</div>`;
            el.onclick = () => {
                vchf_state.pHand = vchf_state.pHand.filter(c => c.id !== card.id);
                vchf_state.table.push({atk: card, def: null});
                refreshUI();
                renderTable();
            };
            document.getElementById(lanes[card.suit]).appendChild(el);
        });
    }

    function renderTable() {
        const dz = document.getElementById('drop-zone'); dz.innerHTML = '';
        vchf_state.table.forEach(p => {
            const c = document.createElement('div'); c.className = 'card-p';
            c.innerHTML = `<div>${p.atk.rank}</div><div>${p.atk.suit}</div>`;
            dz.appendChild(c);
        });
    }

    function startMasterTimer() {
        setInterval(() => { if(vchf_state.active) vchf_state.timer -= 0.1; document.getElementById('vchf-line').style.width = (vchf_state.timer/30)*100 + '%'; }, 100);
    }
    
    /* МАНИФЕСТ МОНОЛИТА: 10+10=1 */
    </script>
</body>
</html>
