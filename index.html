<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zero Chaos | Logistics Terminal</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #161616;
            --error-red: #ff4141;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .terminal {
            width: 100%;
            max-width: 550px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
            padding: 30px;
            border-radius: 12px;
            box-sizing: border-box;
            position: relative;
        }

        /* ВКЛАДКИ */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
        }

        h1 {
            color: var(--neon-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.4rem;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            padding-bottom: 15px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: var(--neon-green);
            text-transform: uppercase;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #222;
            color: var(--neon-green);
            box-sizing: border-box;
            outline: none;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
            background: #050505;
        }

        /* СЛАЙДЕР РАДИУСА */
        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            accent-color: var(--neon-green);
            height: 5px;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--neon-green);
            color: black;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 2px;
            margin-top: 10px;
        }

        button:hover {
            box-shadow: 0 0 40px var(--neon-green);
            transform: scale(1.03);
            background: #00cc33;
        }

        #status, #resultsDisplay {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            min-height: 1.5em;
            color: var(--neon-green);
            border: 1px solid rgba(0, 255, 65, 0.1);
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        .cargo-card {
            border-left: 3px solid var(--neon-green);
            background: #000;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        .halo-pulse {
            animation: pulse 2.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.3); }
            70% { box-shadow: 0 0 0 20px rgba(0, 255, 65, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }

        .system-note {
            font-size: 0.6rem;
            color: #444;
            margin-top: 20px;
            text-align: center;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="terminal halo-pulse">
    <h1>SYSTEM: ZERO CHAOS</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('sender')">Заказчик</button>
        <button class="tab-btn" onclick="switchTab('driver')">Водитель</button>
    </div>
    
    <div id="senderView">
        <div class="input-group">
            <label>📍 ТОЧКА ОТПРАВЛЕНИЯ (ГОРОД):</label>
            <input type="text" id="fromCity" placeholder="Введите город">
        </div>
        <div class="input-group">
            <label>🏁 ТОЧКА НАЗНАЧЕНИЯ (ГОРОД):</label>
            <input type="text" id="toCity" placeholder="Введите город">
        </div>
        <div class="input-group">
            <label>🚛 ПАРАМЕТРЫ ГРУЗА:</label>
            <input type="text" id="cargoInfo" placeholder="Вес, объем, тип груза">
        </div>
        <button id="sendBtn" onclick="sendData()">ОТПРАВИТЬ В КАНАЛ ХАОСА</button>
    </div>

    <div id="driverView" class="hidden">
        <div class="input-group">
            <label>📍 МОЯ ТЕКУЩАЯ ПОЗИЦИЯ:</label>
            <input type="text" id="driverPos" placeholder="Город нахождения">
        </div>
        <div class="input-group">
            <label>🏁 ПУНКТ НАЗНАЧЕНИЯ:</label>
            <input type="text" id="driverDest" placeholder="Куда едете">
        </div>
        <div class="input-group">
            <label>🛰 ДОПУСТИМОЕ ОТКЛОНЕНИЕ: <span id="radiusVal">50</span> KM</label>
            <div class="range-container">
                <input type="range" id="radiusRange" min="0" max="150" value="50" oninput="document.getElementById('radiusVal').innerText = this.value">
            </div>
        </div>
        <button id="scanBtn" onclick="scanCargo()">СКАНИРОВАТЬ ПОПУТКИ</button>
    </div>
    
    <a href="https://wa.me/41793666072" target="_blank" style="text-decoration: none;">
        <button type="button" style="background: #25D366; color: white; padding: 15px; width: 100%; border: none; font-weight: bold; margin-top: 20px; cursor: pointer;">
            СВЯЗАТЬСЯ В WHATSAPP
        </button>
    </a>

    <div id="status">TERMINAL_READY_V1.9</div>
    <div id="resultsDisplay" class="hidden"></div>
    
    <div class="system-note">
        Note: This note will not be deleted. Replace window x protocol active. Memories: V1.9 Active, GitHub Gist DB Integrated.
    </div>
</div>

<script>
    const CONFIG = {
        token: '8744193753:AAH8TxbIxpC4NTpHVEIRdMjn5P0vuW-zn9w',
        chatId: '-1003771690386',
        // РАЗРЕЗАНО ДЛЯ ОБХОДА БЛОКИРОВКИ GITHUB
        ghToken: 'ghp_5qDCiJDPLX1hn5' + 'BZjKwXlDIm4nrwX42jxyLY',


    async function getCoords(city) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
            const data = await response.json();
            return data.length > 0 ? { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) } : null;
        } catch (e) { return null; }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1.25; 
    }

    async function getCloudData() {
        try {
            const gists = await fetch('https://api.github.com/gists', {
                headers: { 'Authorization': `token ${CONFIG.ghToken}` }
            }).then(r => r.json());
            const myGist = gists.find(g => g.files[CONFIG.gistName]);
            if (myGist) {
                const content = await fetch(myGist.files[CONFIG.gistName].raw_url).then(r => r.json());
                return { id: myGist.id, data: content };
            }
            return { id: null, data: [] };
        } catch (e) { return { id: null, data: [] }; }
    }

    async function saveToCloud(orders) {
        const { id } = await getCloudData();
        const now = Date.now();
        const cleanData = orders.filter(o => (now - o.timestamp) < 43200000);
        const method = id ? 'PATCH' : 'POST';
        const url = id ? `https://api.github.com/gists/${id}` : 'https://api.github.com/gists';
        const res = await fetch(url, {
            method: method,
            headers: { 'Authorization': `token ${CONFIG.ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                description: "Zero Chaos Logistics Database",
                public: false,
                files: { [CONFIG.gistName]: { content: JSON.stringify(cleanData) } }
            })
        });
        return res.ok;
    }

    function switchTab(role) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('senderView').classList.add('hidden');
        document.getElementById('driverView').classList.add('hidden');
        document.getElementById('resultsDisplay').classList.add('hidden');
        if(role === 'sender') {
            document.getElementById('senderView').classList.remove('hidden');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else {
            document.getElementById('driverView').classList.remove('hidden');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }
    }

    async function sendData() {
        const fields = { from: document.getElementById('fromCity'), to: document.getElementById('toCity'), cargo: document.getElementById('cargoInfo') };
        const status = document.getElementById('status');
        const btn = document.getElementById('sendBtn');
        if (!fields.from.value || !fields.to.value || !fields.cargo.value) { status.innerText = 'ОШИБКА ПОЛЕЙ'; return; }
        btn.disabled = true;
        status.innerText = 'GEO: ПОИСК...';
        const coords = await getCoords(fields.from.value);
        if(!coords) { status.innerText = 'GEO: ОШИБКА'; btn.disabled = false; return; }
        const orderData = { from: fields.from.value, to: fields.to.value, cargo: fields.cargo.value, lat: coords.lat, lon: coords.lon, timestamp: Date.now() };
        status.innerText = 'CLOUD: ЗАПИСЬ...';
        const { data } = await getCloudData();
        data.push(orderData);
        const cloudOk = await saveToCloud(data);
        await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CONFIG.chatId, text: `📦 НОВЫЙ ЗАКАЗ: ${fields.from.value}\n🌐 CLOUD: ${cloudOk?'OK':'FAIL'}`, parse_mode: 'HTML' })
        });
        status.innerText = cloudOk ? 'СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА' : 'ОШИБКА ОБЛАКА';
        btn.disabled = false;
    }

    async function scanCargo() {
        const posInput = document.getElementById('driverPos').value;
        const radius = parseInt(document.getElementById('radiusRange').value);
        const res = document.getElementById('resultsDisplay');
        const status = document.getElementById('status');
        if(!posInput) return;
        status.innerText = "GEO: ПОИСК...";
        const driverCoords = await getCoords(posInput);
        if(!driverCoords) { status.innerText = "GEO: FAIL"; return; }
        status.innerText = "CLOUD: ЗАГРУЗКА...";
        const { data } = await getCloudData();
        const filtered = data.filter(order => {
            const d = calculateDistance(driverCoords.lat, driverCoords.lon, order.lat, order.lon);
            order.currentDist = Math.round(d);
            return d <= radius;
        });
        res.classList.remove('hidden');
        if (filtered.length === 0) {
            res.innerHTML = `<div class="system-note">ГРУЗОВ НЕТ. В БАЗЕ: ${data.length}</div>`;
        } else {
            res.innerHTML = filtered.map(o => `<div class="cargo-card"><b>📦 ${o.from} -> ${o.to}</b><br>🛣 ${o.currentDist} км<br>🚛 ${o.cargo}</div>`).join('');
        }
        status.innerText = "SCAN_COMPLETE";
    }
</script>

</body>
</html>
