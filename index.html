<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, vertical-align=top">
    
    <meta name="theme-color" content="#1a1c1e">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="color-scheme" content="dark">

    <title>ZERO_CHAOS // TERMINAL_PREMIUM_MATRIX</title>
    <style>
        :root {
            --bg: radial-gradient(circle at top, #1a1c1e 0%, #050607 100%);
            --gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            --gold-solid: #fcf6ba;
            --glass: rgba(74, 4, 4, 0.22); 
            --spotlight: radial-gradient(circle at 50% 0%, rgba(252, 246, 186, 0.22) 0%, transparent 75%);
            --rings: radial-gradient(circle at var(--ox, -10%) var(--oy, -10%), transparent 0%, transparent 35%, rgba(0, 0, 0, 0.5) 36%, rgba(94, 10, 10, 0.12) 37%, transparent 39%, transparent 60%, rgba(0, 0, 0, 0.55) 61%, rgba(74, 4, 4, 0.18) 62%, transparent 65%);
            --grid: linear-gradient(rgba(252, 246, 186, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(252, 246, 186, 0.03) 1px, transparent 1px);
        }
        
        body {
            background: var(--bg); background-image: var(--grid); background-size: 20px 20px; background-attachment: fixed;
            color: var(--gold-solid); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; color-scheme: dark;
        }

        h2 { font-weight: 300; letter-spacing: 12px; text-shadow: 0 0 20px rgba(252, 246, 186, 0.2); text-align: center; margin: 40px 0; text-transform: uppercase; }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 700px;
            transition: 0.5s;
        }

        /* ЭТАЛОННАЯ КАРТОЧКА (СЛОТ) */
        .card {
            position: relative; background: var(--glass); background-image: var(--rings); backdrop-filter: blur(10px);
            border: 1px solid rgba(252, 246, 186, 0.1); border-left: 2px solid rgba(252, 246, 186, 0.2); border-top: 1px solid rgba(252, 246, 186, 0.45); 
            border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.9), inset 0 0 30px rgba(74, 4, 4, 0.3);
            overflow: hidden; cursor: pointer; text-decoration: none; color: inherit;
        }

        .card:nth-child(2n) { --ox: 110%; --oy: 20%; }
        .card:nth-child(2n+1) { --ox: -20%; --oy: 80%; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 100%; background: var(--spotlight); pointer-events: none; z-index: 2; }
        .card:hover { transform: scale(1.03); border-color: var(--gold-solid); box-shadow: 0 20px 50px rgba(0,0,0,1); z-index: 10; }

        .card-img {
            width: 100%; height: 80px; background: linear-gradient(180deg, #000 0%, #1a0101 100%);
            border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 0.5rem; color: #4a0404; border: 1px solid rgba(255,255,255,0.05);
            position: relative; z-index: 1; letter-spacing: 2px; text-transform: uppercase;
        }

        .category-title { font-weight: bold; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-solid); margin: 5px 0; position: relative; z-index: 1; }
        .category-desc { font-size: 0.5rem; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; position: relative; z-index: 1; }

        /* СПЕЦИФИКАЦИЯ МАТРИЦЫ */
        #matrix-container {
            display: none; width: 100%; max-width: 800px; 
            flex-direction: column; align-items: center;
            animation: slideIn 0.5s ease;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; margin-top: 30px;
        }

        .slot-card.vacant { opacity: 0.4; filter: grayscale(1); cursor: default; }
        .slot-card.vacant:hover { transform: none; border-color: rgba(252, 246, 186, 0.1); }

        .back-btn {
            position: sticky; top: 20px; z-index: 100;
            margin-bottom: 20px; padding: 12px 40px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border: 1px solid var(--gold-solid); color: var(--gold-solid);
            cursor: pointer; text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold-solid); color: #000; }

        @keyframes slideIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

    </style>
</head>
<body onclick="activateFullscreen()">

    <h2 id="terminal-header">VCHF // ARSENAL</h2>

    <div class="shop-grid" id="main-grid">
        <div class="card" onclick="openSector('HEALTH')">
            <div class="card-img">UNIT_01</div>
            <div class="category-title">Health</div>
            <div class="category-desc">Ремонт & Тюнинг</div>
        </div>
        <div class="card" onclick="openSector('CRAFT_FOOD')">
            <div class="card-img">UNIT_02</div>
            <div class="category-title">Craft Food</div>
            <div class="category-desc">Частный ресурс</div>
        </div>
        <div class="card" onclick="openSector('WORKSHOP')">
            <div class="card-img">UNIT_03</div>
            <div class="category-title">Workshop</div>
            <div class="category-desc">Мастерская & Цех</div>
        </div>
        <div class="card" onclick="openSector('WAY')">
            <div class="card-img">UNIT_04</div>
            <div class="category-title">Way</div>
            <div class="category-desc">Логистика & Путь</div>
        </div>
        <div class="card" onclick="openSector('TOURISM')">
            <div class="card-img">UNIT_05</div>
            <div class="category-title">Tourism</div>
            <div class="category-desc">Отдых & Поток</div>
        </div>
        <div class="card" onclick="openSector('MEDIA')">
            <div class="card-img">UNIT_06</div>
            <div class="category-title">Media</div>
            <div class="category-desc">Инфополе & Контент</div>
        </div>
    </div>

    <div id="matrix-container">
        <button class="back-btn" onclick="closeSector()">[ ВЕРНУТЬСЯ ]</button>
        <h3 id="active-sector-title" style="letter-spacing: 15px; font-weight: 300; text-transform: uppercase; color: var(--gold-solid); margin-bottom: 0;"></h3>
        <div class="matrix-grid" id="matrix-display"></div>
    </div>

    <script>
        function activateFullscreen() {
            let de = document.documentElement;
            if (de.requestFullscreen) de.requestFullscreen();
        }

        const sectorData = {
            'HEALTH': ['Инвитро', 'Биохакинг', 'Аптека'],
            'CRAFT_FOOD': ['Ферма', 'Шеф-маркет', 'Вино'],
            'WORKSHOP': ['Леруа', 'GitHub', 'Habr'],
            'WAY': ['Карты', 'Такси', 'РЖД'],
            'TOURISM': ['Авиасейлс', 'Островок', 'TripAdvisor'],
            'MEDIA': ['Telegram', 'YouTube', 'VC.ru']
        };

        const sectorLinks = {
            'HEALTH': ['https://www.invitro.ru', 'https://biohacking.org', 'https://apteka.ru'],
            'CRAFT_FOOD': ['https://lavkalavka.com', 'https://www.chefmarket.ru', 'https://winestyle.ru'],
            'WORKSHOP': ['https://leroymerlin.ru', 'https://github.com', 'https://habr.com'],
            'WAY': ['https://maps.yandex.ru', 'https://taxi.yandex.ru', 'https://www.rzd.ru'],
            'TOURISM': ['https://www.aviasales.ru', 'https://ostrovok.ru', 'https://www.tripadvisor.ru'],
            'MEDIA': ['https://t.me', 'https://youtube.com', 'https://vc.ru']
        };

        function openSector(name) {
            const mainGrid = document.getElementById('main-grid');
            const matrixCont = document.getElementById('matrix-container');
            const display = document.getElementById('matrix-display');
            const header = document.getElementById('active-sector-title');

            mainGrid.style.display = 'none';
            matrixCont.style.display = 'flex';
            header.innerText = name;
            display.innerHTML = '';

            const names = sectorData[name] || [];
            const links = sectorLinks[name] || [];

            for (let i = 1; i <= 36; i++) {
                const isLinked = i <= 3;
                const card = document.createElement(isLinked ? 'a' : 'div');
                card.className = `card slot-card ${isLinked ? '' : 'vacant'}`;
                
                if (isLinked) {
                    card.href = links[i-1];
                    card.target = '_blank';
                }

                card.innerHTML = `
                    <div class="card-img" style="height: 40px; font-size: 0.4rem;">SLOT_${i.toString().padStart(2, '0')}</div>
                    <div class="category-title" style="font-size: 0.7rem;">${isLinked ? names[i-1] : 'VACANT'}</div>
                    <div class="category-desc" style="font-size: 0.45rem;">${isLinked ? 'DATA_LINK_OK' : 'EMPTY_SLOT'}</div>
                `;
                display.appendChild(card);
            }
            window.scrollTo(0,0);
        }

        function closeSector() {
            document.getElementById('main-grid').style.display = 'grid';
            document.getElementById('matrix-container').style.display = 'none';
            window.scrollTo(0,0);
        }
    </script>

   <div style="margin-top: 100px; padding-bottom: 50px; text-align: center; opacity: 0.2;">
        <div style="font-size: 0.6rem; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 10px;">
            MONOLITH MANIFESTO // 2026 // NULL_CHAOS
        </div>
        <div style="font-size: 0.5rem; letter-spacing: 5px; text-transform: uppercase; color: var(--gold-solid);">
            © ISKRA BRODYAGA // ALL RIGHTS RESERVED
        </div>
    </div>
</body>
</html>
