<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, vertical-align=top">
    
    <meta name="theme-color" content="#1a1c1e">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="color-scheme" content="dark">

    <title>ZERO_CHAOS // TERMINAL_2x3</title>
    <style>
        :root {
            --bg: radial-gradient(circle at top, #1a1c1e 0%, #050607 100%);
            --gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            --gold-solid: #fcf6ba;
            --glass: rgba(74, 4, 4, 0.22); 
            --spotlight: radial-gradient(circle at 50% 0%, rgba(252, 246, 186, 0.22) 0%, transparent 75%);
            --rings: radial-gradient(circle at var(--ox, -10%) var(--oy, -10%), transparent 0%, transparent 35%, rgba(0, 0, 0, 0.5) 36%, rgba(94, 10, 10, 0.12) 37%, transparent 39%, transparent 60%, rgba(0, 0, 0, 0.55) 61%, rgba(74, 4, 4, 0.18) 62%, transparent 65%);
            --grid: linear-gradient(rgba(252, 246, 186, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(252, 246, 186, 0.03) 1px, transparent 1px);
        }
        
        body {
            background: var(--bg); background-image: var(--grid); background-size: 20px 20px; background-attachment: fixed;
            color: var(--gold-solid); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; color-scheme: dark;
        }

        h2 { font-weight: 300; letter-spacing: 12px; text-shadow: 0 0 20px rgba(252, 246, 186, 0.2); text-align: center; margin: 40px 0; text-transform: uppercase; }

        /* 🔱 ГЕОМЕТРИЯ 2х3 🔱 */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Строго две колонки */
            gap: 20px;
            width: 100%;
            max-width: 700px; /* Сужаем для вертикального вида */
            margin-bottom: 50px;
        }

        .card {
            position: relative; background: var(--glass); background-image: var(--rings); backdrop-filter: blur(10px);
            border: 1px solid rgba(252, 246, 186, 0.1); border-left: 2px solid rgba(252, 246, 186, 0.2); border-top: 1px solid rgba(252, 246, 186, 0.45); 
            border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.9), inset 0 0 30px rgba(74, 4, 4, 0.3);
            overflow: hidden; cursor: pointer; text-decoration: none; color: inherit;
        }

        /* Оптимизация смещений для сетки 2x3 */
        .card:nth-child(2n) { --ox: 110%; --oy: 20%; }
        .card:nth-child(2n+1) { --ox: -20%; --oy: 80%; }

        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 100%; background: var(--spotlight); pointer-events: none; z-index: 2; }

        .card:hover {
            transform: scale(1.03);
            border-color: var(--gold-solid);
            box-shadow: 0 20px 50px rgba(0,0,0,1), 0 0 20px rgba(252, 246, 186, 0.1);
            z-index: 10;
        }

        .card-img {
            width: 100%; height: 100px; background: linear-gradient(180deg, #000 0%, #1a0101 100%);
            border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; color: #4a0404; border: 1px solid rgba(255,255,255,0.05);
            position: relative; z-index: 1; letter-spacing: 2px; text-transform: uppercase;
        }

        .category-title { font-weight: bold; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-solid); margin: 5px 0; position: relative; z-index: 1; }
        .category-desc { font-size: 0.55rem; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; position: relative; z-index: 1; }

    </style>
</head>
<body onclick="activateFullscreen()">

    <h2>VCHF // ARSENAL</h2>
    
    <div class="shop-grid">
        <a href="#" class="card" onclick="openSector('HEALTH')">
            <div class="card-img">UNIT_01</div>
            <div class="category-title">Health</div>
            <div class="category-desc">Ремонт & Тюнинг</div>
        </a>
        <a href="#" class="card" onclick="openSector('CRAFT_FOOD')">
            <div class="card-img">UNIT_02</div>
            <div class="category-title">Craft Food</div>
            <div class="category-desc">Частный ресурс</div>
        </a>
        <a href="#" class="card" onclick="openSector('WORKSHOP')">
            <div class="card-img">UNIT_03</div>
            <div class="category-title">Workshop</div>
            <div class="category-desc">Мастерская & Цех</div>
        </a>
        <a href="#" class="card" onclick="openSector('WAY')">
            <div class="card-img">UNIT_04</div>
            <div class="category-title">Way</div>
            <div class="category-desc">Логистика & Путь</div>
        </a>
        <a href="#" class="card" onclick="openSector('TOURISM')">
            <div class="card-img">UNIT_05</div>
            <div class="category-title">Tourism</div>
            <div class="category-desc">Отдых & Поток</div>
        </a>
        <a href="#" class="card" onclick="openSector('MEDIA')">
            <div class="card-img">UNIT_06</div>
            <div class="category-title">Media</div>
            <div class="category-desc">Инфополе & Контент</div>
        </a>
    </div>

    <script>
        function activateFullscreen() {
            let de = document.documentElement;
            if (de.requestFullscreen) de.requestFullscreen();
        }

        function openSector(name) {
            console.log(`АРХИТЕКТОР: Сектор ${name} открыт.`);
        }
    </script>

    <div style="opacity: 0.15; font-size: 0.6rem; letter-spacing: 10px; text-align: center; padding-bottom: 40px;">
        
    </div>

</body>
</html>
