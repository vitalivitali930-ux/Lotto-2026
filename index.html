<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERO CHAOS | IMPERIAL VAULT</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-bright: #ffdf00;
            --cherry: #4a0404;
            --cherry-dark: #1a0101;
            --neon: #00ff41; 
            --bg: #000; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'serif', 'Times New Roman'; overflow: hidden; }

        /* --- СТВОРКИ СЕЙФА (GATES) --- */
        #gate-container {
            position: fixed; width: 100%; height: 100%; display: flex; z-index: 100;
            transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .gate {
            width: 50%; height: 100%; position: relative;
            background: radial-gradient(circle at center, var(--cherry) 0%, var(--cherry-dark) 100%);
            border: 1px solid rgba(212, 175, 55, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }
        .gate-left { border-right: 2px solid var(--gold); }
        .gate-right { border-left: 2px solid var(--gold); }

        /* Эффект бархата (текстурный шум) */
        .gate::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            opacity: 0.2; pointer-events: none;
        }

        /* --- ЦЕНТРАЛЬНЫЙ ШТУРВАЛ (THE WHEEL) --- */
        .vault-wrapper {
            position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%);
            width: 380px; height: 380px; z-index: 110; display: flex; align-items: center; justify-content: center;
        }

        .main-ring {
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #050505 100%);
            border: 5px double var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px var(--gold-dark);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
        }

        /* Золотой Череп (Pirate Gold Style) */
        .skull-core {
            font-size: 100px; color: var(--gold); text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            filter: drop-shadow(5px 5px 10px #000); transition: 0.5s;
        }
        .main-ring:active .skull-core { transform: scale(0.9); color: var(--neon); text-shadow: 0 0 30px var(--neon); }

        /* ОРБИТАЛЬНЫЕ КЛЮЧИ (ВАЛЮТЫ) */
        .orbit {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            animation: rotateOrbit 120s linear infinite;
        }
        @keyframes rotateOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .currency-key {
            position: absolute; width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(145deg, #111, #000);
            border: 1px solid var(--gold); color: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5em; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 3px 3px 10px #000;
        }
        .currency-key:hover { 
            color: #fff; border-color: var(--neon); box-shadow: 0 0 15px var(--neon); transform: scale(1.15); 
        }

        /* Математика круга для 6 валют */
        .k1 { top: -30px; left: 160px; } 
        .k2 { top: 75px; right: -30px; } 
        .k3 { bottom: 75px; right: -30px; }
        .k4 { bottom: -30px; left: 160px; } 
        .k5 { bottom: 75px; left: -30px; } 
        .k6 { top: 75px; left: -30px; }

        /* --- НИЖНИЙ БЛОК ВВОДА (IDENTITY) --- */
        .auth-sector {
            position: absolute; bottom: 80px; width: 100%; text-align: center; z-index: 120;
        }
        .auth-container {
            display: inline-block; background: rgba(0,0,0,0.6); padding: 20px;
            border: 1px solid var(--gold); border-radius: 5px; box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        .auth-container input {
            display: block; width: 240px; background: transparent; border: none;
            border-bottom: 1px solid var(--cherry); margin: 15px auto; padding: 10px;
            color: var(--gold); font-family: 'Courier New', monospace; text-align: center;
            letter-spacing: 4px; outline: none; transition: 0.4s;
        }
        .auth-container input:focus { border-bottom-color: var(--neon); color: var(--neon); }

        /* ТЕКСТЫ */
        .top-brand {
            position: absolute; top: 40px; text-align: center; width: 100%; z-index: 130;
        }
        .brand-name { font-size: 2.2em; letter-spacing: 12px; color: var(--gold); text-shadow: 2px 2px 10px #000; font-weight: bold; }
        .slogan { font-size: 0.7em; color: var(--gold-dark); letter-spacing: 5px; margin-top: 5px; text-transform: uppercase; }

        .nav-footer {
            position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 130;
        }
        .nav-footer a { color: var(--gold); text-decoration: none; font-size: 0.8em; opacity: 0.5; transition: 0.3s; }
        .nav-footer a:hover { opacity: 1; color: var(--neon); }

        /* --- АНИМАЦИЯ ОТКРЫТИЯ --- */
        .opened .gate-left { transform: translateX(-100%); }
        .opened .gate-right { transform: translateX(100%); }
        .opened .vault-wrapper { opacity: 0; transform: translate(-50%, -50%) scale(0.5); pointer-events: none; transition: 1s; }
        .opened .auth-sector, .opened .top-brand, .opened .nav-footer { opacity: 0; transition: 0.5s; }
    </style>
</head>
<body>

<div id="gate-container">
    <div class="top-brand">
        <div class="brand-name">ZERO CHAOS</div>
        <div class="slogan">DEIN WEG ZUM ERFOLG</div>
    </div>

    <div class="gate gate-left"></div>
    <div class="gate gate-right"></div>

    <div class="vault-wrapper">
        <div class="orbit">
            <div class="currency-key k1" onclick="selectKey('$')">$</div>
            <div class="currency-key k2" onclick="selectKey('€')">€</div>
            <div class="currency-key k3" onclick="selectKey('₣')">₣</div>
            <div class="currency-key k4" onclick="selectKey('£')">£</div>
            <div class="currency-key k5" onclick="selectKey('¥')">¥</div>
            <div class="currency-key k6" onclick="selectKey('₿')">₿</div>
        </div>
        <div class="main-ring" onclick="triggerVault()">
            <div class="skull-core">☠</div>
        </div>
    </div>

    <div class="auth-sector">
        <div class="auth-container">
            <input type="text" placeholder="IDENTITY" id="uid" autocomplete="off">
            <input type="password" placeholder="SECRET_CODE" id="ukey">
        </div>
    </div>

    <div class="nav-footer">
        <a href="docs/regeln.html">REGELN</a>
        <a href="docs/taktik.html">TAKTIK</a>
        <a href="docs/philosophie.html">PHILOSOPHIE</a>
    </div>
</div>

<script>
    function selectKey(val) {
        // Звуковая и визуальная обратная связь
        const keyInput = document.getElementById('ukey');
        keyInput.value += "*"; // Имитация ввода кода через штурвал
    }

    function triggerVault() {
        const id = document.getElementById('uid').value;
        if (!id) {
            alert("Warten! Identität erforderlich.");
            return;
        }

        // Запуск механизма вскрытия
        document.getElementById('gate-container').classList.add('opened');
        
        // Переход в святая святых
        setTimeout(() => {
            window.location.href = 'terminal.html';
        }, 1600);
    }
</script>

</body>
</html>
