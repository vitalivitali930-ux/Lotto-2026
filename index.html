<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, vertical-align=top">
    
    <meta name="theme-color" content="#1a1c1e">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="color-scheme" content="dark">

    <title>ZERO_CHAOS // TERMINAL_15_ELITE</title>
    <style>
        :root {
            /* Палитра: АНТРАЦИТОВЫЙ ШЁЛК И КРАСНОЕ ДЕРЕВО */
            --bg: radial-gradient(circle at top, #1a1c1e 0%, #08090a 100%);
            --gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 100%);
            --gold-solid: #fcf6ba;
            --steel: rgba(45, 45, 48, 0.6);
            --glass: rgba(74, 4, 4, 0.15); 
            --danger: #ff5f5f;
            --spotlight: radial-gradient(circle at 50% 0%, rgba(252, 246, 186, 0.18) 0%, transparent 75%);
            /* Формула волокон дерева */
            --grain: repeating-linear-gradient(45deg, rgba(94, 10, 10, 0.1) 0px, rgba(94, 10, 10, 0.1) 1px, transparent 1px, transparent 3px);
        }
        
        body {
            background: var(--bg);
            background-attachment: fixed;
            color: var(--gold-solid);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 20px;
            padding-bottom: 120px;
            letter-spacing: 0.5px;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            color-scheme: dark;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(252, 246, 186, 0.2);
            text-align: center;
            margin-bottom: 40px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* ЭТАЛОННАЯ КАРТОЧКА: ТЕКСТУРА КРАСНОГО ДЕРЕВА */
        .card {
            position: relative;
            background: var(--glass);
            background-image: var(--grain); /* Наложение волокон дерева */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(252, 246, 186, 0.1);
            border-top: 1px solid rgba(252, 246, 186, 0.35); /* Лак на верхней грани */
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(74, 4, 4, 0.4);
            overflow: hidden;
        }

        /* ЭФФЕКТ МУЗЕЙНОГО СОФИТА */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: var(--spotlight);
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 2;
        }

        .card:active {
            transform: scale(0.97);
            border-color: var(--gold-solid);
            box-shadow: 0 0 30px rgba(74, 4, 4, 0.6);
        }

        .card:active::before {
            opacity: 1;
            background: radial-gradient(circle at 50% 0%, rgba(252, 246, 186, 0.35) 0%, transparent 70%);
        }

        .card-img {
            width: 100%; height: 130px;
            background: linear-gradient(180deg, #000 0%, #2a0202 100%);
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; color: #4a0404;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 1;
        }

        .price { 
            color: rgba(252, 246, 186, 0.7); 
            font-size: 0.85rem; 
            margin: 10px 0;
            font-weight: bold;
            position: relative; z-index: 1;
        }

        button {
            margin-top: 10px; width: 100%;
            background: var(--gold);
            border: none; border-radius: 6px;
            color: #000; padding: 10px; 
            font-weight: bold; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
            position: relative; z-index: 3;
        }

        button:hover { opacity: 0.9; box-shadow: 0 0 10px rgba(252, 246, 186, 0.4); }

        /* СЕЙФ-БАР (PREMIUM GLASS) */
        #cart-bar {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: rgba(18, 19, 21, 0.9); /* Антрацитовая база */
            backdrop-filter: blur(20px);
            border: 1px solid rgba(252, 246, 186, 0.3);
            border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; box-sizing: border-box; z-index: 100;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }

        /* МОДАЛЬНОЕ ОКНО */
        #cart-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; 
            background: radial-gradient(circle, #1a1c1e 0%, #08090a 100%);
            z-index: 200; overflow-y: auto; padding: 30px; box-sizing: border-box;
        }

        .cart-item {
            display: flex; justify-content: space-between;
            border-bottom: 1px solid rgba(252, 246, 186, 0.1); 
            padding: 15px 0;
        }

        .close-btn { 
            color: #888; float: right; cursor: pointer; 
            font-size: 0.8rem; letter-spacing: 2px;
        }
        .close-btn:hover { color: var(--gold-solid); }
    </style>
</head>
<body onclick="activateFullscreen()">

    <h2>VCHF // ARSENAL</h2>
    
    <div class="shop-grid" id="main-grid"></div>

    <div id="cart-bar" onclick="toggleCart(event)">
        <span id="cart-info" style="font-size: 0.8rem; font-weight: bold;">СЕЙФ ПУСТ</span>
        <button style="width: auto; margin: 0; padding: 8px 20px; background: none; border: 1px solid var(--gold-solid); color: var(--gold-solid);">ОТКРЫТЬ</button>
    </div>

    <div id="cart-modal">
        <span class="close-btn" onclick="toggleCart(event)">[ ВЕРНУТЬСЯ К ОБЗОРУ ]</span>
        <h3 style="border-bottom: 1px solid var(--gold-solid); padding-bottom: 15px; font-weight: 300; letter-spacing: 3px;">ДЕПОЗИТАРИЙ</h3>
        <div id="cart-list"></div>
        <div id="cart-total" style="margin-top: 30px; text-align: right; font-size: 1.2rem; color: var(--gold-solid);"></div>
        <button onclick="clearCart(event)" style="color: var(--danger); border-color: var(--danger); background: none; margin-top: 40px; border: 1px solid var(--danger);">ОБНУЛИТЬ СЕЙФ</button>
    </div>

    <script>
        // ЗВУКОВОЙ ДВИЖОК
        const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, duration) {
            if (AudioCtx.state === 'suspended') AudioCtx.resume();
            const osc = AudioCtx.createOscillator();
            const gain = AudioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, AudioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(AudioCtx.destination);
            osc.start(); osc.stop(AudioCtx.currentTime + duration);
        }

        // ФУНКЦИЯ ПОЛНОГО ПОГРУЖЕНИЯ
        function activateFullscreen() {
            let doc = window.document;
            let docEl = doc.documentElement;
            let requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            
            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
            }
        }

        const products = [];
        for (let i = 1; i <= 15; i++) {
            products.push({ id: i, name: `MOTIVE_0${i}`, price: (1000 + i * 150) });
        }

        let cart = JSON.parse(localStorage.getItem('monolith_cart')) || [];
        const grid = document.getElementById('main-grid');

        products.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img">VCHF_UNIT_${item.id}</div>
                <div style="font-size: 0.75rem; letter-spacing: 1px;">${item.name}</div>
                <div class="price">${item.price} VCHF</div>
                <button onclick="event.stopPropagation(); addToCart(${item.id})">В СЕЙФ</button>
            `;
            grid.appendChild(card);
        });

        function addToCart(id) {
            playSfx(880, 'sine', 0.1);
            const product = products.find(p => p.id === id);
            cart.push(product);
            saveCart();
            renderCart();
        }

        function saveCart() {
            localStorage.setItem('monolith_cart', JSON.stringify(cart));
            const info = document.getElementById('cart-info');
            info.innerText = cart.length > 0 ? `АКТИВОВ В СЕЙФЕ: ${cart.length}` : 'СЕЙФ ПУСТ';
        }

        function toggleCart(e) {
            if(e) e.stopPropagation();
            playSfx(110, 'triangle', 0.2);
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalDiv = document.getElementById('cart-total');
            list.innerHTML = '';
            let total = 0;

            cart.forEach((item) => {
                total += item.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <span style="font-size: 0.9rem;">${item.name}</span>
                        <span style="color: var(--gold-solid);">${item.price} VCHF</span>
                    </div>
                `;
            });
            totalDiv.innerText = `ИТОГО К ДЕПОЗИТУ: ${total} VCHF`;
        }

        function clearCart(e) {
            if(e) e.stopPropagation();
            playSfx(50, 'sawtooth', 0.4);
            cart = [];
            saveCart();
            toggleCart();
        }

        saveCart();
    </script>
</body>
</html>
