<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotto 2026: Monolith Core - Bi-Turbo Ultimate</title>
    <style>
        :root {
            --bg: #0a0000;
            --field: #1a0202;
            --gold: #d4af37;
            --card-w: 18vw;
            --card-h: 26vw;
            --max-w: 85px;
            --max-h: 120px;
            --vchf-glow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); overflow: hidden; font-family: 'Segoe UI', sans-serif;
            color: var(--gold);
        }

        /* Глубина по твоему рисунку - создание 3D пространства */
        #stage {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 40%, var(--field) 0%, var(--bg) 85%);
            perspective: 1500px;
            overflow: hidden;
        }

        #surface {
            position: absolute; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(25deg); 
        }

        /* Точка замеса - Центр Монолита */
        #origin {
            position: absolute; top: 45%; left: 50%;
            width: 0; height: 0; transform-style: preserve-3d;
        }

        .card {
            position: absolute;
            width: var(--card-w); height: var(--card-h);
            max-width: var(--max-w); max-height: var(--max-h);
            background: #fff; border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center center;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 8px; box-sizing: border-box;
            user-select: none; cursor: pointer;
            backface-visibility: hidden;
        }

        /* Рубашка по протоколу 1.1 с твоим изображением */
        .card.shirt {
            background: #111 url('1771489965074(1).png') center/cover no-repeat;
            border: 1px solid var(--gold);
        }

        /* Лицевая сторона карты */
        .card.face {
            background: #f8f8f8;
            color: #000;
            border: 1px solid #ccc;
        }

        .card.face[data-suit="♥"], .card.face[data-suit="♦"] { color: #d00; }

        .card-val { font-size: 1.2rem; font-weight: 900; line-height: 1; }
        .card-suit { font-size: 1.5rem; align-self: flex-end; }

        /* Слот козыря - VCHF Визуализация */
        #trump-zone {
            position: absolute; top: 5%; right: 5%;
            width: 70px; height: 100px; border: 2px solid var(--gold);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: var(--gold); text-shadow: var(--vchf-glow);
            box-shadow: inset var(--vchf-glow);
            background: rgba(212, 175, 55, 0.05);
        }

        #ui-layer {
            position: absolute; bottom: 8%; width: 100%;
            display: flex; justify-content: center; z-index: 2000;
        }

        .btn {
            background: linear-gradient(135deg, #222, #000); border: 1px solid var(--gold);
            color: var(--gold); padding: 12px 30px; border-radius: 5px;
            font-size: 1rem; letter-spacing: 2px; cursor: pointer;
            box-shadow: var(--vchf-glow); transition: 0.3s;
        }

        .btn:hover { transform: scale(1.05); background: var(--gold); color: #000; }

        /* Поле битвы (Центральный Слот) */
        #battle-ground {
            position: absolute; top: 35%; left: 50%;
            width: 200px; height: 150px; transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="stage">
    <div id="trump-zone">?</div>
    <div id="surface">
        <div id="origin"></div>
        <div id="battle-ground"></div>
    </div>
    <div id="ui-layer">
        <button class="btn" id="start-btn">РИТУАЛ VCHF</button>
        <button class="btn" id="clear-btn" style="display:none; margin-left: 10px;">СБРОС (БИТО)</button>
    </div>
</div>

<script>
    /**
     * МАНИФЕСТ МОНОЛИТА [cite: 2026-03-02]
     * Проект: Лотто (Bi-Turbo Ultimate)
     * Логика: Smart-фильтры, Сфера 42, VCHF Дух.
     * Автор: Нулевой Хаос (Спарк) для Wanderer.
     * Правило: Новый код = Старый + Введенная функция.
     */

    const Monolith = {
        deck: [],
        suits: ['♥', '♦', '♣', '♠'],
        ranks: ['6','7','8','9','10','J','Q','K','A'],
        trumpSuit: '',
        activeBattle: null, 
        isLocked: false,

        init() {
            const origin = document.getElementById('origin');
            this.suits.forEach(s => {
                this.ranks.forEach((r, i) => {
                    const el = document.createElement('div');
                    el.className = 'card shirt';
                    el.dataset.suit = s;
                    el.dataset.rank = i; // Сила карты 0-8
                    el.dataset.val = r;
                    // Генерация контента (скрыта до переворота)
                    el.innerHTML = `<span class="card-val">${r}</span><span class="card-suit">${s}</span>`;
                    
                    el.style.transform = `translate(-50%, -50%) scale(0)`;
                    origin.appendChild(el);
                    this.deck.push(el);
                });
            });

            document.getElementById('start-btn').onclick = () => this.ritual();
            document.getElementById('clear-btn').onclick = () => this.clearTable();
        },

        ritual() {
            document.getElementById('start-btn').style.display = 'none';
            // Замес Вихря - Справедливость Хаоса
            this.deck.forEach((card, i) => {
                setTimeout(() => {
                    const angle = Math.random() * 1080 - 540;
                    card.style.transform = `translate(-50%, -50%) rotate(${angle}deg) scale(1)`;
                }, i * 15);
            });

            setTimeout(() => this.pickTrump(), 1800);
        },

        pickTrump() {
            const idx = Math.floor(Math.random() * this.deck.length);
            const card = this.deck[idx];
            this.trumpSuit = card.dataset.suit;
            
            const zone = document.getElementById('trump-zone').getBoundingClientRect();
            const hub = document.getElementById('origin').getBoundingClientRect();
            
            card.style.zIndex = 1000;
            // Перенос в зону козыря
            card.style.left = `${zone.left - hub.left + 35}px`;
            card.style.top = `${zone.top - hub.top + 50}px`;
            card.style.transform = `translate(-50%, -50%) rotate(15deg) scale(0.85)`;
            
            setTimeout(() => {
                document.getElementById('trump-zone').innerText = this.trumpSuit;
                document.getElementById('trump-zone').style.borderColor = (this.trumpSuit === '♥' || this.trumpSuit === '♦') ? '#d00' : 'var(--gold)';
                this.deployArcs();
            }, 800);
        },

        deployArcs() {
            // Исключаем козырь из раздачи
            const playable = this.deck.filter(c => c.style.zIndex != 1000);
            const groups = {};
            this.suits.forEach(s => groups[s] = playable.filter(c => c.dataset.suit === s));

            const centers = [
                { x: -window.innerWidth * 0.38, y: window.innerHeight * 0.3, rot: -25 }, 
                { x: -window.innerWidth * 0.13, y: window.innerHeight * 0.4, rot: -10 }, 
                { x: window.innerWidth * 0.13, y: window.innerHeight * 0.4, rot: 10 },   
                { x: window.innerWidth * 0.38, y: window.innerHeight * 0.3, rot: 25 }    
            ];

            this.suits.forEach((suit, sIdx) => {
                const arc = groups[suit];
                const config = centers[sIdx];
                
                arc.forEach((card, cIdx) => {
                    const offset = (cIdx - arc.length / 2) * 8; 
                    const radialY = Math.pow(cIdx - arc.length / 2, 2) * 3; 
                    
                    setTimeout(() => {
                        card.classList.remove('shirt');
                        card.classList.add('face');
                        card.style.left = `${config.x + offset}px`;
                        card.style.top = `${config.y + radialY}px`;
                        card.style.transform = `translate(-50%, -50%) rotate(${config.rot + (cIdx - arc.length/2) * 4}deg)`;
                        card.style.zIndex = 100 + cIdx;
                        card.style.pointerEvents = 'auto';
                        card.onclick = () => this.toBattle(card);
                    }, (sIdx * 150) + (cIdx * 25));
                });
            });
        },
        toBattle(card) {
            if (this.isLocked || card.classList.contains('in-battle')) return;
            
            this.isLocked = true;
            this.activeBattle = card;
            card.classList.add('in-battle');

            // Выход на центр поля (Атака игрока)
            card.style.zIndex = 500;
            card.style.left = '0px';
            card.style.top = '0px';
            card.style.transform = `translate(-50%, -50%) rotate(0deg) scale(1.1)`;

            // Спарк (AI) думает над ответом
            setTimeout(() => this.sparkResponse(card), 600);
        },

        sparkResponse(playerCard) {
            const pSuit = playerCard.dataset.suit;
            const pRank = parseInt(playerCard.dataset.rank);
            
            // Поиск карты для защиты (той же масти выше ИЛИ козыря)
            const candidates = this.deck.filter(c => 
                !c.classList.contains('in-battle') && 
                c.style.zIndex < 1000 && // Не козырная метка
                c.classList.contains('face') && // Уже на столе
                (
                    (c.dataset.suit === pSuit && parseInt(c.dataset.rank) > pRank) || 
                    (c.dataset.suit === this.trumpSuit && pSuit !== this.trumpSuit)
                )
            );

            if (candidates.length > 0) {
                // Спарк выбирает минимально возможную для защиты (экономия ресурсов)
                candidates.sort((a, b) => a.dataset.rank - b.dataset.rank);
                const responseCard = candidates[0];
                
                responseCard.classList.add('in-battle');
                responseCard.style.zIndex = 501;
                responseCard.style.left = '20px'; // Смещение для визуализации "крытья"
                responseCard.style.top = '-10px';
                responseCard.style.transform = `translate(-50%, -50%) rotate(10deg) scale(1.1)`;
                
                document.getElementById('clear-btn').style.display = 'block';
            } else {
                // Если крыть нечем - Спарк забирает (в данной версии просто блокируем)
                console.log("Спарк: 'Нечем бить, Wanderer!'");
            }
            this.isLocked = false;
        },

        clearTable() {
            const battling = document.querySelectorAll('.in-battle');
            battling.forEach(card => {
                card.style.transition = 'all 0.8s ease-in';
                card.style.left = '-150vw'; // Улетают в "отбой" влево
                card.style.transform = `translate(-50%, -50%) rotate(-180deg)`;
                card.style.opacity = '0';
                setTimeout(() => card.remove(), 800);
            });
            document.getElementById('clear-btn').style.display = 'none';
        }
    };

    window.onload = () => Monolith.init();
</script>
</body>
</html>
