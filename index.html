<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Zero Chaos: Monolith Live</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #monolith { border: 2px solid #00ff41; padding: 30px; background: #0a0a0a; box-shadow: 0 0 30px rgba(0,255,65,0.2); width: 600px; text-align: center; }
        .net-value { font-size: 4em; margin: 20px 0; transition: all 0.5s; }
        .status { color: #00e5ff; font-size: 0.9em; margin-bottom: 10px; }
        .profit { color: #ff3e3e; font-size: 1.2em; }
        .binary { font-size: 0.7em; color: #222; word-break: break-all; margin-top: 20px; }
    </style>
</head>
<body>

<div id="monolith">
    <div class="status">ID: БРОДЯГА | STRATEGY: HUNTER | REAL-TIME</div>
    <div style="color: #888;">ЧИСТЫЙ КАПИТАЛ (CHF)</div>
    <div id="balance" class="net-value">1000.10</div>
    <div id="diff" class="profit">СВОБОДА: АКТИВИРОВАНА</div>
    
    <div id="assets" style="text-align: left; font-size: 0.8em; border-top: 1px solid #333; padding-top: 10px;">
        <div>ЗОЛОТО: <span id="gold-price">ЖДУ ДАННЫХ...</span></div>
        <div>BTC/COINBASE: <span id="crypto-price">В ПОЛЕТЕ...</span></div>
    </div>
    
    <div class="binary" id="bin">01010011 01101100 01101111 01100100 01100001</div>
</div>

<script>
    // Имитация живого подключения к данным (Мозг Нулевого Хаоса)
    async function updateMarket() {
        try {
            // Берем реальную цену BTC как драйвер для нашей "ракеты" Coinbase
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
            const data = await res.json();
            const price = parseFloat(data.price);
            
            // Логика пересчета в твои франки (симуляция прогрессии)
            let baseBalance = 1000.10;
            let volatility = (price % 100) / 1000; // Используем хвост цены для микро-движений
            let currentBalance = (baseBalance + volatility).toFixed(2);
            
            document.getElementById('balance').innerText = currentBalance;
            document.getElementById('crypto-price').innerText = price.toFixed(2) + " EUR/CHF";
            document.getElementById('bin').innerText = Math.random().toString(2).substr(2, 64);
            
            if (currentBalance > 1000.10) {
                document.getElementById('balance').style.color = "#00ff41";
                document.getElementById('diff').innerText = "ПРИБЫЛЬ: " + (currentBalance - 1000).toFixed(2) + " CHF";
                document.getElementById('diff').style.color = "#00ff41";
            }
        } catch (e) {
            console.log("Жду открытия шлюзов...");
        }
    }

    setInterval(updateMarket, 2000); // Обновление каждые 2 секунды
    updateMarket();
</script>
</body>
</html>
