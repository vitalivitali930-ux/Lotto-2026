<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotto - Движок VCHF Bi-Turbo 2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-color: #d4af37; 
            --main-gradient: linear-gradient(145deg, #f9e27d, #d4af37);
            --theme-glow: rgba(212, 175, 55, 0.35); 
            --sphere-base: #1a1a1a;
            --white-sphere: radial-gradient(circle at 35% 35%, #444 0%, #1a1a1a 40%, #000 100%);
            --gold-sphere: radial-gradient(circle at 35% 35%, #fff9d6 0%, #f9e27d 30%, #d4af37 60%, #8a6d1c 100%);
            --cell-text: #ffffff; 
            --hot-color: #ff4500;
            --cold-color: #1e90ff;
            --process-color: #00ffff;
            --neon-blue: #00a3ff;
            --gold: #ffcc00;
            --onyx: #050505;
            --neon: #00f3ff;
            --lime: #32CD32;
            --cyan: #00ffff;
            --cherry: #C511A4;
            --silver: #c0c0c0;
        } 

        body, html { 
            background: #000; color: #fff; font-family: -apple-system, sans-serif; 
            text-align: center; margin: 0; padding: 0; overflow: hidden; 
            width: 100%; height: 100%;
        } 

        /* Стили Интро */
        #introCanvas { position: absolute; top: 0; left: 0; z-index: 20001; pointer-events: none; } 
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20002; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
            pointer-events: none; transition: opacity 1s ease;
        } 

        .logo-box-intro { width: 130px; height: 130px; opacity: 0; transition: opacity 3s; margin-bottom: 25px; } 
        .logo-box-intro img { width: 100%; filter: drop-shadow(0 0 20px var(--gold)); } 

        /* Основной контейнер приложения */
        #app-content { display: none; opacity: 0; transition: opacity 1s ease; height: 100vh; overflow: hidden; } 

        /* Окна (Pages) */
        .page { height: calc(100vh - 75px); overflow-y: auto; display: none; padding: 15px 0 30px; } 
        .page.active { display: block; } 

        /* Виртуальный кошелек */
        .balance-container { display: flex; gap: 10px; padding: 0 15px 15px; } 
        .bal-card { 
            flex: 1; border-radius: 12px; padding: 12px; 
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a); 
            border: 1.5px solid #444; transition: 0.4s; cursor: pointer;
            opacity: 0.6; filter: grayscale(0.5);
        } 
        .bal-card.active-wallet { 
            opacity: 1; filter: grayscale(0); border-color: var(--main-color); 
            box-shadow: 0 0 15px var(--theme-glow); transform: scale(1.02);
        } 
        .bal-val { font-size: 18px; font-weight: bold; color: var(--lime); } 

        /* Сетка лото */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 0 15px; max-width: 400px; margin: 0 auto; } 
        .cell { 
            aspect-ratio: 1/1; background: var(--white-sphere); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: #fff; font-size: 18px; 
            transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        } 
        .cell.selected { 
            background: var(--main-gradient); color: #000; transform: scale(1.1); 
            box-shadow: 0 0 20px var(--main-color); border: 2px solid #fff; z-index: 5;
        }

        /* Навигация */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: rgba(10,10,10,0.98); display: flex; 
            justify-content: space-around; align-items: center; 
            border-top: 1.5px solid var(--main-color); z-index: 1000;
        } 
        .nav-item { color: #666; font-size: 10px; cursor: pointer; } 
        .nav-item.active { color: var(--main-color); } 
        .nav-item span { display: block; font-size: 24px; } 

        /* Кнопка */
        .btn-main { 
            width: 85%; padding: 18px; border-radius: 15px; font-size: 18px; 
            background: var(--main-gradient); color: #000; border: none; 
            font-weight: 800; cursor: pointer; margin: 20px 0;
        }

        /* Окно "Душа проекта" / Identity Bridge */
        #soul-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); z-index: 40000; display: none;
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .soul-box {
            background: #111; border: 2px solid var(--main-color);
            padding: 25px; border-radius: 20px; width: 90%; max-width: 350px;
        }
    </style>
</head>
<body>

<div id="soul-overlay">
    <div class="soul-box">
        <h2 style="color:var(--main-color); font-family:'Orbitron';">IDENTITY BRIDGE</h2>
        <div id="soul-content" style="font-size: 12px; text-align:left; max-height: 250px; overflow-y: auto; margin-bottom: 15px; color:#ccc;">
            </div>
        <input type="password" id="soul-pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;">
        <input type="text" id="soul-code" placeholder="Code Word (vchf...)" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:none;">
        <button class="btn-main" onclick="confirmIdentity()" style="width:100%; margin:0;">MANIFEST AKZEPTIEREN</button>
    </div>
</div>

<canvas id="introCanvas"></canvas>
<div id="ui-layer">
    <div id="mainLogoIntro" class="logo-box-intro">
        <img src="1771489965074(1).png" alt="Logo">
    </div>
    <div id="mainStatusIntro" class="status-label-intro" style="font-family:'Orbitron'; color:var(--neon); font-size:10px;">INITIALIZING ENGINE...</div>
</div>

<div id="app-content">
    <div id="page-play" class="page active">
        <div class="balance-container">
            <div class="bal-card active-wallet" id="card-vchf" onclick="switchCurrency('VCHF')">
                <div style="font-size:10px;">VIRTUAL VCHF</div>
                <div class="bal-val" id="vchf-val">100.00</div>
            </div>
            <div class="bal-card" id="card-chf" onclick="switchCurrency('CHF')">
                <div style="font-size:10px;">REAL CHF (TOP-UP)</div>
                <div class="bal-val" id="chf-val">0.00</div>
            </div>
        </div>

        <div class="smart-tools" style="display:flex; gap:5px; justify-content:center; margin-bottom:15px;">
            <button class="btn-main" style="width:auto; padding:8px 15px; font-size:10px;" onclick="randomFill()">🎲 RAINBOW WAVE</button>
        </div>

        <div class="grid" id="main-grid"></div>
        
        <div style="margin-top:20px; font-size:14px; color:var(--main-color);">SUPERZAHL</div>
        <div id="s-grid" style="display:flex; justify-content:center; gap:10px; margin-top:10px;"></div>

        <div class="total-display" style="margin-top:20px;">
            Total: <span id="display-total" style="color:var(--neon-blue); font-weight:bold;">2.50 VCHF</span>
        </div>
        <button class="btn-main" id="main-btn" onclick="runEngine()">TICKET BESTÄTIGEN</button>
    </div>

    <div id="page-tickets" class="page"><h2 style="color:var(--main-color);">MEINE TICKETS</h2><div id="active-list"></div></div>
    <div id="page-stats" class="page"><h2 style="color:var(--main-color);">STATISTIK</h2><div class="grid" id="personal-heatmap"></div></div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('play', this)"><span>🎲</span>GAME</div>
        <div class="nav-item" onclick="showPage('tickets', this)"><span>🎟️</span>TICKETS</div>
        <div class="nav-item" onclick="showPage('stats', this)"><span>📊</span>STATS</div>
    </div>
</div>

<script>
    // Манифест Монолита: Код написан Spark для Wanderer.
    // Заглушка: Реальный билет покупается в 'Shadow Mode' (без списания реального кэша).
/* Spark Memory: Logic Window 2
   - Финансовое ядро: Лимит 50 CHF, Порог 1.2 млн.
   - Заглушка 'Real Ticket': имитация покупки без внешнего API.
   - Сохранение: localStorage для имитации баланса. */

// --- 1. Глобальные Константы Монолита ---
const tg = window.Telegram.WebApp;
const realPrice = 2.50;
let userBalance = {
    VCHF: parseFloat(localStorage.getItem('vchf_bal_vchf')) || 100.00,
    CHF: parseFloat(localStorage.getItem('vchf_bal_chf')) || 0.00
};
let monthlySpent = parseFloat(localStorage.getItem('vchf_spent')) || 0.00;
let selected = [];
let superNum = null;
let currentCurrency = 'VCHF';
let isProcessing = false;
let myTickets = JSON.parse(localStorage.getItem('vchf_tickets')) || [];

// --- 2. Инициализация и Сетка ---
function init() {
    refreshGrid();
    renderSuperGrid();
    updateWalletUI();
    tg.expand();
}

function refreshGrid() {
    const grid = document.getElementById('main-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= 42; i++) {
        const c = document.createElement('div');
        c.className = 'cell' + (selected.includes(i) ? ' selected' : '');
        c.innerText = i;
        c.onclick = () => {
            if (isProcessing) return;
            if (selected.includes(i)) {
                selected = selected.filter(n => n !== i);
            } else if (selected.length < 6) {
                selected.push(i);
            }
            refreshGrid();
        };
        grid.appendChild(c);
    }
}

function renderSuperGrid() {
    const sgrid = document.getElementById('s-grid');
    sgrid.innerHTML = '';
    for (let i = 1; i <= 6; i++) {
        const sc = document.createElement('div');
        sc.className = 'cell' + (superNum === i ? ' selected' : '');
        sc.style.width = '45px';
        sc.innerText = i;
        sc.onclick = () => {
            if (isProcessing) return;
            superNum = i;
            renderSuperGrid();
        };
        sgrid.appendChild(sc);
    }
}

// --- 3. Финансовая Логика и Лимиты ---
function updateWalletUI() {
    document.getElementById('vchf-val').innerText = userBalance.VCHF.toFixed(2);
    document.getElementById('chf-val').innerText = userBalance.CHF.toFixed(2);
    document.getElementById('display-total').innerText = `${realPrice.toFixed(2)} ${currentCurrency}`;
    
    localStorage.setItem('vchf_bal_vchf', userBalance.VCHF);
    localStorage.setItem('vchf_bal_chf', userBalance.CHF);
}

function switchCurrency(type) {
    currentCurrency = type;
    document.querySelectorAll('.bal-card').forEach(c => c.classList.remove('active-wallet'));
    document.getElementById('card-' + type.toLowerCase()).classList.add('active-wallet');
    updateWalletUI();
}

// --- 4. ПРОТОКОЛ "ЦИФРОВОЙ КУРЬЕР" (ЗАГЛУШКА) ---
async function runEngine() {
    if (isProcessing) return;
    
    // Валидация
    if (selected.length !== 6 || !superNum) {
        tg.showAlert("Wähle 6 + 1! (Выберите все числа)");
        return;
    }

    // Проверка лимита 50 CHF (Закон BGS)
    if (monthlySpent + realPrice > 50.00) {
        tg.showAlert("LIMIT EXCEEDED! (Лимит 50 CHF в месяц исчерпан)");
        return;
    }

    // Проверка баланса
    if (userBalance[currentCurrency] < realPrice) {
        tg.showAlert("НЕДОСТАТОЧНО СРЕДСТВ / INSOLVENCY");
        return;
    }

    // Проверка Identity Bridge
    if (!localStorage.getItem('vchf_identity_done')) {
        showSoulManifest();
        return;
    }

    executePurchase();
}

function executePurchase() {
    isProcessing = true;
    const btn = document.getElementById('main-btn');
    btn.innerText = "SHADOW WORKER ACTIVE...";
    btn.style.opacity = "0.5";
    tg.HapticFeedback.impactOccurred('medium');

    // Имитация "Курьерской доставки" (Заглушка покупки билета)
    setTimeout(() => {
        userBalance[currentCurrency] -= realPrice;
        monthlySpent += realPrice;
        localStorage.setItem('vchf_spent', monthlySpent);

        // Генерация виртуального "Реального билета"
        const ticketId = "SL-" + Math.random().toString(36).substr(2, 9).toUpperCase();
        const newTicket = {
            id: ticketId,
            nums: [...selected],
            super: superNum,
            date: new Date().toLocaleString(),
            status: "REGISTERED (SHADOW)"
        };

        myTickets.push(newTicket);
        localStorage.setItem('vchf_tickets', JSON.stringify(myTickets));

        // Сброс и Уведомление
        selected = [];
        superNum = null;
        isProcessing = false;
        btn.innerText = "TICKET BESTÄTIGEN";
        btn.style.opacity = "1";
        
        updateWalletUI();
        refreshGrid();
        renderSuperGrid();
        
        tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert(`TICKET ERFOLGREICH! (Куплено)\nID: ${ticketId}\nДоставлено "Цифровым Курьером"`);
    }, 2000);
}

// --- 5. Доп. функции управления ---
function showPage(pId, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + pId).classList.add('active');
    el.classList.add('active');
    if (pId === 'tickets') renderTicketsList();
}

function renderTicketsList() {
    const list = document.getElementById('active-list');
    list.innerHTML = myTickets.map(t => `
        <div style="background:#111; border:1px solid #333; margin:10px; padding:15px; border-radius:12px; text-align:left;">
            <div style="color:var(--main-color); font-size:10px;">${t.id}</div>
            <div style="font-weight:bold; margin:5px 0;">${t.nums.join(' ')} | ${t.super}</div>
            <div style="font-size:10px; color:#666;">${t.date}</div>
        </div>
    `).reverse().join('');
}

window.onload = init;
/* Spark Memory: Logic Window 3
   - Анимация: Rainbow Wave (Радужный подбор)
   - Безопасность: Identity Bridge & Soul Verification
   - Визуализация: Статистическая Heatmap 2.0 */

// --- 1. RAINBOW WAVE: Интеллектуальный рандом ---
function randomFill() {
    if (isProcessing) return;
    
    // Сброс текущего выбора
    selected = [];
    superNum = null;
    refreshGrid();
    renderSuperGrid();

    let count = 0;
    const interval = setInterval(() => {
        // Эффект "бегающих огней"
        const cells = document.querySelectorAll('#main-grid .cell');
        cells.forEach(c => c.style.borderColor = 'rgba(212,175,55,0.1)');
        
        let tempRnd = Math.floor(Math.random() * 42) + 1;
        let targetCell = cells[tempRnd - 1];
        if (targetCell) targetCell.style.borderColor = 'var(--neon-blue)';

        count++;
        if (count > 20) {
            clearInterval(interval);
            finalizeRandom();
        }
    }, 50).then; // Визуальный сахар

    async function finalizeRandom() {
        // Выбираем 6 уникальных чисел
        while(selected.length < 6) {
            let r = Math.floor(Math.random() * 42) + 1;
            if(!selected.includes(r)) selected.push(r);
        }
        // Выбираем Superzahl
        superNum = Math.floor(Math.random() * 6) + 1;
        
        // Магическая анимация проявления
        refreshGrid();
        renderSuperGrid();
        tg.HapticFeedback.impactOccurred('rigid');
    }
}

// --- 2. IDENTITY BRIDGE: Проверка Души ---
function showSoulManifest() {
    const overlay = document.getElementById('soul-overlay');
    const content = document.getElementById('soul-content');
    overlay.style.display = 'flex';

    content.innerHTML = `
        <p style="color:var(--main-color); font-weight:bold;">MANIFEST MONOLITH V.2.0</p>
        <p>1. Вы подтверждаете роль "Цифрового Курьера" для проекта Лотто.</p>
        <p>2. Месячный лимит на операции: <span style="color:#fff;">50.00 CHF</span>.</p>
        <p>3. Комиссия сервиса: 1% на инфраструктуру + 1% движок.</p>
        <p>4. Налог 35% удерживается автоматически при выигрыше > 1.2 млн.</p>
        <p>5. Ваше кодовое слово является ключом к выводу средств. Потеря ключа = потеря доступа к VCHF.</p>
        <hr style="border:0.5px solid #333;">
        <p style="font-size:10px; color:#666;">Прокрутите вниз, чтобы подтвердить...</p>
    `;
}

function confirmIdentity() {
    const pass = document.getElementById('soul-pass').value;
    const code = document.getElementById('soul-code').value;

    if (pass.length < 4 || code.length < 4) {
        tg.showAlert("Пароль и Кодовое слово должны быть длиннее 4 символов!");
        return;
    }

    // Хешируем и сохраняем (имитация безопасности)
    localStorage.setItem('vchf_identity_done', 'true');
    localStorage.setItem('vchf_p_hash', btoa(pass));
    localStorage.setItem('vchf_c_hash', btoa(code));

    document.getElementById('soul-overlay').style.display = 'none';
    tg.showAlert("IDENTITY VERIFIED. РИТУАЛ ЗАВЕРШЕН.");
    
    // После верификации сразу запускаем покупку, если числа выбраны
    if (selected.length === 6 && superNum) {
        executePurchase();
    }
}

// --- 3. HEATMAP: Личная Статистика ---
function renderHeatmap() {
    const grid = document.getElementById('personal-heatmap');
    grid.innerHTML = '';
    
    // Собираем частоту чисел из купленных билетов
    const stats = {};
    myTickets.forEach(t => {
        t.nums.forEach(n => stats[n] = (stats[n] || 0) + 1);
    });

    for (let i = 1; i <= 42; i++) {
        const c = document.createElement('div');
        c.className = 'cell';
        c.innerText = i;
        
        const freq = stats[i] || 0;
        if (freq > 0) {
            // Золотое свечение пропорционально частоте
            let alpha = Math.min(freq * 0.2, 0.9);
            c.style.background = `rgba(212, 175, 55, ${alpha})`;
            c.style.boxShadow = `0 0 ${freq * 5}px var(--main-color)`;
            c.style.color = '#000';
            c.style.borderColor = '#fff';
        } else {
            c.style.opacity = '0.3';
        }
        grid.appendChild(c);
    }
}

// Привязываем обновление статистики к переходу на вкладку
const originalShowPage = showPage;
showPage = function(pId, el) {
    originalShowPage(pId, el);
    if (pId === 'stats') renderHeatmap();
};

// --- 4. Визуальные эффекты Интро (Манифест) ---
setTimeout(() => {
    const logo = document.getElementById('mainLogoIntro');
    if(logo) logo.style.opacity = '1';
    
    setTimeout(() => {
        document.getElementById('ui-layer').style.opacity = '0';
        document.getElementById('app-content').style.display = 'block';
        setTimeout(() => {
            document.getElementById('app-content').style.opacity = '1';
            document.getElementById('ui-layer').style.display = 'none';
        }, 500);
    }, 2500);
}, 500);
/* Spark Memory: Final Window 4
   - Draw Check: Симуляция тиража Swiss Lotto
   - Tax Logic: Авто-удержание 35% при выигрыше > 1.2M
   - VIP Protocol: Переход на персональное обслуживание
   - Integrity: Манифест Монолита завершен. */

// --- 1. СИМУЛЯЦИЯ ТИРАЖА И ПРОВЕРКА ВЫИГРЫША ---
function simulateDraw(ticketId) {
    const ticket = myTickets.find(t => t.id === ticketId);
    if (!ticket || ticket.status.includes("CHECKED")) return;

    tg.showConfirm("Выполнить проверку билета через Центр Обработки?", (ok) => {
        if (!ok) return;

        // Генерация "Выигрышной комбинации" (Имитация сервера Swisslos)
        const winningNums = [];
        while(winningNums.length < 6) {
            let r = Math.floor(Math.random() * 42) + 1;
            if(!winningNums.includes(r)) winningNums.push(r);
        }
        const winningSuper = Math.floor(Math.random() * 6) + 1;

        // Считаем совпадения
        const matches = ticket.nums.filter(n => winningNums.includes(n));
        const isSuperMatch = ticket.super === winningSuper;

        // Логика наград (Масштабируемая модель)
        let winAmount = 0;
        if (matches.length === 3) winAmount = 10.00;
        if (matches.length === 3 && isSuperMatch) winAmount = 25.00;
        if (matches.length === 4) winAmount = 100.00;
        if (matches.length === 5) winAmount = 5000.00;
        if (matches.length === 6 && isSuperMatch) winAmount = 25000000.00; // ДЖЕКПОТ!

        processPrize(ticket, winAmount, winningNums, winningSuper);
    });
}

// --- 2. НАЛОГОВЫЙ ФИЛЬТР И VIP-ПРОТОКОЛ ---
function processPrize(ticket, amount, winningNums, winningSuper) {
    ticket.status = "CHECKED";
    let finalPay = amount;
    let taxNote = "";

    if (amount > 1200000) {
        // Протокол Агента: Налоговый фильтр 35% (Verauslagung)
        const tax = amount * 0.35;
        finalPay = amount - tax;
        taxNote = `\n(Налог 35% удержан: ${tax.toFixed(2)} CHF)`;
        
        tg.showAlert(`🔥🔥 VIP ВЫИГРЫШ! 🔥🔥\nСумма: ${amount.toFixed(2)} CHF${taxNote}\n\nС вами свяжется персональный Агент Wanderer для оформления перевода.`);
    } else if (amount > 0) {
        // Зачисление на VCHF баланс (Агентская комиссия 1%+1% уже внутри курса или сверху)
        userBalance.VCHF += finalPay;
        updateWalletUI();
        tg.showAlert(`ПОЗДРАВЛЯЕМ!\nВыигрыш: ${finalPay.toFixed(2)} VCHF\nСовпадения: ${winningNums.join(', ')}`);
    } else {
        tg.showAlert(`К сожалению, билет без выигрыша.\nВыпали: ${winningNums.join(', ')} | S: ${winningSuper}`);
    }

    localStorage.setItem('vchf_tickets', JSON.stringify(myTickets));
    renderTicketsList();
}

// --- 3. ПОПОЛНЕНИЕ (БАНКОВСКАЯ ЗАГЛУШКА) ---
function openBankDeposit() {
    tg.showConfirm("Сформировать Swiss QR-bill для пополнения на 50.00 CHF?", (ok) => {
        if(ok) {
            tg.showProgressTree ? tg.showProgressTree(true) : null;
            setTimeout(() => {
                userBalance.CHF += 50.00;
                updateWalletUI();
                tg.showAlert("ОПЛАТА ПОДТВЕРЖДЕНА!\n50.00 CHF зачислены на ваш баланс.");
                tg.HapticFeedback.notificationOccurred('success');
            }, 2500);
        }
    });
}

// Доп. правка функции рендера для кликабельности (из Window 2)
function renderTicketsList() {
    const list = document.getElementById('active-list');
    if (myTickets.length === 0) {
        list.innerHTML = `<div style="padding:50px; color:#666;">Билетов пока нет</div>`;
        return;
    }
    list.innerHTML = myTickets.map(t => `
        <div onclick="simulateDraw('${t.id}')" style="background:#111; border:1px solid ${t.status === 'CHECKED' ? '#222' : 'var(--main-color)'}; margin:10px; padding:15px; border-radius:12px; text-align:left; position:relative; cursor:pointer;">
            <div style="color:var(--main-color); font-size:10px;">${t.id}</div>
            <div style="font-weight:bold; margin:5px 0; letter-spacing:2px;">${t.nums.join('  ')} | <span style="color:var(--main-color)">${t.super}</span></div>
            <div style="font-size:10px; color:#666;">${t.date}</div>
            <div style="position:absolute; right:15px; top:15px; font-size:8px; background:#222; padding:3px 6px; border-radius:4px;">${t.status}</div>
        </div>
    `).reverse().join('');
}
