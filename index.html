<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERO CHAOS | V1.2</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --panel-bg: #0d0d0d;
            --danger: #ff3e3e;
            --font: 'Courier New', monospace;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: var(--font);
            margin: 0; padding: 10px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        #sync-error {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.95); z-index: 9999;
            text-align: center; padding-top: 20%; font-size: 1.5em;
        }

        .header {
            border: 1px solid var(--neon-green);
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
            font-size: 0.8em;
        }

        .clock-box { font-size: 1.4em; font-weight: bold; }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--neon-green);
            padding: 12px; margin-bottom: 10px;
        }

        .asset-card {
            border-bottom: 1px solid #222;
            padding: 15px 0;
            display: flex; flex-direction: column; gap: 10px;
        }

        .asset-info { display: flex; justify-content: space-between; align-items: center; }
        .ticker { font-size: 1.1em; font-weight: bold; color: white; }
        .price { font-size: 1.1em; color: var(--neon-green); }

        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1; background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 15px; cursor: pointer;
            font-family: var(--font); font-weight: bold; text-transform: uppercase;
            transition: 0.1s;
        }

        .btn:active { background: var(--neon-green); color: black; transform: scale(0.98); }
        .btn-sell { border-color: var(--danger); color: var(--danger); }
        .btn-sell:active { background: var(--danger); color: white; }

        .balance-bar {
            background: #1a1a1a; padding: 15px; border: 1px solid var(--neon-green);
            margin-top: auto; display: flex; justify-content: space-between; align-items: center;
        }

        .advisor-area {
            background: #000a00; border-left: 3px solid var(--neon-green);
            padding: 10px; height: 100px; overflow-y: auto; font-size: 0.8em; opacity: 0.8;
        }

        .haloPulse { animation: halo 2s infinite; }
        @keyframes halo { 
            0%, 100% { box-shadow: 0 0 5px rgba(0,255,65,0.2); }
            50% { box-shadow: 0 0 15px rgba(0,255,65,0.4); }
        }
    </style>
</head>
<body>

<div id="sync-error">SYNC ERROR. DATA IS OUTDATED</div>

<div class="header">
    <div>
        <div id="live-clock" class="clock-box">00:00:00</div>
        <div style="opacity: 0.6;">GERMANY HUB | V1.2</div>
    </div>
    <div style="text-align: right;">
        <div style="font-size: 0.6em; opacity: 0.5;">МАНИФЕСТ МОНОЛИТА</div>
        <div id="sync-status" style="color: var(--neon-green);">● SECURE</div>
    </div>
</div>

<div class="panel haloPulse">
    <div id="asset-container">
        </div>
</div>

<div class="panel">
    <div id="advisor-log" class="advisor-area">
        Инициализация... Капитан, система готова к мобильному управлению.
    </div>
</div>

<div class="balance-bar">
    <div style="font-size: 0.8em;">БАЛАНС:</div>
    <div id="total-balance" style="font-size: 1.3em; font-weight: bold; color: white;">1000.00 EUR</div>
</div>

<script>
    let state = {
        balance: 1000.00,
        commission: 1.00,
        spread: 0.001,
        portfolio: {
            'NESN': { name: 'Nestlé', qty: 0, price: 85.15 },
            'BTC': { name: 'Monster (BTC)', qty: 0, price: 60850.00 }
        }
    };

    function updateTime() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('de-CH', { hour12: false });
        if(window.lastSync && Math.abs(Date.now() - window.lastSync) > 2000) {
            document.getElementById('sync-error').style.display = 'block';
        }
        window.lastSync = Date.now();
    }

    function render() {
        const container = document.getElementById('asset-container');
        container.innerHTML = '';
        for (let ticker in state.portfolio) {
            const asset = state.portfolio[ticker];
            container.innerHTML += `
                <div class="asset-card">
                    <div class="asset-info">
                        <span class="ticker">${asset.name}</span>
                        <span class="price">${asset.price.toFixed(ticker==='BTC'?0:2)} EUR</span>
                    </div>
                    <div style="font-size: 0.7em; opacity: 0.6;">В портфеле: ${asset.qty.toFixed(ticker==='BTC'?4:2)}</div>
                    <div class="btn-group">
                        <button class="btn" onclick="executeTrade('${ticker}', 'buy')">BUY</button>
                        <button class="btn btn-sell" onclick="executeTrade('${ticker}', 'sell')">SELL</button>
                    </div>
                </div>
            `;
        }
        document.getElementById('total-balance').innerText = state.balance.toFixed(2) + " EUR";
    }

    function executeTrade(ticker, side) {
        const asset = state.portfolio[ticker];
        const log = document.getElementById('advisor-log');
        const amount = 100;

        if (side === 'buy') {
            if (state.balance < amount + state.commission) return;
            const buyPrice = asset.price * (1 + state.spread);
            asset.qty += (amount / buyPrice);
            state.balance -= (amount + state.commission);
            log.innerHTML = `> КУПЛЕНО ${ticker} на 100€.<br>` + log.innerHTML;
        } else {
            if (asset.qty <= 0) return;
            state.balance += (amount - state.commission);
            asset.qty -= (amount / asset.price);
            log.innerHTML = `> ПРОДАНО ${ticker}. -1€ комиссия.<br>` + log.innerHTML;
        }
        render();
    }

    setInterval(updateTime, 1000);
    render();
    window.lastSync = Date.now();
</script>
</body>
</html>
