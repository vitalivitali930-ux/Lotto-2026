<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERO CHAOS | THE IMPERIAL VAULT</title>
    
    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="velvet-texture">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
            <feColorMatrix type="saturate" values="0.1"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.05"/>
            </feComponentTransfer>
            <feBlend in="SourceGraphic" mode="multiply"/>
        </filter>
        <filter id="gold-emboss">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
            <feSpecularLighting in="blur" surfaceScale="5" specularConstant="0.8" specularExponent="20" lighting-color="#ffd700" result="spec">
                <fePointLight x="-5000" y="-10000" z="20000"/>
            </feSpecularLighting>
            <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
        </filter>
    </svg>

    <style>
        :root {
            --cherry-brilliant: #630202;
            --cherry-mid: #3d0101;
            --cherry-dark: #0a0000;
            --gold-leaf: #d4af37;
            --gold-bright: #ffef8a;
            --neon-pulse: #00ff41;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; overflow: hidden; 
            font-family: 'Cinzel', serif; /* Императорский шрифт */
        }

        /* --- ГЛАВНЫЙ КОНТЕЙНЕР ТРЕЗОРА --- */
        #vault-scene {
            position: relative; width: 100vw; height: 100vh;
            display: flex; perspective: 1000px;
            transition: transform 2s cubic-bezier(0.86, 0, 0.07, 1);
        }

        /* --- ВИШНЕВЫЕ СТВОРКИ (БАРХАТ) --- */
        .gate {
            width: 50%; height: 100%; position: relative;
            background: radial-gradient(circle at center, var(--cherry-mid) 0%, var(--cherry-dark) 100%);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 5; transition: 2.2s cubic-bezier(0.86, 0, 0.07, 1);
            filter: url(#velvet-texture); /* ПРИМЕНЕНИЕ БАРХАТНОЙ ТЕКСТУРЫ */
        }

        .gate-left { 
            border-right: 3px solid var(--gold-leaf); 
            background-image: linear-gradient(90deg, transparent 95%, rgba(212, 175, 55, 0.3) 100%);
        }
        .gate-right { 
            border-left: 3px solid var(--gold-leaf); 
            background-image: linear-gradient(-90deg, transparent 95%, rgba(212, 175, 55, 0.3) 100%);
        }

        /* Эффект "Золотого напыления" на краях */
        .gate::after {
            content: ""; position: absolute; top: 0; width: 1px; height: 100%;
            background: var(--gold-bright); box-shadow: 0 0 15px var(--gold-leaf);
        }
        .gate-left::after { right: -2px; }
        .gate-right::after { left: -2px; }

        /* --- ОСВЕЩЕНИЕ (VIGNETTE) --- */
        .vignette {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 20;
        }

        /* --- ШТУРВАЛ (THE GOLDEN WHEEL) --- */
        .master-hub {
            position: absolute; left: 50%; top: 40%; transform: translate(-50%, -50%);
            width: 450px; height: 450px; z-index: 30;
            display: flex; align-items: center; justify-content: center;
        }
        /* --- ЦЕНТРАЛЬНОЕ ЯДРО (SKULL CORE) --- */
        .skull-disk {
            position: relative; width: 220px; height: 220px;
            background: radial-gradient(circle, #2a2a2a 0%, #050505 100%);
            border-radius: 50%; border: 6px double var(--gold-leaf);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 
                0 0 30px rgba(0,0,0,1), 
                inset 0 0 40px rgba(212, 175, 55, 0.2),
                0 0 15px var(--gold-glow);
            z-index: 100; cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: url(#gold-emboss);
        }

        .skull-disk:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
        }

        .skull-icon {
            font-size: 110px; color: var(--gold-leaf);
            text-shadow: 3px 3px 5px #000, -1px -1px 2px var(--gold-bright);
            user-select: none; pointer-events: none;
        }

        /* --- ОРБИТАЛЬНЫЕ МЕХАНИЗМЫ (THE WHEEL MECHANICS) --- */
        .orbit-system {
            position: absolute; width: 440px; height: 440px;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.05);
            animation: slowRotate 180s linear infinite;
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* СИЛОВЫЕ ЛИНИИ (СПИЦЫ ШТУРВАЛА) */
        .spoke {
            position: absolute; top: 50%; left: 50%;
            width: 200px; height: 2px;
            background: linear-gradient(90deg, var(--gold-leaf) 0%, transparent 100%);
            transform-origin: left center;
            opacity: 0.3; pointer-events: none;
        }

        /* ВАЛЮТНЫЕ КЛЮЧИ (THE CURRENCY SEALS) */
        .seal {
            position: absolute; width: 70px; height: 70px;
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
            border: 2px solid var(--gold-leaf); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold-leaf); font-size: 1.8em; font-weight: 900;
            cursor: pointer; transition: 0.4s;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.8), inset 2px 2px 5px rgba(255,255,255,0.1);
            filter: url(#gold-emboss);
            z-index: 110;
        }

        .seal:hover {
            color: var(--neon-pulse); border-color: var(--neon-pulse);
            box-shadow: 0 0 30px var(--neon-pulse);
            transform: scale(1.2) rotate(-20deg);
        }

        /* Математическое распределение печатей по штурвалу */
        .s-usd { transform: rotate(0deg) translate(220px) rotate(0deg); }
        .s-eur { transform: rotate(60deg) translate(220px) rotate(-60deg); }
        .s-chf { transform: rotate(120deg) translate(220px) rotate(-120deg); }
        .s-gbp { transform: rotate(180deg) translate(220px) rotate(-180deg); }
        .s-jpy { transform: rotate(240deg) translate(220px) rotate(-240deg); }
        .s-btc { transform: rotate(300deg) translate(220px) rotate(-300deg); }

        /* --- ИМПЕРАТОРСКИЙ ВВОД (AUTH SECTOR) --- */
        .auth-zone {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            width: 320px; z-index: 150; text-align: center;
        }

        .auth-field {
            width: 100%; background: rgba(0,0,0,0.85);
            border: 1px solid var(--gold-leaf);
            padding: 15px; margin: 10px 0;
            color: var(--gold-leaf); text-align: center;
            font-family: 'Courier New', monospace; letter-spacing: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            outline: none; transition: 0.5s;
            border-radius: 0; /* Строгая геометрия */
        }

        .auth-field:focus {
            border-color: var(--neon-pulse);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            background: #050505;
        }
        /* --- ЭФФЕКТЫ ВСКРЫТИЯ (THE RUPTURE) --- */
        .vault-opened .gate-left {
            transform: translateX(-100%) scaleX(0.8);
            filter: brightness(0.2);
            transition: 2.5s cubic-bezier(0.95, 0.05, 0.795, 0.035);
        }

        .vault-opened .gate-right {
            transform: translateX(100%) scaleX(0.8);
            filter: brightness(0.2);
            transition: 2.5s cubic-bezier(0.95, 0.05, 0.795, 0.035);
        }

        .vault-opened .master-hub, 
        .vault-opened .auth-zone, 
        .vault-opened .top-brand {
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.5);
            filter: blur(20px);
            transition: 1.5s ease-in;
            pointer-events: none;
        }

        /* --- ТИТРЫ (TOP BRANDING) --- */
        .top-brand {
            position: absolute; top: 50px; width: 100%; text-align: center;
            z-index: 200; pointer-events: none;
        }
        .brand-text {
            font-size: 3.5em; letter-spacing: 25px; font-weight: 900;
            background: linear-gradient(to bottom, var(--gold-bright) 0%, var(--gold-leaf) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
            text-transform: uppercase;
        }

        .imperial-slogan {
            color: var(--gold-leaf); font-size: 0.8em; letter-spacing: 8px;
            margin-top: 10px; opacity: 0.6;
        }
    </style>
</head>
<body>

<div id="vault-scene">
    <div class="vignette"></div>

    <div class="top-brand">
        <div class="brand-text">Zero Chaos</div>
        <div class="imperial-slogan">Dein Weg zum Erfolg | Est. 2026</div>
    </div>

    <div id="g-left" class="gate gate-left"></div>

    <div id="g-right" class="gate gate-right"></div>

    <div class="master-hub">
        <div class="orbit-system">
            <div class="spoke" style="transform: rotate(0deg)"></div>
            <div class="spoke" style="transform: rotate(60deg)"></div>
            <div class="spoke" style="transform: rotate(120deg)"></div>
            <div class="spoke" style="transform: rotate(180deg)"></div>
            <div class="spoke" style="transform: rotate(240deg)"></div>
            <div class="spoke" style="transform: rotate(300deg)"></div>

            <div class="seal s-usd" onclick="inputSym('$')">$</div>
            <div class="seal s-eur" onclick="inputSym('€')">€</div>
            <div class="seal s-chf" onclick="inputSym('₣')">₣</div>
            <div class="seal s-gbp" onclick="inputSym('£')">£</div>
            <div class="seal s-jpy" onclick="inputSym('¥')">¥</div>
            <div class="seal s-btc" onclick="inputSym('₿')">₿</div>
        </div>

        <div class="skull-disk" onclick="engageLock()">
            <div class="skull-icon">☠</div>
        </div>
    </div>

    <div class="auth-zone">
        <input type="text" id="id-field" class="auth-field" placeholder="IDENTITY" autocomplete="off">
        <input type="password" id="key-field" class="auth-field" placeholder="ACCESS_KEY">
    </div>
</div>

<script>
    // Имитация звуков (визуальная пульсация вместо звука пока нет файлов)
    function inputSym(sym) {
        const keyField = document.getElementById('key-field');
        keyField.value += "*";
        
        // Эффект вспышки при нажатии
        const disk = document.querySelector('.skull-disk');
        disk.style.boxShadow = '0 0 80px var(--neon-pulse)';
        setTimeout(() => { disk.style.boxShadow = ''; }, 200);
    }

    function engageLock() {
        const uid = document.getElementById('id-field').value;
        if (!uid) {
            alert("ZUGRIFF VERWEIGERT: IDENTITÄT FEHLT");
            return;
        }

        // ЗАПУСК МЕХАНИЗМА РАЗРЫВА
        const scene = document.getElementById('vault-scene');
        scene.classList.add('vault-opened');

        // Переход в Терминал
        setTimeout(() => {
            window.location.href = 'terminal.html';
        }, 2600);
    }

    // Сохранение ID в локальной памяти (Манифест Монолита)
    document.getElementById('id-field').addEventListener('input', (e) => {
        localStorage.setItem('zc_identity', e.target.value);
    });
</script>

</body>
</html>
