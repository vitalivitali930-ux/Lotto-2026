    <script>
        // МАНИФЕСТ МОНОЛИТА: Новый код = старый + введенная функция.
        const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            const o = AudioCtx.createOscillator(); const g = AudioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, AudioCtx.currentTime);
            g.gain.setValueAtTime(0.1, AudioCtx.currentTime); o.connect(g); g.connect(AudioCtx.destination);
            o.start(); o.stop(AudioCtx.currentTime + d);
        }

        let adminClicks = 0;
        function adminTrigger() {
            adminClicks++;
            if(adminClicks >= 3) {
                const p = prompt("ENTER ACCESS CODE:");
                if(p === "0000") {
                    document.getElementById('admin-panel').style.display = 'block';
                }
                adminClicks = 0;
            } else if (document.getElementById('admin-panel').style.display === 'block') {
                document.getElementById('admin-panel').style.display = 'none';
            }
        }

        // БАЗА ДАННЫХ (ЛОКАЛЬНАЯ ДЛЯ ТЕСТА)
        let products = JSON.parse(localStorage.getItem('monolith_db')) || [];
        if(products.length === 0) {
            for (let i = 1; i <= 15; i++) {
                products.push({ id: i, name: `SLOT_FREE_${i}`, price: 0, img: '' });
            }
        }

        let cart = JSON.parse(localStorage.getItem('monolith_cart')) || [];
        
        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            products.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img">${item.img ? `<img src="${item.img}">` : `UNIT_${item.id}`}</div>
                    <div style="font-size: 0.75rem;">${item.name}</div>
                    <div class="price">${item.price} VCHF</div>
                    <button onclick="event.stopPropagation(); addToCart(${item.id})">В СЕЙФ</button>
                `;
                grid.appendChild(card);
            });
        }

        // ГЕНЕРАЦИЯ И АКТИВАЦИЯ
        function generateKey() {
            const data = {
                n: document.getElementById('p-name').value,
                p: document.getElementById('p-price').value,
                i: document.getElementById('p-img').value
            };
            const key = btoa(encodeURIComponent(JSON.stringify(data)));
            document.getElementById('key-output').innerText = key;
            playSfx(600, 'sine', 0.2);
        }

        function activateSlot() {
            const id = document.getElementById('slot-id').value;
            const key = document.getElementById('slot-key').value;
            try {
                const data = JSON.parse(decodeURIComponent(atob(key)));
                const index = products.findIndex(p => p.id == id);
                if(index !== -1) {
                    products[index].name = data.n;
                    products[index].price = parseInt(data.p);
                    products[index].img = data.i;
                    localStorage.setItem('monolith_db', JSON.stringify(products));
                    renderGrid();
                    alert("СЛОТ АКТИВИРОВАН. СКАЧАЙТЕ ОБНОВЛЕННУЮ БАЗУ (В РАЗРАБОТКЕ)");
                }
            } catch(e) { alert("ОШИБКА КЛЮЧА"); }
        }

        function addToCart(id) {
            playSfx(880, 'sine', 0.1);
            const p = products.find(i => i.id === id);
            cart.push(p);
            localStorage.setItem('monolith_cart', JSON.stringify(cart));
            updateCartBar();
        }

        function updateCartBar() {
            document.getElementById('cart-info').innerText = cart.length > 0 ? `АКТИВОВ: ${cart.length}` : 'СЕЙФ ПУСТ';
        }

        function activateFullscreen() { /* Эталонная функция */ }

        renderGrid();
        updateCartBar();
    </script>

    <script>
        /* 🔱 DATABASE (100% АДАПТАЦИЯ) 🔱 */
        const DATABASE = {
            'INTELLECT': [
                { id: 1, name: "GITHUB_HUB", price: 200, url: "https://github.com", img: "https://github.githubassets.com/favicons/favicon.svg" },
                { id: 2, name: "OPEN_AI", price: 198, url: "https://openai.com", img: "https://openai.com/favicon.ico" },
                { id: 3, name: "WIKIPEDIA", price: 196, url: "https://wikipedia.org", img: "https://wikipedia.org/static/favicon/wikipedia.ico" }
            ],
            'CRAFT_FOOD': [],
            'WORKSHOP': [],
            'WAY': []
        };

        function fillGaps() {
            const cats = Object.keys(DATABASE);
            cats.forEach((cat, idx) => {
                const startId = (idx * 25) + 1;
                while(DATABASE[cat].length < 25) {
                    const cid = startId + DATABASE[cat].length;
                    DATABASE[cat].push({ id: cid, name: `VACANT_${cid}`, price: 200 - (cid*2), url: "#", img: "" });
                }
            });
        }

        function filterCat(catName, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            
            DATABASE[catName].forEach(item => {
                const card = document.createElement('a');
                card.href = item.url;
                card.target = "_blank";
                card.className = `card ${item.img ? 'active' : ''}`;
                card.style.setProperty('--ox', (Math.random() * 100) + '%');
                card.style.setProperty('--oy', (Math.random() * 100) + '%');
                
                card.innerHTML = `
                    <div class="slot-num">№${item.id}</div>
                    <div class="card-img">
                        ${item.img ? `<img src="${item.img}">` : `<span style="opacity:0.1">VACANT</span>`}
                    </div>
                    <div style="letter-spacing: 2px; font-size: 0.85rem; text-transform: uppercase;">${item.name}</div>
                    <div class="price">${item.price > 0 ? item.price : 0} VCHF</div>
                `;
                grid.appendChild(card);
            });
        }

        fillGaps();
        filterCat('INTELLECT', document.querySelector('.cat-btn'));
