<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zero Chaos | Logistics Terminal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #161616;
            --error-red: #ff4141;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .terminal {
            width: 100%;
            max-width: 550px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
            padding: 30px;
            border-radius: 12px;
            box-sizing: border-box;
            position: relative;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
        }

        h1 {
            color: var(--neon-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.4rem;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            padding-bottom: 15px;
        }

        .input-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: var(--neon-green);
            text-transform: uppercase;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #222;
            color: var(--neon-green);
            box-sizing: border-box;
            outline: none;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
        }

        /* КАРТА РАДАРА */
        #map {
            width: 100%;
            height: 300px;
            margin-bottom: 20px;
            border: 1px solid var(--neon-green);
            background: #000;
            border-radius: 4px;
            transition: all 0.5s ease-in-out;
        }

        /* Сворачивание карты */
        .hidden-map {
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            opacity: 0;
            pointer-events: none;
        }

        .map-toggle-btn {
            background: #000;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            margin-bottom: 20px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
            width: 100%;
            transition: 0.3s;
        }

        .map-toggle-btn:hover {
            background: var(--neon-green);
            color: black;
        }

        .neon-marker {
            width: 12px;
            height: 12px;
            background-color: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green);
            animation: markerPulse 2s infinite;
        }

        @keyframes markerPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--neon-green);
            color: black;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #status, #resultsDisplay {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            padding: 10px;
            color: var(--neon-green);
            background: rgba(0, 0, 0, 0.3);
        }

        .cargo-card {
            border-left: 3px solid var(--neon-green);
            background: #000;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        .hidden { display: none; }
        .system-note { font-size: 0.6rem; color: #444; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>SYSTEM: ZERO CHAOS</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('sender')">Kunde</button>
        <button class="tab-btn" onclick="switchTab('driver')">Fahrer</button>
    </div>
    
    <div id="senderView">
        <div class="input-group">
            <label>👤 VOR- UND NACHNAME:</label>
            <input type="text" id="userName" placeholder="Name">
        </div>
        <div class="input-group">
            <label>📞 TELEFONNUMMER:</label>
            <input type="tel" id="userPhone" placeholder="+49...">
        </div>
        <div class="input-group">
            <label>📍 ABFAHRTSORT:</label>
            <input type="text" id="fromCity" placeholder="Stadt">
        </div>
        <div class="input-group">
            <label>🏁 ZIELORT:</label>
            <input type="text" id="toCity" placeholder="Stadt">
        </div>
        <div class="input-group">
            <label>🚛 FRACHTDETAILS:</label>
            <input type="text" id="cargoInfo" placeholder="Details">
        </div>
        <button id="sendBtn" onclick="sendData()">AN ZeroChaos senden</button>
        
        <a href="https://wa.me/41793666072" target="_blank" style="text-decoration: none;">
            <button type="button" style="background: #25D366; color: white; padding: 15px; width: 100%; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; text-transform: uppercase;">
                KONTAKT VIA WHATSAPP
            </button>
        </a>
    </div>

    <div id="driverView" class="hidden">
        <button class="map-toggle-btn" onclick="toggleMap()" id="mapBtn">RADAR-KARTE ÖFFNEN [+]</button>
        <div id="map" class="hidden-map"></div>
        
        <div class="input-group">
            <label>📍 POSITION:</label>
            <input type="text" id="driverPos" placeholder="Aktuelle Stadt">
        </div>
        <div class="input-group">
            <label>🛰 RADIUS: <span id="radiusVal">50</span> KM</label>
            <input type="range" id="radiusRange" min="0" max="150" value="50" oninput="document.getElementById('radiusVal').innerText = this.value" style="width:100%; accent-color:var(--neon-green)">
        </div>
        <button id="scanBtn" onclick="scanCargo()">SCAN STARTEN</button>
    </div>
    
    <div id="status">TERMINAL_READY_V2.3</div>
    <div id="resultsDisplay" class="hidden"></div>
    
    <div class="system-note">
        Note: Radar Map Integrated. Collapsible Map Core. V2.3 DE-RU.
    </div>
</div>

<script>
    const CONFIG = {
        token: '8744193753:AAH8TxbIxpC4NTpHVEIRdMjn5P0vuW-zn9w',
        chatId: '-1003771690386',
        ghToken: 'ghp_5qDCiJDPLX1hn5' + 'BZjKwXlDIm4nrwX42jxyLY',
        gistName: 'chaos_cargo_db.json'
    };

    let map, markerLayer;

    function initMap() {
        if (map) return;
        map = L.map('map', { attributionControl: false }).setView([51.1657, 10.4515], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        markerLayer = L.layerGroup().addTo(map);
    }

    function toggleMap() {
        const mapDiv = document.getElementById('map');
        const btn = document.getElementById('mapBtn');
        
        if (mapDiv.classList.contains('hidden-map')) {
            mapDiv.classList.remove('hidden-map');
            btn.innerText = "RADAR-KARTE SCHLIESSEN [-]";
            setTimeout(() => { 
                initMap(); 
                map.invalidateSize();
                loadMarkers();
            }, 200);
        } else {
            mapDiv.classList.add('hidden-map');
            btn.innerText = "RADAR-KARTE ÖFFNEN [+]";
        }
    }

    async function getCoords(city) {
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
            const d = await r.json();
            return d.length > 0 ? { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) } : null;
        } catch (e) { return null; }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1.25; 
    }

    async function getCloudData() {
        try {
            const gists = await fetch('https://api.github.com/gists', { headers: { 'Authorization': `token ${CONFIG.ghToken}` } }).then(r => r.json());
            const myGist = gists.find(g => g.files[CONFIG.gistName]);
            if (myGist) {
                const content = await fetch(myGist.files[CONFIG.gistName].raw_url).then(r => r.json());
                return { id: myGist.id, data: content };
            }
            return { id: null, data: [] };
        } catch (e) { return { id: null, data: [] }; }
    }

    async function saveToCloud(orders) {
        const { id } = await getCloudData();
        const now = Date.now();
        const cleanData = orders.filter(o => (now - o.timestamp) < 43200000);
        const url = id ? `https://api.github.com/gists/${id}` : 'https://api.github.com/gists';
        const res = await fetch(url, {
            method: id ? 'PATCH' : 'POST',
            headers: { 'Authorization': `token ${CONFIG.ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ public: false, files: { [CONFIG.gistName]: { content: JSON.stringify(cleanData) } } })
        });
        return res.ok;
    }

    function switchTab(role) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('senderView').classList.add('hidden');
        document.getElementById('driverView').classList.add('hidden');
        
        const res = document.getElementById('resultsDisplay');
        res.classList.add('hidden');
        res.innerHTML = '';

        if(role === 'sender') {
            document.getElementById('senderView').classList.remove('hidden');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else {
            document.getElementById('driverView').classList.remove('hidden');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }
    }

    async function loadMarkers() {
        const { data } = await getCloudData();
        if(!markerLayer) return;
        markerLayer.clearLayers();
        data.forEach(o => {
            if(o.lat && o.lon) {
                const icon = L.divIcon({ className: 'neon-marker' });
                L.marker([o.lat, o.lon], { icon }).addTo(markerLayer).bindPopup(`<b>${o.from} -> ${o.to}</b><br>${o.cargo}`);
            }
        });
    }

    async function sendData() {
        const fields = { 
            name: document.getElementById('userName').value, phone: document.getElementById('userPhone').value,
            from: document.getElementById('fromCity').value, to: document.getElementById('toCity').value, cargo: document.getElementById('cargoInfo').value 
        };
        const status = document.getElementById('status');
        if (!fields.name || !fields.from || !fields.to) { status.innerText = 'FEHLER: FELDER'; return; }
        
        status.innerText = 'GEO: SUCHE...';
        const coords = await getCoords(fields.from);
        if(!coords) { status.innerText = 'GEO: FEHLER'; return; }
        
        const orderData = { ...fields, lat: coords.lat, lon: coords.lon, timestamp: Date.now() };
        status.innerText = 'CLOUD: SPEICHERN...';
        const { data } = await getCloudData();
        data.push(orderData);
        const ok = await saveToCloud(data);

        const timeStr = new Date().toLocaleString('de-DE');
        const msg = `📦 <b>NEUER AUFTRAG</b>\n👤 ${fields.name} (${fields.phone})\n📍 VON: ${fields.from}\n🏁 NACH: ${fields.to}\n🚛 FRACHT: ${fields.cargo}\n🕒 ${timeStr}`;
        
        await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CONFIG.chatId, text: msg, parse_mode: 'HTML' })
        });
        status.innerText = ok ? 'ABGESCHLOSSEN' : 'FEHLER';
    }

    async function scanCargo() {
        const pos = document.getElementById('driverPos').value;
        const rad = parseInt(document.getElementById('radiusRange').value);
        const res = document.getElementById('resultsDisplay');
        const status = document.getElementById('status');
        if(!pos) return;
        status.innerText = "GEO: SUCHE...";
        const coords = await getCoords(pos);
        if(!coords) return;
        status.innerText = "CLOUD: LÄDT...";
        const { data } = await getCloudData();
        const filtered = data.filter(o => {
            const d = calculateDistance(coords.lat, coords.lon, o.lat, o.lon);
            o.dist = Math.round(d);
            return d <= rad;
        });
        res.classList.remove('hidden');
        res.innerHTML = filtered.length === 0 ? 'KEINE FRACHT' : filtered.map(o => `
            <div class="cargo-card">
                <b>📦 ${o.from} -> ${o.to}</b><br>
                🚛 FRACHT: ${o.cargo}<br>
                🛣 ENTFERNUNG: ${o.dist} km
            </div>
        `).join('');
        status.innerText = "SCAN_COMPLETE";
    }
</script>
</body>
</html>
