<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERO CHAOS | MONOLITH v2.2.1</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --panel-bg: #0d0d0d;
            --danger: #ff3e3e;
            --font: 'Courier New', monospace;
        }

        body {
            background-color: var(--dark-bg); color: var(--neon-green);
            font-family: var(--font); margin: 0; padding: 10px;
            box-sizing: border-box; display: flex; flex-direction: column; min-height: 100vh;
        }

        #sync-error {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.95); z-index: 9999;
            text-align: center; padding-top: 20%; font-size: 1.5em;
        }

        .header {
            border: 1px solid var(--neon-green); padding: 10px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        .clock-box { font-size: 1.2em; font-weight: bold; }
        .day-stat { font-size: 0.7em; text-align: right; }

        .panel { background: var(--panel-bg); border: 1px solid var(--neon-green); padding: 12px; margin-bottom: 10px; }

        .asset-card { border-bottom: 1px solid #222; padding: 12px 0; display: flex; flex-direction: column; gap: 8px; }
        .asset-info { display: flex; justify-content: space-between; align-items: center; }
        .ticker { font-size: 1em; font-weight: bold; color: white; }
        
        .trade-controls { display: flex; gap: 5px; align-items: center; margin-top: 5px; }
        .trade-input { 
            background: #000; border: 1px solid var(--neon-green); color: var(--neon-green); 
            padding: 10px; width: 60px; font-family: var(--font); outline: none; text-align: center;
        }

        .btn { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 10px; cursor: pointer; font-family: var(--font); font-weight: bold; font-size: 0.8em; transition: 0.2s; }
        .btn:active { background: var(--neon-green); color: black; }
        .btn-buy { flex-grow: 1; }
        .btn-sell { border-color: var(--danger); color: var(--danger); min-width: 80px; }

        .pos { color: #00ff41; } .neg { color: #ff3e3e; }

        .balance-bar { background: #1a1a1a; padding: 12px; border: 1px solid var(--neon-green); margin-top: auto; }
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }

        .advisor-area { background: #000a00; border-left: 3px solid var(--neon-green); padding: 8px; height: 60px; overflow-y: auto; font-size: 0.7em; }
        .reset-btn { font-size: 0.6em; color: #555; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="sync-error">SYNC ERROR. DATA IS OUTDATED</div>

<div class="header">
    <div>
        <div id="live-clock" class="clock-box">00:00:00</div>
        <div style="font-size: 0.6em; opacity: 0.6;">START: <span id="start-val">1000.00</span></div>
    </div>
    <div class="day-stat">
        <div>DAILY P&L:</div>
        <div id="daily-pl" style="font-weight: bold;">+0.00 EUR (0%)</div>
    </div>
</div>

<div class="panel" style="overflow-y: auto; flex-grow: 1;">
    <div id="asset-container"></div>
</div>

<div class="panel">
    <div id="advisor-log" class="advisor-area"> > Навигатор v2.2.1: Таймер синхронизации оптимизирован. </div>
</div>

<div class="balance-bar">
    <div class="total-row">
        <span style="font-size: 0.7em;">CASH:</span>
        <span id="cash-balance" style="font-weight: bold; color: white;">1000.00</span>
    </div>
    <div class="total-row" style="border-top: 1px solid #333; padding-top: 5px;">
        <span style="font-size: 0.7em;">TOTAL EQUITY:</span>
        <span id="total-equity" style="font-size: 1.1em; font-weight: bold; color: var(--neon-green);">1000.00</span>
    </div>
    <div style="text-align: center; margin-top: 5px;"><button class="reset-btn" onclick="wipeData()">[СБРОС СЕССИИ]</button></div>
</div>

<script>
    const INITIAL_STATE = {
        startBalance: 1000.00,
        balance: 1000.00,
        portfolio: {
            'BTC': { name: 'Monster (BTC)', qty: 0, price: 60850.00, invested: 0 },
            'RHM': { name: 'Rheinmetall', qty: 0, price: 542.40, invested: 0 },
            'SAP': { name: 'SAP SE', qty: 0, price: 184.20, invested: 0 },
            'ADS': { name: 'Adidas AG', qty: 0, price: 215.10, invested: 0 },
            'P911': { name: 'Porsche AG', qty: 0, price: 72.45, invested: 0 },
            'DTE': { name: 'D. Telekom', qty: 0, price: 28.14, invested: 0 }
        }
    };

    let state = JSON.parse(localStorage.getItem('monolith_v2_2')) || INITIAL_STATE;

    function save() { localStorage.setItem('monolith_v2_2', JSON.stringify(state)); }
    function wipeData() { if(confirm("Сбросить?")) { state = JSON.parse(JSON.stringify(INITIAL_STATE)); save(); render(); } }

    function updateTime() {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('de-CH', { hour12: false });
        // Увеличен допуск до 5 секунд (5000ms) для стабильности мобильных браузеров
        if(window.lastSync && Math.abs(Date.now() - window.lastSync) > 5000) {
            document.getElementById('sync-error').style.display = 'block';
        }
        window.lastSync = Date.now();
    }

    function render() {
        const container = document.getElementById('asset-container');
        container.innerHTML = '';
        let totalAssetVal = 0;

        for (let ticker in state.portfolio) {
            const asset = state.portfolio[ticker];
            let currentVal = asset.qty * asset.price;
            totalAssetVal += currentVal;
            let profitPct = asset.invested > 0 ? ((currentVal - asset.invested) / asset.invested) * 100 : 0;

            container.innerHTML += `
                <div class="asset-card">
                    <div class="asset-info">
                        <span class="ticker">${asset.name}</span>
                        <span class="price">${asset.price.toFixed(2)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:0.65em; opacity:0.8;">
                        <span>In: ${asset.invested.toFixed(2)}€ | Val: ${currentVal.toFixed(2)}€</span>
                        <span class="${profitPct>=0?'pos':'neg'}">${profitPct >= 0 ? '▲' : '▼'} ${profitPct.toFixed(2)}%</span>
                    </div>
                    <div class="trade-controls">
                        <input type="number" id="input-${ticker}" class="trade-input" placeholder="€" value="${state.balance > 101 ? 100 : Math.floor(state.balance - 1)}">
                        <button class="btn btn-buy" onclick="executeTrade('${ticker}', 'buy')">BUY</button>
                        <button class="btn btn-sell" onclick="executeTrade('${ticker}', 'sell')">SELL ALL</button>
                    </div>
                </div>`;
        }

        const totalEquity = state.balance + totalAssetVal;
        const dailyPL = totalEquity - state.startBalance;
        const dailyPLPct = (dailyPL / state.startBalance) * 100;

        document.getElementById('cash-balance').innerText = state.balance.toFixed(2);
        document.getElementById('total-equity').innerText = totalEquity.toFixed(2);
        document.getElementById('start-val').innerText = state.startBalance.toFixed(2);
        
        const plEl = document.getElementById('daily-pl');
        plEl.innerText = `${dailyPL >= 0 ? '+' : ''}${dailyPL.toFixed(2)} EUR (${dailyPLPct.toFixed(2)}%)`;
        plEl.className = `day-stat ${dailyPL >= 0 ? 'pos' : 'neg'}`;
    }

    function executeTrade(ticker, side) {
        const asset = state.portfolio[ticker];
        const log = document.getElementById('advisor-log');
        const input = document.getElementById(`input-${ticker}`);
        let amount = parseFloat(input.value);

        if (side === 'buy') {
            if (isNaN(amount) || amount <= 0 || state.balance < (amount + 1)) {
                log.innerHTML = `> [!] ОШИБКА: Мало кэша<br>` + log.innerHTML;
                return;
            }
            const sprPrice = asset.price * 1.001;
            asset.qty += (amount / sprPrice);
            asset.invested += amount;
            state.balance -= (amount + 1);
            log.innerHTML = `> BUY ${ticker}: ${amount}€ (Fee 1€)<br>` + log.innerHTML;
        } else {
            if (asset.qty <= 0) return;
            const sellPr = asset.price * 0.999;
            const cashIn = asset.qty * sellPr;
            state.balance += (cashIn - 1);
            log.innerHTML = `> SELL ${ticker}: +${cashIn.toFixed(2)}€ (Fee 1€)<br>` + log.innerHTML;
            asset.qty = 0; asset.invested = 0;
        }
        save(); render();
    }

    setInterval(updateTime, 1000);
    render();
    window.lastSync = Date.now();
</script>
</body>
</html>
