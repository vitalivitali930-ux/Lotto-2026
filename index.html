<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>VCHF 2.0 - Bi-Turbo Ultimate</title>
    <style>
        :root {
            --gold: #ffcf40;
            --space-dark: #121625; 
            --nebula-core: #222a44; 
            --spark-neon: #00fa9a;
            --trump-halo: #8a2be2; 
            --cherry-pulse: #4a0404; 
            --bg-card: #ffffff;
            --grid-color: rgba(255, 207, 64, 0.08); 
            --card-w: 55px;
            --card-h: 77px;
            --micro-scale: 0.25;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505; color: #e0e6ff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .arena-top {
            flex: 1; position: relative;
            background: radial-gradient(circle at 50% 40%, var(--nebula-core) 0%, var(--space-dark) 60%, #000 100%);
            animation: tableBreathe 10s infinite ease-in-out;
            overflow: hidden; z-index: 1;
        }

        /* ЛОГОТИП МОНОЛИТА */
        .monolith-logo {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; opacity: 0.15;
            pointer-events: none; z-index: 0;
            filter: grayscale(1) brightness(1.5);
        }

        @keyframes tableBreathe {
            0%, 100% { filter: brightness(0.8); }
            50% { filter: brightness(1.1); }
        }

        .trump-status { 
            position: fixed; top: 20px; right: 20px; 
            width: 70px; height: 70px; border: 2px solid var(--gold); 
            background: #000; display: flex; justify-content: center; align-items: center; 
            z-index: 5000; border-radius: 50%;
            box-shadow: 0 0 25px var(--gold);
        }

        #trump-icon { font-size: 44px; z-index: 5005; }

        .card-node {
            position: absolute; width: var(--card-w); height: var(--card-h);
            background-color: #1a1a1a; border: 1px solid rgba(255, 207, 64, 0.5);
            border-radius: 6px; z-index: 10;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .card-node.face-up { background-color: var(--bg-card); border: 1px solid #fff; }
        .card-node.hide { opacity: 0; pointer-events: none; }

        .control-bottom {
            height: 130px; position: relative;
            background: linear-gradient(to top, #000 10%, #0c0f18 100%);
            z-index: 4000; border-top: 1px solid rgba(255, 207, 64, 0.3);
            transition: 0.6s cubic-bezier(0.075, 0.82, 0.165, 1);
        }

        .control-bottom.expanded { height: 350px; }

        .suits-grid { display: flex; flex-direction: column; width: 100%; align-items: center; gap: 2px; margin-top: 15px; }
        .suit-row { display: flex; height: 22px; transition: 0.4s; }

        .slot { 
            width: var(--card-w); height: var(--card-h);
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 207, 64, 0.2); 
            position: relative; margin-left: -42px; border-radius: 4px; 
            transform: scale(var(--micro-scale)); transform-origin: center bottom;
        }

        .slot.filled { background: var(--bg-card); border: 1px solid #fff; z-index: 5; }

        .control-bottom.expanded .suit-row { height: 65px; }
        .control-bottom.expanded .slot { transform: scale(1.1) translateY(-15px); margin-left: -18px; }

        #status-msg {
            position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
            z-index: 9999; color: var(--gold); font-weight: bold;
            opacity: 0; transition: 0.6s; text-align: center;
        }
        #status-msg.active { opacity: 1; }

        .action-btns { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 4500; }
        button { padding: 14px 22px; background: #101420; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; }
        .particle { position: absolute; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div id='status-msg'>VCHF MONOLITH ACTIVE</div>
    <div class='trump-status'><div id='trump-icon'>?</div></div>

    <div class='arena-top' id='arena'>
        <img src="1771489965074(1).png" class="monolith-logo" alt="VCHF LOGO">
        
        <div class='spark-zone' style="padding:15px; position:relative; z-index:100;">
            <span style='font-size:10px; color:var(--spark-neon); letter-spacing:3px;'>SPARK AI CORE</span>
            <div id='spark-cards' style='margin-top:8px; display:flex; gap:4px;'></div>
        </div>
        <div id='chaos-deck'></div>
        <div id='battle-table'></div>
    </div>

    <div class='control-bottom' id='ctrl-panel'>
        <button id='btn-zoom' style="position:absolute; top:-25px; right:30px; width:50px; height:50px; border-radius:50%;" onclick='toggleHand()'>↕</button>
        <div class='suits-grid' id='main-hand' onclick="if(!isExpanded) toggleHand()">
            <div id='s-spades' class='suit-row'></div>
            <div id='s-clubs' class='suit-row'></div>
            <div id='s-diamonds' class='suit-row'></div>
            <div id='s-hearts' class='suit-row'></div>
        </div>
        <div class='action-btns'>
            <button id='btn-ready' onclick='ignite()'>АКТИВАЦИЯ ХАОСА</button>
            <button id='btn-bito' style='display:none' onclick='handleBito()'>БИТО / ЗАВЕРШИТЬ</button>
            <button id='btn-take' style='display:none' onclick='handleTake()'>ВЗЯТЬ КАРТЫ</button>
        </div>
    </div>
<script>
    let audioCtx = null;
    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'slide') {
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'bito') {
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
    }
    // --- ГЛОБАЛЬНЫЕ КОНСТАНТЫ ---
    const SUITS = ['♠', '♣', '♦', '♥'];
    const RANKS = ['6', '7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const COLORS = {'♠': '#1a1a1a', '♣': '#1a1a1a', '♦': '#e63946', '♥': '#e63946'};
    
    // --- СОСТОЯНИЕ МОНОЛИТА (vchf 2.0) ---
    let vchf = {
        deck: [],
        pHand: [],
        eHand: [],
        table: [],
        trump: '',
        phase: 'WAIT',
        turn: 'player',
        // Психика и Память Искры (Интеграция Нулевого Хаоса)
        memory: {
            outCards: new Set(),
            playerSeen: new Set(),
            dangerLevel: 0
        }
    };
    
    let isExpanded = false;

    function showMsg(text) {
        const msg = document.getElementById('status-msg');
        msg.textContent = text;
        msg.classList.add('active');
        setTimeout(() => msg.classList.remove('active'), 3000);
    }

    // --- ФАЗА ИНИЦИАЦИИ (IGNITE) ---
    function ignite() {
        document.getElementById('btn-ready').style.display = 'none';
        vchf.phase = 'SHUFFLING';
        
        let tempDeck = [];
        SUITS.forEach(s => {
            RANKS.forEach(r => {
                tempDeck.push({ s: s, r: r, v: RANKS.indexOf(r), c: COLORS[s], used: false });
            });
        });
        vchf.deck = tempDeck;
        renderChaosInitial();
        setTimeout(visualShuffle, 200);
    }

    function renderChaosInitial() {
        const container = document.getElementById('chaos-deck');
        container.innerHTML = '';
        vchf.deck.forEach((card, i) => {
            const node = document.createElement('div');
            node.className = 'card-node';
            node.id = `node-${i}`;
            // Позиционирование в центре стола для начала тасования
            node.style.left = '50%'; 
            node.style.top = '45%';
            node.style.transform = 'translate(-50%, -50%)';
            container.appendChild(node);
        });
    }

    function visualShuffle() {
        let startTime = Date.now();
        let duration = 2000;
        let ti = document.getElementById('trump-icon');

        let interval = setInterval(() => {
            let elapsed = Date.now() - startTime;
            vchf.deck.forEach((_, i) => {
                const node = document.getElementById(`node-${i}`);
                if (node) {
                    // Хаотичный разброс карт по арене
                    node.style.left = (Math.random() * 60 + 20) + '%';
                    node.style.top = (Math.random() * 50 + 20) + '%';
                    node.style.transform = `rotate(${Math.random() * 360}deg)`;
                }
            });
            // Мерцание мастей в индикаторе козыря
            let rs = SUITS[Math.floor(Math.random() * 4)];
            ti.textContent = rs; 
            ti.style.color = COLORS[rs];

            if (elapsed > duration) {
                clearInterval(interval);
                finalizeShuffle();
            }
        }, 100);
    }

    function finalizeShuffle() {
        // Физическое перемешивание массива
        vchf.deck.sort(() => Math.random() - 0.5);
        
        // Фиксация "Свечи" (Козыря)
        vchf.trump = SUITS[Math.floor(Math.random() * 4)];
        const ti = document.getElementById('trump-icon');
        ti.textContent = vchf.trump; 
        ti.style.color = COLORS[vchf.trump];
        
        vchf.phase = 'PICK';
        showMsg('ВЕКТОР ХАОСА ОПРЕДЕЛЕН');

        // Распределение карт по кругу для выбора (Эталонная анимация)
        vchf.deck.forEach((card, i) => {
            const node = document.getElementById(`node-${i}`);
            const angle = (i / 36) * Math.PI * 2;
            const radius = 140;
            node.style.left = `calc(50% + ${Math.cos(angle) * radius}px)`;
            node.style.top = `calc(45% + ${Math.sin(angle) * radius}px)`;
            node.style.transform = `translate(-50%, -50%) rotate(${angle * 57.3 + 90}deg)`;
            
            node.onclick = () => { 
                if (vchf.phase === 'PICK') pickCard(i, 'player'); 
            };
        });
    }
    // --- ПРОЦЕСС РАЗДАЧИ (100% ЭТАЛОН) ---
    function pickCard(idx, actor) {
        const card = vchf.deck[idx];
        if (!card || card.used) return;

        card.used = true;
        playSound('slide');
        const node = document.getElementById(`node-${idx}`);

        if (actor === 'player') {
            vchf.pHand.push(card);
            // Поиск целевого слота в твоей сетке мастей
            const slot = document.getElementById(`slot-${card.s}-${card.r}`);
            const rect = slot.getBoundingClientRect();
            const parent = document.getElementById('chaos-deck').getBoundingClientRect();

            // Анимация полета в слот
            node.style.zIndex = 1000;
            node.style.left = (rect.left - parent.left + 27) + 'px';
            node.style.top = (rect.top - parent.top + 38) + 'px';
            node.style.transform = 'translate(-50%, -50%) rotate(0deg) scale(0.3)';

            setTimeout(() => {
                node.classList.add('hide');
                fillSlot(card);
                // После твоего выбора Искра делает свой ход автоматически
                sparkAutoPick();
            }, 500);
        } else {
            vchf.eHand.push(card);
            // Анимация улета карт Искры "вверх" за пределы экрана
            node.style.top = '-200px';
            node.style.opacity = '0';
            node.style.transform = 'translate(-50%, -50%) scale(0.1)';
            setTimeout(() => {
                node.classList.add('hide');
                updateSparkUI();
                checkDeckEmpty();
            }, 500);
        }
    }

    function sparkAutoPick() {
        const available = vchf.deck.map((c, i) => !c.used ? i : null).filter(v => v !== null);
        if (available.length > 0) {
            // Искра выбирает случайную карту из оставшихся в круге
            const randomIndex = available[Math.floor(Math.random() * available.length)];
            pickCard(randomIndex, 'enemy');
        } else {
            checkDeckEmpty();
        }
    }

    function checkDeckEmpty() {
        const remaining = vchf.deck.filter(c => !c.used).length;
        if (remaining === 0 && vchf.phase === 'PICK') {
            vchf.phase = 'BATTLE';
            showMsg('ФАЗА БОЯ АКТИВИРОВАНА');
            renderBattleTable();
            // Определение первого хода (по минимальному козырю)
            determineFirstTurn();
        }
    }

    function determineFirstTurn() {
        let minP = 100, minE = 100;
        vchf.pHand.forEach(c => { if(c.s === vchf.trump && c.v < minP) minP = c.v; });
        vchf.eHand.forEach(c => { if(c.s === vchf.trump && c.v < minE) minE = c.v; });
        
        vchf.turn = (minP < minE) ? 'player' : 'enemy';
        if(vchf.turn === 'enemy') {
            showMsg('ИСКРА ХОДИТ ПЕРВОЙ');
            sparkThink();
        } else {
            showMsg('ТВОЙ ПЕРВЫЙ ХОД');
        }
    }

    function fillSlot(card) {
        const el = document.getElementById(`slot-${card.s}-${card.r}`);
        el.classList.add('filled');
        el.style.color = card.c;
        // Визуальное наполнение слота данными карты
        el.innerHTML = `
            <div style="position:absolute; top:4px; left:6px; font-size:12px; font-weight:900;">${card.r}</div>
            <div style="font-size:32px;">${card.s}</div>
        `;
        // Привязка логики клика по карте в слоте
        el.onclick = (e) => {
            e.stopPropagation();
            if (vchf.phase === 'BATTLE' && vchf.turn === 'player') tryPlayCard(card);
            else if (!isExpanded) toggleHand();
        };
    }

    function updateSparkUI() {
        const container = document.getElementById('spark-cards');
        container.innerHTML = '';
        // Отрисовка "индикаторов" карт в руке Искры
        vchf.eHand.forEach(() => {
            const dot = document.createElement('div');
            dot.style.cssText = `
                width:12px; height:18px; 
                background:var(--spark-neon); 
                border-radius:3px; 
                box-shadow:0 0 10px var(--spark-neon); 
                opacity:0.7;
            `;
            container.appendChild(dot);
        });
    }
    // --- ИНТЕЛЛЕКТУАЛЬНОЕ ЯДРО ИСКРЫ (SPARK AI - SMART EDITION) ---
    function sparkThink() {
        if (vchf.phase !== 'BATTLE') return;
        
        // Анализ опасности: сколько карт у игрока? (0 - безопасно, 1 - критично)
        vchf.memory.dangerLevel = 1 - (vchf.pHand.length / 18);
        
        const isDefending = (vchf.table.length % 2 !== 0);
        
        // Психологическая задержка "обдумывания" (имитация живого игрока)
        const delay = 800 + (Math.random() * 1200);
        
        setTimeout(() => {
            if (isDefending) {
                sparkDefendLogic();
            } else {
                sparkAttackLogic();
            }
        }, delay);
    }

    function sparkDefendLogic() {
        const target = vchf.table[vchf.table.length - 1].card;
        
        // Поиск кандидатов для защиты
        let candidates = vchf.eHand.filter(c => {
            return (c.s === target.s && c.v > target.v) || (c.s === vchf.trump && target.s !== vchf.trump);
        });

        if (candidates.length === 0) {
            sparkTakeAll();
            return;
        }

        // Сортировка: сначала самые слабые не-козыри, козыри в конце
        candidates.sort((a, b) => {
            const aT = a.s === vchf.trump;
            const bT = b.s === vchf.trump;
            if (aT && !bT) return 1;
            if (!aT && bT) return -1;
            return a.v - b.v;
        });

        const bestChoice = candidates[0];

        // ПСИХИКА: Если карта слишком дорогая (ТУЗ), а атак еще много - Искра может решить "взять"
        // Это предотвращает выманивание козырей мелкими картами в начале игры
        if (bestChoice.v > 6 && vchf.memory.dangerLevel < 0.4) {
             if (Math.random() > 0.6) { 
                 sparkTakeAll(); 
                 return; 
             }
        }

        executeSparkMove(bestChoice);
    }

    function sparkAttackLogic() {
        let attackChoices = [];
        if (vchf.table.length === 0) {
            // Начало атаки: выбираем самую слабую карту, приоритет - не козырь
            attackChoices = vchf.eHand.filter(c => c.s !== vchf.trump).sort((a,b) => a.v - b.v);
            if(attackChoices.length === 0) attackChoices = [...vchf.eHand].sort((a,b) => a.v - b.v);
        } else {
            // Подкидывание по рангу (если есть на столе)
            const tableRanks = vchf.table.map(m => m.card.r);
            attackChoices = vchf.eHand.filter(c => tableRanks.includes(c.r));
            
            // ПСИХИКА: Не подкидывать козыри, если ситуация не критическая
            attackChoices = attackChoices.filter(c => c.s !== vchf.trump || vchf.memory.dangerLevel > 0.8);
        }

        // Ограничение: не более 6 пар карт на столе
        if (attackChoices.length > 0 && vchf.table.length < 12) {
            executeSparkMove(attackChoices[0]);
        } else {
            handleBito();
        }
    }

    function executeSparkMove(card) {
        vchf.eHand = vchf.eHand.filter(c => c !== card);
        vchf.table.push({ card: card, actor: 'enemy' });
        playSound('slide');
        updateSparkUI();
        renderBattleTable();
        checkGameStatus();
        
        // Если Искра атаковала, теперь твоя очередь защищаться
        // Если защищалась - ждем твоего хода (подкидывания или бито)
    }

    function sparkTakeAll() {
        showMsg('SPARK ПРИНИМАЕТ УДАР');
        vchf.eHand = vchf.eHand.concat(vchf.table.map(m => m.card));
        vchf.table = [];
        setTimeout(() => { 
            updateSparkUI(); 
            renderBattleTable(); 
            vchf.turn = 'player'; 
            showMsg('ТВОЙ ХОД (ПЕРЕХОД)');
        }, 800);
    }
    // --- ОТРИСОВКА БОЕВОГО ПРОСТРАНСТВА ---
    function renderBattleTable() {
        const container = document.getElementById('battle-table');
        container.innerHTML = '';
        
        vchf.table.forEach((move, i) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card-node face-up';
            cardEl.style.color = move.card.c;
            
            const pairIndex = Math.floor(i / 2);
            const isDefense = (i % 2 !== 0);
            
            const col = pairIndex % 3;
            const row = Math.floor(pairIndex / 3);
            const offsetX = col * 90 + (isDefense ? 20 : 0);
            const offsetY = row * 100 + (isDefense ? 25 : 0);
            
            cardEl.style.left = `calc(50% - 130px + ${offsetX}px)`;
            cardEl.style.top = `calc(35% + ${offsetY}px)`;
            cardEl.style.zIndex = 100 + i;
            
            const randomRot = (Math.random() * 10 - 5) + (isDefense ? 15 : 0);
            cardEl.style.transform = `rotate(${randomRot}deg)`;
            
            cardEl.innerHTML = `
                <div style="position:absolute; top:6px; left:8px; font-size:14px; font-weight:900;">${move.card.r}</div>
                <div style="font-size:36px; text-align:center; margin-top:20px;">${move.card.s}</div>
            `;
            container.appendChild(cardEl);
        });

        // ПРАВИЛО КНОПОК: Показываем только в твой ход
        const isPTurn = (vchf.turn === 'player');
        const isDefending = (vchf.table.length % 2 !== 0);
        const hasCardsOnTable = vchf.table.length > 0;
        
        // Кнопка БИТО: если твой ход, ты атаковала, Искра отбилась (четно на столе)
        document.getElementById('btn-bito').style.display = (isPTurn && hasCardsOnTable && !isDefending) ? 'block' : 'none';
        // Кнопка ВЗЯТЬ: если твой ход и ты должна защищаться (нечетно на столе)
        document.getElementById('btn-take').style.display = (isPTurn && isDefending) ? 'block' : 'none';
    }

    // --- ЛОГИКА ТВОЕГО ХОДА (ИСПРАВЛЕНО) ---
    function tryPlayCard(card) {
        if (vchf.turn !== 'player') return;
        if (!validateMove(card)) { 
            showMsg('НЕВЕРНЫЙ ВЕКТОР'); 
            return; 
        }

        vchf.pHand = vchf.pHand.filter(c => c !== card);
        const slot = document.getElementById(`slot-${card.s}-${card.r}`);
        slot.classList.remove('filled');
        slot.innerHTML = '';
        
        vchf.table.push({ card: card, actor: 'player' });
        playSound('slide');
        renderBattleTable();

        // СИНХРОНИЗАЦИЯ:
        // Если после твоего хода на столе НЕЧЕТНО (ты атаковала или подкинула) -> Искра думает как защититься
        // Если после твоего хода на столе ЧЕТНО (ты защитилась) -> Искра думает, подкинуть ли еще
        setTimeout(() => {
            vchf.turn = 'enemy';
            sparkThink();
        }, 600);
        
        checkGameStatus();
    }

    function validateMove(card) {
        if (vchf.table.length === 0) return true;

        const isDefending = (vchf.table.length % 2 !== 0);
        
        if (isDefending) {
            const attack = vchf.table[vchf.table.length - 1].card;
            return (card.s === attack.s && card.v > attack.v) || 
                   (card.s === vchf.trump && attack.s !== vchf.trump);
        } else {
            const tableRanks = vchf.table.map(m => m.card.r);
            return tableRanks.includes(card.r) && vchf.table.length < 12;
        }
    }
    // --- ОБРАБОТКА ФИНАЛЬНЫХ ДЕЙСТВИЙ ХОДА ---

    function handleTake() {
        showMsg('ТЫ ЗАБИРАЕШЬ КАРТЫ');
        // Карты со стола переходят в руку игрока
        const takenCards = vchf.table.map(m => m.card);
        vchf.pHand = vchf.pHand.concat(takenCards);
        
        vchf.table = [];
        // Заполняем слоты заново для добавленных карт
        takenCards.forEach(c => fillSlot(c));
        
        renderBattleTable();
        
        // После "Взять" ход всегда переходит к Искре
        vchf.turn = 'enemy';
        setTimeout(sparkThink, 1000);
    }

    function handleBito() {
        if (vchf.table.length === 0 || vchf.table.length % 2 !== 0) return;
        
        playSound('bito'); 
        showMsg('БИТО');

        // Визуальный эффект распада карт на столе
        const cardsOnTable = document.querySelectorAll('#battle-table .card-node');
        cardsOnTable.forEach(el => {
            const rect = el.getBoundingClientRect();
            // ИСПРАВЛЕНО: Прямое вычисление центра (55/2=27.5, 77/2=38.5)
            createDust(rect.left + 27, rect.top + 38);
            el.style.transform = 'scale(0) rotate(180deg)'; 
            el.style.opacity = '0';
        });

        // Память Искры фиксирует вышедшие карты (Бито)
        vchf.table.forEach(m => vchf.memory.outCards.add(m.card.s + m.card.r));

        setTimeout(() => {
            vchf.table = []; 
            renderBattleTable();
            // Ход переходит к тому, кто отбился
            vchf.turn = (vchf.turn === 'player' ? 'enemy' : 'player');
            if (vchf.turn === 'enemy') sparkThink();
            checkGameStatus();
        }, 600);
    }

    // --- СИСТЕМА ЧАСТИЦ (DUST FX) ---
    function createDust(x, y) {
        const arena = document.getElementById('arena');
        // 15 частиц на каждую карту для эффекта "рассыпания"
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px'; 
            p.style.top = y + 'px';
            arena.appendChild(p);

            // Случайный вектор разлета
            const tx = (Math.random() - 0.5) * 250; 
            const ty = (Math.random() - 0.5) * 250;
            
            p.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
            ], { 
                duration: 800 + Math.random() * 400, 
                easing: 'ease-out' 
            }).onfinish = () => p.remove();
        }
    }

    function toggleHand() {
        isExpanded = !isExpanded;
        const panel = document.getElementById('ctrl-panel');
        const btn = document.getElementById('btn-zoom');
        
        if (isExpanded) { 
            panel.classList.add('expanded'); 
            btn.textContent = '✕'; 
        } else { 
            panel.classList.remove('expanded'); 
            btn.textContent = '↕'; 
        }
        playSound('slide');
    }
    // --- ПРОВЕРКА СОСТОЯНИЯ ЗАВЕРШЕНИЯ ---
    function checkGameStatus() {
        if (vchf.phase !== 'BATTLE') return;

        const pEmpty = vchf.pHand.length === 0;
        const eEmpty = vchf.eHand.length === 0;

        // Если колода пуста и у кого-то кончились карты
        if (pEmpty || eEmpty) {
            vchf.phase = 'END';
            let finalMsg = "";

            if (pEmpty && eEmpty) {
                finalMsg = "НИЧЬЯ В ХАОСЕ: СТАТИКА";
            } else if (pEmpty) {
                finalMsg = "ПОБЕДА - ВЕКТОР ОЧИЩЕН";
            } else {
                finalMsg = "ПРОИГРЫШ - SPARK ПОГЛОТИЛ ТЕБЯ";
            }

            showMsg(finalMsg);
            
            // Создаем глобальный Dust FX для всего экрана при финале
            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    createDust(window.innerWidth/2, window.innerHeight/2);
                }, i * 300);
            }

            // Предложение перезагрузки через 5 секунд
            setTimeout(() => {
                if(confirm(finalMsg + "\n\nПерезагрузить Монолит?")) {
                    location.reload();
                }
            }, 5000);
        }
    }

    // --- ПОСТРОЕНИЕ СЕТКИ СЛОТОВ (INITIAL LAYOUT) ---
    const initLayout = () => {
        const rows = {
            '♠': 's-spades',
            '♣': 's-clubs',
            '♦': 's-diamonds',
            '♥': 's-hearts'
        };

        SUITS.forEach(s => {
            const container = document.getElementById(rows[s]);
            container.innerHTML = '';
            RANKS.forEach(rank => {
                const sl = document.createElement('div');
                sl.className = 'slot'; 
                sl.id = `slot-${s}-${rank}`;
                container.appendChild(sl);
            });
        });
    };

    // ТОЧКА ВХОДА МОНОЛИТА
    window.onload = () => { 
        initLayout(); 
        showMsg('СИСТЕМА ГОТОВА К ЗАПУСКУ'); 
    };
</script>
</body>
