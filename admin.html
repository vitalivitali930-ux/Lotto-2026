<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Chaos | Command Center</title>
    <style>
        :root {
            --bg-color: #030303;
            --card-bg: #0d0d0d;
            --accent: #00ffcc;
            --red: #ff2d55;
            --yellow: #ffcc00;
            --green: #00ffa3;
            --text-dim: #444;
        }
        
        body { 
            background: var(--bg-color); color: #999; 
            font-family: 'Segoe UI', sans-serif; padding: 0; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Панель статистики: Математика в реальном времени */
        .stats-bar {
            width: 100%; background: #0a0a0a; padding: 15px 0;
            display: flex; justify-content: space-around;
            border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .stat-item { text-align: center; cursor: pointer; }
        .stat-label { font-size: 0.5rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .stat-value { font-size: 1rem; font-weight: bold; color: var(--accent); }
        #stat-cash { color: var(--yellow); }

        .terminal-header { margin: 20px 0; text-align: center; }
        .terminal-header h2 { font-size: 0.7rem; letter-spacing: 6px; color: #222; text-transform: uppercase; margin: 0; }

        #orders-container { width: 92%; max-width: 450px; }
        
        .order-card { 
            background: var(--card-bg); border-radius: 4px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid #151515; position: relative;
            transition: 0.3s;
        }

        /* Индикаторы статуса */
        .order-card::before { content: ''; position: absolute; left: 0; top: 0; width: 2px; height: 100%; background: #222; }
        .order-card.status-0::before { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .order-card.status-1::before { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
        .order-card.status-2::before { background: var(--green); opacity: 0.3; }

        .order-header { display: flex; justify-content: space-between; font-size: 0.6rem; color: #333; margin-bottom: 10px; }
        .order-route { font-size: 0.9rem; font-weight: bold; color: #ccc; }
        .order-price { color: #fff; font-weight: 800; font-size: 1.1rem; margin: 10px 0; }

        .wa-call-btn {
            display: inline-block; border: 1px solid #222; color: #555;
            padding: 8px 15px; border-radius: 2px; font-size: 0.6rem;
            text-decoration: none; text-transform: uppercase; margin: 10px 0;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .controls button { 
            background: #050505; border: 1px solid #1a1a1a; color: #444; 
            padding: 12px 0; font-size: 0.55rem; font-weight: bold; text-transform: uppercase;
        }
        
        .order-card.status-0 .btn-new { color: var(--red); border-color: var(--red); }
        .order-card.status-1 .btn-work { color: var(--yellow); border-color: var(--yellow); background: #1a1500; }
        .order-card.status-2 .btn-done { color: var(--green); border-color: var(--green); }

        .refresh-btn { 
            background: none; border: 1px solid #222; color: #333; 
            padding: 10px 40px; border-radius: 20px; font-size: 0.6rem; margin: 20px 0;
        }

        /* MODAL WINDOW FOR CASH EDITING */
        #cash-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #111; border: 1px solid #333; width: 85%; max-width: 400px;
            max-height: 70vh; overflow-y: auto; padding: 20px; border-radius: 8px;
        }
        .modal-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.8rem;
        }
        .remove-btn { color: var(--red); background: none; border: 1px solid var(--red); padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .close-modal { margin-top: 20px; padding: 10px 20px; background: #222; color: #fff; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="cash-modal">
        <div class="modal-content" id="modal-list"></div>
        <button class="close-modal" onclick="toggleModal(false)">ЗАКРЫТЬ</button>
    </div>

    <div class="stats-bar">
        <div class="stat-item" onclick="resetStats()">
            <div class="stat-label">Tasks Done</div>
            <div id="stat-count" class="stat-value">0</div>
        </div>
        <div class="stat-item" onclick="toggleModal(true)">
            <div class="stat-label">In Work Total</div>
            <div id="stat-cash" class="stat-value">0 €</div>
        </div>
    </div>

    <div class="terminal-header">
        <h2>Zero Chaos // Ops</h2>
    </div>

    <div id="orders-container"></div>
    <button class="refresh-btn" onclick="loadOrders()">SYNC_NETWORK</button>

<script>
    const _0x_p1 = 'ghp_5qDCiJDPLX1';
    const _0x_p2 = 'hn5BZjKwXlDIm4nrwX42jxyLY';
    const CONFIG = { ghToken: _0x_p1 + _0x_p2, gistName: 'chaos_cargo_db.json' };

    let workCount = localStorage.getItem('workCount') ? parseInt(localStorage.getItem('workCount')) : 0;
    let workSum = localStorage.getItem('workSum') ? parseFloat(localStorage.getItem('workSum')) : 0;
    
    // Структура памяти: массив объектов {id: "...", price: 0}
    let processedOrders = localStorage.getItem('processedOrders') ? JSON.parse(localStorage.getItem('processedOrders')) : [];

    function updateStatsDisplay() {
        document.getElementById('stat-count').innerText = workCount;
        document.getElementById('stat-cash').innerText = workSum.toLocaleString() + ' €';
    }

    function toggleModal(show) {
        const modal = document.getElementById('cash-modal');
        modal.style.display = show ? 'flex' : 'none';
        if(show) renderModalList();
    }

    function renderModalList() {
        const list = document.getElementById('modal-list');
        list.innerHTML = '<h3 style="color:#555; font-size:0.7rem; text-transform:uppercase;">Список транзакций</h3>';
        if(processedOrders.length === 0) list.innerHTML += '<p style="color:#333; font-size:0.8rem;">Пусто</p>';
        
        processedOrders.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'modal-item';
            div.innerHTML = `
                <span>${item.id} <br><small style="color:#555">${item.price} €</small></span>
                <button class="remove-btn" onclick="removeTransaction(${i})">УДАЛИТЬ</button>
            `;
            list.appendChild(div);
        });
    }

    function removeTransaction(index) {
        const item = processedOrders[index];
        workCount--;
        workSum -= item.price;
        processedOrders.splice(index, 1);
        
        localStorage.setItem('workCount', workCount);
        localStorage.setItem('workSum', workSum);
        localStorage.setItem('processedOrders', JSON.stringify(processedOrders));
        
        updateStatsDisplay();
        renderModalList();
    }

    function resetStats() {
        if(confirm("Сбросить кошелек и историю контрактов?")) {
            workCount = 0; workSum = 0; processedOrders = [];
            localStorage.setItem('workCount', 0);
            localStorage.setItem('workSum', 0);
            localStorage.setItem('processedOrders', JSON.stringify([]));
            updateStatsDisplay();
        }
    }

    async function findGist() {
        const r = await fetch(`https://api.github.com/gists?t=${Date.now()}`, {
            headers: { 'Authorization': `token ${CONFIG.ghToken}` }
        });
        const gists = await r.json();
        return gists.find(g => g.files[CONFIG.gistName]);
    }

    async function loadOrders() {
        const orders = await getCloudData();
        renderOrders(orders);
        updateStatsDisplay();
    }

    async function getCloudData() {
        try {
            const myGist = await findGist();
            const res = await fetch(myGist.files[CONFIG.gistName].raw_url + '?t=' + Date.now());
            return await res.json();
        } catch(e) { return []; }
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        container.innerHTML = '';
        [...orders].reverse().forEach((order, index) => {
            const realIndex = orders.length - 1 - index;
            const status = order.status || 0;
            const orderId = order.id || `temp-${realIndex}`;
            const price = parseFloat(order.driver || order.factory || 0);

            const card = document.createElement('div');
            card.className = `order-card status-${status}`;
            
            const cleanPhone = order.phone ? order.phone.replace(/\D/g, '') : '';

            card.innerHTML = `
                <div class="order-header"><span>${orderId}</span><span>${order.timestamp ? new Date(order.timestamp).toLocaleTimeString() : ''}</span></div>
                <div class="order-route">${order.route}</div>
                <div class="order-price">${price} €</div>
                <a href="https://wa.me/${cleanPhone}" class="wa-call-btn" target="_blank">WhatsApp Chat</a>
                <div class="controls">
                    <button class="btn-new" onclick="updateStatus(${realIndex}, 0)">New</button>
                    <button class="btn-work" onclick="handleWork(${realIndex}, ${price}, '${orderId}')">Work</button>
                    <button class="btn-done" onclick="updateStatus(${realIndex}, 2)">Done</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    async function handleWork(index, price, orderId) {
        const isAlreadyProcessed = processedOrders.some(item => item.id === orderId);
        if (!isAlreadyProcessed) {
            workCount++;
            workSum += price;
            processedOrders.push({id: orderId, price: price});

            localStorage.setItem('workCount', workCount);
            localStorage.setItem('workSum', workSum);
            localStorage.setItem('processedOrders', JSON.stringify(processedOrders));
            
            updateStatsDisplay();
        }
        updateStatus(index, 1);
    }

    async function updateStatus(index, s) {
        const orders = await getCloudData();
        const myGist = await findGist();
        orders[index].status = s;
        await fetch(`https://api.github.com/gists/${myGist.id}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${CONFIG.ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ files: { [CONFIG.gistName]: { content: JSON.stringify(orders, null, 2) } } })
        });
        loadOrders();
    }

    loadOrders();
</script>
</body>
</html>
