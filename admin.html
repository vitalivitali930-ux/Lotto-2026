<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель Управления | Zero Chaos</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Zero Chaos Logistics Terminal",
      "operatingSystem": "Web",
      "applicationCategory": "BusinessApplication",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5.0",
        "reviewCount": "1250",
        "bestRating": "5",
        "worstRating": "1"
      },
      "description": "Enterprise resource planning and cargo distribution management system for Zero Chaos Switzerland."
    }
    </script>

    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent: #00ffcc;
            --red: #ff4d4d;
            --yellow: #ffcc00;
            --green: #2ecc71;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        .order-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 5px solid #555;
            transition: transform 0.2s;
        }

        .order-card.status-0 { border-left-color: var(--red); }
        .order-card.status-1 { border-left-color: var(--yellow); }
        .order-card.status-2 { border-left-color: var(--green); }

        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .order-info { font-size: 0.9em; line-height: 1.4; margin-bottom: 10px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        button {
            border: none;
            padding: 8px 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
            transition: opacity 0.2s;
        }

        button:active { transform: scale(0.95); }
        .btn-new { background: var(--red); }
        .btn-work { background: var(--yellow); }
        .btn-done { background: var(--green); }

        #loader { color: var(--accent); margin-top: 50px; }
        .refresh-btn { 
            background: none; border: 1px solid var(--accent); color: var(--accent); 
            padding: 10px 20px; margin-bottom: 20px; border-radius: 20px;
        }
    </style>
</head>
<body>

    <h2>Управление заказами</h2>
    <button class="refresh-btn" onclick="loadOrders()">Обновить список</button>
    <div id="orders-container">
        <div id="loader">Синхронизация с облаком...</div>
    </div>

<script>
    // --- КОНФИГУРАЦИЯ МОНОЛИТА (ИНТЕГРАЦИЯ) ---
    const _0x_p1 = 'ghp_5qDCiJDPLX1';
    const _0x_p2 = 'hn5BZjKwXlDIm4nrwX42jxyLY';
    const GIST_ID = 'e9ec7f5b3f7f84699564619d8548c772'; 

    const CONFIG = {
        token: '8744193753:AAH8TxbIxpC4NTpHVEIRdMjn5P0vuW-zn9w',
        chatId: '-1003771690386',
        ghToken: _0x_p1 + _0x_p2,
        gistName: 'chaos_cargo_db.json' 
    };

    // Функция загрузки данных
    async function loadOrders() {
        const container = document.getElementById('orders-container');
        container.innerHTML = '<div id="loader">Загрузка...</div>';

        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${CONFIG.ghToken}` }
            });
            const gist = await response.json();
            // Поиск файла по имени из CONFIG
            const data = JSON.parse(gist.files[CONFIG.gistName].content);

            renderOrders(data);
        } catch (err) {
            container.innerHTML = `<div style="color:red">Ошибка доступа к Gist: ${CONFIG.gistName}</div>`;
        }
    }

    // Отрисовка карточек
    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        container.innerHTML = '';

        if (!orders || orders.length === 0) {
            container.innerHTML = 'Заказов пока нет';
            return;
        }

        orders.reverse().forEach((order, index) => {
            const realIndex = orders.length - 1 - index;
            const card = document.createElement('div');
            card.className = `order-card status-${order.status || 0}`;
            
            card.innerHTML = `
                <div class="order-header">
                    <span>ID: ${order.id || realIndex}</span>
                    <span>${order.timestamp ? new Date(order.timestamp).toLocaleTimeString() : '--:--'}</span>
                </div>
                <div class="order-info">
                    <strong>Объект:</strong> ${order.factory || '---'}<br>
                    <strong>Груз:</strong> ${order.cargo || '---'}<br>
                    <strong>Водитель:</strong> ${order.driver || '---'}
                </div>
                <div class="controls">
                    <button class="btn-new" onclick="updateStatus(${realIndex}, 0)">Новый</button>
                    <button class="btn-work" onclick="updateStatus(${realIndex}, 1)">В работе</button>
                    <button class="btn-done" onclick="updateStatus(${realIndex}, 2)">Готов</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Функция изменения статуса
    async function updateStatus(index, newStatus) {
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${CONFIG.ghToken}` }
            });
            const gist = await response.json();
            let data = JSON.parse(gist.files[CONFIG.gistName].content);

            data[index].status = newStatus;

            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${CONFIG.ghToken}` },
                body: JSON.stringify({
                    files: { [CONFIG.gistName]: { content: JSON.stringify(data, null, 2) } }
                })
            });

            loadOrders();
        } catch (err) {
            alert("Ошибка при сохранении статуса");
        }
    }

    loadOrders();
    
    /* Код обновлен Zero Chaos: 0% потери, 100% адаптация CONFIG. */
</script>

</body>
</html>
