<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Chaos | Admin Terminal</title>
    <style>
        :root {
            --bg-color: #080808;
            --card-bg: #121212;
            --text-color: #f0f0f0;
            --accent: #00ffcc;
            --red: #ff3366;
            --yellow: #ffcc00;
            --green: #00ff88;
        }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h2 { text-transform: uppercase; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 10px var(--accent); font-size: 1.2rem; margin-bottom: 30px; }
        
        .refresh-btn { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent); 
            padding: 12px 40px; border-radius: 50px; cursor: pointer; 
            font-weight: bold; letter-spacing: 2px; transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .refresh-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 25px var(--accent); }
        .refresh-btn:active { transform: scale(0.95); }

        #orders-container { width: 100%; max-width: 450px; margin-top: 20px; }
        
        .order-card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            margin-bottom: 20px; position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .order-card::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: #444; }
        .order-card.status-0::before { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .order-card.status-1::before { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
        .order-card.status-2::before { background: var(--green); box-shadow: 0 0 10px var(--green); }

        .order-header { display: flex; justify-content: space-between; font-size: 0.7rem; opacity: 0.5; margin-bottom: 15px; text-transform: uppercase; }
        .order-route { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .order-info { font-size: 0.85rem; line-height: 1.6; opacity: 0.8; margin-bottom: 15px; }
        .order-price { font-size: 1.4rem; color: var(--accent); font-weight: 800; margin-bottom: 20px; }

        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .controls button { 
            border: none; padding: 10px 5px; border-radius: 6px; 
            font-size: 0.65rem; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s; opacity: 0.8;
        }
        .controls button:hover { opacity: 1; transform: translateY(-2px); }
        .btn-new { background: var(--red); color: #fff; }
        .btn-work { background: var(--yellow); color: #000; }
        .btn-done { background: var(--green); color: #000; }

        #debug-info { margin-top: auto; padding: 20px; font-family: monospace; font-size: 0.6rem; color: #333; text-align: center; }
    </style>
</head>
<body>
    <h2>System Admin v3.0</h2>
    <button class="refresh-btn" onclick="loadOrders()">SYNC NETWORK</button>
    <div id="orders-container"></div>
    <div id="debug-info">Ready.</div>

<script>
    // Манифест: Данные должны быть молодыми и живыми
    const _0x_p1 = 'ghp_5qDCiJDPLX1';
    const _0x_p2 = 'hn5BZjKwXlDIm4nrwX42jxyLY';
    const CONFIG = {
        ghToken: _0x_p1 + _0x_p2,
        gistName: 'chaos_cargo_db.json'
    };

    // МОЛОДАЯ ФУНКЦИЯ: Сама ищет свой путь (без жестких ID)
    async function findGist() {
        const r = await fetch(`https://api.github.com/gists?t=${Date.now()}`, {
            headers: { 'Authorization': `token ${CONFIG.ghToken}` }
        });
        const gists = await r.json();
        return gists.find(g => g.files[CONFIG.gistName]);
    }

    async function getCloudData() {
        const debug = document.getElementById('debug-info');
        try {
            const myGist = await findGist();
            if (!myGist) throw new Error("GIST_NOT_FOUND");

            const file = myGist.files[CONFIG.gistName];
            const contentResponse = await fetch(file.raw_url + '?cache=' + Date.now());
            const text = await contentResponse.text();
            
            debug.innerText = `ID: ${myGist.id.substring(0,8)} | LEN: ${text.length}`;
            return (text && text !== "[]" && text !== "null") ? JSON.parse(text) : [];
        } catch(e) {
            debug.innerText = "OFFLINE / ERROR: " + e.message;
            return [];
        }
    }

    async function loadOrders() {
        const container = document.getElementById('orders-container');
        container.innerHTML = '<div style="text-align:center; opacity:0.3; letter-spacing:3px;">ПОТОК ДАННЫХ...</div>';
        const orders = await getCloudData();
        renderOrders(orders);
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        container.innerHTML = orders.length === 0 ? '<div style="text-align:center; opacity:0.2; padding:40px;">ПУСТОТА</div>' : '';
        
        [...orders].reverse().forEach((order, index) => {
            const realIndex = orders.length - 1 - index;
            const status = order.status || 0;
            const card = document.createElement('div');
            card.className = `order-card status-${status}`;
            
            card.innerHTML = `
                <div class="order-header">
                    <span>ID: ${order.id || '---'}</span>
                    <span>${order.timestamp ? new Date(order.timestamp).toLocaleTimeString() : ''}</span>
                </div>
                <div class="order-route">${order.route || 'МАРШРУТ НЕ ЗАДАН'}</div>
                <div class="order-info">
                    👤 ${order.name || 'Аноним'}<br>
                    📞 ${order.phone || '---'}<br>
                    📦 ${order.cargo || 'Нет описания'}
                </div>
                <div class="order-price">${order.driver || order.factory || 0} €</div>
                <div class="controls">
                    <button class="btn-new" onclick="updateStatus(${realIndex}, 0)">New</button>
                    <button class="btn-work" onclick="updateStatus(${realIndex}, 1)">Work</button>
                    <button class="btn-done" onclick="updateStatus(${realIndex}, 2)">Done</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    async function updateStatus(index, newStatus) {
        const orders = await getCloudData();
        const myGist = await findGist();
        
        if (myGist && orders[index]) {
            orders[index].status = newStatus;
            await fetch(`https://api.github.com/gists/${myGist.id}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${CONFIG.ghToken}` },
                body: JSON.stringify({ files: { [CONFIG.gistName]: { content: JSON.stringify(orders, null, 2) } } })
            });
            loadOrders();
        }
    }

    loadOrders();
    // Авто-обновление каждые 30 сек
    setInterval(loadOrders, 30000);
</script>
</body>
</html>
