<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель Управления | Zero Chaos</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent: #00ffcc;
            --red: #ff4d4d;
            --yellow: #ffcc00;
            --green: #2ecc71;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        .order-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 5px solid #555;
            transition: transform 0.2s;
        }

        .order-card.status-0 { border-left-color: var(--red); }    /* Новый */
        .order-card.status-1 { border-left-color: var(--yellow); } /* В работе */
        .order-card.status-2 { border-left-color: var(--green); }  /* Готов */

        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .order-info { font-size: 0.9em; line-height: 1.4; margin-bottom: 10px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        button {
            border: none;
            padding: 8px 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
            transition: opacity 0.2s;
        }

        button:active { transform: scale(0.95); }
        .btn-new { background: var(--red); }
        .btn-work { background: var(--yellow); }
        .btn-done { background: var(--green); }

        #loader { color: var(--accent); margin-top: 50px; }
        .refresh-btn { 
            background: none; border: 1px solid var(--accent); color: var(--accent); 
            padding: 10px 20px; margin-bottom: 20px; border-radius: 20px;
        }
    </style>
</head>
<body>

    <h2>Управление заказами</h2>
    <button class="refresh-btn" onclick="loadOrders()">Обновить список</button>
    <div id="orders-container">
        <div id="loader">Синхронизация с облаком...</div>
    </div>

<script>
    // Конфигурация (Та же, что в основном файле)
    const GIST_ID = 'ТВОЙ_ID_GIST'; // ВСТАВЬ СВОЙ ID
    const GIST_TOKEN = 'ТВОЙ_TOKEN_GIST'; // ВСТАВЬ СВОЙ ТОКЕН

    // Функция загрузки данных
    async function loadOrders() {
        const container = document.getElementById('orders-container');
        container.innerHTML = '<div id="loader">Загрузка...</div>';

        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${GIST_TOKEN}` }
            });
            const gist = await response.json();
            const data = JSON.parse(gist.files["orders.json"].content);

            renderOrders(data);
        } catch (err) {
            container.innerHTML = '<div style="color:red">Ошибка доступа к Gist</div>';
        }
    }

    // Отрисовка карточек
    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        container.innerHTML = '';

        if (orders.length === 0) {
            container.innerHTML = 'Заказов пока нет';
            return;
        }

        // Показываем последние заказы сверху
        orders.reverse().forEach((order, index) => {
            const realIndex = orders.length - 1 - index; // Индекс в оригинальном массиве
            const card = document.createElement('div');
            card.className = `order-card status-${order.status}`;
            
            card.innerHTML = `
                <div class="order-header">
                    <span>ID: ${order.id}</span>
                    <span>${order.time}</span>
                </div>
                <div class="order-info">
                    <strong>Сумма:</strong> ${order.total} CHF<br>
                    <strong>Тип:</strong> ${order.type === 'dine-in' ? 'В заведении' : 'С собой'}
                </div>
                <div class="controls">
                    <button class="btn-new" onclick="updateStatus(${realIndex}, 0)">Новый</button>
                    <button class="btn-work" onclick="updateStatus(${realIndex}, 1)">В работе</button>
                    <button class="btn-done" onclick="updateStatus(${realIndex}, 2)">Готов</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Функция ИЗМЕНЕНИЯ статуса
    async function updateStatus(index, newStatus) {
        try {
            // 1. Получаем текущие данные
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${GIST_TOKEN}` }
            });
            const gist = await response.json();
            let data = JSON.parse(gist.files["orders.json"].content);

            // 2. Меняем статус
            data[index].status = newStatus;

            // 3. Сохраняем обратно
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${GIST_TOKEN}` },
                body: JSON.stringify({
                    files: { "orders.json": { content: JSON.stringify(data, null, 2) } }
                })
            });

            // 4. Обновляем вид
            loadOrders();
        } catch (err) {
            alert("Ошибка при сохранении статуса");
        }
    }

    // Запуск при открытии
    loadOrders();
</script>

</body>
</html>
