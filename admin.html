<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Chaos | Admin v3.5</title>
    <style>
        :root {
            --bg-color: #050505; /* Ещё глубже черный */
            --card-bg: #111111; /* Глубокий серый для карточек */
            --text-main: #888888; /* Базовый серый текст */
            --text-highlight: #aaaaaa; /* Светло-серый при наведении */
            
            --accent: #00ffcc;
            --red: #ff3366;
            --yellow: #ffcc00;
            --green: #00ff88;
            --gray: #444444; /* Серый для законченных заказов */
        }
        
        body { 
            background: var(--bg-color); color: var(--text-main); 
            font-family: 'Inter', Roboto, sans-serif; padding: 20px; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }
        
        h2 { text-transform: uppercase; letter-spacing: 5px; color: #555; /* Приглушенный заголовок */ text-shadow: none; font-size: 1rem; margin-bottom: 30px; }
        h2:hover { color: var(--text-highlight); }

        .refresh-btn { 
            background: transparent; border: 1px solid #333; color: #555; 
            padding: 10px 30px; border-radius: 50px; cursor: pointer; 
            font-weight: bold; letter-spacing: 2px; font-size: 0.7rem; transition: 0.3s;
        }
        .refresh-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 204, 0.1); }

        #orders-container { width: 100%; max-width: 450px; margin-top: 30px; }
        
        .order-card { 
            background: var(--card-bg); border-radius: 6px; padding: 25px; 
            margin-bottom: 25px; position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .order-card:hover { border-color: rgba(255,255,255,0.05); transform: translateY(-2px); }

        /* Полоска статуса */
        .order-card::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: #222; transition: 0.3s; }
        .order-card.status-0::before { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .order-card.status-1::before { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
        .order-card.status-2::before { background: var(--green); box-shadow: 0 0 10px var(--green); }

        /* Логика полного "посерения" для DONE (Статус 2) */
        .order-card.status-2 {
            border-color: rgba(255,255,255,0.01);
            filter: grayscale(1) opacity(0.6); /* Приглушаем всю карточку */
        }
        .order-card.status-2 * { color: #555 !important; text-shadow: none !important; }
        .order-card.status-2::before { background: var(--gray) !important; box-shadow: none !important; }

        .order-header { display: flex; justify-content: space-between; font-size: 0.65rem; color: #444; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .order-route { font-size: 1rem; font-weight: bold; margin-bottom: 12px; color: var(--text-highlight); letter-spacing: 1px; }
        
        .order-info { font-size: 0.8rem; line-height: 1.6; color: #777; margin-bottom: 15px; }
        .order-info strong { color: #aaa; }

        .order-price { font-size: 1.3rem; color: var(--text-highlight); font-weight: 800; margin-bottom: 20px; letter-spacing: 1px; }

        /* Кнопка WhatsApp Call */
        .wa-call-btn {
            display: inline-block; background: #1a1a1a; color: #666; 
            text-decoration: none; padding: 6px 15px; border-radius: 4px; 
            font-size: 0.6rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; 
            border: 1px solid #222; transition: 0.3s; margin-top: 5px;
        }
        .wa-call-btn:hover { background: #222; color: #aaa; border-color: #333; }
        .wa-call-btn i { margin-right: 5px; opacity: 0.7; }

        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .controls button { 
            border: none; padding: 12px 5px; border-radius: 4px; 
            font-size: 0.65rem; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s; opacity: 0.6;
            background: #1a1a1a; color: #555; border: 1px solid #222;
        }
        .controls button:hover { opacity: 1; transform: translateY(-1px); background: #222; color: #fff; border-color: #333; }
        
        .order-card.status-0 .btn-new { background: var(--red); color: #fff; opacity: 1; border: none; box-shadow: 0 0 10px rgba(255, 51, 102, 0.2); }
        .order-card.status-1 .btn-work { background: var(--yellow); color: #000; opacity: 1; border: none; box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
        .order-card.status-2 .btn-done { background: var(--green); color: #000; opacity: 1; border: none; }

        #debug-info { margin-top: auto; padding: 20px; font-family: monospace; font-size: 0.6rem; color: #222; text-align: center; }
    </style>
</head>
<body>
    <h2>Zero Chaos :: Ops Terminal</h2>
    <button class="refresh-btn" onclick="loadOrders()">SYNC_NETWORK</button>
    <div id="orders-container"></div>
    <div id="debug-info">Ready.</div>

<script>
    // Манифест: Данные должны быть молодыми и живыми
    const _0x_p1 = 'ghp_5qDCiJDPLX1';
    const _0x_p2 = 'hn5BZjKwXlDIm4nrwX42jxyLY';
    const CONFIG = {
        ghToken: _0x_p1 + _0x_p2,
        gistName: 'chaos_cargo_db.json'
    };

    // МОЛОДАЯ ФУНКЦИЯ: Сама ищет свой путь (без жестких ID)
    async function findGist() {
        const r = await fetch(`https://api.github.com/gists?t=${Date.now()}`, {
            headers: { 'Authorization': `token ${CONFIG.ghToken}` }
        });
        const gists = await r.json();
        return gists.find(g => g.files[CONFIG.gistName]);
    }

    async function getCloudData() {
        const debug = document.getElementById('debug-info');
        try {
            const myGist = await findGist();
            if (!myGist) throw new Error("GIST_NOT_FOUND");

            const file = myGist.files[CONFIG.gistName];
            const contentResponse = await fetch(file.raw_url + '?cache=' + Date.now());
            const text = await contentResponse.text();
            
            debug.innerText = `[${myGist.id.substring(0,6)}] LEN: ${text.length}`;
            return (text && text !== "[]" && text !== "null") ? JSON.parse(text) : [];
        } catch(e) {
            debug.innerText = "OFFLINE / ERROR: " + e.message;
            return [];
        }
    }

    async function loadOrders() {
        const container = document.getElementById('orders-container');
        if (!container.innerHTML || container.innerHTML.includes('ПУСТО')) {
            container.innerHTML = '<div style="text-align:center; opacity:0.1; letter-spacing:4px; padding:50px;">СКАНИРОВАНИЕ СЕТИ...</div>';
        }
        const orders = await getCloudData();
        renderOrders(orders);
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        container.innerHTML = orders.length === 0 ? '<div style="text-align:center; opacity:0.1; padding:40px;">БАЗА ПУСТА</div>' : '';
        
        [...orders].reverse().forEach((order, index) => {
            const realIndex = orders.length - 1 - index;
            const status = order.status || 0;
            const card = document.createElement('div');
            card.className = `order-card status-${status}`;
            
            // Чистим телефон для ссылки
            const cleanPhone = order.phone ? order.phone.replace(/\D/g, '') : '';
            
            card.innerHTML = `
                <div class="order-header">
                    <span>${order.id || 'N/A'}</span>
                    <span>${order.timestamp ? new Date(order.timestamp).toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                </div>
                <div class="order-route">${order.route || '---'}</div>
                <div class="order-info">
                    <strong>Кустарь:</strong> ${order.name || '---'}<br>
                    <strong>Груз:</strong> ${order.cargo || '---'}
                </div>
                <div class="order-price">${order.driver || order.factory || 0} €</div>
                
                ${cleanPhone ? `<a href="https://wa.me/${cleanPhone}" class="wa-call-btn" target="_blank">[ WhatsApp Call ]</a>` : '<span style="font-size:0.6rem; color:#333;">Нет тел.</span>'}
                
                <div class="controls">
                    <button class="btn-new" onclick="updateStatus(${realIndex}, 0)">New</button>
                    <button class="btn-work" onclick="updateStatus(${realIndex}, 1)">Work</button>
                    <button class="btn-done" onclick="updateStatus(${realIndex}, 2)">Done</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    async function updateStatus(index, newStatus) {
        const orders = await getCloudData();
        const myGist = await findGist();
        
        if (myGist && orders[index]) {
            orders[index].status = newStatus;
            await fetch(`https://api.github.com/gists/${myGist.id}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${CONFIG.ghToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { [CONFIG.gistName]: { content: JSON.stringify(orders, null, 2) } } })
            });
            loadOrders();
        }
    }

    loadOrders();
    // Авто-обновление каждые 45 сек
    setInterval(loadOrders, 45000);
</script>
</body>
</html>
