<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель Управления | Zero Chaos</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent: #00ffcc;
            --red: #ff4d4d;
            --yellow: #ffcc00;
            --green: #2ecc71;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Inter', sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .order-card { 
            background: var(--card-bg); border-radius: 8px; padding: 20px; 
            margin-bottom: 15px; width: 100%; max-width: 400px; 
            border-left: 4px solid #555; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .order-card.status-0 { border-left-color: var(--red); }
        .order-card.status-1 { border-left-color: var(--yellow); }
        .order-card.status-2 { border-left-color: var(--green); }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.8rem; opacity: 0.7; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-new { background: var(--red); color: #000; }
        .btn-work { background: var(--yellow); color: #000; }
        .btn-done { background: var(--green); color: #000; }
        .refresh-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 25px; border-radius: 30px; margin-bottom: 25px; cursor: pointer; letter-spacing: 2px; }
    </style>
</head>
<body>
    <h2>Система Управления</h2>
    <button class="refresh-btn" onclick="loadOrders()">ОБНОВИТЬ СЕТЬ</button>
    <div id="orders-container"></div>

<script>
    const _0x_p1 = 'ghp_5qDCiJDPLX1';
    const _0x_p2 = 'hn5BZjKwXlDIm4nrwX42jxyLY';
    const GIST_ID = 'e9ec7f5b3f7f84699564619d8548c772'; 

    const CONFIG = {
        ghToken: _0x_p1 + _0x_p2,
        gistName: 'chaos_cargo_db.json' 
    };

    // УЛУЧШЕННЫЙ ЗАБОР ДАННЫХ (БЕЗ ОШИБОК И КЭША)
    async function getCloudData() {
        try {
            // Добавляем метку времени для обхода кэша GitHub API
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${CONFIG.ghToken}` }
            });
            const gist = await response.json();
            const file = gist.files[CONFIG.gistName];
            
            if (file) {
                // Прямой забор содержимого через RAW URL
                const contentResponse = await fetch(file.raw_url + '?cache_bust=' + Date.now());
                const rawText = await contentResponse.text();
                
                if (!rawText || rawText.trim() === "") return [];
                const data = JSON.parse(rawText);
                return Array.isArray(data) ? data : [];
            }
        } catch(e) { 
            console.error("Критический сбой забора:", e); 
        }
        return [];
    }

    async function loadOrders() {
        const container = document.getElementById('orders-container');
        if (!container.innerHTML || container.innerHTML.includes('БАЗА')) {
            container.innerHTML = '<div style="opacity:0.5; letter-spacing:5px;">SCANNING...</div>';
        }
        const orders = await getCloudData();
        renderOrders(orders);
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        container.innerHTML = (orders.length === 0) ? '<div style="opacity:0.3; padding:50px;">БАЗА_ДАННЫХ_ПУСТА</div>' : '';
        
        // Разворачиваем, чтобы новые заказы всегда были сверху
        [...orders].reverse().forEach((order, index) => {
            const realIndex = orders.length - 1 - index;
            const card = document.createElement('div');
            
            // Определяем статус (0 - новый, 1 - в работе, 2 - готов)
            const status = (order.status !== undefined) ? order.status : 0;
            card.className = `order-card status-${status}`;
            
            card.innerHTML = `
                <div class="order-header">
                    <span>ID: ${order.id || 'NEW'}</span>
                    <span>${order.timestamp ? new Date(order.timestamp).toLocaleTimeString('ru-RU') : '--:--'}</span>
                </div>
                <div style="margin-bottom:8px;"><strong>КУСТАРЬ:</strong> ${order.name || 'Аноним'}</div>
                <div style="margin-bottom:8px;"><strong>МАРШРУТ:</strong> ${order.route || 'Локация не указана'}</div>
                <div style="margin-bottom:8px;"><strong>ГРУЗ:</strong> ${order.cargo || '---'}</div>
                <div style="color:var(--accent); font-size:1.2rem; font-weight:bold;">${order.driver || order.factory || '0'} €</div>
                <div style="font-size:0.8rem; margin-top:5px; opacity:0.6;">📞 ${order.phone || '---'}</div>
                
                <div class="controls">
                    <button class="btn-new" onclick="updateStatus(${realIndex}, 0)">НОВЫЙ</button>
                    <button class="btn-work" onclick="updateStatus(${realIndex}, 1)">В РАБОТЕ</button>
                    <button class="btn-done" onclick="updateStatus(${realIndex}, 2)">ГОТОВ</button>
                </div>`;
            container.appendChild(card);
        });
    }

    async function updateStatus(index, newStatus) {
        // Сначала получаем актуальную базу
        const orders = await getCloudData();
        if (orders[index]) {
            orders[index].status = newStatus;
            
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 
                    'Authorization': `token ${CONFIG.ghToken}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    files: { [CONFIG.gistName]: { content: JSON.stringify(orders, null, 2) } } 
                })
            });
            
            if (res.ok) loadOrders();
            else alert("Ошибка синхронизации статуса");
        }
    }

    // Авто-обновление каждые 45 секунд
    loadOrders();
    setInterval(loadOrders, 45000);

</script>
</body>
</html>
