<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель Управления | Zero Chaos</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent: #00ffcc;
            --red: #ff4d4d;
            --yellow: #ffcc00;
            --green: #2ecc71;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .order-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; width: 100%; max-width: 400px; border-left: 5px solid #555; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .order-card.status-0 { border-left-color: var(--red); }
        .order-card.status-1 { border-left-color: var(--yellow); }
        .order-card.status-2 { border-left-color: var(--green); }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 0.75em; font-weight: bold; text-transform: uppercase; color: #000; }
        .btn-new { background: var(--red); }
        .btn-work { background: var(--yellow); }
        .btn-done { background: var(--green); }
        .refresh-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 20px; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Управление заказами</h2>
    <button class="refresh-btn" onclick="loadOrders()">Обновить список</button>
    <div id="orders-container"></div>

<script>
    const _0x_p1 = 'ghp_5qDCiJDPLX1';
    const _0x_p2 = 'hn5BZjKwXlDIm4nrwX42jxyLY';
    const GIST_ID = 'e9ec7f5b3f7f84699564619d8548c772'; 

    const CONFIG = {
        ghToken: _0x_p1 + _0x_p2,
        gistName: 'chaos_cargo_db.json' 
    };

    // Та самая ЛОГИКА ТЕРМИНАЛА (РАБОЧАЯ)
    async function getCloudData() {
        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { 'Authorization': `token ${CONFIG.ghToken}` }
            });
            const gist = await response.json();
            const file = gist.files[CONFIG.gistName];
            if (file) {
                const contentResponse = await fetch(file.raw_url);
                const data = await contentResponse.json();
                return Array.isArray(data) ? data : [];
            }
        } catch(e) { console.error("Ошибка чтения:", e); }
        return [];
    }

    async function loadOrders() {
        const container = document.getElementById('orders-container');
        container.innerHTML = 'Загрузка...';
        const orders = await getCloudData();
        renderOrders(orders);
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        container.innerHTML = orders.length === 0 ? 'Заказов нет' : '';
        [...orders].reverse().forEach((order, index) => {
            const realIndex = orders.length - 1 - index;
            const card = document.createElement('div');
            card.className = `order-card status-${order.status || 0}`;
            card.innerHTML = `
                <div class="order-header"><span>ID: ${order.id || realIndex}</span><span>${new Date(order.timestamp).toLocaleTimeString()}</span></div>
                <div><b>Объект:</b> ${order.name || '---'}</div>
                <div><b>Маршрут:</b> ${order.route || '---'}</div>
                <div><b>Ставка:</b> ${order.driver} €</div>
                <div class="controls">
                    <button class="btn-new" onclick="updateStatus(${realIndex}, 0)">Новый</button>
                    <button class="btn-work" onclick="updateStatus(${realIndex}, 1)">В работе</button>
                    <button class="btn-done" onclick="updateStatus(${realIndex}, 2)">Готов</button>
                </div>`;
            container.appendChild(card);
        });
    }

    async function updateStatus(index, newStatus) {
        const orders = await getCloudData();
        orders[index].status = newStatus;
        await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${CONFIG.ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ files: { [CONFIG.gistName]: { content: JSON.stringify(orders, null, 2) } } })
        });
        loadOrders();
    }

    loadOrders();
</script>
</body>
</html>
