<script>
    /* МАНИФЕСТ МОНОЛИТА - Искра: Адаптивный SEO-движок 2.0 */
    const canvas = document.getElementById('introCanvas');
    const ctx = canvas.getContext('2d');
    const statusIntro = document.getElementById('mainStatusIntro');
    const logoIntro = document.getElementById('mainLogoIntro');
    const tg = window.Telegram.WebApp; tg.expand(); 

    const sndClick = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');
    const sndShuffle = new Audio('https://www.soundjay.com/misc/sounds/marbles-shake-1.mp3');
    const sndWin = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3'); 

    let realStatsDB = {};
    let myTickets = JSON.parse(localStorage.getItem('vchf_user_tickets')) || [];
    let selected = [], superNum = null, currentPeriod = 'month', ticketCount = 1, currentCurrency = 'VCHF', currentLang = 'en', pendingLang = 'en', isProcessing = false;
    const realPrice = 2.50; 

    const dict = {
        ru: { btn: "ПОДТВЕРДИТЬ", super: "БОНУСНОЕ ЧИСЛО", month: "МЕСЯЦ", year: "ГОД", all: "ЗА ВСЁ ВРЕМЯ", total: "Итого", game: "ИГРА", tickets: "БИЛЕТЫ", stats: "СТАТС", activeT: "МОИ БИЛЕТЫ" },
        de: { btn: "BESTÄTIGEN", super: "SUPERZAHL", month: "MONAT", year: "JAHR", all: "ALLE ZEIT", total: "Gesamt", game: "SPIEL", tickets: "TICKETS", stats: "STATS", activeT: "MEINE TICKETS" },
        en: { btn: "CONFIRM", super: "SUPER NUMBER", month: "MONTH", year: "YEAR", all: "ALL TIME", total: "Total", game: "GAME", tickets: "TICKETS", stats: "STATS", activeT: "MY TICKETS" }
    }; 
    const legalDict = {
        ru: { title: "Закон Швейцарии (BGS)", text: "Участие разрешено только лицам старше <b>18 лет</b>.", btn: "МНЕ ЕСТЬ 18 ЛЕТ" },
        de: { title: "Schweizer Gesetz (BGS)", text: "Teilnahme erst ab <b>18 Jahren</b> gestattet.", btn: "ICH BIN 18 JAHRE ALT" },
        en: { title: "Swiss Law (BGS)", text: "Participation only for persons over <b>18 years</b>.", btn: "I AM 18 YEARS OLD" }
    }; 

    const spheresIntro = [
        { x: 0.15, y: 0.25, colors: ['#000', '#ffcc00', '#000'], label: 'DE' },
        { x: 0.85, y: 0.25, colors: ['#eee', '#ffffff', '#eee'], label: 'EN' },
        { x: 0.15, y: 0.50, colors: ['#0057b7', '#ffd700'], label: 'UA' },
        { x: 0.85, y: 0.50, colors: ['#fff', '#0039a6', '#d52b1e'], label: 'RU' }
    ];
    let drawnItems = spheresIntro.map(s => ({ ...s, grow: 0, ink: 0 }));
    let l1 = { x: window.innerWidth/2, y: 0 }, step1 = 0, step2 = 0, active2 = false, fadeIntro = 1.0; 

    function drawSphereIntro(s) {
        if (s.grow <= 0) return;
        const x = s.x * canvas.width, y = s.y * canvas.height, r = 42 * s.grow;
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
        let gBody = ctx.createRadialGradient(x-15, y-15, r/10, x, y, r);
        gBody.addColorStop(0, '#fff'); gBody.addColorStop(0.5, '#444'); gBody.addColorStop(1, '#050505');
        ctx.fillStyle = gBody; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
        if (s.ink > 0) {
            ctx.save(); ctx.beginPath(); ctx.arc(x, y, r-2, 0, 7); ctx.clip();
            let gFlag = ctx.createLinearGradient(x-r, y-r, x+r, y+r);
            s.colors.forEach((c, i) => gFlag.addColorStop(i/(s.colors.length-1), c));
            ctx.globalAlpha = s.ink; ctx.fillStyle = gFlag; ctx.fill(); ctx.restore(); ctx.globalAlpha = 1;
        }
    } 

    function animateIntro() {
        if (fadeIntro <= 0.01) { document.getElementById('ui-layer').style.display = 'none'; canvas.style.display = 'none'; document.getElementById('app-content').style.display = 'block'; setTimeout(() => document.getElementById('app-content').style.opacity = '1', 50); return; }
        ctx.clearRect(0,0, canvas.width, canvas.height);
        ctx.globalAlpha = fadeIntro;
        if (step1 < spheresIntro.length) {
            let target = drawnItems[step1]; let tx = target.x * canvas.width, ty = target.y * canvas.height;
            l1.x += (tx - l1.x) * 0.08; l1.y += (ty - l1.y) * 0.08;
            if (Math.abs(l1.x-tx)<2) { if (target.grow < 1) target.grow += 0.04; else step1++; }
        }
        if (active2 && step2 < spheresIntro.length) {
            let target = drawnItems[step2]; if (target.ink < 1) target.ink += 0.03; else step2++;
        }
        drawnItems.forEach(drawSphereIntro);
        if (step2 === spheresIntro.length) { setTimeout(() => { fadeIntro -= 0.01; document.getElementById('ui-layer').style.opacity = fadeIntro; }, 1500); }
        requestAnimationFrame(animateIntro);
    } 

    async function randomFill() {
        if (isProcessing) return; isProcessing = true;
        const delay = ms => new Promise(res => setTimeout(res, ms));
        const colors = ['flash-gold', 'flash-lime', 'flash-cyan', 'flash-cherry'];
        selected = []; document.querySelectorAll('.cell').forEach(c => c.className = 'cell');
        sndShuffle.play();
        let start = Date.now();
        while (Date.now() - start < 1500) {
            document.querySelectorAll('.cell').forEach(c => { if(!selected.includes(parseInt(c.innerText))) c.className = 'cell'; });
            for(let i=0;i<4;i++) { let r=Math.floor(Math.random()*42)+1; let t=document.getElementById('cell-'+r); if(t) t.classList.add(colors[i]); }
            await delay(60);
        }
        while (selected.length < 6) {
            let r = Math.floor(Math.random()*42)+1;
            if(!selected.includes(r)) { selected.push(r); const t=document.getElementById('cell-'+r); t.className='cell selected'; tg.HapticFeedback.impactOccurred('medium'); await delay(200); }
        }
        superNum = Math.floor(Math.random()*6)+1;
        document.querySelectorAll('.super-cell').forEach((sc, idx) => sc.classList.toggle('selected', idx + 1 === superNum));
        sndWin.play(); isProcessing = false; refreshGrid();
    }

    function refreshGrid() {
        const grid = document.getElementById('main-grid'); grid.innerHTML = '';
        for (let i = 1; i <= 42; i++) {
            const c = document.createElement('div'); c.className = 'cell'; c.id = `cell-${i}`; c.innerText = i;
            if (selected.includes(i)) c.classList.add('selected');
            c.onclick = () => { if(isProcessing) return; if(selected.includes(i)) selected=selected.filter(n=>n!==i); else if(selected.length<6) selected.push(i); refreshGrid(); };
            grid.appendChild(c);
        }
    }

    function setTheme(t) { document.body.className = 'theme-' + t; }
    function setLang(l) { currentLang = l; document.getElementById('main-btn').innerText = dict[l].btn; }
    function acceptLegal() { document.getElementById('legal-overlay').style.display = 'none'; document.getElementById('app-content').style.filter = 'none'; setLang(pendingLang); }
    function showLegal(l) { pendingLang=l; document.getElementById('legal-overlay').style.display='flex'; document.getElementById('legal-content').innerHTML=legalDict[l].text; document.getElementById('legal-agree-btn').innerText=legalDict[l].btn; }

    window.onload = () => {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=1; i<=42; i++) realStatsDB[i] = [Math.random(), Math.random(), 300];
        refreshGrid();
        const sgrid = document.getElementById('s-grid');
        for(let i=1;i<=6;i++){ const sc=document.createElement('div'); sc.className='super-cell'; sc.innerText=i; sc.onclick=()=>{if(isProcessing)return; superNum=i; document.querySelectorAll('.super-cell').forEach(el=>el.classList.toggle('selected', el.innerText==i));}; sgrid.appendChild(sc); }
        setTimeout(() => { logoIntro.style.opacity = '1'; setTimeout(() => requestAnimationFrame(animateIntro), 2000); setTimeout(() => active2 = true, 3000); }, 1000);
        showLegal('de');
    };
</script>
</body>
</html>
